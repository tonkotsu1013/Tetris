<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini API 自動採点アプリ</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.6; }
    h1 { font-size: 1.5rem; border-bottom: 2px solid #4285f4; padding-bottom: 10px; }
    .config-box { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    input[type="password"] { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
    
    /* 保存チェックボックスのスタイル */
    .save-option { display: block; margin-top: 8px; font-size: 0.85rem; color: #5f6368; cursor: pointer; }
    .save-option input { margin-right: 5px; vertical-align: middle; }

    /* ドラッグ＆ドロップエリアのスタイル */
    .drop-zone {
      margin-top: 10px;
      padding: 30px 15px;
      border: 2px dashed #4285f4;
      border-radius: 8px;
      text-align: center;
      background-color: #f8fbff;
      cursor: pointer;
      transition: background-color 0.2s, border-color 0.2s;
    }
    .drop-zone:hover, .drop-zone.dragover {
      background-color: #e8f0fe;
      border-color: #1a73e8;
    }
    .drop-zone p { margin: 0; color: #5f6368; pointer-events: none; }
    
    /* アップロードされたファイルのリスト */
    .file-list { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
    .file-badge { background: #e0e0e0; padding: 5px 10px; border-radius: 15px; font-size: 0.85rem; display: flex; align-items: center; }

    .upload-section { margin-bottom: 25px; }
    
    /* ボタン類のスタイル */
    button { background-color: #4285f4; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 1.1rem; width: 100%; font-weight: bold; }
    button:hover { background-color: #3367d6; }
    button:disabled { background-color: #ccc; cursor: not-allowed; }
    
    .camera-btn { background-color: #34a853; width: auto; font-size: 0.9rem; padding: 8px 15px; margin-bottom: 10px; display: inline-flex; align-items: center; gap: 5px;}
    .camera-btn:hover { background-color: #2d9249; }
    
    #loading { display: none; text-align: center; margin: 20px 0; font-weight: bold; color: #4285f4; }
    
    /* 採点結果のスタイル */
    .result-item { margin-bottom: 15px; padding: 15px; border-radius: 8px; border-left: 5px solid; }
    .correct { background-color: #e6f4ea; border-color: #34a853; }
    .incorrect { background-color: #fce8e6; border-color: #ea4335; }
    .correct h3 { color: #1e8e3e; margin-top: 0; }
    .incorrect h3 { color: #d93025; margin-top: 0; }
    .detail { margin: 5px 0; font-size: 0.95rem; }

    /* カメラ用モーダルのスタイル（画面いっぱいに変更） */
    .camera-modal { 
      display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
      background: #000; z-index: 1000; flex-direction: column; 
    }
    .camera-content { 
      width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; 
    }
    .camera-header {
      position: absolute; top: 0; left: 0; width: 100%; padding: 15px; box-sizing: border-box;
      background: rgba(0,0,0,0.6); display: flex; justify-content: space-between; align-items: center; z-index: 10;
    }
    .camera-header h3 { margin: 0; color: white; font-size: 1.2rem; }
    .camera-select { padding: 8px; font-size: 1rem; border-radius: 4px; max-width: 250px; }
    
    #cameraVideo { 
      width: 100%; height: 100%; object-fit: contain; background-color: #000; transition: opacity 0.1s; 
    }
    
    .camera-controls { 
      position: absolute; bottom: 30px; left: 0; width: 100%; 
      display: flex; gap: 20px; justify-content: center; z-index: 10; 
    }
    .capture-btn { 
      background-color: #ff9800; width: auto; padding: 15px 40px; font-size: 1.2rem; 
      border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
    }
    .capture-btn:hover { background-color: #e68a00; }
    .close-btn { 
      background-color: #7f8c8d; width: auto; padding: 15px 25px; font-size: 1rem; 
      border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
    }
    .close-btn:hover { background-color: #6c7a7d; }
  </style>
</head>
<body>

  <h1>📝 Gemini 自動採点アプリ</h1>

  <div class="config-box">
    <label for="apiKey"><strong>Gemini API キー:</strong></label>
    <input type="password" id="apiKey" placeholder="AIzaSy...">
    
    <label class="save-option">
      <input type="checkbox" id="saveApiKeyCheck"> APIキーをブラウザに保存する（次回から自動入力）
    </label>
    <small style="display: block; margin-top: 5px; color: #666;">※キーはあなたのブラウザ内（LocalStorage）にのみ保存されます。学校の共有PCなどではチェックを外してください。</small>
  </div>

  <div class="upload-section">
    <strong>📄 模範解答（答えのページ）</strong><br>
    <button type="button" class="camera-btn" onclick="openCamera('answer')">📷 カメラで撮影する</button>
    <div class="drop-zone" id="answerDropZone">
      <p>ここに画像をドラッグ＆ドロップするか、クリックしてファイルを選択</p>
      <input type="file" id="answerInput" accept="image/*" multiple style="display: none;">
    </div>
    <div id="answerFileList" class="file-list"></div>
  </div>

  <div class="upload-section">
    <strong>✍️ 生徒の回答（回答のページ）</strong><br>
    <button type="button" class="camera-btn" onclick="openCamera('student')">📷 カメラで撮影する</button>
    <div class="drop-zone" id="studentDropZone">
      <p>ここに画像をドラッグ＆ドロップするか、クリックしてファイルを選択</p>
      <input type="file" id="studentInput" accept="image/*" multiple style="display: none;">
    </div>
    <div id="studentFileList" class="file-list"></div>
  </div>

  <button id="gradeBtn">採点開始</button>

  <div id="loading">採点中...（画像枚数が多いと数十秒かかる場合があります）</div>
  <div id="resultsArea"></div>

  <div id="cameraModal" class="camera-modal">
    <div class="camera-content">
      <div class="camera-header">
        <h3 id="cameraModalTitle">プリントを撮影</h3>
        <select id="cameraSelect" class="camera-select">
          <option value="">カメラを読み込み中...</option>
        </select>
      </div>
      <video id="cameraVideo" autoplay playsinline></video>
      <canvas id="cameraCanvas" style="display: none;"></canvas>
      <div class="camera-controls">
        <button id="captureBtn" class="capture-btn">📸 撮影！</button>
        <button id="closeCameraBtn" class="close-btn">✖ 完了して閉じる</button>
      </div>
    </div>
  </div>

  <script>
    let answerFilesArray = [];
    let studentFilesArray = [];

    window.addEventListener('DOMContentLoaded', () => {
      const savedKey = localStorage.getItem('gemini_api_key');
      if (savedKey) {
        document.getElementById('apiKey').value = savedKey;
        document.getElementById('saveApiKeyCheck').checked = true;
      }
    });

    function addBadge(listId, fileName) {
      const fileList = document.getElementById(listId);
      const badge = document.createElement('div');
      badge.className = 'file-badge';
      badge.textContent = `📎 ${fileName}`;
      fileList.appendChild(badge);
    }

    function setupDropZone(zoneId, inputId, listId, fileArray) {
      const dropZone = document.getElementById(zoneId);
      const fileInput = document.getElementById(inputId);

      dropZone.addEventListener('click', () => fileInput.click());

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });
      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
      });

      fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
        fileInput.value = ""; 
      });

      function handleFiles(files) {
        for (const file of files) {
          if (file.type.startsWith('image/')) {
            fileArray.push(file);
            addBadge(listId, file.name);
          }
        }
      }
    }

    setupDropZone('answerDropZone', 'answerInput', 'answerFileList', answerFilesArray);
    setupDropZone('studentDropZone', 'studentInput', 'studentFileList', studentFilesArray);

    let currentCameraTarget = null;
    let videoStream = null;
    let photoCounter = 1;
    let availableCameras = [];

    // カメラの一覧を取得してセレクトボックスに追加する関数
    async function updateCameraList() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        availableCameras = devices.filter(device => device.kind === 'videoinput');
        
        const select = document.getElementById('cameraSelect');
        select.innerHTML = ''; 
        
        availableCameras.forEach((camera, index) => {
          const option = document.createElement('option');
          option.value = camera.deviceId;
          option.text = camera.label || `カメラ ${index + 1}`; 
          select.appendChild(option);
        });
      } catch (err) {
        console.error("デバイスの取得に失敗しました:", err);
      }
    }

    // 指定したデバイスIDのカメラを起動する関数
    async function startStream(deviceId = null) {
      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
      }
      
      const constraints = {
        video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: 'environment' },
        audio: false
      };

      try {
        videoStream = await navigator.mediaDevices.getUserMedia(constraints);
        const video = document.getElementById('cameraVideo');
        video.srcObject = videoStream;
        
        // 初回起動時、またはカメラリストが空の場合はリストを更新する
        if (availableCameras.length === 0 || !availableCameras[0].label) {
            await updateCameraList();
            
            // 現在アクティブなトラックのデバイスIDをセレクトボックスに反映させる
            const activeTrack = videoStream.getVideoTracks()[0];
            const select = document.getElementById('cameraSelect');
            if (activeTrack && activeTrack.getSettings) {
                const settings = activeTrack.getSettings();
                if (settings.deviceId) {
                    select.value = settings.deviceId;
                }
            }
        }
      } catch (err) {
        console.error("カメラエラー:", err);
        alert('カメラを起動できませんでした。ブラウザのカメラ許可設定を確認してください。');
      }
    }

    async function openCamera(target) {
      currentCameraTarget = target;
      const modal = document.getElementById('cameraModal');
      const modalTitle = document.getElementById('cameraModalTitle');
      
      if (target === 'answer') {
        modalTitle.textContent = '📄 模範解答を撮影';
      } else {
        modalTitle.textContent = '✍️ 生徒の回答を撮影';
      }

      modal.style.display = 'flex';
      await startStream();
    }

    // セレクトボックスの選択が変更されたら、該当のカメラに切り替える
    document.getElementById('cameraSelect').addEventListener('change', (e) => {
      startStream(e.target.value);
    });

    function closeCamera() {
      const modal = document.getElementById('cameraModal');
      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
        videoStream = null;
      }
      modal.style.display = 'none';
      
      availableCameras = []; 
      document.getElementById('cameraSelect').innerHTML = '<option value="">カメラを読み込み中...</option>';
    }

    document.getElementById('closeCameraBtn').addEventListener('click', closeCamera);

    document.getElementById('captureBtn').addEventListener('click', () => {
      const video = document.getElementById('cameraVideo');
      const canvas = document.getElementById('cameraCanvas');
      const ctx = canvas.getContext('2d');
      
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      canvas.toBlob((blob) => {
        if (!blob) return;
        
        const fileName = `カメラ撮影_${photoCounter}.jpg`;
        const file = new File([blob], fileName, { type: 'image/jpeg' });
        photoCounter++;
        
        if (currentCameraTarget === 'answer') {
          answerFilesArray.push(file);
          addBadge('answerFileList', fileName);
        } else if (currentCameraTarget === 'student') {
          studentFilesArray.push(file);
          addBadge('studentFileList', fileName);
        }

        video.style.opacity = '0.3';
        setTimeout(() => video.style.opacity = '1', 150);
        
      }, 'image/jpeg', 0.9);
    });

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => {
          const base64Data = reader.result.split(',')[1];
          resolve({ inlineData: { data: base64Data, mimeType: file.type } });
        };
        reader.onerror = error => reject(error);
      });
    }

    document.getElementById('gradeBtn').addEventListener('click', async () => {
      const apiKey = document.getElementById('apiKey').value.trim();
      const shouldSave = document.getElementById('saveApiKeyCheck').checked;

      if (!apiKey) { alert('APIキーを入力してください。'); return; }

      if (shouldSave) {
        localStorage.setItem('gemini_api_key', apiKey);
      } else {
        localStorage.removeItem('gemini_api_key');
      }

      if (answerFilesArray.length === 0) { alert('模範解答の画像をアップロードまたは撮影してください。'); return; }
      if (studentFilesArray.length === 0) { alert('生徒の回答の画像をアップロードまたは撮影してください。'); return; }

      const btn = document.getElementById('gradeBtn');
      const loading = document.getElementById('loading');
      const resultsArea = document.getElementById('resultsArea');

      btn.disabled = true;
      loading.style.display = 'block';
      resultsArea.innerHTML = '';

      try {
        const answerParts = await Promise.all(answerFilesArray.map(fileToBase64));
        const studentParts = await Promise.all(studentFilesArray.map(fileToBase64));

        const promptText = `
          あなたは優秀な採点アシスタントです。
          提供された【模範解答の画像】と【生徒の回答の画像】を比較し、生徒の回答を採点してください。
          結果は以下のJSONスキーマに従ったJSON配列のみで出力してください。Markdownの装飾は一切不要です。
          
          ルール:
          - あっている場合: 問題番号と正解のみを出力。
          - 間壊っている場合: 問題番号、正解、生徒の回答、および間違えた理由の解説を出力。

          フォーマット例:
          [
            { "question_number": "1", "is_correct": true, "correct_answer": "ア" },
            { "question_number": "2", "is_correct": false, "correct_answer": "徳川家康", "student_answer": "豊臣秀吉", "explanation": "江戸幕府を開いたのは徳川家康です。" }
          ]
        `;

        const contents = [
          { role: "user", parts: [
              { text: promptText },
              { text: "【模範解答の画像】" },
              ...answerParts,
              { text: "【生徒の回答の画像】" },
              ...studentParts
            ]
          }
        ];

        const modelName = "gemini-2.5-flash"; 
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: contents,
            generationConfig: { response_mime_type: "application/json" }
          })
        });

        if (!response.ok) {
          const errData = await response.json();
          throw new Error(errData.error?.message || 'API通信エラーが発生しました。');
        }

        const data = await response.json();
        const jsonString = data.candidates[0].content.parts[0].text;
        const results = JSON.parse(jsonString);

        if (results.length === 0) {
          resultsArea.innerHTML = '<p>採点結果を取得できませんでした。画像が不鮮明か、問題が検出できませんでした。</p>';
        } else {
          results.forEach(item => {
            const div = document.createElement('div');
            div.className = `result-item ${item.is_correct ? 'correct' : 'incorrect'}`;
            
            if (item.is_correct) {
              div.innerHTML = `
                <h3>◎ 問題 ${item.question_number}</h3>
                <div class="detail"><strong>正解:</strong> ${item.correct_answer || '記載なし'}</div>
              `;
            } else {
              div.innerHTML = `
                <h3>❌ 問題 ${item.question_number}</h3>
                <div class="detail"><strong>正解:</strong> ${item.correct_answer || '記載なし'}</div>
                <div class="detail"><strong>生徒の回答:</strong> <span style="color:red;">${item.student_answer || '空欄または判別不能'}</span></div>
                <div class="detail" style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ea4335;">
                  <strong>💡 解説:</strong><br>${item.explanation || '解説はありません。'}
                </div>
              `;
            }
            resultsArea.appendChild(div);
          });
        }

      } catch (error) {
        console.error(error);
        alert(`エラーが発生しました:\n${error.message}`);
      } finally {
        btn.disabled = false;
        loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
