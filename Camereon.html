// EXTENSION MODULE 12: MAP EDITOR (DEV TOOL)
// めっちゃカメレオン - マップエディター（開発ツール）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const MapEditor = (function() {
  let active = false;
  let selectedObj = null;
  let editCanvas = null;
  let customMap = null;

  function open() {
    if (active) return;
    active = true;

    const overlay = document.createElement('div');
    overlay.id = 'map-editor-overlay';
    overlay.style.cssText = `
      position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;
      display:flex;flex-direction:column;
    `;
    overlay.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border)">
        <h3 style="font-size:1rem">🗺️ マップエディター（開発ツール）</h3>
        <div style="flex:1"></div>
        <button class="btn btn-secondary btn-sm" id="me-export">📋 エクスポート</button>
        <button class="btn btn-danger btn-sm" id="me-close">✕ 閉じる</button>
      </div>
      <div style="display:flex;flex:1;overflow:hidden">
        <div style="width:200px;border-right:1px solid var(--border);padding:12px;overflow-y:auto;font-size:.82rem">
          <div style="color:var(--text2);font-weight:700;margin-bottom:8px">オブジェクト追加</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <button class="btn btn-secondary btn-sm" id="me-add-box">+ ボックス</button>
            <button class="btn btn-secondary btn-sm" id="me-add-circle">+ 円</button>
            <button class="btn btn-secondary btn-sm" id="me-clear">🗑 クリア</button>
          </div>
          <div style="margin-top:16px;color:var(--text2);font-weight:700;margin-bottom:8px">背景色</div>
          <input type="color" id="me-bg-color" value="#5C4020" style="width:100%;height:32px;border:none;border-radius:4px;cursor:pointer">
          <div style="margin-top:12px;color:var(--text2);font-size:.75rem">
            クリックでオブジェクト選択<br>
            ドラッグで移動<br>
            Deleteで削除
          </div>
        </div>
        <canvas id="me-canvas" style="flex:1;cursor:crosshair"></canvas>
        <div id="me-props" style="width:180px;border-left:1px solid var(--border);padding:12px;overflow-y:auto;font-size:.82rem;display:none">
          <div style="color:var(--text2);font-weight:700;margin-bottom:8px">プロパティ</div>
          <div class="field"><label>ラベル</label><input type="text" id="me-label" class="field input" style="width:100%;padding:6px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text)"></div>
          <div class="field"><label>色</label><input type="color" id="me-color" style="width:100%;height:28px;border:none;border-radius:4px;cursor:pointer"></div>
          <button class="btn btn-danger btn-sm" id="me-delete" style="width:100%;margin-top:8px">🗑 削除</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    editCanvas = document.getElementById('me-canvas');
    const ctx = editCanvas.getContext('2d');
    customMap = { bg: '#5C4020', objects: [] };

    function resize() {
      const rect = editCanvas.parentElement.getBoundingClientRect();
      editCanvas.width = rect.width - 380;
      editCanvas.height = rect.height;
      render();
    }
    setTimeout(resize, 50);
    window.addEventListener('resize', resize);

    function render() {
      const w = editCanvas.width, h = editCanvas.height;
      ctx.fillStyle = customMap.bg;
      ctx.fillRect(0, 0, w, h);
      // Grid
      ctx.save();ctx.globalAlpha=.1;ctx.strokeStyle='#fff';ctx.lineWidth=1;
      for(let x=0;x<w;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}
      for(let y=0;y<h;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}
      ctx.restore();
      // Objects
      customMap.objects.forEach((obj, i) => {
        ctx.save();
        ctx.fillStyle = obj.color;
        const isSelected = obj === selectedObj;
        if (isSelected) { ctx.shadowColor = '#58a6ff'; ctx.shadowBlur = 12; }
        if (obj.type === 'box') {
          const ox=obj.x*w,oy=obj.y*h,ow=obj.w*w,oh=obj.h*h;
          ctx.fillRect(ox,oy,ow,oh);
          if (isSelected) { ctx.strokeStyle='#58a6ff';ctx.lineWidth=2;ctx.strokeRect(ox,oy,ow,oh); }
          ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText(obj.label||'',ox+ow/2,oy+oh/2);
        } else if (obj.type === 'circle') {
          const cx=obj.x*w,cy=obj.y*h,r=obj.r*Math.min(w,h);
          ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
          if (isSelected) { ctx.strokeStyle='#58a6ff';ctx.lineWidth=2;ctx.stroke(); }
        }
        ctx.restore();
      });
    }

    // Interactions
    let dragging = false, dragStart = null, dragObjStart = null;

    editCanvas.addEventListener('mousedown', e => {
      const r = editCanvas.getBoundingClientRect();
      const mx = (e.clientX - r.left) / editCanvas.width;
      const my = (e.clientY - r.top) / editCanvas.height;
      // Find clicked object
      selectedObj = null;
      customMap.objects.forEach(obj => {
        if (obj.type === 'box') {
          if (mx >= obj.x && mx <= obj.x+obj.w && my >= obj.y && my <= obj.y+obj.h) selectedObj = obj;
        } else if (obj.type === 'circle') {
          const dx = mx - obj.x, dy = my - obj.y;
          if (Math.sqrt(dx*dx+dy*dy) <= obj.r) selectedObj = obj;
        }
      });
      if (selectedObj) {
        dragging = true;
        dragStart = { mx, my };
        dragObjStart = { x: selectedObj.x, y: selectedObj.y };
        showProps();
      } else {
        hideProps();
      }
      render();
    });

    editCanvas.addEventListener('mousemove', e => {
      if (!dragging || !selectedObj) return;
      const r = editCanvas.getBoundingClientRect();
      const mx = (e.clientX - r.left) / editCanvas.width;
      const my = (e.clientY - r.top) / editCanvas.height;
      selectedObj.x = Math.max(0, dragObjStart.x + (mx - dragStart.mx));
      selectedObj.y = Math.max(0, dragObjStart.y + (my - dragStart.my));
      render();
    });

    editCanvas.addEventListener('mouseup', () => { dragging = false; });

    function showProps() {
      if (!selectedObj) return;
      const p = document.getElementById('me-props');
      if (p) p.style.display = '';
      const lbl = document.getElementById('me-label');
      const col = document.getElementById('me-color');
      if (lbl) lbl.value = selectedObj.label || '';
      if (col) col.value = selectedObj.color || '#888888';
    }
    function hideProps() {
      const p = document.getElementById('me-props');
      if (p) p.style.display = 'none';
    }

    document.getElementById('me-label')?.addEventListener('input', e => { if (selectedObj) { selectedObj.label = e.target.value; render(); } });
    document.getElementById('me-color')?.addEventListener('input', e => { if (selectedObj) { selectedObj.color = e.target.value; render(); } });
    document.getElementById('me-delete')?.addEventListener('click', () => {
      customMap.objects = customMap.objects.filter(o => o !== selectedObj);
      selectedObj = null; hideProps(); render();
    });
    document.getElementById('me-bg-color')?.addEventListener('input', e => { customMap.bg = e.target.value; render(); });
    document.getElementById('me-add-box')?.addEventListener('click', () => {
      customMap.objects.push({ type:'box', x:.1+Math.random()*.6, y:.1+Math.random()*.6, w:.12, h:.1, color:'#4A4A4A', label:'新オブジェクト' });
      render();
    });
    document.getElementById('me-add-circle')?.addEventListener('click', () => {
      customMap.objects.push({ type:'circle', x:.2+Math.random()*.6, y:.2+Math.random()*.6, r:.06, color:'#4A4A4A', label:'円' });
      render();
    });
    document.getElementById('me-clear')?.addEventListener('click', () => { customMap.objects=[]; selectedObj=null; hideProps(); render(); });
    document.getElementById('me-export')?.addEventListener('click', () => {
      const json = JSON.stringify(customMap, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'custom_map.json';
      a.click();
      showToast('📋 マップをエクスポートしました', 'info');
    });
    document.getElementById('me-close')?.addEventListener('click', () => {
      overlay.remove();
      window.removeEventListener('resize', resize);
      active = false;
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Delete' && selectedObj && active) {
        customMap.objects = customMap.objects.filter(o => o !== selectedObj);
        selectedObj = null; hideProps(); render();
      }
    });
  }

  return { open };
})();

      ['lobby-chat-messages','game-chat-messages'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = '';
      });
    }},
  };

  function appendLocalMessage(from, text) {
    ['lobby-chat-messages','game-chat-messages'].forEach(id => {
      const c = document.getElementById(id);
      if (!c) return;
      const d = document.createElement('div');
      d.className = 'chat-msg system';
      d.style.whiteSpace = 'pre-line';
      d.textContent = text;
      c.appendChild(d);
      c.scrollTop = c.scrollHeight;
    });
  }

  function process(input) {
    const parts = input.trim().split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const args = parts.slice(1);
    if (commands[cmd]) {
      commands[cmd].fn(args);
      return true;
    }
    return false;
  }

  function hookInputs() {
    ['lobby-chat-input','game-chat-input'].forEach(id => {
      const input = document.getElementById(id);
      if (!input) return;
      // Tab completion
      input.addEventListener('keydown', e => {
        if (e.key === 'Tab' && input.value.startsWith('/')) {
          e.preventDefault();
          const partial = input.value.toLowerCase();
          const match = Object.keys(commands).find(k => k.startsWith(partial));
          if (match) input.value = match + ' ';
        }
        if (e.key === 'Enter') {
          const val = input.value.trim();
          if (val.startsWith('/')) {
            e.preventDefault();
            process(val);
            input.value = '';
          }
        }
      });
    });
  }

  return { process, hookInputs, appendLocalMessage };
})();

// MODULE 14: CONNECTION QUALITY MONITOR
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const ConnectionMonitor = (function() {
  const history = [];
  const MAX_HISTORY = 30;
  let warningShown = false;

  function record(ping) {
    history.push({ ts: Date.now(), ping });
    if (history.length > MAX_HISTORY) history.shift();
    analyze();
  }

  function analyze() {
    if (history.length < 5) return;
    const recent = history.slice(-5);
    const avg = recent.reduce((s,h) => s + h.ping, 0) / recent.length;
    const jitter = Math.max(...recent.map(h=>h.ping)) - Math.min(...recent.map(h=>h.ping));

    if (avg > 300 && !warningShown) {
      warningShown = true;
      showQualityWarning(avg, jitter);
    } else if (avg <= 200) {
      warningShown = false;
    }
  }

  function showQualityWarning(avg, jitter) {
    if (typeof showToast === 'function') {
      showToast(`⚠️ 接続品質が低下しています (${Math.round(avg)}ms)`, 'warn');
    }
  }

  function getAvgPing() {
    if (!history.length) return 0;
    return Math.round(history.reduce((s,h) => s + h.ping, 0) / history.length);
  }

  function getJitter() {
    if (history.length < 2) return 0;
    const pings = history.map(h => h.ping);
    return Math.max(...pings) - Math.min(...pings);
  }

  function getQualityString() {
    const avg = getAvgPing();
    if (avg === 0) return '---';
    if (avg < 60) return '優良';
    if (avg < 120) return '良好';
    if (avg < 250) return '普通';
    return '不安定';
  }

  return { record, getAvgPing, getJitter, getQualityString };
})();

    { title: '👁️ よく見て', body: 'カメレオンは背景に溶け込んでいます。不自然に見える部分を探そう！', highlight: null },

    active = false;
    if (overlay) { overlay.remove(); overlay = null; }
    const role = steps === STEPS_HUNTER ? 'hunter' : 'chameleon';

  function capture() {

    const pc = document.getElementById('paint-canvas');
    if (!gc) { showToast('ゲーム画面が見つかりません', 'warn'); return; }

    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#39d353';

    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText('🦎 めっちゃカメレオン', gc.width - 10, gc.height - 10);
    ctx.restore();

    // Download
    const link = document.createElement('a');
    link.download = `camereon_${Date.now()}.png`;

    showToast('📸 スクリーンショットを保存しました！', 'info');

// MODULE 19: PAINT HISTORY (UNDO/REDO)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const PaintHistory = (function() {
  const MAX_HISTORY = 30;
  let undoStack = [];
  let redoStack = [];
  let canvas = null;
  let ctx = null;

  function init() {
    canvas = document.getElementById('paint-canvas');
    if (!canvas) return;
    ctx = canvas.getContext('2d');
    addUndoRedoButtons();
  }

  function saveState() {
    if (!canvas || !ctx) return;
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    undoStack.push(imgData);
    if (undoStack.length > MAX_HISTORY) undoStack.shift();
    redoStack = [];
    updateButtonStates();
  }

  function undo() {
    if (undoStack.length === 0) return;
    const current = ctx.getImageData(0, 0, canvas.width, canvas.height);
    redoStack.push(current);
    const prev = undoStack.pop();
    ctx.putImageData(prev, 0, 0);
    updateButtonStates();
    showToast('↩ 元に戻した', 'info');
  }

  function redo() {
    if (redoStack.length === 0) return;
    const current = ctx.getImageData(0, 0, canvas.width, canvas.height);
    undoStack.push(current);
    const next = redoStack.pop();
    ctx.putImageData(next, 0, 0);
    updateButtonStates();
    showToast('↪ やり直した', 'info');
  }

  function clear() { undoStack = []; redoStack = []; updateButtonStates(); }

  function updateButtonStates() {
    const undoBtn = document.getElementById('paint-undo');
    const redoBtn = document.getElementById('paint-redo');
    if (undoBtn) undoBtn.disabled = undoStack.length === 0;
    if (redoBtn) redoBtn.disabled = redoStack.length === 0;
  }

  function addUndoRedoButtons() {
    const toolbar = document.getElementById('paint-toolbar');
    if (!toolbar || document.getElementById('paint-undo')) return;
    const undoBtn = document.createElement('button');
    undoBtn.id = 'paint-undo';
    undoBtn.className = 'tool-btn';
    undoBtn.textContent = '↩';
    undoBtn.title = '元に戻す (Ctrl+Z)';
    undoBtn.disabled = true;
    undoBtn.addEventListener('click', undo);

    const redoBtn = document.createElement('button');
    redoBtn.id = 'paint-redo';
    redoBtn.className = 'tool-btn';
    redoBtn.textContent = '↪';
    redoBtn.title = 'やり直す (Ctrl+Y)';
    redoBtn.disabled = true;
    redoBtn.addEventListener('click', redo);

    const toolBtns = toolbar.querySelector('.tool-btns');
    if (toolBtns) { toolBtns.appendChild(undoBtn); toolBtns.appendChild(redoBtn); }

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') { e.preventDefault(); undo(); }
      if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); }
    });

    // Hook into paint events to save state
    if (canvas) {
      let strokeStart = false;
      canvas.addEventListener('mousedown', () => { saveState(); strokeStart = true; });
      canvas.addEventListener('mouseup', () => { strokeStart = false; });
    }
  }

  window.addEventListener('load', () => setTimeout(init, 1800));

  return { undo, redo, saveState, clear };
})();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MODULE 20: BACKGROUND MUSIC GENERATOR (Web Audio)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const BGMSystem = (function() {
  let audioCtx = null;
  let gainNode = null;
  let playing = false;
  let nodes = [];
  let interval = null;
  let currentPhase = null;

  function init() {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 0;
      gainNode.connect(audioCtx.destination);
    } catch(e) { console.warn('BGM: Audio not available'); }
  }

  function resume() { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }

  // Generative ambient music: random pentatonic notes
  const PAINT_SCALE = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25]; // C maj pentatonic
  const HUNT_SCALE  = [220.00, 246.94, 261.63, 293.66, 329.63, 369.99, 415.30, 440.00]; // A min pentatonic

  function playNote(freq, duration, when, vol) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    env.gain.setValueAtTime(0, when);
    env.gain.linearRampToValueAtTime(vol, when + 0.05);
    env.gain.exponentialRampToValueAtTime(0.001, when + duration);
    osc.connect(env);
    env.connect(gainNode);
    osc.start(when);
    osc.stop(when + duration + 0.1);
    nodes.push(osc);
    // Cleanup old nodes
    if (nodes.length > 50) nodes = nodes.slice(-20);
  }

  function startPaintBGM() {
    if (!audioCtx) return;
    resume();
    gainNode.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 1);
    playing = true;
    let beat = 0;
    const tempo = 0.8; // seconds per beat
    interval = setInterval(() => {
      if (!playing) return;
      const scale = PAINT_SCALE;
      const when = audioCtx.currentTime;
      // Arpeggiate
      if (beat % 4 === 0) {
        scale.slice(0,4).forEach((f,i) => playNote(f, 0.4, when + i*0.15, 0.15));
      } else if (beat % 2 === 0) {
        const f = scale[Math.floor(Math.random() * scale.length)];
        playNote(f, 0.3, when, 0.1);
        playNote(f * 1.5, 0.2, when + 0.1, 0.05);
      } else {
        playNote(scale[0]/2, 0.5, when, 0.08);
      }
      beat++;
    }, tempo * 1000);
  }

  function startHuntBGM() {
    if (!audioCtx) return;
    resume();
    gainNode.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.5);
    playing = true;
    let beat = 0;
    const tempo = 0.4;
    interval = setInterval(() => {
      if (!playing) return;
      const scale = HUNT_SCALE;
      const when = audioCtx.currentTime;
      if (beat % 2 === 0) {
        // Bass pulse
        playNote(scale[0]/2, 0.25, when, 0.18);
      }
      if (beat % 4 === 1) {
        const f = scale[Math.floor(Math.random() * scale.length)];
        playNote(f, 0.2, when, 0.08);
      }
      if (beat % 8 === 0) {
        scale.slice(0,3).forEach((f,i) => playNote(f*2, 0.15, when + i*0.08, 0.06));
      }
      beat++;
    }, tempo * 1000);
  }

  function stop() {
    playing = false;
    if (interval) { clearInterval(interval); interval = null; }
    if (gainNode && audioCtx) gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
  }

  function setPhase(phase) {
    if (phase === currentPhase) return;
    currentPhase = phase;
    stop();
    setTimeout(() => {
      if (phase === 'paint') startPaintBGM();
      else if (phase === 'hunt') startHuntBGM();
    }, 600);
  }

  function setVolume(v) {
    if (gainNode && audioCtx) gainNode.gain.linearRampToValueAtTime(v * 0.15, audioCtx.currentTime + 0.3);
  }

  window.addEventListener('load', () => {
    setTimeout(() => {
      document.addEventListener('click', () => { if (!audioCtx) init(); resume(); }, { once: true });
      // Hook to phase changes
      setTimeout(() => {
        if (window.STATE && window.STATE.socket) {
          STATE.socket.on('game:phase', data => setPhase(data.phase));
          STATE.socket.on('game:result', () => stop());
        }
      }, 1200);
    }, 900);
  });

  return { init, setPhase, stop, setVolume };
})();

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MODULE 21: MAP BACKGROUND IMPROVEMENTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// Enhanced map rendering with textures and ambient effects
const MapRenderer = (function() {
  const textureCache = {};

  function getOrCreateTexture(color, type) {
    const key = `${color}_${type}`;
    if (textureCache[key]) return textureCache[key];
    const tc = document.createElement('canvas');
    tc.width = 64; tc.height = 64;
    const ctx = tc.getContext('2d');
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, 64, 64);
    if (type === 'wood') {
      ctx.globalAlpha = 0.15;
      for (let i = 0; i < 8; i++) {
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1 + Math.random();
        ctx.beginPath();
        ctx.moveTo(0, i * 8 + Math.random() * 4);
        ctx.lineTo(64, i * 8 + Math.random() * 4);
        ctx.stroke();
      }
    } else if (type === 'stone') {
      ctx.globalAlpha = 0.12;
      for (let i = 0; i < 12; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#000';
        ctx.beginPath();
        ctx.arc(Math.random()*64, Math.random()*64, 1+Math.random()*3, 0, Math.PI*2);
        ctx.fill();
      }
    }
    textureCache[key] = tc;
    return tc;
  }

  function drawEnhancedObject(ctx, obj, w, h) {
    ctx.save();
    if (obj.type === 'box') {
      const ox = obj.x*w, oy = obj.y*h, ow = obj.w*w, oh = obj.h*h;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,.3)';
      ctx.fillRect(ox+4, oy+4, ow, oh);
      // Main body with gradient
      const grad = ctx.createLinearGradient(ox, oy, ox, oy+oh);
      grad.addColorStop(0, lightenColor(obj.color, 20));
      grad.addColorStop(1, darkenColor(obj.color, 20));
      ctx.fillStyle = grad;
      roundRect(ctx, ox, oy, ow, oh, 5);
      ctx.fill();
      // Highlight
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#fff';
      roundRect(ctx, ox+1, oy+1, ow-2, oh/3, 4);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Label
      ctx.fillStyle = 'rgba(255,255,255,.55)';
      ctx.font = `bold ${Math.max(9, ow/8)}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,.5)'; ctx.shadowBlur = 4;
      ctx.fillText(obj.label || '', ox+ow/2, oy+oh/2);
    } else if (obj.type === 'circle') {
      const cx = obj.x*w, cy = obj.y*h, r = obj.r*Math.min(w,h);
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,.25)';
      ctx.beginPath(); ctx.ellipse(cx+3, cy+5, r, r*0.6, 0, 0, Math.PI*2); ctx.fill();
      // Main body
      const grad = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, 0, cx, cy, r);
      grad.addColorStop(0, lightenColor(obj.color, 25));
      grad.addColorStop(1, darkenColor(obj.color, 10));
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
      // Specular
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx-r*0.25, cy-r*0.25, r*0.35, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      // Label
      ctx.fillStyle = 'rgba(255,255,255,.55)';
      ctx.font = `bold ${Math.max(8,r/2.5)}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,.5)'; ctx.shadowBlur = 4;
      ctx.fillText(obj.label || '', cx, cy);
    }
    ctx.restore();
  }

  function lightenColor(hex, amount) {
    try {
      const r = Math.min(255, parseInt(hex.slice(1,3),16)+amount);
      const g = Math.min(255, parseInt(hex.slice(3,5),16)+amount);
      const b = Math.min(255, parseInt(hex.slice(5,7),16)+amount);
      return `rgb(${r},${g},${b})`;
    } catch(e) { return hex; }
  }

  function darkenColor(hex, amount) {
    try {
      const r = Math.max(0, parseInt(hex.slice(1,3),16)-amount);
      const g = Math.max(0, parseInt(hex.slice(3,5),16)-amount);
      const b = Math.max(0, parseInt(hex.slice(5,7),16)-amount);
      return `rgb(${r},${g},${b})`;
    } catch(e) { return hex; }
  }

  return { drawEnhancedObject, lightenColor, darkenColor };
})();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MODULE 22: NETWORK STATISTICS DISPLAY
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const NetStats = (function() {
  let panel = null;
  let bytesSent = 0;
  let bytesRecv = 0;
  let packetsPerSec = 0;
  let lastPacketCount = 0;
  let packetCount = 0;
  let updateInterval = null;

  function trackSend(bytes) { bytesSent += bytes; packetCount++; }
  function trackRecv(bytes) { bytesRecv += bytes; packetCount++; }

  function formatBytes(b) {
    if (b < 1024) return `${b}B`;
    if (b < 1024*1024) return `${(b/1024).toFixed(1)}KB`;
    return `${(b/(1024*1024)).toFixed(2)}MB`;
  }

  function createPanel() {
    panel = document.createElement('div');
    panel.id = 'net-stats';
    panel.style.cssText = `
      position:fixed;bottom:14px;right:14px;z-index:100;
      background:rgba(13,17,23,.9);border:1px solid var(--border);
      border-radius:8px;padding:8px 12px;font:11px/1.8 monospace;
      color:var(--text2);display:none;min-width:160px;
    `;
    document.body.appendChild(panel);
    updateInterval = setInterval(update, 1000);
  }

  function update() {
    if (!panel || panel.style.display === 'none') return;
    const pps = packetCount - lastPacketCount;
    lastPacketCount = packetCount;
    panel.innerHTML = `
      <div style="color:var(--accent2);font-weight:700;margin-bottom:4px">📡 ネット統計</div>
      <div>Ping: <span style="color:${STATE.ping<80?'var(--accent)':STATE.ping<200?'var(--warn)':'var(--danger)'}">${STATE.ping}ms</span></div>
      <div>品質: <span style="color:var(--text)">${typeof ConnectionMonitor !== 'undefined' ? ConnectionMonitor.getQualityString() : '---'}</span></div>
      <div>送信: <span style="color:var(--text)">${formatBytes(bytesSent)}</span></div>
      <div>受信: <span style="color:var(--text)">${formatBytes(bytesRecv)}</span></div>
      <div>パケット/秒: <span style="color:var(--text)">${pps}</span></div>
    `;
  }

  function show() { if (panel) panel.style.display = ''; }
  function hide() { if (panel) panel.style.display = 'none'; }
  function toggle() {
    if (!panel) createPanel();
    panel.style.display = panel.style.display === 'none' ? '' : 'none';
  }

  window.addEventListener('load', () => setTimeout(createPanel, 2000));

  return { show, hide, toggle, trackSend, trackRecv };
})();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MODULE 23: DYNAMIC LIGHTING EFFECTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const LightingSystem = (function() {
  let lightCanvas = null;
  let lightCtx = null;
  let lights = [];

  function init() {
    lightCanvas = document.createElement('canvas');
    lightCanvas.style.cssText = `
      position:absolute;inset:0;width:100%;height:100%;
      pointer-events:none;z-index:4;mix-blend-mode:screen;opacity:0.4;
      display:none;
    `;
    lightCtx = lightCanvas.getContext('2d');
    const gm = document.querySelector('.game-main');
    if (gm) gm.appendChild(lightCanvas);
  }

  function resize(w, h) {
    if (!lightCanvas) return;
    lightCanvas.width = w;
    lightCanvas.height = h;
  }

  function addLight(x, y, radius, color, intensity) {
    lights.push({ x, y, radius, color, intensity: intensity || 1, life: 1, id: Math.random() });
  }

  function removeOld() {
    lights = lights.filter(l => l.life > 0);
    lights.forEach(l => l.life -= 0.005);
  }

  function render(w, h) {
    if (!lightCtx || !lightCanvas || lightCanvas.style.display === 'none') return;
    lightCtx.clearRect(0, 0, w, h);
    lights.forEach(l => {
      const grad = lightCtx.createRadialGradient(l.x*w, l.y*h, 0, l.x*w, l.y*h, l.radius * Math.min(w,h));
      grad.addColorStop(0, l.color + Math.floor(l.life * 80).toString(16).padStart(2,'0'));
      grad.addColorStop(1, 'transparent');
      lightCtx.fillStyle = grad;
      lightCtx.beginPath();
      lightCtx.arc(l.x*w, l.y*h, l.radius * Math.min(w,h), 0, Math.PI*2);
      lightCtx.fill();
    });
    removeOld();
  }

  function showForMap(mapId) {
    const mapLights = {
      hideout: [
        {x:.84, y:.62, r:.12, color:'#FFA060'},
        {x:.52, y:.18, r:.1, color:'#FFD080'},
      ],
      space: [
        {x:.22, y:.5, r:.08, color:'#4080FF'},
        {x:.5, y:.5, r:.08, color:'#FF2040'},
        {x:.78, y:.5, r:.08, color:'#40FFAA'},
      ],
      backrooms: [
        {x:.22, y:.5, r:.1, color:'#FFE840'},
        {x:.5, y:.5, r:.1, color:'#FFE840'},
        {x:.78, y:.5, r:.1, color:'#FFE840'},
      ]
    };
    if (!lightCanvas) return;
    lightCanvas.style.display = mapLights[mapId] ? '' : 'none';
    lights = [];
    (mapLights[mapId] || []).forEach(l => {
      lights.push({ ...l, radius: l.r, life: 999, id: Math.random() });
    });
  }

  return { init, resize, render, addLight, showForMap };
})();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MODULE 24: SPECTATOR CAMERA
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const SpectatorCamera = (function() {
  let following = null;
  let spectating = false;
  let camX = 0.5, camY = 0.5, camZoom = 1;
  let indicator = null;

  function startSpectating() {
    spectating = true;
    // Find first alive chameleon to follow
    const alive = Object.values(STATE.game.players).filter(p => p.alive && p.role === 'chameleon');
    if (alive.length > 0) {
      following = alive[0].id;
    }
    showIndicator();
  }

  function stopSpectating() {
    spectating = false;
    following = null;
    hideIndicator();
  }

  function update() {
    if (!spectating || !following) return;
    const gp = STATE.game.players[following];
    if (!gp) {
      // Lost target, find another
      const alive = Object.values(STATE.game.players).filter(p => p.alive && p.role === 'chameleon');
      if (alive.length > 0) following = alive[0].id;
      else stopSpectating();
      return;
    }
    camX = gp.x;
    camY = gp.y;
  }

  function switchTarget() {
    const alive = Object.values(STATE.game.players).filter(p => p.alive && p.role === 'chameleon');
    if (alive.length === 0) return;
    const idx = alive.findIndex(p => p.id === following);
    following = alive[(idx + 1) % alive.length].id;
    showToast(`👁️ 観戦: ${STATE.game.players[following]?.name || '?'}`, 'info');
    updateIndicator();
  }

  function showIndicator() {
    if (indicator) return;
    indicator = document.createElement('div');
    indicator.id = 'spectator-indicator';
    indicator.style.cssText = `
      position:absolute;top:50px;left:50%;transform:translateX(-50%);
      z-index:30;background:rgba(13,17,23,.85);border:1px solid var(--text2);
      border-radius:20px;padding:6px 16px;font-size:.8rem;color:var(--text2);
      pointer-events:none;
    `;
    indicator.innerHTML = '👁️ 観戦モード — <span id="spec-target">?</span> を観戦中 <kbd style="background:var(--border);padding:1px 5px;border-radius:3px;font-size:.7rem">TAB</kbd> で切替';
    const gm = document.querySelector('.game-main');
    if (gm) gm.appendChild(indicator);
  }

  function updateIndicator() {
    const target = document.getElementById('spec-target');
    if (target && following) target.textContent = STATE.game.players[following]?.name || '?';
  }

  function hideIndicator() {
    if (indicator) { indicator.remove(); indicator = null; }
  }

  return { startSpectating, stopSpectating, update, switchTarget };
})();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MODULE 25: STICKER SYSTEM (special paint stamps)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const StickerSystem = (function() {
  const STICKERS = [
    { id:'tree', emoji:'🌲', size:40, label:'木' },
    { id:'rock', emoji:'🪨', size:36, label:'岩' },
    { id:'bush', emoji:'🌿', size:32, label:'草' },
    { id:'box',  emoji:'📦', size:38, label:'箱' },
    { id:'lamp', emoji:'💡', size:30, label:'ランプ' },
    { id:'door', emoji:'🚪', size:44, label:'ドア' },
    { id:'pot',  emoji:'🪴', size:36, label:'植木鉢' },
    { id:'book', emoji:'📚', size:32, label:'本' },
  ];

  let selected = null;
  let panel = null;

  function createPanel() {
    if (panel) return;
    panel = document.createElement('div');
    panel.id = 'sticker-panel';
    panel.style.cssText = `
      position:absolute;bottom:70px;left:14px;z-index:25;
      background:var(--bg2);border:1px solid var(--border);
      border-radius:12px;padding:10px;
      display:none;box-shadow:var(--panel-shadow);
    `;
    const grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(4,1fr);gap:6px;';
    STICKERS.forEach(st => {
      const btn = document.createElement('button');
      btn.style.cssText = `
        width:44px;height:44px;font-size:1.4rem;border:1px solid var(--border);
        border-radius:8px;background:var(--bg3);cursor:pointer;transition:.1s;
      `;
      btn.textContent = st.emoji;
      btn.title = st.label;
      btn.addEventListener('click', () => {
        selected = st;
        panel.style.display = 'none';
        showToast(`🪧 ${st.label}スタンプを選択 — キャンバス上でクリック！`, 'info');
        activateStickerMode();
      });
      grid.appendChild(btn);
    });
    panel.appendChild(grid);
    const gm = document.querySelector('.game-main');
    if (gm) gm.appendChild(panel);
  }

  function activateStickerMode() {
    const pc = document.getElementById('paint-canvas');
    if (!pc) return;
    const handler = e => {
      if (!selected) return;
      const r = pc.getBoundingClientRect();
      const x = (e.clientX - r.left) * (pc.width/r.width);
      const y = (e.clientY - r.top)  * (pc.height/r.height);
      const ctx = pc.getContext('2d');
      ctx.font = `${selected.size}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(selected.emoji, x, y);
      // Emit as fill stroke (approximation)
      if (STATE.socket) STATE.socket.emit('paint:stroke', {
        type: 'fill', x: x/pc.width, y: y/pc.height, color: '#transparent'
      });
      selected = null;
      pc.removeEventListener('click', handler);
    };
    pc.addEventListener('click', handler, {once:true});
  }

  function addStickerButton() {
    const toolbar = document.getElementById('paint-toolbar');
    if (!toolbar || document.getElementById('btn-stickers')) return;
    const btn = document.createElement('button');
    btn.id = 'btn-stickers';
    btn.className = 'tool-btn';
    btn.textContent = '🪧 スタンプ';
    btn.addEventListener('click', () => {
      createPanel();
      panel.style.display = panel.style.display === 'none' ? '' : 'none';
    });
    toolbar.querySelector('.tool-btns').appendChild(btn);
  }

  window.addEventListener('load', () => setTimeout(addStickerButton, 2000));

  return { createPanel };
})();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// FINAL INITIALIZATIONS

    // Hook lighting into phase
    if (window.STATE && window.STATE.socket) {
      STATE.socket.on('game:phase', data => {
        LightingSystem.showForMap(data.map || 'hideout');
        if (data.phase === 'hunt' && STATE.myRole !== 'hunter') {
          SpectatorCamera.stopSpectating();
        }
      });
    }

    // Hook spectator mode
    if (window.STATE && window.STATE.socket) {
      STATE.socket.on('player:eliminated', data => {
        if (data.playerId === STATE.myId) {
          setTimeout(() => SpectatorCamera.startSpectating(), 500);
        }
      });
    }

    // Tab key for spectator camera switch
    document.addEventListener('keydown', e => {
      if (e.key === 'Tab' && STATE.phase === 'hunt' && STATE.myRole === 'dead') {
        e.preventDefault();
        SpectatorCamera.switchTarget();
      }
    });

    // Net stats toggle with N key
    KeyboardShortcuts && KeyboardShortcuts.register('n', () => NetStats.toggle());

    console.log('🦎 All modules loaded:', GAME_VERSION.modules.length, 'modules');
  }, 2100);

<script>

    cur.style.borderColor = STATE && STATE.paint && STATE.paint.tool === 'eraser'
      ? 'rgba(255,100,100,.8)' : (STATE && STATE.paint ? STATE.paint.color : '#fff');
  });
  document.addEventListener('mouseleave', () => { cur.style.display = 'none'; });
})();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MODULE 28: PHASE VIGNETTE

(function() {
  let vignette = null;
  function setPhaseVignette(phase) {
    const gm = document.querySelector('.game-main');

    if (vignette) vignette.remove();

  window.addEventListener('load', () => {

      }
    }, 1300);

})();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

(function() {
  function addWaitingDots() {
    const readyCount = document.getElementById('lobby-ready-count');
    if (!readyCount) return;
    const orig = readyCount.textContent;
    if (!orig.includes('準備完了')) return;
    const [left, right] = orig.split(' 準備完了');
    const [r, t] = left.split('/');
    if (parseInt(r) >= parseInt(t) && parseInt(t) > 0) return;
    const dots = document.createElement('span');

    dots.style.cssText = 'font-size:.6rem;vertical-align:middle;margin-left:4px';
    readyCount.appendChild(dots);
  }
  setInterval(() => {
    const rc = document.getElementById('lobby-ready-count');
    if (rc && !rc.querySelector('.waiting-dots') &&
        document.getElementById('screen-lobby')?.classList.contains('active')) {

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MODULE 31: ADVANCED PAINT TOOLS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const AdvancedPaint = (function() {
  // Spray can tool
  function spray(ctx, x, y, color, size, density) {
    ctx.fillStyle = color;
    for (let i = 0; i < density; i++) {
      const angle  = Math.random() * Math.PI * 2;
      const radius = Math.random() * size;
      const px = x + Math.cos(angle) * radius;
      const py = y + Math.sin(angle) * radius;
      ctx.globalAlpha = 0.3 + Math.random() * 0.4;
      ctx.beginPath();
      ctx.arc(px, py, .8, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Symmetry mirror draw
  function mirrorDraw(ctx, x0, y0, x1, y1, w, h, color, size) {
    ctx.strokeStyle = color;
    ctx.lineWidth   = size * 2;
    ctx.lineCap     = 'round';
    // Original
    ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
    // Horizontal mirror
    ctx.beginPath(); ctx.moveTo(w - x0, y0); ctx.lineTo(w - x1, y1); ctx.stroke();
  }

  // Kaleidoscope draw (4-way)
  function kaleidoscopeDraw(ctx, x0, y0, x1, y1, w, h, color, size) {
    const pairs = [
      [x0, y0, x1, y1],
      [w-x0, y0, w-x1, y1],
      [x0, h-y0, x1, h-y1],
      [w-x0, h-y0, w-x1, h-y1],
    ];
    ctx.strokeStyle = color;
    ctx.lineWidth   = size * 2;
    ctx.lineCap     = 'round';
    pairs.forEach(([ax,ay,bx,by]) => {
      ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
    });
  }

  // Line tool (straight line with shift)
  let lineStart = null;
  function lineToolStart(x, y) { lineStart = { x, y }; }
  function lineToolEnd(ctx, x, y, color, size) {
    if (!lineStart) return;
    ctx.strokeStyle = color;
    ctx.lineWidth   = size * 2;
    ctx.lineCap     = 'round';
    ctx.beginPath(); ctx.moveTo(lineStart.x, lineStart.y); ctx.lineTo(x, y); ctx.stroke();
    lineStart = null;
  }

  let sprayInterval = null;
  function startSpray(ctx, getPos, color, size) {
    stopSpray();
    sprayInterval = setInterval(() => {
      const pos = getPos();
      if (pos) spray(ctx, pos.x, pos.y, color, size * 3, 15);
    }, 30);
  }
  function stopSpray() {
    if (sprayInterval) { clearInterval(sprayInterval); sprayInterval = null; }
  }

  function addAdvancedTools() {
    const toolBtns = document.querySelector('.tool-btns');
    if (!toolBtns || document.getElementById('tool-spray')) return;

    const tools = [
      { id:'tool-spray',      label:'🌫️ スプレー', tool:'spray'      },
      { id:'tool-mirror',     label:'↔️ ミラー',   tool:'mirror'     },
      { id:'tool-kaleid',     label:'✦ 万華鏡',   tool:'kaleid'     },
      { id:'tool-line',       label:'📏 直線',     tool:'line'       },
    ];

    tools.forEach(t => {
      const btn = document.createElement('button');
      btn.id = t.id;
      btn.className = 'tool-btn';
      btn.dataset.tool = t.tool;
      btn.textContent = t.label;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (window.STATE && window.STATE.paint) STATE.paint.tool = t.tool;
      });
      toolBtns.appendChild(btn);
    });

    // Patch paint canvas mouse events for new tools
    const pc = document.getElementById('paint-canvas');
    if (!pc) return;
    const ctx = pc.getContext('2d');
    let mousePos = null;
    pc.addEventListener('mousemove', e => {
      const r = pc.getBoundingClientRect();
      mousePos = { x: (e.clientX-r.left)*(pc.width/r.width), y: (e.clientY-r.top)*(pc.height/r.height) };
    });

    let prevPos = null;
    pc.addEventListener('mousedown', e => {
      if (!STATE || !STATE.paint) return;
      const tool = STATE.paint.tool;
      const r = pc.getBoundingClientRect();
      const x = (e.clientX-r.left)*(pc.width/r.width);
      const y = (e.clientY-r.top)*(pc.height/r.height);
      if (tool === 'spray') {
        startSpray(ctx, () => mousePos, STATE.paint.color, STATE.paint.brushSize);
      } else if (tool === 'line') {
        lineToolStart(x, y);
      } else if (tool === 'mirror' || tool === 'kaleid') {
        prevPos = { x, y };
      }
    });

    pc.addEventListener('mousemove', e => {
      if (!STATE || !STATE.paint || !STATE.paint.isDrawing) return;
      const tool = STATE.paint.tool;
      const r = pc.getBoundingClientRect();
      const x = (e.clientX-r.left)*(pc.width/r.width);
      const y = (e.clientY-r.top)*(pc.height/r.height);
      if (tool === 'mirror' && prevPos) {
        mirrorDraw(ctx, prevPos.x, prevPos.y, x, y, pc.width, pc.height, STATE.paint.color, STATE.paint.brushSize);
        prevPos = { x, y };
      } else if (tool === 'kaleid' && prevPos) {
        kaleidoscopeDraw(ctx, prevPos.x, prevPos.y, x, y, pc.width, pc.height, STATE.paint.color, STATE.paint.brushSize);
        prevPos = { x, y };
      }
    });

    pc.addEventListener('mouseup', e => {
      if (!STATE || !STATE.paint) return;
      const tool = STATE.paint.tool;
      if (tool === 'spray') stopSpray();
      if (tool === 'line') {
        const r = pc.getBoundingClientRect();
        const x = (e.clientX-r.left)*(pc.width/r.width);
        const y = (e.clientY-r.top)*(pc.height/r.height);
        lineToolEnd(ctx, x, y, STATE.paint.color, STATE.paint.brushSize);
      }
      prevPos = null;
    });
  }

  window.addEventListener('load', () => setTimeout(addAdvancedTools, 2200));
  return { spray, mirrorDraw, kaleidoscopeDraw };
})();

(function() {
  function addEyedropperTool() {
    const toolBtns = document.querySelector('.tool-btns');
    if (!toolBtns || document.getElementById('tool-eyedrop')) return;
    const btn = document.createElement('button');
    btn.id = 'tool-eyedrop';
    btn.className = 'tool-btn';
    btn.dataset.tool = 'eyedrop';
    btn.textContent = '💉 スポイト';
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (window.STATE && window.STATE.paint) STATE.paint.tool = 'eyedrop';
    });
    toolBtns.appendChild(btn);

    const pc = document.getElementById('paint-canvas');
    if (!pc) return;
    pc.addEventListener('click', e => {
      if (!STATE || !STATE.paint || STATE.paint.tool !== 'eyedrop') return;
      const r = pc.getBoundingClientRect();
      const x = Math.floor((e.clientX-r.left)*(pc.width/r.width));
      const y = Math.floor((e.clientY-r.top)*(pc.height/r.height));
      const ctx = pc.getContext('2d');
      const px  = ctx.getImageData(x, y, 1, 1).data;
      if (px[3] === 0) return; // transparent
      const hex = '#' + [px[0],px[1],px[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
      STATE.paint.color = hex;
      // Update swatch selection
      let matched = false;
      document.querySelectorAll('.color-swatch').forEach(sw => {
        if (sw.style.background === hex || sw.style.background.replace(/\s/g,'') === hex) {
          document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
          sw.classList.add('selected');
          matched = true;
        }
      });
      if (!matched) showToast(`💉 色を取得: ${hex}`, 'info');
      // Switch back to brush
      document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
      document.getElementById('tool-brush')?.classList.add('active');
      STATE.paint.tool = 'brush';
    });
  }
  window.addEventListener('load', () => setTimeout(addEyedropperTool, 2300));
})();

// MODULE 36: PLAYER READY TIMER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
(function() {
  let countdownEl = null;
  let cdInterval  = null;

  window.addEventListener('load', () => {
    setTimeout(() => {
      if (!window.STATE || !window.STATE.socket) return;
      STATE.socket.on('room:update', room => {
        if (!room || room.phase !== 'lobby') { stopCountdown(); return; }
        const all    = room.players || [];
        const total  = all.length;
        const ready  = all.filter(p => p.isReady).length;
        const isHost = room.host === STATE.myId;
        if (total >= 2 && ready === total) {
          startCountdown(5);
        } else {
          stopCountdown();
        }
      });
    }, 1300);
  });

  function startCountdown(secs) {
    stopCountdown();
    const lobbyActions = document.querySelector('.lobby-actions');
    if (!lobbyActions) return;
    countdownEl = document.createElement('div');
    countdownEl.style.cssText = 'color:var(--warn);font-weight:700;font-size:.95rem;display:flex;align-items:center;gap:6px;';
    countdownEl.innerHTML = `<span class="dot-1" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--warn)">●</span> <span id="cd-num">${secs}</span>秒後にスタート`;
    lobbyActions.appendChild(countdownEl);
    let left = secs;
    cdInterval = setInterval(() => {
      left--;
      const n = document.getElementById('cd-num');
      if (n) n.textContent = left;
      if (typeof SoundSystem !== 'undefined') SoundSystem.play('countdown');
      if (left <= 0) stopCountdown();
    }, 1000);
  }

  function stopCountdown() {
    if (cdInterval) { clearInterval(cdInterval); cdInterval = null; }
    if (countdownEl) { countdownEl.remove(); countdownEl = null; }
  }
})();

// MODULE 37: PLAYER TRAIL EFFECT (hunt phase)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const TrailSystem = (function() {
  const trails = {}; // playerId -> [{x,y,ts}]
  const MAX_TRAIL = 12;
  const TRAIL_LIFETIME = 800;

  function addPoint(playerId, x, y) {
    if (!trails[playerId]) trails[playerId] = [];
    trails[playerId].push({ x, y, ts: Date.now() });
    if (trails[playerId].length > MAX_TRAIL) trails[playerId].shift();
  }

  function drawTrails(ctx, w, h) {
    const now = Date.now();
    Object.entries(trails).forEach(([id, pts]) => {
      const alive = pts.filter(p => now - p.ts < TRAIL_LIFETIME);
      if (alive.length < 2) { trails[id] = alive; return; }
      trails[id] = alive;
      const gp = STATE.game.players[id];
      const color = gp ? gp.color : '#ffffff';
      ctx.save();
      ctx.lineCap = 'round';
      for (let i = 1; i < alive.length; i++) {
        const age = (now - alive[i].ts) / TRAIL_LIFETIME;
        ctx.globalAlpha = (1 - age) * 0.25;
        ctx.lineWidth = Math.max(1, 6 * (1 - age));
        ctx.strokeStyle = color;
        ctx.beginPath();
        ctx.moveTo(alive[i-1].x * w, alive[i-1].y * h);
        ctx.lineTo(alive[i].x * w, alive[i].y * h);
        ctx.stroke();
      }
      ctx.restore();
    });
  }

  function clear() { Object.keys(trails).forEach(k => delete trails[k]); }

  return { addPoint, drawTrails, clear };
})();

// Hook trail into movement events
window.addEventListener('load', () => {
  setTimeout(() => {
    if (!window.STATE || !window.STATE.socket) return;
    STATE.socket.on('player:moved', data => {
      if (STATE.phase === 'hunt') TrailSystem.addPoint(data.id, data.x, data.y);
    });
    STATE.socket.on('game:phase', data => {
      if (data.phase !== 'hunt') TrailSystem.clear();
    });
  }, 1300);
});

(function() {
  let reconnectBanner = null;
  let reconnectTimer  = null;
  let attempt = 0;

  function showReconnecting() {
    if (reconnectBanner) return;
    reconnectBanner = document.createElement('div');
    reconnectBanner.style.cssText = `
      position:fixed;top:0;left:0;right:0;z-index:500;
      background:rgba(210,153,34,.95);color:#0d1117;
      padding:10px 20px;font-weight:700;font-size:.9rem;
      display:flex;align-items:center;justify-content:center;gap:12px;
      animation:slideDown .3s ease;
    `;
    reconnectBanner.innerHTML = `
      <div class="loading-spinner" style="width:18px;height:18px;border-width:3px;border-top-color:#0d1117"></div>
      <span id="reconnect-text">再接続中... (${attempt}回目)</span>
    `;
    const style = document.createElement('style');
    style.textContent = '@keyframes slideDown{from{transform:translateY(-100%)}to{transform:none}}';
    document.head.appendChild(style);
    document.body.appendChild(reconnectBanner);
  }

  function hideReconnecting() {
    if (reconnectBanner) { reconnectBanner.remove(); reconnectBanner = null; }
    attempt = 0;
  }

  window.addEventListener('load', () => {
    setTimeout(() => {
      if (!window.STATE || !window.STATE.socket) return;
      STATE.socket.on('disconnect', () => {
        attempt = 0;
        showReconnecting();
        reconnectTimer = setInterval(() => {
          attempt++;
          const t = document.getElementById('reconnect-text');
          if (t) t.textContent = `再接続中... (${attempt}回目)`;
        }, 1000);
      });
      STATE.socket.on('connect', () => {
        clearInterval(reconnectTimer);
        hideReconnecting();
        if (attempt > 0) showToast('✅ 再接続しました！', 'info');
      });
    }, 1300);
  });
})();

        SoundSystem && SoundSystem.play && setTimeout(() => {
          try {
            const ctx = new (window.AudioContext||window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g   = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = f;
            g.gain.value = 0.2;
            g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .3);
            osc.start(); osc.stop(ctx.currentTime + .3);
          } catch(e) {}
        }, i * 100);
      });
    }
  }
})();

// Track own position every frame
setInterval(() => {
  if (!window.STATE || STATE.phase !== 'hunt') return;
  const myGp = STATE.game && STATE.game.players && STATE.game.players[STATE.myId];
  if (myGp && myGp.alive) TrailSystem.addPoint(STATE.myId, myGp.x, myGp.y);
}, 60);

// Render trails into the game canvas (wrap existing draw)

}
