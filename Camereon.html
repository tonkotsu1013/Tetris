<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>めっちゃカメレオン</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"><\/script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --text:#e6edf3;--text2:#8b949e;--accent:#39d353;--accent2:#58a6ff;
  --danger:#f85149;--warn:#d29922;--hunter:#f85149;--cham:#39d353;
  --panel-shadow:0 8px 32px rgba(0,0,0,.6);--radius:10px;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,select,textarea{font-family:inherit;outline:none}
canvas{display:block}
.screen{display:none;width:100%;height:100%}
.screen.active{display:flex}
/* TITLE */
#screen-title{flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#1a2f1a 0%,#0d1117 70%);position:relative;overflow:hidden}
.title-bg-canvas{position:absolute;inset:0;pointer-events:none}
.title-inner{position:relative;z-index:2;text-align:center;padding:20px}
.title-logo{font-size:clamp(2.5rem,8vw,5rem);font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#39d353 0%,#58a6ff 50%,#ff79c6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;line-height:1.1}
.title-sub{color:var(--text2);font-size:1.1rem;margin-bottom:40px}
.title-cham{font-size:5rem;margin-bottom:20px;animation:sway 3s ease-in-out infinite}
@keyframes sway{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
.menu-grid{display:grid;gap:12px;width:min(340px,90vw)}
.btn{padding:14px 28px;border-radius:var(--radius);font-size:1rem;font-weight:700;transition:all .15s;border:2px solid transparent}
.btn-primary{background:var(--accent);color:#0d1117}
.btn-primary:hover{background:#4ae868;transform:translateY(-2px);box-shadow:0 4px 20px rgba(57,211,83,.4)}
.btn-secondary{background:var(--bg2);color:var(--text);border-color:var(--border)}
.btn-secondary:hover{border-color:var(--accent2);color:var(--accent2)}
.btn-danger{background:var(--danger);color:#fff}
.btn-warn{background:var(--warn);color:#0d1117;font-weight:700}
.btn-sm{padding:8px 16px;font-size:.85rem}
.btn-xs{padding:5px 10px;font-size:.8rem;border-radius:6px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.server-status{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;color:var(--text2);font-size:.8rem}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);transition:.3s}
.status-dot.connected{background:var(--accent)}
.status-dot.connecting{background:var(--warn);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:min(440px,95vw);max-height:90vh;overflow-y:auto;box-shadow:var(--panel-shadow);animation:modalIn .2s ease}
@keyframes modalIn{from{transform:scale(.9) translateY(20px);opacity:0}to{transform:none;opacity:1}}
.modal h2{font-size:1.4rem;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.modal-footer{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.field{margin-bottom:16px}
.field label{display:block;color:var(--text2);font-size:.85rem;margin-bottom:6px;font-weight:600}
.field input,.field select{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.95rem;transition:.2s}
.field input:focus,.field select:focus{border-color:var(--accent2);background:var(--bg)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* LOBBY */
#screen-lobby{flex-direction:column;overflow:hidden}
.lobby-header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.lobby-header h1{font-size:1.2rem;flex:1}
.room-id-badge{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:.8rem;color:var(--accent2);font-family:monospace;cursor:pointer}
.room-id-badge:hover{border-color:var(--accent2)}
.lobby-body{display:flex;flex:1;overflow:hidden}
.lobby-players{width:220px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-title{padding:10px 14px;font-size:.8rem;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.player-list{flex:1;overflow-y:auto;padding:8px}
.player-card{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:4px;background:var(--bg3);border:1px solid transparent;transition:.15s}
.player-card.host{border-color:var(--warn)}
.player-card.me{border-color:var(--accent2)}
.player-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem}
.player-info{flex:1;min-width:0}
.player-name{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-status{font-size:.75rem;color:var(--text2)}
.ready-badge{width:10px;height:10px;border-radius:50%;background:var(--danger);flex-shrink:0}
.ready-badge.ready{background:var(--accent)}
.lobby-center{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.map-card{border-radius:10px;overflow:hidden;border:2px solid var(--border);cursor:pointer;transition:.15s;background:var(--bg3)}
.map-card:hover{border-color:var(--accent2)}
.map-card.selected{border-color:var(--accent);box-shadow:0 0 0 2px #39d35333}
.map-thumb{height:80px;display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.map-label{padding:6px 10px;font-size:.82rem;font-weight:600;text-align:center}
.lobby-chat{width:260px;flex-shrink:0;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:4px}
.chat-msg{font-size:.82rem;line-height:1.4;padding:4px 8px;border-radius:6px}
.chat-msg.system{color:var(--text2);font-style:italic}
.chat-msg.chat .msg-name{color:var(--accent2);font-weight:600;margin-right:4px}
.chat-input-row{display:flex;gap:6px;padding:8px;border-top:1px solid var(--border);flex-shrink:0}
.chat-input{flex:1;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem}
.chat-input:focus{border-color:var(--accent2)}
.lobby-actions{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0}
/* BROWSER */
#screen-browser{flex-direction:column;overflow:hidden;background:var(--bg)}
.browser-header{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.browser-header h2{flex:1;font-size:1.2rem}
.browser-list{flex:1;overflow-y:auto;padding:16px}
.room-row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:.15s}
.room-row:hover{border-color:var(--accent2);background:var(--bg3)}
.room-row-name{font-weight:700;font-size:1rem;flex:1}
.room-row-meta{color:var(--text2);font-size:.82rem;display:flex;gap:14px;flex-shrink:0}
.room-row-badge{padding:2px 8px;border-radius:20px;font-size:.75rem;font-weight:700}
.badge-lobby{background:#1a2f1a;color:var(--accent)}
.badge-playing{background:#2f1a1a;color:var(--danger)}
.badge-lock{background:var(--bg3);color:var(--warn)}
.no-rooms{text-align:center;padding:60px 20px;color:var(--text2)}
/* GAME */
#screen-game{flex-direction:column;overflow:hidden;background:#0a0a0a;position:relative}
.game-hud{display:flex;align-items:center;gap:12px;padding:8px 14px;background:rgba(13,17,23,.9);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;backdrop-filter:blur(8px)}
.hud-phase{padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.hud-phase.paint{background:#1a2f1a;color:var(--accent)}
.hud-phase.hunt{background:#2f1a1a;color:var(--danger);animation:huntPulse 2s infinite}
.hud-phase.result{background:#1a1a2f;color:var(--accent2)}
@keyframes huntPulse{0%,100%{opacity:1}50%{opacity:.7}}
.hud-timer{font-size:1.4rem;font-weight:900;font-variant-numeric:tabular-nums;min-width:60px;text-align:center}
.hud-timer.urgent{color:var(--danger);animation:timerPulse .5s infinite}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.hud-hp{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hp-bar{width:80px;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.hp-fill{height:100%;background:var(--accent);border-radius:4px;transition:.3s}
.hp-fill.low{background:var(--danger)}
.hud-role{padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:700}
.hud-role.chameleon{background:#1a2f1a;color:var(--cham)}
.hud-role.hunter{background:#2f1a1a;color:var(--hunter)}
.hud-score{color:var(--warn);font-weight:700;font-size:.95rem}
.hud-spacer{flex:1}
.hud-players-mini{display:flex;gap:4px;align-items:center}
.mini-avatar{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem}
.mini-avatar.dead{opacity:.35;filter:grayscale(1)}
.mini-avatar.hunter-badge{border-color:var(--hunter)}
.game-main{flex:1;display:flex;overflow:hidden;position:relative}
#game-canvas{position:absolute;inset:0;width:100%;height:100%}
#paint-canvas{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair;z-index:5;display:none}
#paint-canvas.active{display:block}
#hunt-overlay{position:absolute;inset:0;width:100%;height:100%;z-index:6;display:none;cursor:crosshair}
#hunt-overlay.active{display:block}
.paint-toolbar{position:absolute;bottom:0;left:0;right:260px;z-index:10;padding:10px 14px;display:flex;align-items:center;gap:10px;background:rgba(13,17,23,.9);border-top:1px solid var(--border);backdrop-filter:blur(8px);flex-wrap:wrap}
.color-palette{display:flex;gap:6px;flex-wrap:wrap}
.color-swatch{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.1s;flex-shrink:0}
.color-swatch:hover{transform:scale(1.2)}
.color-swatch.selected{border-color:#fff;transform:scale(1.15)}
.brush-sizes{display:flex;gap:6px;align-items:center}
.brush-btn{width:32px;height:32px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
.brush-btn:hover,.brush-btn.selected{border-color:var(--accent2);background:var(--bg2)}
.brush-preview{background:var(--text);border-radius:50%}
.tool-btns{display:flex;gap:6px}
.tool-btn{padding:6px 12px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:.82rem;cursor:pointer;transition:.15s}
.tool-btn:hover{border-color:var(--accent2)}
.tool-btn.active{border-color:var(--accent);color:var(--accent);background:#1a2f1a}
.paint-tip{color:var(--text2);font-size:.78rem;margin-left:auto}
.game-right{width:260px;flex-shrink:0;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--bg2);z-index:10}
.game-right-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab-btn{flex:1;padding:9px;font-size:.8rem;font-weight:700;background:none;color:var(--text2);border-bottom:2px solid transparent;transition:.15s}
.tab-btn.active{color:var(--text);border-color:var(--accent2)}
.tab-btn:hover:not(.active){color:var(--text)}
.tab-content{display:none;flex:1;flex-direction:column;overflow:hidden}
.tab-content.active{display:flex}
.score-list{flex:1;overflow-y:auto;padding:8px}
.score-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:4px;background:var(--bg3);border:1px solid transparent}
.score-row.me{border-color:var(--accent2)}
.score-rank{width:22px;text-align:center;font-weight:700;color:var(--text2);font-size:.85rem}
.score-name{flex:1;min-width:0;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-val{font-weight:700;color:var(--warn)}
.score-role-badge{font-size:.7rem;padding:1px 6px;border-radius:10px;flex-shrink:0}
.score-role-badge.chameleon{background:#1a2f1a;color:var(--cham)}
.score-role-badge.hunter{background:#2f1a1a;color:var(--hunter)}
.score-role-badge.dead{background:var(--bg);color:var(--text2)}
/* RESULT */
#result-overlay{position:absolute;inset:0;z-index:50;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;flex-direction:column}
#result-overlay.show{display:flex}
.result-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:36px 40px;width:min(520px,95vw);text-align:center;animation:resultIn .4s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--panel-shadow)}
@keyframes resultIn{from{transform:scale(.7);opacity:0}to{transform:none;opacity:1}}
.result-title{font-size:2.5rem;font-weight:900;margin-bottom:8px}
.result-reason{color:var(--text2);margin-bottom:24px;font-size:1rem}
.result-podium{display:flex;flex-direction:column;gap:6px;margin-bottom:24px;text-align:left}
.result-player-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)}
.result-rank{font-size:1.2rem;width:30px;text-align:center}
.result-pname{flex:1;font-weight:700}
.result-pscore{color:var(--warn);font-weight:700}
.result-countdown{color:var(--text2);font-size:.9rem;margin-top:12px}
/* ANNOUNCE */
.phase-announce{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:40;pointer-events:none;text-align:center}
.phase-announce-inner{font-size:clamp(2rem,8vw,4rem);font-weight:900;text-shadow:0 0 40px currentColor;animation:announceAnim 2.5s forwards}
@keyframes announceAnim{0%{opacity:0;transform:scale(.5)}20%{opacity:1;transform:scale(1.1)}40%{transform:scale(1)}70%{opacity:1}100%{opacity:0;transform:scale(1.3)}}
.paint-announce{color:var(--cham)}
.hunt-announce{color:var(--danger)}
/* TOAST */
#toast-area{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:.88rem;max-width:300px;box-shadow:var(--panel-shadow);animation:toastIn .3s ease;pointer-events:auto}
@keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}
.toast.fadeout{animation:toastOut .3s forwards}
@keyframes toastOut{to{transform:translateX(120%);opacity:0}}
.toast-kill{border-color:var(--danger);color:var(--danger)}
.toast-join{border-color:var(--accent);color:var(--accent)}
.toast-warn{border-color:var(--warn);color:var(--warn)}
.toast-info{border-color:var(--accent2)}
/* ELIM */
.elim-banner{position:absolute;left:50%;transform:translateX(-50%);top:70px;z-index:35;pointer-events:none;background:rgba(248,81,73,.9);color:#fff;padding:8px 24px;border-radius:30px;font-weight:700;font-size:1rem;animation:elimAnim 2.5s forwards}
@keyframes elimAnim{0%{opacity:0;top:60px}10%{opacity:1;top:70px}80%{opacity:1}100%{opacity:0}}
/* SCROLLBARS */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* PING */
.ping-indicator{font-size:.75rem;color:var(--text2);font-family:monospace;padding:2px 6px;background:var(--bg3);border-radius:4px}
.ping-indicator.good{color:var(--accent)}
.ping-indicator.ok{color:var(--warn)}
.ping-indicator.bad{color:var(--danger)}
.section-title{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);font-weight:700;margin-bottom:10px}
.flex-row{display:flex;align-items:center;gap:8px}
.spacer{flex:1}
.hidden{display:none!important}
@media(max-width:700px){.lobby-players{display:none}.game-right{display:none}}
</style>
</head>
<body>

<div id="loading">
  <div style="font-size:3rem">🦎</div>
  <div class="loading-spinner"></div>
  <div style="color:var(--text2)">読み込み中...</div>
</div>

<div id="toast-area"></div>

<!-- TITLE -->
<div class="screen" id="screen-title">
  <canvas class="title-bg-canvas" id="title-bg-canvas"></canvas>
  <div class="title-inner">
    <div class="title-cham">🦎</div>
    <div class="title-logo">めっちゃカメレオン</div>
    <div class="title-sub">自分を塗って、景色に溶け込め！</div>
    <div class="menu-grid">
      <button class="btn btn-primary" id="btn-create-room">🏠 部屋を作る</button>
      <button class="btn btn-secondary" id="btn-browse-rooms">🔍 部屋を探す</button>
      <button class="btn btn-secondary" id="btn-join-direct">🔑 IDで参加</button>
      <button class="btn btn-secondary" id="btn-how-to-play">📖 遊び方</button>
    </div>
    <div style="margin-top:16px;color:var(--text2);font-size:.82rem">ネットワーク対戦 • 2〜10人 • Steamの体験版</div>
  </div>
  <div class="server-status">
    <div class="status-dot connecting" id="status-dot"></div>
    <span id="status-text">サーバーに接続中...</span>
    <span class="ping-indicator" id="ping-display" style="display:none">---ms</span>
  </div>
</div>

<!-- BROWSER -->
<div class="screen" id="screen-browser">
  <div class="browser-header">
    <button class="btn btn-secondary btn-sm" id="btn-back-from-browser">← 戻る</button>
    <h2>🌐 公開ルーム一覧</h2>
    <button class="btn btn-secondary btn-sm" id="btn-refresh-rooms">🔄 更新</button>
  </div>
  <div class="browser-list" id="browser-list"><div class="no-rooms">読み込み中...</div></div>
</div>

<!-- LOBBY -->
<div class="screen" id="screen-lobby">
  <div class="lobby-header">
    <button class="btn btn-secondary btn-sm" id="btn-leave-lobby">← 退出</button>
    <h1 id="lobby-room-name">🦎 めっちゃカメレオン</h1>
    <div class="room-id-badge" id="room-id-badge" title="クリックでコピー">----</div>
    <span class="ping-indicator" id="lobby-ping">---ms</span>
  </div>
  <div class="lobby-body">
    <div class="lobby-players">
      <div class="panel-title"><span>プレイヤー</span><span id="lobby-player-count">0/10</span></div>
      <div class="player-list" id="lobby-player-list"></div>
    </div>
    <div class="lobby-center">
      <div>
        <div class="section-title">🗺️ マップ選択</div>
        <div class="map-grid" id="map-grid"></div>
      </div>
      <div id="lobby-host-controls" class="hidden">
        <div class="section-title">⚙️ ホスト設定</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-primary" id="btn-force-start">▶ 強制スタート</button>
        </div>
        <div style="margin-top:8px;color:var(--text2);font-size:.8rem">全員が準備OKになると自動スタート</div>
      </div>
      <div>
        <div class="section-title">📋 ゲームルール</div>

const el = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  el(id).classList.add('active');
}
function showToast(msg,type='info'){
  const area=el('toast-area'),t=document.createElement('div');
  t.className=`toast toast-${type}`;t.textContent=msg;area.appendChild(t);
  setTimeout(()=>{t.classList.add('fadeout');setTimeout(()=>t.remove(),350)},3000);
}
function flashScreen(color){
  const d=document.createElement('div');
  d.style.cssText=`position:fixed;inset:0;background:${color};opacity:.45;pointer-events:none;z-index:200;transition:opacity .4s`;
  document.body.appendChild(d);setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),400)},50);
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function hexToRgba(hex){
  return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SOCKET
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initSocket(){
  STATE.socket = io(SERVER_URL,{reconnectionDelay:1000,reconnectionAttempts:10});
  const s = STATE.socket;

  s.on('connect',()=>{
    STATE.connected=true; STATE.myId=s.id;
    setStatus(true); startPingLoop();
    console.log('[+] connected',s.id);
  });
  s.on('disconnect',()=>{STATE.connected=false;setStatus(false);showToast('⚠️ 切断されました','warn')});
  s.on('connect_error',()=>setStatus(false,true));

  s.on('room:update',room=>{STATE.room=room;updateLobbyUI(room)});
  s.on('players:update',players=>{STATE.players=players;updateGamePlayers(players);updateScoreboard(players);updateMini(players)});
  s.on('chat:message',msg=>{appendChat(msg,'lobby-chat-messages');appendChat(msg,'game-chat-messages')});
  s.on('game:phase',data=>handlePhase(data));
  s.on('player:role',data=>{
    STATE.myRole=data.role; STATE.myHp=data.hp||100; updateRoleHUD();
    showToast(data.role==='hunter'?'🔫 あなたはハンターです！':'🦎 あなたはカメレオンです！',data.role==='hunter'?'warn':'info');
  });
  s.on('player:damaged',data=>{
    if(data.playerId===STATE.myId){STATE.myHp=data.hp;updateHpBar();flashScreen('#f85149')}
    const gp=STATE.game.players[data.playerId];if(gp)gp.hp=data.hp;
  });
  s.on('player:eliminated',data=>{
    const gp=STATE.game.players[data.playerId];if(gp){gp.alive=false;gp.hp=0}
    if(data.playerId===STATE.myId){STATE.myHp=0;STATE.myRole='dead';updateHpBar();flashScreen('#f85149');showToast('💀 発見されました...観戦モードへ','warn');el('hunt-overlay').classList.remove('active')}
    showElimBanner(`💥 ${data.hunterName} が ${data.playerName} を発見！`);
    showToast(`🔫 ${data.hunterName} が ${data.playerName} を排除！`,'kill');
  });
  s.on('paint:stroke',data=>applyRemoteStroke(data.playerId,data.stroke));
  s.on('paint:clear',data=>clearRemotePaint(data.playerId));
  s.on('player:moved',data=>{const gp=STATE.game.players[data.id];if(gp){gp.x=data.x;gp.y=data.y;gp.pose=data.pose}});
  s.on('hunter:bullet',data=>{STATE.game.bullets.push({x:data.targetX,y:data.targetY,ts:Date.now()});if(data.hit)STATE.game.hitFx.push({x:data.targetX,y:data.targetY,ts:Date.now()})});
  s.on('game:result',result=>showResult(result));
  s.on('timer:warning',data=>{if(data.seconds<=10)showToast(`⏰ 残り ${data.seconds} 秒！`,'warn')});
}

function startPingLoop(){
  if(STATE.pingInterval)clearInterval(STATE.pingInterval);

    if(!STATE.socket||!STATE.connected)return;
    const t0=Date.now();
    STATE.socket.emit('ping:check',t0,ts=>{
      STATE.ping=Date.now()-ts;

      ['ping-display','lobby-ping','game-ping'].forEach(id=>{const e=el(id);if(e){e.textContent=txt;e.className=`ping-indicator ${cls}`;e.style.display=''}});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TITLE BG ANIMATION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initTitleBg(){
  const canvas=el('title-bg-canvas'),ctx=canvas.getContext('2d');
  let pts=[];
  function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<70;i++)pts.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,r:2+Math.random()*5,ph:Math.random()*Math.PI*2,hue:110+Math.random()*60});
  let t=0;
  (function draw(){t+=.008;ctx.clearRect(0,0,canvas.width,canvas.height);
    pts.forEach(p=>{p.x+=p.vx+Math.sin(t+p.ph)*.25;p.y+=p.vy+Math.cos(t+p.ph)*.25;
      if(p.x<-10)p.x=canvas.width+10;if(p.x>canvas.width+10)p.x=-10;
      if(p.y<-10)p.y=canvas.height+10;if(p.y>canvas.height+10)p.y=-10;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},60%,55%,.12)`;ctx.fill();
    });requestAnimationFrame(draw);
  })();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// GAME CANVAS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initGameCanvas(){
  STATE.game.ctx=el('game-canvas').getContext('2d');
  resizeCanvases();
  window.addEventListener('resize',resizeCanvases);
}
function resizeCanvases(){
  const main=document.querySelector('.game-main');if(!main)return;
  const w=Math.max(100,main.offsetWidth-260),h=Math.max(100,main.offsetHeight);
  ['game-canvas','paint-canvas','hunt-overlay'].forEach(id=>{
    const c=el(id);if(!c)return;c.width=w;c.height=h;c.style.width=w+'px';c.style.height=h+'px';
  });
}
function gsize(){const c=el('game-canvas');return{w:c.width,h:c.height}}

function drawGame(){
  const ctx=STATE.game.ctx,{w,h}=gsize();
  if(!ctx||!w||!h){STATE.game.animFrame=requestAnimationFrame(drawGame);return}
  ctx.clearRect(0,0,w,h);
  drawMap(ctx,w,h);
  Object.values(STATE.game.players).forEach(gp=>drawPlayer(ctx,gp,w,h));
  const now=Date.now();
  STATE.game.bullets=STATE.game.bullets.filter(b=>now-b.ts<400);
  STATE.game.bullets.forEach(b=>{const age=(now-b.ts)/400;ctx.save();ctx.globalAlpha=1-age;ctx.fillStyle='#FFD700';ctx.shadowColor='#FFD700';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(b.x*w,b.y*h,5*(1-age*.5),0,Math.PI*2);ctx.fill();ctx.restore()});
  STATE.game.hitFx=STATE.game.hitFx.filter(fx=>now-fx.ts<600);
  STATE.game.hitFx.forEach(fx=>{const age=(now-fx.ts)/600;ctx.save();ctx.globalAlpha=1-age;ctx.font=`${20+age*28}px serif`;ctx.textAlign='center';ctx.fillText('💥',fx.x*w,fx.y*h-age*40);ctx.restore()});
  STATE.game.animFrame=requestAnimationFrame(drawGame);
}

function drawMap(ctx,w,h){
  const map=MAPS[STATE.game.mapId]||MAPS.hideout;
  ctx.fillStyle=map.bg;ctx.fillRect(0,0,w,h);
  ctx.save();ctx.globalAlpha=.05;ctx.strokeStyle='#fff';ctx.lineWidth=1;
  for(let x=0;x<w;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}
  for(let y=0;y<h;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}
  ctx.restore();
  map.objects.forEach(obj=>{
    ctx.save();ctx.fillStyle=obj.color;ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=8;
    if(obj.type==='box'){
      const ox=obj.x*w,oy=obj.y*h,ow=obj.w*w,oh=obj.h*h;
      roundRect(ctx,ox,oy,ow,oh,6);ctx.fill();
      ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.4)';
      ctx.font=`bold ${Math.max(9,ow/7)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(obj.label,ox+ow/2,oy+oh/2);
    }else if(obj.type==='circle'){
      const cx=obj.x*w,cy=obj.y*h,r=obj.r*Math.min(w,h);
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.4)';
      ctx.font=`bold ${Math.max(9,r/2)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(obj.label,cx,cy);
    }
    ctx.restore();
  });
}

function drawPlayer(ctx,gp,w,h){
  const alive=gp.alive||gp.role==='hunter';
  ctx.save();
  if(!alive)ctx.globalAlpha=.3;
  const px=gp.x*w,py=gp.y*h,SZ=26;
  ctx.save();
  if(gp.role==='chameleon'&&gp.paintCanvas&&STATE.phase!=='lobby'){
    ctx.beginPath();ctx.ellipse(px,py,SZ,SZ*1.2,0,0,Math.PI*2);ctx.clip();
    ctx.fillStyle='#FFFFFF';ctx.fill();
    ctx.drawImage(gp.paintCanvas,px-SZ,py-SZ*1.2,SZ*2,SZ*2.4);
    ctx.restore();
    ctx.beginPath();ctx.ellipse(px,py,SZ,SZ*1.2,0,0,Math.PI*2);
    ctx.strokeStyle=alive?gp.color:'#555';ctx.lineWidth=2.5;ctx.stroke();
  }else{
    ctx.beginPath();ctx.ellipse(px,py,SZ,SZ*1.2,0,0,Math.PI*2);
    ctx.fillStyle=gp.role==='hunter'?'#CC2020':(alive?'#FFFFFF':'#555');
    ctx.shadowColor=gp.role==='hunter'?'#FF000060':'#00000060';ctx.shadowBlur=14;ctx.fill();
    ctx.strokeStyle=gp.color;ctx.lineWidth=2.5;ctx.stroke();
    ctx.restore();
  }
  ctx.shadowBlur=0;
  // Eyes
  const ey=py-SZ*.3;
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(px-SZ*.3,ey,3.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px+SZ*.3,ey,3.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px-SZ*.22,ey-1,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px+SZ*.38,ey-1,1.5,0,Math.PI*2);ctx.fill();
  if(gp.role==='hunter'){ctx.font='13px serif';ctx.textAlign='center';ctx.fillStyle='#FFD700';ctx.fillText('🔫',px,py+SZ*1.2+14)}
  // Name
  ctx.fillStyle=gp.id===STATE.myId?'#58a6ff':'rgba(255,255,255,.85)';
  ctx.font=`bold ${gp.id===STATE.myId?12:10}px sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(gp.name,px,py-SZ*1.2-10);
  // HP bar
  if(STATE.phase==='hunt'&&gp.role==='chameleon'){
    const bw=SZ*2,bx=px-SZ,by=py+SZ*1.2+4;
    ctx.fillStyle='#333';roundRect(ctx,bx,by,bw,4,2);ctx.fill();
    ctx.fillStyle=gp.hp>50?'#39d353':gp.hp>25?'#d29922':'#f85149';
    roundRect(ctx,bx,by,bw*(gp.hp/100),4,2);ctx.fill();
  }
  ctx.restore();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PAINT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initPaint(){
  const canvas=el('paint-canvas'),ctx=canvas.getContext('2d');
  STATE.paint.ctx=ctx;
  // Color palette
  const pal=el('color-palette');pal.innerHTML='';
  PAINT_COLORS.forEach(color=>{
    const sw=document.createElement('div');
    sw.className='color-swatch'+(color===STATE.paint.color?' selected':'');
    sw.style.background=color;
    sw.addEventListener('click',()=>{
      document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
      sw.classList.add('selected');STATE.paint.color=color;
      if(STATE.paint.tool==='eraser')switchTool('brush');
    });
    pal.appendChild(sw);
  });
  // Brush buttons
  document.querySelectorAll('.brush-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.brush-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');STATE.paint.brushSize=parseInt(btn.dataset.size);
    });
  });
  // Tool buttons
  document.querySelectorAll('.tool-btn').forEach(btn=>{btn.addEventListener('click',()=>switchTool(btn.dataset.tool))});
  el('btn-clear-paint').addEventListener('click',()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    STATE.socket&&STATE.socket.emit('paint:clear');
  });
  // Draw events
  canvas.addEventListener('mousedown',e=>{
    if(STATE.paint.tool==='fill')return;
    STATE.paint.isDrawing=true;
    const p=cpos(canvas,e);STATE.paint.lastX=p.x;STATE.paint.lastY=p.y;
    paintDot(p.x,p.y);
  });
  canvas.addEventListener('mousemove',e=>{
    if(!STATE.paint.isDrawing)return;
    const p=cpos(canvas,e);
    paintLine(STATE.paint.lastX,STATE.paint.lastY,p.x,p.y);
    STATE.socket&&STATE.socket.emit('paint:stroke',{type:'line',x0:STATE.paint.lastX/canvas.width,y0:STATE.paint.lastY/canvas.height,x1:p.x/canvas.width,y1:p.y/canvas.height,color:STATE.paint.color,size:STATE.paint.brushSize,tool:STATE.paint.tool});
    STATE.paint.lastX=p.x;STATE.paint.lastY=p.y;
  });
  canvas.addEventListener('mouseup',()=>STATE.paint.isDrawing=false);
  canvas.addEventListener('mouseleave',()=>STATE.paint.isDrawing=false);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];STATE.paint.isDrawing=true;const p=cpos(canvas,t);STATE.paint.lastX=p.x;STATE.paint.lastY=p.y;paintDot(p.x,p.y)},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!STATE.paint.isDrawing)return;const t=e.touches[0];const p=cpos(canvas,t);paintLine(STATE.paint.lastX,STATE.paint.lastY,p.x,p.y);STATE.paint.lastX=p.x;STATE.paint.lastY=p.y},{passive:false});
  canvas.addEventListener('touchend',()=>STATE.paint.isDrawing=false);
  canvas.addEventListener('click',e=>{
    if(STATE.paint.tool!=='fill')return;
    const p=cpos(canvas,e);fillAt(ctx,p.x,p.y,STATE.paint.color);
    STATE.socket&&STATE.socket.emit('paint:stroke',{type:'fill',x:p.x/canvas.width,y:p.y/canvas.height,color:STATE.paint.color});
  });
}
function switchTool(t){
  STATE.paint.tool=t;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.toggle('active',b.dataset.tool===t));
}
function cpos(canvas,e){
  const r=canvas.getBoundingClientRect();
  return{x:(e.clientX-r.left)*(canvas.width/r.width),y:(e.clientY-r.top)*(canvas.height/r.height)};
}
function paintDot(x,y){
  const ctx=STATE.paint.ctx,sz=STATE.paint.brushSize;
  ctx.globalCompositeOperation=STATE.paint.tool==='eraser'?'destination-out':'source-over';
  ctx.fillStyle=STATE.paint.color;ctx.beginPath();ctx.arc(x,y,sz,0,Math.PI*2);ctx.fill();
  ctx.globalCompositeOperation='source-over';
}
function paintLine(x0,y0,x1,y1){
  const ctx=STATE.paint.ctx,sz=STATE.paint.brushSize;
  ctx.globalCompositeOperation=STATE.paint.tool==='eraser'?'destination-out':'source-over';
  ctx.strokeStyle=STATE.paint.color;ctx.lineWidth=sz*2;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
  ctx.globalCompositeOperation='source-over';
}
function fillAt(ctx,sx,sy,color){
  const cw=ctx.canvas.width,ch=ctx.canvas.height;
  const d=ctx.getImageData(0,0,cw,ch),data=d.data;
  const i=(Math.floor(sy)*cw+Math.floor(sx))*4;
  const tr=data[i],tg=data[i+1],tb=data[i+2],ta=data[i+3];
  const fc=hexToRgba(color);
  if(tr===fc.r&&tg===fc.g&&tb===fc.b&&ta===255)return;
  const stk=[[Math.floor(sx),Math.floor(sy)]],vis=new Uint8Array(cw*ch);
  function match(i){return Math.abs(data[i]-tr)<30&&Math.abs(data[i+1]-tg)<30&&Math.abs(data[i+2]-tb)<30&&Math.abs(data[i+3]-ta)<30}
  let cnt=0;
  while(stk.length&&cnt<60000){
    const[x,y]=stk.pop();if(x<0||x>=cw||y<0||y>=ch)continue;
    const idx=y*cw+x;if(vis[idx])continue;const pi=idx*4;if(!match(pi))continue;
    vis[idx]=1;data[pi]=fc.r;data[pi+1]=fc.g;data[pi+2]=fc.b;data[pi+3]=255;
    stk.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);cnt++;
  }
  ctx.putImageData(d,0,0);
}
function applyRemoteStroke(playerId,stroke){
  const gp=STATE.game.players[playerId];if(!gp)return;
  if(!gp.paintCanvas){gp.paintCanvas=document.createElement('canvas');gp.paintCanvas.width=200;gp.paintCanvas.height=200;gp.paintCtx=gp.paintCanvas.getContext('2d')}
  const ctx=gp.paintCtx,w=gp.paintCanvas.width,h=gp.paintCanvas.height;
  if(stroke.type==='line'){
    ctx.globalCompositeOperation=stroke.tool==='eraser'?'destination-out':'source-over';
    ctx.strokeStyle=stroke.color;ctx.lineWidth=(stroke.size||4)*2;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(stroke.x0*w,stroke.y0*h);ctx.lineTo(stroke.x1*w,stroke.y1*h);ctx.stroke();
    ctx.globalCompositeOperation='source-over';
  }else if(stroke.type==='fill'){fillAt(ctx,stroke.x*w,stroke.y*h,stroke.color)}
}
function clearRemotePaint(playerId){const gp=STATE.game.players[playerId];if(gp&&gp.paintCtx)gp.paintCtx.clearRect(0,0,gp.paintCanvas.width,gp.paintCanvas.height)}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HUNT OVERLAY
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initHunt(){
  const canvas=el('hunt-overlay'),ctx=canvas.getContext('2d');
  canvas.addEventListener('click',e=>{
    if(STATE.myRole!=='hunter'||STATE.phase!=='hunt')return;
    const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)/r.width,y=(e.clientY-r.top)/r.height;
    STATE.game.bullets.push({x,y,ts:Date.now()});
    STATE.socket&&STATE.socket.emit('hunter:shoot',{targetX:x,targetY:y,bulletId:Math.random().toString(36).slice(2)},res=>{

  Particle.prototype.update = function() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += this.gravity;
    this.vx *= 0.98;
    this.life -= this.decay;
    this.rotation += this.rotationSpeed;
    return this.life > 0;
  };

  Particle.prototype.draw = function(ctx) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    if (this.type === 'text') {
      ctx.font = `${this.size * 4}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(this.text, 0, 0);
    } else if (this.type === 'star') {
      ctx.fillStyle = this.color;
      drawStar(ctx, 0, 0, 5, this.size, this.size * 0.5);
      ctx.fill();
    } else if (this.type === 'confetti') {
      ctx.fillStyle = this.color;
      ctx.fillRect(-this.size / 2, -this.size * 1.5, this.size, this.size * 3);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, this.size, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
    }
    ctx.restore();
  };

  function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
    let rot = (Math.PI / 2) * 3;
    const step = Math.PI / spikes;
    ctx.beginPath();
    ctx.moveTo(cx, cy - outerRadius);
    for (let i = 0; i < spikes; i++) {
      ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
      rot += step;
      ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
      rot += step;
    }
    ctx.lineTo(cx, cy - outerRadius);
    ctx.closePath();
  }

  function emit(x, y, count, opts) {
    for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
      particles.push(new Particle(x, y, opts));
    }
  }

  function emitExplosion(x, y, color) {
    const colors = [color || '#FF6B6B', '#FFD700', '#FF4500', '#fff'];
    for (let i = 0; i < 30; i++) {
      const angle = (i / 30) * Math.PI * 2;
      const speed = 2 + Math.random() * 5;
      emit(x, y, 1, {
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        decay: 0.025 + Math.random() * 0.01,
        size: 2 + Math.random() * 4,
        gravity: 0.08,
        type: Math.random() < 0.3 ? 'star' : 'dot'
      });
    }
  }

  function emitConfetti(x, y) {
    const colors = ['#FF6B6B','#FFD700','#39d353','#58a6ff','#ff79c6','#FF4500'];
    for (let i = 0; i < 40; i++) {
      emit(x, y, 1, {
        vx: (Math.random() - 0.5) * 8,
        vy: -Math.random() * 8 - 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        decay: 0.01,
        size: 4 + Math.random() * 6,
        gravity: 0.15,
        type: 'confetti'
      });
    }
  }

  function emitHit(x, y) {
    emit(x, y, 15, {
      vx: 0, vy: 0,
      color: '#FF4500',
      decay: 0.04,
      size: 3,
      gravity: 0.05,
      type: 'dot'
    });
    emit(x, y, 5, {
      vx: 0, vy: -3,
      decay: 0.03,
      size: 12,
      gravity: 0,
      type: 'text',
      text: '💥'
    });
  }

  function emitElim(x, y, name) {
    emitExplosion(x, y, '#f85149');
    emit(x, y, 1, {
      vx: 0, vy: -1,
      decay: 0.008,
      size: 14,
      gravity: -0.01,
      type: 'text',
      text: '💀'
    });
  }

  function emitWin(canvasW, canvasH) {
    for (let i = 0; i < 5; i++) {
      setTimeout(() => {
        emitConfetti(Math.random() * canvasW, canvasH * 0.3);
      }, i * 300);
    }
  }

  function update(ctx) {
    for (let i = particles.length - 1; i >= 0; i--) {
      if (!particles[i].update()) {
        particles.splice(i, 1);
      } else {
        particles[i].draw(ctx);
      }
    }
  }

  function clear() { particles.length = 0; }

  return { emit, emitExplosion, emitConfetti, emitHit, emitElim, emitWin, update, clear };
})();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// EXTENSION MODULE 2: SOUND SYSTEM (Web Audio API)
// めっちゃカメレオン - サウンドエフェクト
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const SoundSystem = (function() {
  let ctx = null;
  let enabled = true;
  let masterGain = null;

  function init() {
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.value = 0.3;
      masterGain.connect(ctx.destination);
    } catch(e) {
      console.warn('Audio not available:', e);
      enabled = false;
    }
  }

  function resume() {
    if (ctx && ctx.state === 'suspended') ctx.resume();
  }

  function beep(freq, duration, type, gainVal, delay) {
    if (!ctx || !enabled) return;
    resume();
    const oscillator = ctx.createOscillator();
    const gainNode = ctx.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(masterGain);
    oscillator.type = type || 'sine';
    oscillator.frequency.setValueAtTime(freq, ctx.currentTime + (delay || 0));
    gainNode.gain.setValueAtTime(gainVal || 0.3, ctx.currentTime + (delay || 0));
    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (delay || 0) + duration);
    oscillator.start(ctx.currentTime + (delay || 0));
    oscillator.stop(ctx.currentTime + (delay || 0) + duration);
  }

  function noise(duration, gainVal) {
    if (!ctx || !enabled) return;
    resume();
    const bufferSize = ctx.sampleRate * duration;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    const gainNode = ctx.createGain();
    gainNode.gain.setValueAtTime(gainVal || 0.1, ctx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    source.connect(gainNode);
    gainNode.connect(masterGain);
    source.start();
  }

  const sounds = {
    shoot() {
      noise(0.08, 0.2);
      beep(120, 0.1, 'sawtooth', 0.15);
    },
    hit() {
      beep(200, 0.05, 'square', 0.2);
      beep(100, 0.1, 'sawtooth', 0.15, 0.05);
      noise(0.1, 0.15);
    },
    eliminate() {
      beep(880, 0.05, 'square', 0.3);
      beep(440, 0.05, 'square', 0.3, 0.06);
      beep(220, 0.2, 'sawtooth', 0.2, 0.12);
      noise(0.15, 0.2);
    },
    paintStroke() {
      if (Math.random() < 0.1) beep(300 + Math.random() * 200, 0.03, 'sine', 0.05);
    },
    phaseChange() {
      beep(440, 0.1, 'sine', 0.2);
      beep(660, 0.1, 'sine', 0.2, 0.12);
      beep(880, 0.15, 'sine', 0.2, 0.24);
    },
    win() {
      [523, 659, 784, 1047].forEach((f, i) => beep(f, 0.15, 'sine', 0.25, i * 0.12));
    },
    lose() {
      [523, 415, 349, 262].forEach((f, i) => beep(f, 0.2, 'sawtooth', 0.15, i * 0.12));
    },
    countdown() {
      beep(880, 0.08, 'sine', 0.15);
    },
    join() {
      beep(523, 0.08, 'sine', 0.1);
      beep(784, 0.12, 'sine', 0.1, 0.1);
    },
    ready() {
      beep(660, 0.1, 'sine', 0.15);
      beep(880, 0.15, 'sine', 0.15, 0.1);
    },
    chat() {
      beep(660, 0.04, 'sine', 0.05);
    },
    timerTick() {
      beep(440, 0.05, 'square', 0.08);
    },
    timerUrgent() {
      beep(880, 0.06, 'square', 0.15);
    }
  };

  function play(name) {
    if (!enabled) return;
    try {
      if (sounds[name]) sounds[name]();
    } catch(e) {}
  }

  function setVolume(v) {
    if (masterGain) masterGain.gain.value = Math.max(0, Math.min(1, v));
  }

  function toggle() {
    enabled = !enabled;
    return enabled;
  }

  return { init, play, setVolume, toggle, get enabled() { return enabled; } };
})();

// EXTENSION MODULE 3: MINIMAP
// めっちゃカメレオン - ミニマップシステム
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const MinimapSystem = (function() {
  let canvas = null;
  let ctx = null;
  const SIZE = 120;
  const PADDING = 10;

  function init() {
    canvas = document.createElement('canvas');
    canvas.width = SIZE;
    canvas.height = SIZE;
    canvas.style.cssText = `
      position:absolute;bottom:${PADDING}px;left:${PADDING}px;
      width:${SIZE}px;height:${SIZE}px;border-radius:8px;
      border:1px solid rgba(255,255,255,.2);z-index:20;
      background:rgba(0,0,0,.5);backdrop-filter:blur(4px);
      display:none;pointer-events:none;
    `;
    ctx = canvas.getContext('2d');
    const gameMain = document.querySelector('.game-main');
    if (gameMain) gameMain.appendChild(canvas);
    return canvas;
  }

  function show() { if (canvas) canvas.style.display = 'block'; }
  function hide() { if (canvas) canvas.style.display = 'none'; }

  function draw(players, mapId, myId, phase) {
    if (!ctx || !canvas || canvas.style.display === 'none') return;
    const map = window.MAPS ? window.MAPS[mapId] || window.MAPS.hideout : null;

    ctx.clearRect(0, 0, SIZE, SIZE);

    // Background
    if (map) {
      ctx.fillStyle = map.bg + '99';
    } else {
      ctx.fillStyle = 'rgba(20,20,20,0.8)';
    }
    ctx.fillRect(0, 0, SIZE, SIZE);

    // Map objects (simplified)
    if (map && map.objects) {
      map.objects.forEach(obj => {
        ctx.save();
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = obj.color;
        if (obj.type === 'box') {
          ctx.fillRect(obj.x * SIZE, obj.y * SIZE, obj.w * SIZE, obj.h * SIZE);
        } else if (obj.type === 'circle') {
          ctx.beginPath();
          ctx.arc(obj.x * SIZE, obj.y * SIZE, obj.r * SIZE, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      });
    }

    // Players
    if (players) {
      const arr = Array.isArray(players) ? players : Object.values(players);
      arr.forEach(p => {
        if (!p) return;
        const px = (p.x || 0.5) * SIZE;
        const py = (p.y || 0.5) * SIZE;
        const r = p.id === myId ? 5 : 3.5;

        ctx.save();
        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);

        if (!p.alive && p.role !== 'hunter') {
          ctx.fillStyle = 'rgba(100,100,100,0.6)';
        } else if (p.role === 'hunter') {
          ctx.fillStyle = '#f85149';
          // Hunter has cross/target icon
          ctx.fill();
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.restore();
          return;
        } else if (p.id === myId) {
          ctx.fillStyle = '#fff';
          ctx.strokeStyle = p.color || '#39d353';
          ctx.lineWidth = 2;
          ctx.fill();
          ctx.stroke();
          ctx.restore();
          return;
        } else {
          // Chameleon: only show if hunter or dead (otherwise hidden)
          if (phase === 'hunt') {
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
          } else {
            ctx.fillStyle = p.color || '#39d353';
          }
        }
        ctx.fill();
        ctx.restore();
      });
    }

    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(0, 0, SIZE, SIZE);

    // Label
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '8px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('MAP', SIZE - 3, 10);
  }

  return { init, show, hide, draw };
})();

// EXTENSION MODULE 4: SETTINGS PANEL
// めっちゃカメレオン - 設定パネル
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const SettingsPanel = (function() {
  const DEFAULTS = {
    volume: 0.3,
    showMinimap: true,
    showFps: false,
    paintSmoothing: true,
    particleEffects: true,
    chatNotifications: true,
    colorblindMode: false,
    language: 'ja',
    crosshairColor: '#FF3232',
    crosshairSize: 22,
    playerName: ''
  };

  let settings = { ...DEFAULTS };

  function load() {
    try {
      const saved = localStorage.getItem('camereon_settings');
      if (saved) settings = { ...DEFAULTS, ...JSON.parse(saved) };
    } catch(e) {}
    apply();
  }

  function save() {
    try { localStorage.setItem('camereon_settings', JSON.stringify(settings)); } catch(e) {}
  }

  function apply() {
    SoundSystem.setVolume(settings.volume);
    if (settings.showMinimap) MinimapSystem.show();
    else MinimapSystem.hide();
  }

  function get(key) { return settings[key]; }
  function set(key, value) { settings[key] = value; save(); apply(); }

  function createPanel() {
    const panel = document.createElement('div');
    panel.id = 'settings-panel';
    panel.style.cssText = `
      position:fixed;top:0;right:-320px;width:320px;height:100vh;
      background:var(--bg2);border-left:1px solid var(--border);
      z-index:150;transition:right .3s ease;overflow-y:auto;
      box-shadow:-4px 0 20px rgba(0,0,0,.5);
    `;
    panel.innerHTML = `
      <div style="padding:20px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <h3 style="font-size:1.1rem">⚙️ 設定</h3>
          <button id="close-settings" style="background:none;border:none;color:var(--text2);font-size:1.2rem;cursor:pointer">✕</button>
        </div>
        <div class="settings-section">
          <div class="settings-label">🔊 音量</div>
          <div style="display:flex;align-items:center;gap:10px">
            <input type="range" id="set-volume" min="0" max="1" step="0.05" value="${settings.volume}"
              style="flex:1;accent-color:var(--accent)">
            <span id="vol-display" style="width:35px;text-align:right;font-size:.85rem;color:var(--text2)">${Math.round(settings.volume*100)}%</span>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-label">🗺️ ミニマップを表示</div>
          <label class="toggle-switch">
            <input type="checkbox" id="set-minimap" ${settings.showMinimap ? 'checked' : ''}>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-section">
          <div class="settings-label">✨ パーティクルエフェクト</div>
          <label class="toggle-switch">
            <input type="checkbox" id="set-particles" ${settings.particleEffects ? 'checked' : ''}>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-section">
          <div class="settings-label">🎯 照準の色</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
            ${['#FF3232','#39d353','#58a6ff','#FFD700','#FF79C6','#FFFFFF'].map(c =>
              `<div class="crosshair-color-btn" data-color="${c}"
                style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${c===settings.crosshairColor?'#fff':'transparent'}"
              ></div>`
            ).join('')}
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-label">📏 照準のサイズ: <span id="xhair-size-val">${settings.crosshairSize}</span></div>
          <input type="range" id="set-crosshair-size" min="12" max="40" step="2" value="${settings.crosshairSize}"
            style="width:100%;margin-top:6px;accent-color:var(--accent)">
        </div>
        <div class="settings-section">
          <div class="settings-label">🎨 ブラシスムージング</div>
          <label class="toggle-switch">
            <input type="checkbox" id="set-smoothing" ${settings.paintSmoothing ? 'checked' : ''}>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-section">
          <div class="settings-label">💬 チャット通知音</div>
          <label class="toggle-switch">
            <input type="checkbox" id="set-chat-notify" ${settings.chatNotifications ? 'checked' : ''}>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-section" style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border)">
          <button id="reset-settings" class="btn btn-secondary" style="width:100%">🔄 設定をリセット</button>
        </div>
        <div style="margin-top:12px;color:var(--text2);font-size:.75rem;text-align:center">
          めっちゃカメレオン v1.0.0 · 設定はブラウザに保存されます
        </div>
      </div>
    `;

    const style = document.createElement('style');
    style.textContent = `
      .settings-section { margin-bottom:18px }
      .settings-label { color:var(--text2);font-size:.85rem;font-weight:600;margin-bottom:8px }
      .toggle-switch { position:relative;display:inline-block;width:44px;height:24px }
      .toggle-switch input { opacity:0;width:0;height:0 }
      .toggle-slider { position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:24px;transition:.2s }
      .toggle-slider:before { content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s }
      input:checked + .toggle-slider { background:var(--accent) }
      input:checked + .toggle-slider:before { transform:translateX(20px) }
      .crosshair-color-btn:hover { transform:scale(1.15) }
    `;
    document.head.appendChild(style);
    document.body.appendChild(panel);

    // Wire events
    panel.querySelector('#close-settings').addEventListener('click', () => {
      panel.style.right = '-320px';
    });
    panel.querySelector('#set-volume').addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      set('volume', v);
      panel.querySelector('#vol-display').textContent = Math.round(v * 100) + '%';
      SoundSystem.play('chat');
    });
    panel.querySelector('#set-minimap').addEventListener('change', e => {
      set('showMinimap', e.target.checked);
    });
    panel.querySelector('#set-particles').addEventListener('change', e => {
      set('particleEffects', e.target.checked);
    });
    panel.querySelector('#set-smoothing').addEventListener('change', e => {
      set('paintSmoothing', e.target.checked);
    });
    panel.querySelector('#set-chat-notify').addEventListener('change', e => {
      set('chatNotifications', e.target.checked);
    });
    panel.querySelector('#set-crosshair-size').addEventListener('input', e => {
      set('crosshairSize', parseInt(e.target.value));
      panel.querySelector('#xhair-size-val').textContent = e.target.value;
    });
    panel.querySelectorAll('.crosshair-color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        panel.querySelectorAll('.crosshair-color-btn').forEach(b => b.style.borderColor = 'transparent');
        btn.style.borderColor = '#fff';
        set('crosshairColor', btn.dataset.color);
      });
    });
    panel.querySelector('#reset-settings').addEventListener('click', () => {
      settings = { ...DEFAULTS };
      save(); apply();
      panel.remove();
      createPanel();
      openPanel();
    });

    return panel;
  }

  function openPanel() {
    let p = document.getElementById('settings-panel');
    if (!p) p = createPanel();
    p.style.right = '0';
  }

  function closePanel() {
    const p = document.getElementById('settings-panel');
    if (p) p.style.right = '-320px';
  }

  return { load, save, get, set, openPanel, closePanel, createPanel };
})();

// EXTENSION MODULE 5: FPS COUNTER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const FPSCounter = (function() {
  let frames = 0;
  let lastTime = performance.now();
  let fps = 0;
  let display = null;

  function init() {
    display = document.createElement('div');
    display.id = 'fps-counter';
    display.style.cssText = `
      position:absolute;top:8px;left:8px;z-index:25;
      background:rgba(0,0,0,.6);color:#39d353;
      font:bold 11px/1 monospace;padding:3px 6px;border-radius:4px;
      display:none;pointer-events:none;
    `;
    const gm = document.querySelector('.game-main');
    if (gm) gm.appendChild(display);
  }

  function tick() {
    frames++;
    const now = performance.now();
    if (now - lastTime >= 1000) {
      fps = Math.round(frames * 1000 / (now - lastTime));
      frames = 0;
      lastTime = now;
      if (display) {
        display.textContent = `${fps} FPS`;
        display.style.color = fps >= 55 ? '#39d353' : fps >= 30 ? '#d29922' : '#f85149';
      }
    }
  }

  function show() { if (display) display.style.display = 'block'; }
  function hide() { if (display) display.style.display = 'none'; }
  function toggle() {
    if (!display) return;
    const visible = display.style.display !== 'none';
    display.style.display = visible ? 'none' : 'block';
    return !visible;
  }

  return { init, tick, show, hide, toggle };
})();

// EXTENSION MODULE 6: REPLAY / HIGHLIGHT SYSTEM
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const ReplaySystem = (function() {
  const events = [];
  const MAX_EVENTS = 10000;
  let recording = false;
  let highlights = [];

  function startRecording() { recording = true; events.length = 0; }
  function stopRecording() { recording = false; }

  function record(type, data) {
    if (!recording || events.length >= MAX_EVENTS) return;
    events.push({ ts: Date.now(), type, data: JSON.parse(JSON.stringify(data)) });
  }

  function addHighlight(type, data) {
    highlights.push({ ts: Date.now(), type, data, eventIndex: events.length });
  }

  function getHighlights() { return highlights; }
  function getEventCount() { return events.length; }
  function clear() { events.length = 0; highlights.length = 0; }

  function exportJSON() {
    return JSON.stringify({ events: events.slice(-500), highlights }, null, 2);
  }

  return { startRecording, stopRecording, record, addHighlight, getHighlights, getEventCount, clear, exportJSON };
})();

// EXTENSION MODULE 7: ACHIEVEMENT SYSTEM
// めっちゃカメレオン - 実績システム
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const AchievementSystem = (function() {
  const ACHIEVEMENTS = [
    { id: 'first_game',    icon: '🎮', title: '初参戦',          desc: '初めてゲームに参加した',                  secret: false },
    { id: 'first_survive', icon: '🦎', title: '生き残り名人',     desc: 'カメレオンとして生き残った',              secret: false },
    { id: 'first_find',    icon: '🔫', title: '発見者',          desc: 'カメレオンを初めて発見した',              secret: false },
    { id: 'artist',        icon: '🎨', title: 'アーティスト',    desc: 'ペイントフェーズで全部の色を使った',       secret: false },
    { id: 'speedrun',      icon: '⚡', title: 'スピードスター',   desc: 'ハントフェーズ開始10秒以内にカメレオンを発見', secret: true },
    { id: 'survivor_3',    icon: '🏅', title: '三連続生還',      desc: '3回連続でカメレオンとして生き残った',      secret: false },
    { id: 'hunter_ace',    icon: '🏆', title: 'エースハンター',  desc: '1試合で3人以上のカメレオンを排除した',     secret: false },
    { id: 'perfect_hide',  icon: '🌟', title: 'パーフェクトハイダー', desc: '一度もダメージを受けずに生き残った',  secret: true },
    { id: 'social',        icon: '💬', title: 'おしゃべり好き',  desc: 'チャットを10回送った',                    secret: false },
    { id: 'veteran',       icon: '👑', title: 'ベテラン',        desc: '10試合プレイした',                        secret: false },
    { id: 'chameleon_king',icon: '🦎', title: 'カメレオン王',    desc: '通算スコア1000ptを超えた',                secret: false },
    { id: 'no_damage',     icon: '🛡️', title: 'ノーダメージ',    desc: '1試合で一度もダメージを受けなかった',      secret: true },
  ];

  let unlocked = new Set();
  let stats = {
    gamesPlayed: 0,
    gamesWon: 0,
    timesEliminated: 0,
    totalScore: 0,
    chatsSent: 0,
    consecutiveSurvives: 0,
    colorsUsed: new Set(),
    killsThisGame: 0,
    damageReceivedThisGame: 0,
  };

  function load() {
    try {
      const d = JSON.parse(localStorage.getItem('camereon_achievements') || '{}');
      unlocked = new Set(d.unlocked || []);
      Object.assign(stats, d.stats || {});
      if (stats.colorsUsed && !stats.colorsUsed.add) stats.colorsUsed = new Set(stats.colorsUsed);
    } catch(e) {}
  }

  function save() {
    try {
      localStorage.setItem('camereon_achievements', JSON.stringify({
        unlocked: [...unlocked],
        stats: { ...stats, colorsUsed: [...stats.colorsUsed] }
      }));
    } catch(e) {}
  }

  function unlock(id) {
    if (unlocked.has(id)) return;
    unlocked.add(id);
    const ach = ACHIEVEMENTS.find(a => a.id === id);
    if (ach) showAchievementToast(ach);
    save();
  }

  function showAchievementToast(ach) {
    const toast = document.createElement('div');
    toast.style.cssText = `
      position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
      background:linear-gradient(135deg,#1a2f1a,#0d1117);
      border:1px solid var(--accent);border-radius:12px;
      padding:12px 20px;z-index:300;
      display:flex;align-items:center;gap:12px;
      box-shadow:0 4px 24px rgba(57,211,83,.3);
      animation:achIn .4s cubic-bezier(.34,1.56,.64,1);
      font-size:.9rem;min-width:260px;
    `;
    toast.innerHTML = `
      <span style="font-size:1.8rem">${ach.icon}</span>
      <div>
        <div style="color:var(--accent);font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.05em">実績解除！</div>
        <div style="font-weight:700">${ach.title}</div>
        <div style="color:var(--text2);font-size:.78rem">${ach.desc}</div>
      </div>
    `;
    const style = document.createElement('style');
    style.textContent = `@keyframes achIn{from{transform:translateX(-50%) translateY(40px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}`;
    document.head.appendChild(style);
    document.body.appendChild(toast);
    SoundSystem.play('win');
    setTimeout(() => {
      toast.style.animation = 'toastOut .3s forwards';
      setTimeout(() => { toast.remove(); style.remove(); }, 350);
    }, 4000);
  }

  function check() {
    if (stats.gamesPlayed >= 1) unlock('first_game');
    if (stats.gamesWon >= 1) unlock('first_survive');
    if (stats.killsThisGame >= 1) unlock('first_find');
    if (stats.colorsUsed && stats.colorsUsed.size >= 8) unlock('artist');
    if (stats.consecutiveSurvives >= 3) unlock('survivor_3');
    if (stats.killsThisGame >= 3) unlock('hunter_ace');
    if (stats.chatsSent >= 10) unlock('social');
    if (stats.gamesPlayed >= 10) unlock('veteran');
    if (stats.totalScore >= 1000) unlock('chameleon_king');
    if (stats.damageReceivedThisGame === 0 && stats.gamesPlayed > 0) unlock('no_damage');
    if (stats.damageReceivedThisGame === 0) unlock('perfect_hide');
  }

  function trackColor(color) {
    if (!stats.colorsUsed) stats.colorsUsed = new Set();
    stats.colorsUsed.add(color);
    check();
  }
  function trackChat() { stats.chatsSent++; check(); }
  function trackKill() { stats.killsThisGame++; check(); }
  function trackDamage() { stats.damageReceivedThisGame++; }
  function trackGameStart() { stats.gamesPlayed++; stats.killsThisGame = 0; stats.damageReceivedThisGame = 0; save(); }
  function trackWin() { stats.gamesWon++; stats.consecutiveSurvives++; stats.totalScore += (STATE && STATE.myScore || 0); check(); save(); }
  function trackLoss() { stats.consecutiveSurvives = 0; save(); }

  function getAll() { return ACHIEVEMENTS.map(a => ({ ...a, unlocked: unlocked.has(a.id) })); }

  function createPanel() {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay open';
    modal.id = 'achievement-panel';
    const all = getAll();
    modal.innerHTML = `
      <div class="modal" style="max-width:520px">
        <h2>🏅 実績一覧 (${unlocked.size}/${ACHIEVEMENTS.length})</h2>
        <div style="display:grid;gap:8px;max-height:400px;overflow-y:auto">
          ${all.map(a => `
            <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;
              background:${a.unlocked ? 'rgba(57,211,83,.1)' : 'var(--bg3)'};
              border:1px solid ${a.unlocked ? 'var(--accent)' : 'var(--border)'};border-radius:8px">
              <span style="font-size:1.6rem;${!a.unlocked ? 'filter:grayscale(1);opacity:.3' : ''}">${a.secret && !a.unlocked ? '❓' : a.icon}</span>
              <div>
                <div style="font-weight:700;${!a.unlocked ? 'color:var(--text2)' : ''}">${a.secret && !a.unlocked ? '???（シークレット）' : a.title}</div>
                <div style="font-size:.78rem;color:var(--text2)">${a.secret && !a.unlocked ? '条件を満たすと解除' : a.desc}</div>
              </div>
              ${a.unlocked ? '<span style="margin-left:auto;color:var(--accent)">✓</span>' : ''}
            </div>
          `).join('')}
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
        </div>
      </div>
    `;
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    document.body.appendChild(modal);
  }

  return { load, save, unlock, check, trackColor, trackChat, trackKill, trackDamage, trackGameStart, trackWin, trackLoss, getAll, createPanel };
})();

const AdvancedHUD = (function() {
  let killFeedEl = null;
  let eventLogEl = null;
  let comboEl = null;
  let comboCount = 0;
  let comboTimer = null;

  function init() {
    // Kill feed
    killFeedEl = document.createElement('div');
    killFeedEl.id = 'kill-feed';
    killFeedEl.style.cssText = `
      position:absolute;top:10px;right:270px;z-index:20;
      display:flex;flex-direction:column;gap:4px;pointer-events:none;
      min-width:220px;
    `;
    const gm = document.querySelector('.game-main');
    if (gm) gm.appendChild(killFeedEl);

    // Combo counter
    comboEl = document.createElement('div');
    comboEl.id = 'combo-display';
    comboEl.style.cssText = `
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      z-index:30;pointer-events:none;text-align:center;display:none;
    `;
    if (gm) gm.appendChild(comboEl);
  }

  function addKillFeedEntry(hunterName, targetName, hunterColor, targetColor) {
    if (!killFeedEl) return;
    const entry = document.createElement('div');
    entry.style.cssText = `
      display:flex;align-items:center;gap:6px;padding:5px 10px;
      background:rgba(13,17,23,.85);border:1px solid rgba(248,81,73,.3);
      border-radius:6px;font-size:.8rem;animation:toastIn .2s ease;
      backdrop-filter:blur(4px);
    `;
    entry.innerHTML = `
      <span style="color:${hunterColor || '#f85149'};font-weight:700">${hunterName}</span>
      <span style="color:var(--text2)">🔫</span>
      <span style="color:${targetColor || '#39d353'};font-weight:700">${targetName}</span>
    `;
    killFeedEl.insertBefore(entry, killFeedEl.firstChild);
    // Limit to 5 entries
    while (killFeedEl.children.length > 5) killFeedEl.removeChild(killFeedEl.lastChild);
    setTimeout(() => {
      entry.style.opacity = '0';
      entry.style.transition = 'opacity .5s';
      setTimeout(() => entry.remove(), 500);
    }, 3500);
  }

  function showCombo(count) {
    if (!comboEl || count < 2) return;
    comboEl.style.display = 'block';
    const colors = ['', '', '#FFD700', '#FF4500', '#FF0000', '#9400D3'];
    const labels = ['', '', 'DOUBLE!', 'TRIPLE!', 'QUAD!', 'PENTA!!'];
    comboEl.innerHTML = `
      <div style="font-size:${2 + count * 0.3}rem;font-weight:900;
        color:${colors[Math.min(count, 5)] || '#FFD700'};
        text-shadow:0 0 30px currentColor;
        animation:announceAnim 1.5s forwards">
        ${labels[Math.min(count, 5)] || `×${count}`}
      </div>
    `;
    if (comboTimer) clearTimeout(comboTimer);
    comboTimer = setTimeout(() => { comboEl.style.display = 'none'; comboCount = 0; }, 2000);
  }

  function onKill() {
    comboCount++;
    showCombo(comboCount);
    if (comboTimer) clearTimeout(comboTimer);
    comboTimer = setTimeout(() => { comboCount = 0; }, 3000);
  }

  function resetCombo() { comboCount = 0; if (comboTimer) clearTimeout(comboTimer); }

  return { init, addKillFeedEntry, onKill, resetCombo };
})();

const KeyboardShortcuts = (function() {
  const shortcuts = {
    'Tab':       () => { const tabs = document.querySelectorAll('.tab-btn'); tabs.forEach((t,i)=>{ if(t.classList.contains('active')){ tabs[(i+1)%tabs.length].click(); }}); },
    'Escape':    () => { document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open')); SettingsPanel.closePanel(); },
    'F1':        () => { document.getElementById('modal-howto')?.classList.add('open'); },
    'm':         () => { const on = SettingsPanel.get('showMinimap'); SettingsPanel.set('showMinimap', !on); showToast((!on ? '🗺️ ミニマップON' : '🗺️ ミニマップOFF'), 'info'); },
    'F':         () => { FPSCounter.toggle(); },
    'Enter':     () => {
      const activeChat = document.querySelector('.chat-input:focus');
      if (!activeChat) {
        const gameChat = document.getElementById('game-chat-input');
        if (gameChat && document.getElementById('screen-game')?.classList.contains('active')) {
          gameChat.focus();
        }
      }
    }
  };

  function init() {
    document.addEventListener('keydown', e => {
      const tag = document.activeElement?.tagName?.toLowerCase();
      if (tag === 'input' || tag === 'textarea') return;
      const fn = shortcuts[e.key] || shortcuts[e.key.toLowerCase()];
      if (fn) { e.preventDefault(); fn(); }
    });
  }

  function register(key, fn) { shortcuts[key] = fn; }

  function showHelp() {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay open';
    modal.innerHTML = `
      <div class="modal">
        <h2>⌨️ キーボードショートカット</h2>
        <div style="display:grid;gap:8px">
          ${Object.entries({
            'WASD / 矢印キー': '移動（ハントフェーズ）',
            'Tab': 'チャット / スコアタブ切り替え',
            'M': 'ミニマップ表示切替',
            'F': 'FPSカウンター切替',
            'F1': '遊び方を見る',
            'Enter': 'チャット欄にフォーカス',
            'Esc': 'ダイアログを閉じる',
          }).map(([k,v]) => `
            <div style="display:flex;align-items:center;gap:12px;padding:8px 12px;background:var(--bg3);border-radius:6px">
              <kbd style="background:var(--border);padding:2px 8px;border-radius:4px;font-family:monospace;font-size:.85rem">${k}</kbd>
              <span style="color:var(--text2);font-size:.85rem">${v}</span>
            </div>
          `).join('')}
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
        </div>
      </div>
    `;
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    document.body.appendChild(modal);
  }

  return { init, register, showHelp };
})();

// めっちゃカメレオン - ゲームイベントフック
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function patchGameEvents() {
  // Patch the original socket event handlers to add extensions
  const origShowResult = window.showResult || function(){};

  // Intercept player:eliminated
  if (window.STATE && window.STATE.socket) {
    hookSocketEvents();
  } else {
    // Wait for socket init
    const checkSocket = setInterval(() => {
      if (window.STATE && window.STATE.socket) {
        clearInterval(checkSocket);
        hookSocketEvents();
      }
    }, 100);
  }
}

function hookSocketEvents() {
  const s = STATE.socket;
  if (!s) return;

  s.on('player:eliminated', data => {
    // Sound
    SoundSystem.play('eliminate');
    // Particles on canvas
    const gc = document.getElementById('game-canvas');
    if (gc) {
      const gp = STATE.game.players[data.playerId];
      if (gp) {
        const { w, h } = { w: gc.width, h: gc.height };
        ParticleSystem.emitElim(gp.x * w, gp.y * h, data.playerName);
        if (SettingsPanel.get('particleEffects')) {
          ParticleSystem.emitExplosion(gp.x * w, gp.y * h, '#f85149');
        }
      }
    }
    // Kill feed
    const hunterGp = STATE.game.players[data.hunterId];
    const targetGp = STATE.game.players[data.playerId];
    AdvancedHUD.addKillFeedEntry(
      data.hunterName, data.playerName,
      hunterGp?.color, targetGp?.color
    );
    // Achievements
    if (data.hunterId === STATE.myId) {
      AchievementSystem.trackKill();
      AdvancedHUD.onKill();
    }
    if (data.playerId === STATE.myId) {
      AchievementSystem.trackLoss();
    }
    // Replay
    ReplaySystem.record('elimination', data);
    ReplaySystem.addHighlight('elimination', data);
  });

  s.on('player:damaged', data => {
    SoundSystem.play('hit');
    if (data.playerId === STATE.myId) {
      AchievementSystem.trackDamage();
      const gc = document.getElementById('game-canvas');
      const gp = STATE.game.players[STATE.myId];
      if (gc && gp && SettingsPanel.get('particleEffects')) {
        ParticleSystem.emitHit(gp.x * gc.width, gp.y * gc.height);
      }
    }
  });

  s.on('hunter:bullet', data => {
    SoundSystem.play('shoot');
  });

  s.on('game:phase', data => {
    SoundSystem.play('phaseChange');
    if (data.phase === 'paint') {
      ReplaySystem.startRecording();
      AchievementSystem.trackGameStart();
      AdvancedHUD.resetCombo();
    }
    if (data.phase === 'hunt') {
      MinimapSystem.show();
    }
  });

  s.on('game:result', result => {
    const gc = document.getElementById('game-canvas');
    if (gc && SettingsPanel.get('particleEffects')) {
      if (result.winner === 'chameleons' && STATE.myRole === 'chameleon') {
        ParticleSystem.emitWin(gc.width, gc.height);
        SoundSystem.play('win');
        AchievementSystem.trackWin();
      } else if (result.winner === 'hunters' && STATE.myRole === 'hunter') {
        ParticleSystem.emitWin(gc.width, gc.height);
        SoundSystem.play('win');
        AchievementSystem.trackWin();
      } else {
        SoundSystem.play('lose');
        AchievementSystem.trackLoss();
      }
    }
    ReplaySystem.stopRecording();
    MinimapSystem.hide();
  });

  s.on('chat:message', msg => {
    if (msg.from !== STATE.myName && SettingsPanel.get('chatNotifications')) {
      SoundSystem.play('chat');
    }
    if (msg.fromId === STATE.myId) {
      AchievementSystem.trackChat();
    }
  });

  // Patch paint to track achievements
  const origPaintCanvas = document.getElementById('paint-canvas');
  if (origPaintCanvas) {
    origPaintCanvas.addEventListener('mousedown', () => {
      AchievementSystem.trackColor(STATE.paint?.color || '#000');
      SoundSystem.play('paintStroke');
    });
  }
}

// Patch minimap into draw loop
const _origDrawGame = window.drawGame;
let _minimapTick = 0;
window.drawGame = function() {
  // Call FPS counter
  FPSCounter.tick();
  // Update particles on game canvas
  if (STATE && STATE.game && STATE.game.ctx && SettingsPanel.get('particleEffects')) {
    ParticleSystem.update(STATE.game.ctx);
  }
  // Update minimap every 3 frames
  if (++_minimapTick % 3 === 0) {
    MinimapSystem.draw(
      STATE && STATE.game ? STATE.game.players : {},
      STATE && STATE.game ? STATE.game.mapId : 'hideout',
      STATE ? STATE.myId : null,
      STATE ? STATE.phase : 'lobby'
    );
  }
};
