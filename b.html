<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI学習プランナー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 100%;
            width: 100%;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* APIキー設定モーダル */
        .api-key-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .api-key-modal.hidden {
            display: none;
        }

        .api-key-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
        }

        .api-key-content h2 {
            margin-bottom: 20px;
            color: #667eea;
        }

        .api-key-content p {
            margin-bottom: 15px;
            color: #666;
            line-height: 1.6;
        }

        .api-key-content a {
            color: #667eea;
            text-decoration: none;
        }

        .api-key-content a:hover {
            text-decoration: underline;
        }

        /* ヘッダー */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .user-level {
            font-size: 14px;
            opacity: 0.9;
        }

        .api-key-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .api-key-indicator:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .api-key-indicator.active {
            background: #10b981;
        }

        /* ナビゲーション */
        .nav-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
            overflow-x: auto;
        }

        .nav-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .nav-tab.active {
            background: white;
            color: #667eea;
            font-weight: bold;
            border-bottom: 3px solid #667eea;
        }

        /* コンテンツエリア */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* カード */
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #333;
        }

        .card h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #555;
        }

        /* フォーム */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        /* ボタン */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        /* カレンダー */
        .calendar {
            background: white;
            border-radius: 12px;
            padding: 15px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-header button {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 5px 10px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .calendar-day-header {
            text-align: center;
            font-weight: bold;
            padding: 10px 5px;
            font-size: 12px;
            color: #666;
        }

        .calendar-day {
            aspect-ratio: 1;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px;
            position: relative;
        }

        .calendar-day:hover {
            background: #f0f0f0;
        }

        .calendar-day.today {
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        .calendar-day.has-schedule {
            background: #e0e7ff;
        }

        .calendar-day.completed {
            background: #d1fae5;
        }

        .calendar-day.behind {
            background: #fee2e2;
        }

        .calendar-day-number {
            font-size: 14px;
        }

        /* チャット */
        .chat-container {
            height: 400px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 15px;
            background: #f9fafb;
        }

        .chat-message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .chat-message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .chat-message.ai {
            background: white;
            border: 2px solid #e0e0e0;
        }

        .chat-input-container {
            display: flex;
            gap: 10px;
        }

        .chat-input-container input {
            flex: 1;
        }

        .chat-input-container button {
            width: auto;
            min-width: 80px;
        }

        /* モーダル */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        /* ローディング */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* アラート */
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
        }

        .alert-info {
            background: #dbeafe;
            color: #1e40af;
        }

        .alert-warning {
            background: #fef3c7;
            color: #92400e;
        }

        /* プログレスバー */
        .progress-bar {
            height: 30px;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        /* レスポンシブ */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 20px;
            }

            .nav-tab {
                font-size: 12px;
                padding: 12px 8px;
            }

            .card {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- APIキー設定モーダル -->
    <div id="apiKeyModal" class="api-key-modal">
        <div class="api-key-content">
            <h2>🔑 APIキー設定</h2>
            <p>
                このアプリを使用するには、Anthropic APIキーが必要です。<br>
                <a href="https://console.anthropic.com/" target="_blank">Anthropic Console</a>でAPIキーを取得してください。
            </p>
            <div class="form-group">
                <label>APIキー</label>
                <input type="password" id="apiKeyInput" placeholder="sk-ant-...">
            </div>
            <p style="font-size: 12px; color: #999;">
                ※APIキーはブラウザのローカルストレージに保存されます（安全）
            </p>
            <button class="btn btn-primary" onclick="saveApiKey()">保存して開始</button>
        </div>
    </div>

    <div class="app-container">
        <!-- ヘッダー -->
        <div class="header">
            <div class="api-key-indicator" onclick="showApiKeyModal()">
                🔑 <span id="apiKeyStatus">未設定</span>
            </div>
            <h1>📚 AI学習プランナー</h1>
            <div class="user-level">
                Lv.<span id="userLevel">1</span> | 
                EXP: <span id="userExp">0</span> / <span id="userExpMax">100</span>
            </div>
        </div>

        <!-- ナビゲーション -->
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('schedule')">📅 計画</button>
            <button class="nav-tab" onclick="switchTab('calendar')">📆 カレンダー</button>
            <button class="nav-tab" onclick="switchTab('mentor')">💬 メンター</button>
            <button class="nav-tab" onclick="switchTab('settings')">⚙️ 設定</button>
        </div>

        <!-- コンテンツ -->
        <div class="content">
            <!-- 計画タブ -->
            <div id="scheduleTab" class="tab-content active">
                <div class="card">
                    <h2>新しい学習計画を作成</h2>
                    <div class="form-group">
                        <label>教材名</label>
                        <input type="text" id="bookTitle" placeholder="例: TOEIC文法問題集">
                    </div>
                    <div class="form-group">
                        <label>開始ページ</label>
                        <input type="number" id="startPage" value="1">
                    </div>
                    <div class="form-group">
                        <label>終了ページ</label>
                        <input type="number" id="endPage" value="100">
                    </div>
                    <div class="form-group">
                        <label>目標日</label>
                        <input type="date" id="targetDate">
                    </div>
                    <button class="btn btn-primary" onclick="createSchedule()">
                        🤖 AIで計画を生成
                    </button>
                </div>

                <div class="card">
                    <h2>進行中の計画</h2>
                    <div id="activeSchedules"></div>
                </div>

                <div class="card">
                    <h2>全体の進捗</h2>
                    <div id="overallProgress"></div>
                </div>
            </div>

            <!-- カレンダータブ -->
            <div id="calendarTab" class="tab-content">
                <div class="card">
                    <div id="calendar"></div>
                </div>
            </div>

            <!-- メンタータブ -->
            <div id="mentorTab" class="tab-content">
                <div class="card">
                    <h2>💬 AIメンター</h2>
                    <div id="mentorChat" class="chat-container"></div>
                    <div class="chat-input-container">
                        <input type="text" id="mentorInput" placeholder="今日の学習について話そう...">
                        <button class="btn btn-primary" onclick="sendMentorMessage()">送信</button>
                    </div>
                </div>

                <div class="card">
                    <h2>😭 挫折しそうな時</h2>
                    <div class="form-group">
                        <textarea id="giveUpText" rows="4" placeholder="今の気持ちを書いてください..."></textarea>
                    </div>
                    <button class="btn btn-success" onclick="getEncouragement()">励ましてもらう</button>
                    <div id="encouragementResponse"></div>
                </div>
            </div>

            <!-- 設定タブ -->
            <div id="settingsTab" class="tab-content">
                <div class="card">
                    <h2>⚙️ 設定</h2>
                    <button class="btn btn-secondary" onclick="showRoutineModal()">週間ルーティン設定</button>
                    <button class="btn btn-secondary" onclick="showSpecialDaysModal()">特別な予定を追加</button>
                    <button class="btn btn-secondary" onclick="showMentorModal()">メンタータイプ変更</button>
                    <button class="btn btn-danger" onclick="resetAllData()">全データをリセット</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ローディング -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>AI処理中...</p>
    </div>

    <!-- 各種モーダル（省略されたモーダルは元のコードと同じ構造） -->

    <script>
        // ==================== データ管理 ====================
        class DataManager {
            constructor() {
                this.STORAGE_KEY = 'studyPlannerData';
                this.API_KEY_STORAGE = 'anthropic_api_key';
            }

            save(data) {
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));
            }

            load() {
                const data = localStorage.getItem(this.STORAGE_KEY);
                return data ? JSON.parse(data) : null;
            }

            saveApiKey(key) {
                localStorage.setItem(this.API_KEY_STORAGE, key);
            }

            loadApiKey() {
                return localStorage.getItem(this.API_KEY_STORAGE);
            }

            hasApiKey() {
                return !!this.loadApiKey();
            }

            clear() {
                localStorage.removeItem(this.STORAGE_KEY);
            }
        }

        // ==================== API通信 ====================
        class AnthropicAPI {
            constructor() {
                this.baseURL = 'https://api.anthropic.com/v1/messages';
                this.model = 'claude-sonnet-4-20250514';
                this.dataManager = new DataManager();
            }

            async call(messages, maxTokens = 1000) {
                const apiKey = this.dataManager.loadApiKey();
                if (!apiKey) {
                    throw new Error('APIキーが設定されていません');
                }

                const response = await fetch(this.baseURL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: this.model,
                        max_tokens: maxTokens,
                        messages: messages
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'APIエラーが発生しました');
                }

                const data = await response.json();
                return data.content[0].text;
            }

            async generateSchedule(bookTitle, startPage, endPage, targetDate, weeklyRoutine, specialDays) {
                const prompt = `あなたは学習計画の専門家です。以下の情報から実現可能な学習計画を作成してください。

教材: ${bookTitle}
開始ページ: ${startPage}
終了ページ: ${endPage}
目標日: ${targetDate}

週間ルーティン: ${JSON.stringify(weeklyRoutine)}
特別な予定: ${JSON.stringify(specialDays)}

JSON形式で以下を返してください:
{
    "dailyPages": 1日あたりのページ数,
    "totalDays": 必要日数,
    "difficulty": "簡単" | "普通" | "厳しい",
    "advice": "アドバイス（50文字程度）"
}`;

                const response = await this.call([{ role: 'user', content: prompt }]);
                return JSON.parse(response.replace(/```json|```/g, '').trim());
            }

            async getMentorResponse(message, mentorType) {
                const personalities = {
                    praise: '褒めて励ます',
                    strict: '厳しくも優しく鼓舞する',
                    gentle: '共感して癒やす'
                };

                const prompt = `あなたは学習を応援するAIメンターです。
タイプ: ${personalities[mentorType]}

ユーザーのメッセージ: ${message}

${personalities[mentorType]}口調で、短く（2-3文）応答してください。`;

                return await this.call([{ role: 'user', content: prompt }]);
            }

            async getEncouragement(userText, stats) {
                const prompt = `あなたは優しく寄り添うAIメンターです。

ユーザーの悩み: ${userText}

これまでの努力:
- レベル: ${stats.level}
- 達成ページ数: ${stats.totalPages}
- 継続日数: ${stats.consecutiveDays}日

ユーザーのこれまでの努力を具体的に示しながら、徹底的に肯定して励ましてください。200文字程度で。`;

                return await this.call([{ role: 'user', content: prompt }]);
            }
        }

        // ==================== アプリケーション ====================
        class StudyPlannerApp {
            constructor() {
                this.dataManager = new DataManager();
                this.api = new AnthropicAPI();
                
                // データ
                this.schedules = [];
                this.userStats = { level: 1, exp: 0, expMax: 100 };
                this.weeklyRoutine = {};
                this.specialDays = [];
                this.mentorType = 'praise';
                this.currentDate = new Date();

                this.init();
            }

            init() {
                this.loadData();
                this.checkApiKey();
                this.updateUI();
                this.setupEventListeners();
            }

            checkApiKey() {
                if (!this.dataManager.hasApiKey()) {
                    document.getElementById('apiKeyModal').classList.remove('hidden');
                } else {
                    document.getElementById('apiKeyModal').classList.add('hidden');
                    document.getElementById('apiKeyStatus').textContent = '設定済み';
                    document.querySelector('.api-key-indicator').classList.add('active');
                }
            }

            loadData() {
                const data = this.dataManager.load();
                if (data) {
                    this.schedules = data.schedules || [];
                    this.userStats = data.userStats || this.userStats;
                    this.weeklyRoutine = data.weeklyRoutine || {};
                    this.specialDays = data.specialDays || [];
                    this.mentorType = data.mentorType || 'praise';
                }
            }

            saveData() {
                this.dataManager.save({
                    schedules: this.schedules,
                    userStats: this.userStats,
                    weeklyRoutine: this.weeklyRoutine,
                    specialDays: this.specialDays,
                    mentorType: this.mentorType
                });
            }

            updateUI() {
                this.updateUserLevel();
                this.updateActiveSchedules();
                this.updateCalendar();
            }

            updateUserLevel() {
                document.getElementById('userLevel').textContent = this.userStats.level;
                document.getElementById('userExp').textContent = this.userStats.exp;
                document.getElementById('userExpMax').textContent = this.userStats.expMax;
            }

            updateActiveSchedules() {
                const container = document.getElementById('activeSchedules');
                const active = this.schedules.filter(s => !s.completed);

                if (active.length === 0) {
                    container.innerHTML = '<p style="color: #999;">進行中の計画はありません</p>';
                    return;
                }

                let html = '';
                active.forEach((schedule, index) => {
                    const progress = ((schedule.currentPage - schedule.startPage) / (schedule.endPage - schedule.startPage)) * 100;
                    html += `
                        <div class="card">
                            <h3>${schedule.title}</h3>
                            <p>進捗: ${schedule.currentPage} / ${schedule.endPage}ページ</p>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%">${Math.round(progress)}%</div>
                            </div>
                            <button class="btn btn-success" onclick="app.updateProgress(${index})">進捗を更新</button>
                        </div>
                    `;
                });

                container.innerHTML = html;
            }

            updateCalendar() {
                const calendar = document.getElementById('calendar');
                const year = this.currentDate.getFullYear();
                const month = this.currentDate.getMonth();

                let html = `
                    <div class="calendar-header">
                        <button onclick="app.prevMonth()">◀</button>
                        <h3>${year}年 ${month + 1}月</h3>
                        <button onclick="app.nextMonth()">▶</button>
                    </div>
                    <div class="calendar-grid">
                        <div class="calendar-day-header">日</div>
                        <div class="calendar-day-header">月</div>
                        <div class="calendar-day-header">火</div>
                        <div class="calendar-day-header">水</div>
                        <div class="calendar-day-header">木</div>
                        <div class="calendar-day-header">金</div>
                        <div class="calendar-day-header">土</div>
                `;

                const firstDay = new Date(year, month, 1).getDay();
                const lastDate = new Date(year, month + 1, 0).getDate();

                for (let i = 0; i < firstDay; i++) {
                    html += '<div class="calendar-day"></div>';
                }

                for (let day = 1; day <= lastDate; day++) {
                    const date = new Date(year, month, day);
                    const isToday = this.isToday(date);
                    const classes = ['calendar-day'];
                    if (isToday) classes.push('today');

                    html += `<div class="${classes.join(' ')}">
                        <div class="calendar-day-number">${day}</div>
                    </div>`;
                }

                html += '</div>';
                calendar.innerHTML = html;
            }

            isToday(date) {
                const today = new Date();
                return date.getDate() === today.getDate() &&
                       date.getMonth() === today.getMonth() &&
                       date.getFullYear() === today.getFullYear();
            }

            prevMonth() {
                this.currentDate.setMonth(this.currentDate.getMonth() - 1);
                this.updateCalendar();
            }

            nextMonth() {
                this.currentDate.setMonth(this.currentDate.getMonth() + 1);
                this.updateCalendar();
            }

            async createSchedule() {
                const title = document.getElementById('bookTitle').value;
                const startPage = parseInt(document.getElementById('startPage').value);
                const endPage = parseInt(document.getElementById('endPage').value);
                const targetDate = document.getElementById('targetDate').value;

                if (!title || !targetDate) {
                    alert('すべての項目を入力してください');
                    return;
                }

                if (!this.dataManager.hasApiKey()) {
                    alert('APIキーを設定してください');
                    this.checkApiKey();
                    return;
                }

                const loading = document.getElementById('loading');
                loading.classList.add('active');

                try {
                    const result = await this.api.generateSchedule(
                        title, startPage, endPage, targetDate,
                        this.weeklyRoutine, this.specialDays
                    );

                    this.schedules.push({
                        title,
                        startPage,
                        endPage,
                        currentPage: startPage,
                        targetDate,
                        dailyPages: result.dailyPages,
                        completed: false
                    });

                    this.saveData();
                    this.updateUI();

                    alert(`✅ 計画を作成しました！\n\n${result.advice}`);
                } catch (error) {
                    console.error('Error:', error);
                    alert('エラー: ' + error.message);
                } finally {
                    loading.classList.remove('active');
                }
            }

            updateProgress(index) {
                const pages = prompt('今日の進捗ページ数を入力してください:');
                if (pages && !isNaN(pages)) {
                    this.schedules[index].currentPage += parseInt(pages);
                    this.userStats.exp += parseInt(pages) * 2;

                    if (this.userStats.exp >= this.userStats.expMax) {
                        this.levelUp();
                    }

                    this.saveData();
                    this.updateUI();
                }
            }

            levelUp() {
                this.userStats.level++;
                this.userStats.exp = 0;
                this.userStats.expMax = Math.floor(this.userStats.expMax * 1.5);
                alert(`🎉 レベルアップ！ Lv.${this.userStats.level}になりました！`);
            }

            async sendMentorMessage() {
                const input = document.getElementById('mentorInput');
                const message = input.value.trim();

                if (!message) return;

                if (!this.dataManager.hasApiKey()) {
                    alert('APIキーを設定してください');
                    return;
                }

                this.addChatMessage(message, 'user');
                input.value = '';

                try {
                    const response = await this.api.getMentorResponse(message, this.mentorType);
                    this.addChatMessage(response, 'ai');
                } catch (error) {
                    console.error('Error:', error);
                    this.addChatMessage('ごめん、今ちょっと調子が悪いみたい...💦', 'ai');
                }
            }

            addChatMessage(text, sender) {
                const chat = document.getElementById('mentorChat');
                const message = document.createElement('div');
                message.className = `chat-message ${sender}`;
                message.textContent = text;
                chat.appendChild(message);
                chat.scrollTop = chat.scrollHeight;
            }

            async getEncouragement() {
                const text = document.getElementById('giveUpText').value;

                if (!text) {
                    alert('気持ちを入力してください');
                    return;
                }

                if (!this.dataManager.hasApiKey()) {
                    alert('APIキーを設定してください');
                    return;
                }

                const loading = document.getElementById('loading');
                loading.classList.add('active');

                try {
                    const stats = {
                        level: this.userStats.level,
                        totalPages: this.schedules.reduce((sum, s) => sum + (s.currentPage - s.startPage), 0),
                        consecutiveDays: 5
                    };

                    const response = await this.api.getEncouragement(text, stats);

                    document.getElementById('encouragementResponse').innerHTML = `
                        <div class="alert alert-success">${response}</div>
                    `;

                    this.userStats.exp += 10;
                    this.saveData();
                    this.updateUserLevel();
                } catch (error) {
                    console.error('Error:', error);
                    alert('エラー: ' + error.message);
                } finally {
                    loading.classList.remove('active');
                }
            }

            setupEventListeners() {
                document.getElementById('mentorInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        this.sendMentorMessage();
                    }
                });
            }
        }

        // ==================== グローバル関数 ====================
        let app;

        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (!key) {
                alert('APIキーを入力してください');
                return;
            }

            if (!key.startsWith('sk-ant-')) {
                alert('正しいAPIキー形式ではありません（sk-ant-で始まる必要があります）');
                return;
            }

            app.dataManager.saveApiKey(key);
            app.checkApiKey();
            alert('✅ APIキーを保存しました');
        }

        function showApiKeyModal() {
            document.getElementById('apiKeyModal').classList.remove('hidden');
        }

        function resetAllData() {
            if (confirm('本当に全データをリセットしますか？この操作は取り消せません。')) {
                app.dataManager.clear();
                location.reload();
            }
        }

        function showRoutineModal() {
            alert('週間ルーティン設定機能は準備中です');
        }

        function showSpecialDaysModal() {
            alert('特別な予定機能は準備中です');
        }

        function showMentorModal() {
            alert('メンタータイプ変更機能は準備中です');
        }

        // ==================== 初期化 ====================
        window.addEventListener('DOMContentLoaded', () => {
            app = new StudyPlannerApp();
        });
    </script>
</body>
</html>
