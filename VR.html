<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI VR Avatar Prototype - Expression Version</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #2a2a3a; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        #webcam { position: absolute; bottom: 10px; right: 10px; width: 160px; height: 120px; transform: scaleX(-1); border: 2px solid #fff; border-radius: 8px; opacity: 0.7; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; pointer-events: none; max-width: 300px; }
        h1 { margin: 0 0 10px 0; font-size: 16px; }
        p { margin: 5px 0; font-size: 12px; color: #ccc; }
    </style>

    <!-- three-vrm v1 は ES Module なので importmap + type="module" で読み込む -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.0/examples/jsm/",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@1/lib/three-vrm.module.js"
        }
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <video id="webcam" autoplay playsinline></video>
    
    <div id="ui">
        <h1>AIアバター試作機 (Ver.0.5)</h1>
        <p>● 首の動きを連動</p>
        <p>★ まばたきを検知（目を閉じるとアバターも閉じます）</p>
        <p>★ 口の動きを検知（口を開けるとアバターも「あ」の口になります）</p>
        <p id="status">アバター読み込み中...</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRM, VRMLoaderPlugin, VRMUtils, VRMExpressionPresetName, VRMHumanBoneName } from '@pixiv/three-vrm';

        let currentVrm = undefined;

        // --- 1. Three.js セットアップ ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0.0, 1.4, 1.2);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(1.0, 2.0, 1.0).normalize();
        scene.add(dirLight);

        // --- 2. VRMアバターの読み込み (v1 API) ---
        // 修正: three-vrm v1 の正しい API を使用
        //   - VRMLoaderPlugin を GLTFLoader に登録
        //   - VRM インスタンスは gltf.userData.vrm から取得
        //   - VRMモデルURL: raw.githubusercontent.com から動作確認済みのモデルを使用
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        const vrmUrl = 'https://raw.githubusercontent.com/pixiv/three-vrm/dev/packages/three-vrm/examples/models/VRM1_Constraint_Twist_Sample.vrm';

        loader.load(
            vrmUrl,
            (gltf) => {
                const vrm = gltf.userData.vrm;
                if (!vrm) {
                    document.getElementById('status').innerText = "VRMデータが見つかりません";
                    document.getElementById('status').style.color = "#ff4444";
                    return;
                }

                // パフォーマンス最適化
                VRMUtils.removeUnnecessaryVertices(gltf.scene);

                currentVrm = vrm;
                scene.add(vrm.scene);
                vrm.scene.rotation.y = Math.PI;

                document.getElementById('status').innerText = "準備完了！まばたき・口を動かしてね";
                document.getElementById('status').style.color = "#00ff88";
                console.log('VRM loaded:', vrm);
            },
            (progress) => {
                if (progress.total > 0) {
                    const pct = Math.round(progress.loaded / progress.total * 100);
                    document.getElementById('status').innerText = `読み込み中... ${pct}%`;
                }
            },
            (error) => {
                console.error('VRM load error:', error);
                document.getElementById('status').innerText = "読み込み失敗: " + error.message;
                document.getElementById('status').style.color = "#ff4444";
            }
        );

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (currentVrm) {
                currentVrm.update(delta);
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });


        // --- 3. MediaPipe で顔・目・口を追跡 ---
        const videoElement = document.getElementById('webcam');

        // EAR（Eye Aspect Ratio）計算
        function calcEAR(top, bottom, innerCorner, outerCorner) {
            const vertical = Math.hypot(top.x - bottom.x, top.y - bottom.y);
            const horizontal = Math.hypot(innerCorner.x - outerCorner.x, innerCorner.y - outerCorner.y);
            if (horizontal === 0) return 0;
            return vertical / horizontal;
        }

        function onResults(results) {
            if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0 || !currentVrm) return;
            const lm = results.multiFaceLandmarks[0];

            // --- 首の回転 ---
            const nose         = lm[4];
            const leftEyeCorner  = lm[33];
            const rightEyeCorner = lm[263];

            const roll  = Math.atan2(rightEyeCorner.y - leftEyeCorner.y, rightEyeCorner.x - leftEyeCorner.x);
            const pitch = (nose.y - (leftEyeCorner.y + rightEyeCorner.y) / 2) * 3;
            const yaw   = (nose.x - (leftEyeCorner.x + rightEyeCorner.x) / 2) * -3;

            // 修正: v1 API では getBoneNode → humanoid.getNormalizedBoneNode
            const neck = currentVrm.humanoid.getNormalizedBoneNode('neck');
            if (neck) {
                neck.rotation.z = roll;
                neck.rotation.x = pitch;
                neck.rotation.y = yaw;
            }

            // --- まばたき (EAR方式で 0〜1 の滑らかな値) ---
            const EAR_OPEN   = 0.25;
            const EAR_CLOSED = 0.05;

            const leftEAR  = calcEAR(lm[159], lm[145], lm[33],  lm[133]);
            const rightEAR = calcEAR(lm[386], lm[374], lm[362], lm[263]);

            const leftBlink  = 1.0 - Math.max(0, Math.min(1, (leftEAR  - EAR_CLOSED) / (EAR_OPEN - EAR_CLOSED)));
            const rightBlink = 1.0 - Math.max(0, Math.min(1, (rightEAR - EAR_CLOSED) / (EAR_OPEN - EAR_CLOSED)));

            // 修正: v1 VRM1.0モデルのExpressionPreset名は小文字始まり
            //   例: BlinkLeft → 'blinkLeft', Aa → 'aa'
            //   VRMExpressionPresetName.BlinkLeft = 'blinkLeft' となっている
            currentVrm.expressionManager?.setValue(VRMExpressionPresetName.BlinkLeft,  leftBlink);
            currentVrm.expressionManager?.setValue(VRMExpressionPresetName.BlinkRight, rightBlink);

            // --- 口の開閉 ---
            const lipTop    = lm[13];
            const lipBottom = lm[14];
            const mouthDist = Math.hypot(lipTop.x - lipBottom.x, lipTop.y - lipBottom.y);

            let mouthAa = (mouthDist - 0.015) * 15;
            mouthAa = Math.max(0.0, Math.min(1.0, mouthAa));
            currentVrm.expressionManager?.setValue(VRMExpressionPresetName.Aa, mouthAa);
        }

        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        faceMesh.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        cameraUtils.start();
    </script>
</body>
</html>
