<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VRM Viewer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #15151f;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  #canvas-container { position: fixed; inset: 0; }

  #ui {
    position: fixed;
    top: 12px;
    left: 12px;
    color: #fff;
    background: rgba(0, 0, 0, 0.55);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.7;
    max-width: 280px;
    pointer-events: none;
  }
  #ui h1 { margin: 0 0 6px; font-size: 15px; }
  #status { color: #8be9fd; }

  #expressions {
    position: fixed;
    top: 12px;
    right: 12px;
    max-width: 230px;
    max-height: 80vh;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.55);
    color: #fff;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 12px;
  }
  #expressions h2 { margin: 0 0 8px; font-size: 13px; }
  .expr-btn {
    display: block;
    width: 100%;
    margin: 3px 0;
    padding: 6px 8px;
    border: none;
    border-radius: 6px;
    background: #2e2e4d;
    color: #fff;
    cursor: pointer;
    font-size: 12px;
    text-align: left;
  }
  .expr-btn:hover { background: #45457a; }
  .expr-btn.active { background: #5b6cff; }
  #resetExpr { margin-top: 8px; background: #553333; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui">
  <h1>VRM Viewer</h1>
  <div id="status">読み込み中...</div>
  <div id="keyHints">
    WASD：移動 / Z+WASD：走る / Shift：しゃがむ / Space：ジャンプ<br>
    マウスドラッグ：視点 / ホイール：ズーム
  </div>
</div>

<!-- 設定パネル -->
<div id="settingsPanel" style="
  position:fixed; bottom:12px; left:12px;
  background:rgba(0,0,0,0.6); color:#fff;
  padding:12px 16px; border-radius:10px; font-size:12px; line-height:2;
">
  <b>設定</b><br>
  <label><input type="checkbox" id="chkFaceDir" checked> 視点方向に向く（S/A/D）</label><br>
  <label><input type="checkbox" id="chkThirdPerson" checked> 3人称追跡カメラ</label>
</div>

<div id="expressions">
  <h2>表情一覧（VRMから自動検出）</h2>
  <div id="exprList">VRM読み込み後に表示されます</div>
</div>

<!--
  ====================================================================
  importmap: three.js / three-vrm / addons をCDN(jsdelivr)から読み込む設定。
  バージョンを変えたい場合はここの数字を変更してください。
  ====================================================================
-->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

/* ====================================================================
   ① ファイル名はここで指定します
   index.html と「同じフォルダ」に以下のファイルを置いてください。
   サブフォルダに入れた場合はパスを './models/xxx.vrm' のように直してください。
   ==================================================================== */
const VRM_FILE_PATH = './ayame_v1.1.vrm';     // ← VRMファイル名
const WALK_ANIMATION_PATH = './Walking.fbx';  // ← ミクサモ(Mixamo)の歩行アニメーション(FBX)

// 走る/アイドルなど別のモーションを追加したい場合は、ここに増やして
// 下の「複数アニメーションを使う場合の拡張例」を参考に組み込んでください。
// const RUN_ANIMATION_PATH = './Running.fbx';
// const IDLE_ANIMATION_PATH = './Idle.fbx';

const KEEP_IN_PLACE = true; // true: その場で足踏み（移動しない） / false: 実際に前進してしまう

/* ====================================================================
   ② Mixamo → VRM ボーン名 対応表
   ミクサモのリグ名 (mixamorigXXX) は VRM の Humanoid ボーン名と
   名前も階層も違うため、この対応表で1本ずつ紐づけてから動かします。
   （pixiv公式 three-vrm のサンプルで使われている対応表と同じものです）
   ==================================================================== */
const mixamoVRMRigMap = {
  mixamorigHips: 'hips',
  mixamorigSpine: 'spine',
  mixamorigSpine1: 'chest',
  mixamorigSpine2: 'upperChest',
  mixamorigNeck: 'neck',
  mixamorigHead: 'head',
  mixamorigLeftShoulder: 'leftShoulder',
  mixamorigLeftArm: 'leftUpperArm',
  mixamorigLeftForeArm: 'leftLowerArm',
  mixamorigLeftHand: 'leftHand',
  mixamorigLeftHandThumb1: 'leftThumbMetacarpal',
  mixamorigLeftHandThumb2: 'leftThumbProximal',
  mixamorigLeftHandThumb3: 'leftThumbDistal',
  mixamorigLeftHandIndex1: 'leftIndexProximal',
  mixamorigLeftHandIndex2: 'leftIndexIntermediate',
  mixamorigLeftHandIndex3: 'leftIndexDistal',
  mixamorigLeftHandMiddle1: 'leftMiddleProximal',
  mixamorigLeftHandMiddle2: 'leftMiddleIntermediate',
  mixamorigLeftHandMiddle3: 'leftMiddleDistal',
  mixamorigLeftHandRing1: 'leftRingProximal',
  mixamorigLeftHandRing2: 'leftRingIntermediate',
  mixamorigLeftHandRing3: 'leftRingDistal',
  mixamorigLeftHandPinky1: 'leftLittleProximal',
  mixamorigLeftHandPinky2: 'leftLittleIntermediate',
  mixamorigLeftHandPinky3: 'leftLittleDistal',
  mixamorigRightShoulder: 'rightShoulder',
  mixamorigRightArm: 'rightUpperArm',
  mixamorigRightForeArm: 'rightLowerArm',
  mixamorigRightHand: 'rightHand',
  mixamorigRightHandPinky1: 'rightLittleProximal',
  mixamorigRightHandPinky2: 'rightLittleIntermediate',
  mixamorigRightHandPinky3: 'rightLittleDistal',
  mixamorigRightHandRing1: 'rightRingProximal',
  mixamorigRightHandRing2: 'rightRingIntermediate',
  mixamorigRightHandRing3: 'rightRingDistal',
  mixamorigRightHandMiddle1: 'rightMiddleProximal',
  mixamorigRightHandMiddle2: 'rightMiddleIntermediate',
  mixamorigRightHandMiddle3: 'rightMiddleDistal',
  mixamorigRightHandIndex1: 'rightIndexProximal',
  mixamorigRightHandIndex2: 'rightIndexIntermediate',
  mixamorigRightHandIndex3: 'rightIndexDistal',
  mixamorigRightHandThumb1: 'rightThumbMetacarpal',
  mixamorigRightHandThumb2: 'rightThumbProximal',
  mixamorigRightHandThumb3: 'rightThumbDistal',
  mixamorigLeftUpLeg: 'leftUpperLeg',
  mixamorigLeftLeg: 'leftLowerLeg',
  mixamorigLeftFoot: 'leftFoot',
  mixamorigLeftToeBase: 'leftToes',
  mixamorigRightUpLeg: 'rightUpperLeg',
  mixamorigRightLeg: 'rightLowerLeg',
  mixamorigRightFoot: 'rightFoot',
  mixamorigRightToeBase: 'rightToes',
};

/* ====================================================================
   ③ ミクサモのFBXアニメーションを VRM 用 AnimationClip に変換する関数
   pixiv公式 three-vrm のサンプル loadMixamoAnimation.js をベースに、
   「その場から動かさない」処理 (KEEP_IN_PLACE) を追加したものです。
   https://github.com/pixiv/three-vrm/tree/dev/packages/three-vrm-core/examples/humanoidAnimation
   ==================================================================== */
function loadMixamoAnimation(url, vrm, keepInPlace = true) {
  const loader = new FBXLoader();
  return loader.loadAsync(url).then((asset) => {
    // Mixamoから書き出されたFBXは、アニメーション名が "mixamo.com" になっていることが多い
    const clip = THREE.AnimationClip.findByName(asset.animations, 'mixamo.com') || asset.animations[0];
    if (!clip) throw new Error('FBXの中にアニメーションが見つかりませんでした');

    const tracks = [];
    const restRotationInverse = new THREE.Quaternion();
    const parentRestWorldRotation = new THREE.Quaternion();
    const _quatA = new THREE.Quaternion();

    // ミクサモとVRMでは腰(Hips)の高さ＝身長スケールが違うため、比率を求めて補正する
    const mixamoHipsNode = asset.getObjectByName('mixamorigHips');
    const motionHipsHeight = mixamoHipsNode.position.y;
    const vrmHipsHeight = vrm.humanoid.normalizedRestPose.hips.position[1];
    const hipsPositionScale = vrmHipsHeight / motionHipsHeight;

    clip.tracks.forEach((track) => {
      // トラック名は "mixamorigHips.quaternion" のような形式になっている
      const [mixamoRigName, propertyName] = track.name.split('.');
      const vrmBoneName = mixamoVRMRigMap[mixamoRigName];
      const vrmNodeName = vrm.humanoid?.getNormalizedBoneNode(vrmBoneName)?.name;
      const mixamoRigNode = asset.getObjectByName(mixamoRigName);

      // 対応表に無いボーン（指の一部や補助ボーンなど）は無視する
      if (vrmNodeName == null || mixamoRigNode == null) return;

      // レスト(直立)姿勢時の回転を基準に、回転の差分だけを取り出す
      mixamoRigNode.getWorldQuaternion(restRotationInverse).invert();
      mixamoRigNode.parent.getWorldQuaternion(parentRestWorldRotation);

      if (track instanceof THREE.QuaternionKeyframeTrack) {
        for (let i = 0; i < track.values.length; i += 4) {
          const flat = track.values.slice(i, i + 4);
          _quatA.fromArray(flat).premultiply(parentRestWorldRotation).multiply(restRotationInverse).toArray(flat);
          flat.forEach((v, idx) => (track.values[idx + i] = v));
        }
        tracks.push(new THREE.QuaternionKeyframeTrack(
          `${vrmNodeName}.${propertyName}`,
          track.times,
          // VRM0.0モデルは前後左右の軸が反転しているので、その場合だけ符号を反転する
          track.values.map((v, i) => (vrm.meta?.metaVersion === '0' && i % 2 === 0 ? -v : v)),
        ));
      } else if (track instanceof THREE.VectorKeyframeTrack) {
        const values = track.values.map(
          (v, i) => (vrm.meta?.metaVersion === '0' && i % 3 !== 1 ? -v : v) * hipsPositionScale,
        );

        // Hipsの「位置」トラック＝歩行による前進(根本移動)が入っている部分
        if (mixamoRigName === 'mixamorigHips' && propertyName === 'position' && keepInPlace) {
          // X(左右)とZ(前後)だけ0にする。Y(上下の重心バウンス)はそのまま残すので
          // 「その場で足踏みしている」自然な動きになる
          for (let i = 0; i < values.length; i += 3) {
            values[i] = 0;
            values[i + 2] = 0;
          }
        }
        tracks.push(new THREE.VectorKeyframeTrack(`${vrmNodeName}.${propertyName}`, track.times, values));
      }
    });

    return new THREE.AnimationClip(clip.name || 'anim', clip.duration, tracks);
  });
}

/* ====================================================================
   シーンの基本構築
   ==================================================================== */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15151f);

const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(0, 1.4, 3.2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// OrbitControls（手動操作時のみ使用、3人称追跡時は無効化）
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.minDistance = 0.6;
controls.maxDistance = 12;
controls.update();

// ライト
scene.add(new THREE.HemisphereLight(0xffffff, 0x444466, 1.3));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
dirLight.position.set(1, 2, 1.5);
scene.add(dirLight);

// 足元の目安になる地面とグリッド（ワールド広め）
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshStandardMaterial({ color: 0x23233a, roughness: 1 }),
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);
scene.add(new THREE.GridHelper(60, 60, 0x4444aa, 0x2c2c44));

const clock = new THREE.Clock();
let currentVrm = null;
let mixer = null;

// アニメーションアクション管理
const actions = {};  // { name: THREE.AnimationAction }
let currentAction = null;
let currentActionName = '';

// 設定フラグ
let faceCameraDir = true;  // 視点方向に向く
let thirdPersonMode = true; // 3人称追跡カメラ

document.getElementById('chkFaceDir').addEventListener('change', (e) => { faceCameraDir = e.target.checked; });
document.getElementById('chkThirdPerson').addEventListener('change', (e) => {
  thirdPersonMode = e.target.checked;
  controls.enabled = !thirdPersonMode;
  if (!thirdPersonMode) controls.update();
});

// キャラクター状態
const charState = {
  position: new THREE.Vector3(0, 0, 0),
  yaw: 0,               // キャラの向き(Y軸回転、ラジアン)
  speed: 0,             // 現在の移動速度 m/s
  isCrouching: false,
  isJumping: false,
  isFalling: false,
  jumpVY: 0,
  landingPhase: false,  // 着地アニメ再生中
  turn180Phase: false,  // Turn180アニメ再生中
  turn180Done: false,
};

// 3人称カメラ状態
const thirdCam = {
  yaw: 0,      // 水平角
  pitch: 0.3,  // 垂直角(rad)
  distance: 3.5,
};

// マウス操作でカメラ角度を変える
let isPointerDown = false;
let lastPointerX = 0, lastPointerY = 0;
renderer.domElement.addEventListener('pointerdown', (e) => {
  if (!thirdPersonMode) return;
  isPointerDown = true;
  lastPointerX = e.clientX;
  lastPointerY = e.clientY;
});
window.addEventListener('pointerup', () => { isPointerDown = false; });
window.addEventListener('pointermove', (e) => {
  if (!thirdPersonMode || !isPointerDown) return;
  const dx = e.clientX - lastPointerX;
  const dy = e.clientY - lastPointerY;
  lastPointerX = e.clientX;
  lastPointerY = e.clientY;
  thirdCam.yaw -= dx * 0.004;
  thirdCam.pitch = Math.max(-0.1, Math.min(1.0, thirdCam.pitch + dy * 0.004));
});
renderer.domElement.addEventListener('wheel', (e) => {
  if (!thirdPersonMode) return;
  thirdCam.distance = Math.max(1.0, Math.min(12, thirdCam.distance + e.deltaY * 0.01));
  e.preventDefault();
}, { passive: false });

const statusEl = document.getElementById('status');

/* ====================================================================
   ④ VRMの読み込み
   ==================================================================== */
const gltfLoader = new GLTFLoader();
gltfLoader.register((parser) => new VRMLoaderPlugin(parser));

// FBXアニメーション定義（ファイル名と内部キー名）
const FBX_ANIMS = {
  idle:             './Standard Idle.fbx',
  walk:             './Walking.fbx',
  walkBack:         './Walking Backwards.fbx',
  turn180:          './Walking Turn 180.fbx',
  strafeL:          './Left Strafe Walking.fbx',
  strafeR:          './Right Strafe Walking.fbx',
  run:              './Running.fbx',
  runBack:          './Running Backwards.fbx',
  runTurn180:       './Running Turn 180.fbx',
  runStrafeL:       './Left Strafe.fbx',
  runStrafeR:       './Right Strafe.fbx',
  crouch:           './Male Crouch Pose.fbx',
  crouchWalk:       './Crouched Walking.fbx',
  crouchStrafeL:    './Crouched Sneaking Left.fbx',
  crouchStrafeR:    './Crouched Sneaking Right.fbx',
  jump:             './Jumping.fbx',
  fall:             './Falling Idle.fbx',
  land:             './Falling to Landing.fbx',
  stairs:           './Ascending Stairs.fbx',
};

gltfLoader.load(
  VRM_FILE_PATH,
  async (gltf) => {
    const vrm = gltf.userData.vrm;
    VRMUtils.removeUnnecessaryVertices(gltf.scene);
    VRMUtils.removeUnnecessaryJoints(gltf.scene);
    VRMUtils.rotateVRM0(vrm);
    scene.add(vrm.scene);
    currentVrm = vrm;
    statusEl.textContent = 'VRM読み込み完了。アニメーション読込中...';
    setupExpressionUI(vrm);

    mixer = new THREE.AnimationMixer(vrm.scene);

    // アニメーション一括ロード（失敗したものはスキップ）
    const keys = Object.keys(FBX_ANIMS);
    let loaded = 0;
    for (const key of keys) {
      try {
        const clip = await loadMixamoAnimation(FBX_ANIMS[key], vrm, true);
        clip.name = key;
        const action = mixer.clipAction(clip);
        action.play();
        action.setEffectiveWeight(0);
        actions[key] = action;
        loaded++;
        statusEl.textContent = `アニメーション読込中... (${loaded}/${keys.length})`;
      } catch (e) {
        console.warn(`アニメ読込スキップ: ${key} (${FBX_ANIMS[key]})`, e.message);
      }
    }

    playAnim('idle');
    statusEl.textContent = '準備完了！ WASD移動 / Z+WASD走る / Shift:しゃがむ / Space:ジャンプ';

    // 3人称カメラ初期化
    thirdCam.yaw = charState.yaw + Math.PI;
    controls.enabled = !thirdPersonMode;
  },
  (progress) => {
    if (progress.total) {
      statusEl.textContent = `VRM読み込み中... ${Math.round((progress.loaded / progress.total) * 100)}%`;
    }
  },
  (error) => {
    console.error(error);
    statusEl.textContent = 'VRMの読み込みに失敗しました。ファイル名/パスを確認してください。';
  },
);

/* ====================================================================
   ⑤ 表情(Expression) UI
   ==================================================================== */
function setupExpressionUI(vrm) {
  const listEl = document.getElementById('exprList');
  listEl.innerHTML = '';
  if (!vrm.expressionManager) {
    listEl.textContent = 'このVRMには表情(Expression)が設定されていません';
    return;
  }
  const names = Object.keys(vrm.expressionManager.expressionMap);
  console.log('このVRMが持つ表情一覧:', names);
  names.forEach((name) => {
    const btn = document.createElement('button');
    btn.className = 'expr-btn';
    btn.textContent = name;
    btn.onclick = () => {
      names.forEach((n) => vrm.expressionManager.setValue(n, 0));
      vrm.expressionManager.setValue(name, 1.0);
      document.querySelectorAll('.expr-btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
    };
    listEl.appendChild(btn);
  });
  const resetBtn = document.createElement('button');
  resetBtn.className = 'expr-btn';
  resetBtn.id = 'resetExpr';
  resetBtn.textContent = 'リセット（neutral）';
  resetBtn.onclick = () => {
    names.forEach((n) => vrm.expressionManager.setValue(n, 0));
    document.querySelectorAll('.expr-btn').forEach((b) => b.classList.remove('active'));
  };
  listEl.appendChild(resetBtn);
}

/* ====================================================================
   ⑥ アニメーション切り替えヘルパー
   ==================================================================== */
function playAnim(name, fadeTime = 0.2, loop = true, onFinish = null) {
  if (!actions[name]) return false;
  if (currentActionName === name && loop) return true;

  const next = actions[name];
  next.loop = loop ? THREE.LoopRepeat : THREE.LoopOnce;
  next.clampWhenFinished = !loop;
  next.timeScale = 1;
  next.time = 0;
  next.enabled = true;

  if (currentAction && currentAction !== next) {
    currentAction.crossFadeTo(next, fadeTime, true);
  } else {
    next.setEffectiveWeight(1);
  }
  next.play();
  currentAction = next;
  currentActionName = name;

  // 非ループ時: 終了コールバック登録
  if (!loop && onFinish) {
    const dur = next.getClip().duration;
    // mixerのfinishedイベントで検知
    const cb = (e) => {
      if (e.action === next) {
        mixer.removeEventListener('finished', cb);
        onFinish();
      }
    };
    mixer.addEventListener('finished', cb);
  }
  return true;
}

/* ====================================================================
   ⑦ キー入力
   ==================================================================== */
const keys = new Set();
const keyMap = {
  'w': 'w', 'W': 'w', 'arrowup': 'w',
  's': 's', 'S': 's', 'arrowdown': 's',
  'a': 'a', 'A': 'a', 'arrowleft': 'a',
  'd': 'd', 'D': 'd', 'arrowright': 'd',
  'z': 'z', 'Z': 'z',
  'shift': 'shift',
  ' ': 'space',
};

window.addEventListener('keydown', (e) => {
  const k = keyMap[e.key.toLowerCase()] || keyMap[e.key];
  if (k) {
    e.preventDefault();
    const wasDown = keys.has(k);
    keys.add(k);
    if (!wasDown) onKeyDown(k);
  }
});
window.addEventListener('keyup', (e) => {
  const k = keyMap[e.key.toLowerCase()] || keyMap[e.key];
  if (k) keys.delete(k);
});

// Shiftはトグル（しゃがみ）
let crouchToggle = false;
function onKeyDown(k) {
  if (k === 'shift') {
    crouchToggle = !crouchToggle;
    charState.isCrouching = crouchToggle;
    if (!crouchToggle) playAnim('idle');
  }
  if (k === 'space' && !charState.isJumping && !charState.isFalling) {
    startJump();
  }
}

/* ====================================================================
   ⑧ ジャンプ・落下物理
   ==================================================================== */
const GRAVITY = -9.8;
const JUMP_VY = 4.5;
const GROUND_Y = 0;

function startJump() {
  charState.isJumping = true;
  charState.isFalling = false;
  charState.landingPhase = false;
  charState.jumpVY = JUMP_VY;
  playAnim('jump', 0.1, false, () => {
    charState.isFalling = true;
    charState.isJumping = false;
    playAnim('fall', 0.15);
  });
}

function updatePhysics(delta) {
  if (charState.isJumping || charState.isFalling) {
    charState.jumpVY += GRAVITY * delta;
    charState.position.y += charState.jumpVY * delta;

    if (charState.position.y <= GROUND_Y) {
      // 着地
      charState.position.y = GROUND_Y;
      charState.isJumping = false;
      charState.isFalling = false;
      charState.landingPhase = true;
      charState.jumpVY = 0;
      playAnim('land', 0.1, false, () => {
        charState.landingPhase = false;
        playAnim('idle', 0.2);
      });
    }
  }
}

/* ====================================================================
   ⑨ 移動・アニメーション更新
   ==================================================================== */
const WALK_SPEED = 1.4;
const WALK_BACK_SPEED = 0.8;   // 後ろ歩きは遅め
const RUN_SPEED = 4.0;
const CROUCH_SPEED = 0.7;

// Turn180 状態管理
let turn180Active = false;
let turn180IsRun = false;
let turn180TargetYaw = 0;

function getInputDir() {
  // WASDでの方向入力(0または1)
  return {
    forward: keys.has('w') ? 1 : 0,
    back:    keys.has('s') ? 1 : 0,
    left:    keys.has('a') ? 1 : 0,
    right:   keys.has('d') ? 1 : 0,
    run:     keys.has('z'),
  };
}

// カメラの水平向き(yaw)を取得
function getCameraYaw() {
  // 3人称モードではthirdCam.yaw、そうでなければOrbitControlsのカメラ角
  if (thirdPersonMode) {
    return thirdCam.yaw;
  }
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  return Math.atan2(dir.x, dir.z);
}

function updateMovement(delta) {
  if (!currentVrm) return;
  if (charState.isJumping || charState.isFalling || charState.landingPhase) return;

  const inp = getInputDir();
  const isRunning = inp.run && !charState.isCrouching;
  const camYaw = getCameraYaw();

  // Turn180中は向き転換アニメを優先し、完了後に移動開始
  if (turn180Active) return;

  // しゃがみ中の動き
  if (charState.isCrouching) {
    if (inp.forward) {
      playAnim('crouchWalk');
      moveCharacter(camYaw, 0, CROUCH_SPEED, delta);
    } else if (inp.back) {
      if (faceCameraDir) {
        // 逆再生
        if (actions['crouchWalk']) {
          if (currentActionName !== 'crouchWalkBack') {
            playAnim('crouchWalk');
            actions['crouchWalk'].timeScale = -1;
            currentActionName = 'crouchWalkBack';
          }
        }
        moveCharacter(camYaw, Math.PI, CROUCH_SPEED, delta);
      } else {
        playAnim('crouchWalk');
        moveCharacter(charState.yaw + Math.PI, 0, CROUCH_SPEED, delta);
      }
    } else if (inp.left) {
      if (faceCameraDir) {
        playAnim('crouchStrafeL');
        moveCharacter(camYaw, -Math.PI / 2, CROUCH_SPEED, delta);
      } else {
        charState.yaw += Math.PI / 2 * delta * 3;
        playAnim('crouchWalk');
        moveCharacter(charState.yaw, 0, CROUCH_SPEED * 0.5, delta);
      }
    } else if (inp.right) {
      if (faceCameraDir) {
        playAnim('crouchStrafeR');
        moveCharacter(camYaw, Math.PI / 2, CROUCH_SPEED, delta);
      } else {
        charState.yaw -= Math.PI / 2 * delta * 3;
        playAnim('crouchWalk');
        moveCharacter(charState.yaw, 0, CROUCH_SPEED * 0.5, delta);
      }
    } else {
      // しゃがみアイドル
      playAnim('crouch');
    }
    applyCharacterTransform();
    return;
  }

  // 通常移動
  let didMove = false;

  if (inp.forward && inp.back) {
    // 両方押し: 無視
  } else if (inp.forward) {
    // 前進中に反対(S)が押されたら turn180
    const animKey = isRunning ? 'run' : 'walk';
    playAnim(animKey);
    if (isRunning) {
      moveCharacter(camYaw, 0, RUN_SPEED, delta);
    } else {
      moveCharacter(camYaw, 0, WALK_SPEED, delta);
    }
    didMove = true;
  } else if (inp.back) {
    if (faceCameraDir) {
      if (isRunning) {
        playAnim('runBack');
        moveCharacter(camYaw, Math.PI, RUN_SPEED * 0.6, delta);
      } else {
        playAnim('walkBack');
        moveCharacter(camYaw, Math.PI, WALK_BACK_SPEED, delta);
      }
    } else {
      // 後ろ向きに転換してから歩く → Turn180
      const targetYaw = camYaw + Math.PI;  // 後ろ向き
      startTurn180(targetYaw, isRunning);
    }
    didMove = true;
  } else if (inp.left && !inp.right) {
    if (faceCameraDir) {
      playAnim(isRunning ? 'runStrafeL' : 'strafeL');
      moveCharacter(camYaw, -Math.PI / 2, isRunning ? RUN_SPEED * 0.8 : WALK_SPEED * 0.9, delta);
    } else {
      charState.yaw += Math.PI / 2 * delta * 3;
      if (isRunning) {
        moveCharacter(charState.yaw, 0, RUN_SPEED, delta);
        playAnim('run');
      } else {
        moveCharacter(charState.yaw, 0, WALK_SPEED, delta);
        playAnim('walk');
      }
    }
    didMove = true;
  } else if (inp.right && !inp.left) {
    if (faceCameraDir) {
      playAnim(isRunning ? 'runStrafeR' : 'strafeR');
      moveCharacter(camYaw, Math.PI / 2, isRunning ? RUN_SPEED * 0.8 : WALK_SPEED * 0.9, delta);
    } else {
      charState.yaw -= Math.PI / 2 * delta * 3;
      if (isRunning) {
        moveCharacter(charState.yaw, 0, RUN_SPEED, delta);
        playAnim('run');
      } else {
        moveCharacter(charState.yaw, 0, WALK_SPEED, delta);
        playAnim('walk');
      }
    }
    didMove = true;
  }

  if (!didMove) {
    playAnim('idle');
  }

  applyCharacterTransform();
}

// moveCharacter: 指定yawの方向にmoveYaw分オフセットして動く
// moveYaw: 0=前, PI=後ろ, -PI/2=左, PI/2=右
function moveCharacter(baseYaw, moveYaw, speed, delta) {
  const angle = baseYaw + moveYaw;
  // キャラの向きはbaseYawに向ける（ストレーフ時はキャラはbaseYaw向き）
  charState.yaw = baseYaw;
  charState.position.x -= Math.sin(angle) * speed * delta;
  charState.position.z -= Math.cos(angle) * speed * delta;
}

function applyCharacterTransform() {
  if (!currentVrm) return;
  currentVrm.scene.position.copy(charState.position);
  currentVrm.scene.rotation.y = charState.yaw;
}

/* Turn180 */
function startTurn180(targetYaw, isRun) {
  turn180Active = true;
  turn180IsRun = isRun;
  turn180TargetYaw = targetYaw;
  const animKey = isRun ? 'runTurn180' : 'turn180';
  playAnim(animKey, 0.1, false, () => {
    charState.yaw = turn180TargetYaw;
    turn180Active = false;
    // Turn180後すぐに歩き/走りへ
    playAnim(isRun ? 'run' : 'walk', 0.15);
  });
}

/* ====================================================================
   ⑩ 3人称カメラ更新
   ==================================================================== */
function updateThirdPersonCamera() {
  if (!thirdPersonMode || !currentVrm) return;

  const target = charState.position.clone().add(new THREE.Vector3(0, 1.2, 0));
  const sinP = Math.sin(thirdCam.pitch);
  const cosP = Math.cos(thirdCam.pitch);
  const sinY = Math.sin(thirdCam.yaw);
  const cosY = Math.cos(thirdCam.yaw);

  const offset = new THREE.Vector3(
    thirdCam.distance * cosP * sinY,
    thirdCam.distance * sinP,
    thirdCam.distance * cosP * cosY,
  );
  camera.position.copy(target).add(offset);
  camera.lookAt(target);
}

/* ====================================================================
   ウィンドウリサイズ対応
   ==================================================================== */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ====================================================================
   メインループ
   ==================================================================== */
function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.05); // 最大50ms（タブ非アクティブ対策）

  updatePhysics(delta);
  updateMovement(delta);
  updateThirdPersonCamera();

  if (mixer) mixer.update(delta);
  if (currentVrm) currentVrm.update(delta);

  if (!thirdPersonMode) controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
