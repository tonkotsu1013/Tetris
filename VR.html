<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRM Model Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.2/lib/three-vrm.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';

        // --- 1. 基本設定（シーン、カメラ、レンダラー） ---
        const canvas = document.createElement('canvas');
        document.body.appendChild(canvas);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xdddddd); // 背景色を薄いグレーに設定

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.2, -3); // カメラの初期位置（キャラクターの正面）

        // マウス操作の設定
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.0, 0); // 見る中心をキャラクターの胸のあたりに
        controls.update();

        // --- 2. ライトの設定 ---
        const directionalLight = new THREE.DirectionalLight(0xffffff, Math.PI);
        directionalLight.position.set(1, 1, 1).normalize();
        scene.add(directionalLight);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        // --- 3. VRMモデルの読み込み ---
        let currentVrm = undefined;
        const loader = new GLTFLoader();

        // GLTFLoaderにVRMプラグインを登録
        loader.register((parser) => {
            return new VRMLoaderPlugin(parser);
        });

        // ★ここに表示したいVRMファイルのパスを指定します★
        const vrmUrl = './ayame_v1.1.vrm'; 

        loader.load(
            vrmUrl,
            (gltf) => {
                const vrm = gltf.userData.vrm;
                currentVrm = vrm;
                
                // VRMをシーンに追加
                scene.add(vrm.scene);
                
                // モデルが後ろを向いている場合は180度回転させる
                vrm.scene.rotation.y = Math.PI;

                console.log('VRMの読み込みに成功しました');
            },
            (progress) => console.log('Loading model...', 100.0 * (progress.loaded / progress.total), '%'),
            (error) => console.error('VRMの読み込みに失敗しました', error)
        );

        // --- 4. レンダリングループ（アニメーション） ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();

            // VRMの更新（髪の揺れや瞬きなどを動かすために必要）
            if (currentVrm) {
                currentVrm.update(deltaTime);
            }

            renderer.render(scene, camera);
        }
        animate();

        // --- 5. ウィンドウサイズ変更への対応 ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
