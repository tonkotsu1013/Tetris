<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>VRM Animation Viewer</title>
    <style>body { margin: 0; overflow: hidden; background-color: #333; }</style>
</head>
<body>

    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.0.0/lib/three-vrm.module.js"
      }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js'; // FBX読み込み用
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';

        // 1. シーン・カメラ・ライト
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.2, 3);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.2, 0);

        scene.add(new THREE.DirectionalLight(0xffffff, 3));
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // 2. VRM読み込み
        const gltfLoader = new GLTFLoader();
        gltfLoader.register((parser) => new VRMLoaderPlugin(parser));
        
        let currentVrm = null;
        const clock = new THREE.Clock();

        gltfLoader.load('ayame_v1.1.vrm', (gltf) => {
            currentVrm = gltf.userData.vrm;
            scene.add(currentVrm.scene);
            
            // 表情リスト確認
            console.log("利用可能な表情:", currentVrm.expressionManager.expressionNames);

            // 3. FBXアニメーション読み込み
            const fbxLoader = new FBXLoader();
            fbxLoader.load('walking.fbx', (fbx) => {
                const mixer = new THREE.AnimationMixer(currentVrm.scene);
                const action = mixer.clipAction(fbx.animations[0]);
                action.play();

                // 4. 更新ループ
                function animate() {
                    requestAnimationFrame(animate);
                    const delta = clock.getDelta();
                    currentVrm.update(delta);
                    mixer.update(delta);
                    controls.update();
                    renderer.render(scene, camera);
                }
                animate();
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
