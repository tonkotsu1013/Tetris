<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>3D Overworld</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    overflow: hidden;
    background: #0a0f1a;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  #canvas-container { position: fixed; inset: 0; }

  /* ── HUD ── */
  #hud {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    pointer-events: none;
    z-index: 10;
  }
  .hud-key {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 6px;
    color: #fff;
    font-size: 11px;
    padding: 4px 8px;
    backdrop-filter: blur(6px);
    white-space: nowrap;
  }
  .hud-key span { color: #7ec8ff; font-weight: 700; }

  /* ── Status ── */
  #status-bar {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    color: #fff;
    font-size: 12px;
    padding: 5px 16px;
    pointer-events: none;
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  #anim-name { color: #7ec8ff; font-weight: 700; }

  /* ── Settings Panel ── */
  #settings-toggle {
    position: fixed;
    top: 12px;
    right: 12px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 20;
    backdrop-filter: blur(6px);
  }
  #settings-panel {
    position: fixed;
    top: 56px;
    right: 12px;
    background: rgba(10,15,30,0.92);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    color: #fff;
    padding: 16px 18px;
    font-size: 13px;
    z-index: 20;
    backdrop-filter: blur(10px);
    display: none;
    min-width: 240px;
  }
  #settings-panel h2 { margin: 0 0 12px; font-size: 14px; color: #7ec8ff; }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 8px 0;
    gap: 12px;
  }
  .setting-label { flex: 1; font-size: 12px; color: #ccc; }
  .toggle-switch {
    position: relative;
    width: 40px; height: 22px;
    flex-shrink: 0;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: #333;
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider { background: #5b6cff; }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); }

  .file-row {
    margin: 10px 0 4px;
    font-size: 11px;
    color: #888;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 10px;
  }
  .file-input-label {
    display: block;
    margin: 4px 0;
    padding: 5px 8px;
    background: rgba(255,255,255,0.07);
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    color: #bbb;
    text-align: center;
  }
  .file-input-label:hover { background: rgba(255,255,255,0.14); }
  .file-input-label input { display: none; }

  /* ── Loading ── */
  #loading {
    position: fixed;
    inset: 0;
    background: #0a0f1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    color: #fff;
    gap: 16px;
  }
  #loading-text { font-size: 14px; color: #7ec8ff; }
  .loading-bar-outer {
    width: 240px; height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    overflow: hidden;
  }
  .loading-bar-inner {
    height: 100%;
    background: #5b6cff;
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
  }
  #loading-logo { font-size: 28px; font-weight: 700; letter-spacing: 2px; color: #fff; }
</style>
</head>
<body>

<div id="loading">
  <div id="loading-logo">OVERWORLD</div>
  <div class="loading-bar-outer"><div class="loading-bar-inner" id="loading-bar"></div></div>
  <div id="loading-text">VRM ファイルを読み込んでください</div>
</div>

<div id="canvas-container"></div>

<div id="status-bar">
  アニメーション: <span id="anim-name">---</span>
  &nbsp;|&nbsp; 座標: <span id="pos-info">0, 0, 0</span>
</div>

<button id="settings-toggle">⚙</button>

<div id="settings-panel">
  <h2>⚙ 設定</h2>

  <div class="setting-row">
    <span class="setting-label">視点方向を向く（S/A/D）</span>
    <label class="toggle-switch">
      <input type="checkbox" id="setting-face-camera" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="setting-row">
    <span class="setting-label">カメラがキャラを追従</span>
    <label class="toggle-switch">
      <input type="checkbox" id="setting-cam-follow" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="setting-row">
    <span class="setting-label">後ろ歩きスピード低下</span>
    <label class="toggle-switch">
      <input type="checkbox" id="setting-backward-slow" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="file-row">ファイルを読み込む</div>

  <label class="file-input-label">
    📁 VRMファイル (.vrm)
    <input type="file" id="file-vrm" accept=".vrm">
  </label>

  <div style="font-size:10px;color:#666;margin:6px 0 4px;">アニメーション FBX（複数選択可）</div>
  <label class="file-input-label">
    🎬 FBXファイルを追加
    <input type="file" id="file-fbx" accept=".fbx" multiple>
  </label>
  <div id="loaded-anims" style="font-size:10px;color:#888;margin-top:6px;"></div>
</div>

<div id="hud">
  <div class="hud-key"><span>W</span> 歩く</div>
  <div class="hud-key"><span>Ctrl+W</span> 走る</div>
  <div class="hud-key"><span>S</span> 後退</div>
  <div class="hud-key"><span>A/D</span> 横移動</div>
  <div class="hud-key"><span>Shift</span> しゃがみ</div>
  <div class="hud-key"><span>Space</span> ジャンプ</div>
  <div class="hud-key"><span>ドラッグ</span> 視点</div>
</div>

<!-- importmap -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

// ================================================================
//  設定
// ================================================================
const settings = {
  faceCamera: true,       // S/A/D で視点方向を向く
  camFollow: true,        // カメラがキャラを追従
  backwardSlow: true,     // 後ろ歩きのスピード低下
};

// ================================================================
//  ボーンマップ (Mixamo → VRM)
// ================================================================
const mixamoVRMRigMap = {
  mixamorigHips:'hips', mixamorigSpine:'spine', mixamorigSpine1:'chest',
  mixamorigSpine2:'upperChest', mixamorigNeck:'neck', mixamorigHead:'head',
  mixamorigLeftShoulder:'leftShoulder', mixamorigLeftArm:'leftUpperArm',
  mixamorigLeftForeArm:'leftLowerArm', mixamorigLeftHand:'leftHand',
  mixamorigLeftHandThumb1:'leftThumbMetacarpal', mixamorigLeftHandThumb2:'leftThumbProximal',
  mixamorigLeftHandThumb3:'leftThumbDistal', mixamorigLeftHandIndex1:'leftIndexProximal',
  mixamorigLeftHandIndex2:'leftIndexIntermediate', mixamorigLeftHandIndex3:'leftIndexDistal',
  mixamorigLeftHandMiddle1:'leftMiddleProximal', mixamorigLeftHandMiddle2:'leftMiddleIntermediate',
  mixamorigLeftHandMiddle3:'leftMiddleDistal', mixamorigLeftHandRing1:'leftRingProximal',
  mixamorigLeftHandRing2:'leftRingIntermediate', mixamorigLeftHandRing3:'leftRingDistal',
  mixamorigLeftHandPinky1:'leftLittleProximal', mixamorigLeftHandPinky2:'leftLittleIntermediate',
  mixamorigLeftHandPinky3:'leftLittleDistal', mixamorigRightShoulder:'rightShoulder',
  mixamorigRightArm:'rightUpperArm', mixamorigRightForeArm:'rightLowerArm',
  mixamorigRightHand:'rightHand', mixamorigRightHandPinky1:'rightLittleProximal',
  mixamorigRightHandPinky2:'rightLittleIntermediate', mixamorigRightHandPinky3:'rightLittleDistal',
  mixamorigRightHandRing1:'rightRingProximal', mixamorigRightHandRing2:'rightRingIntermediate',
  mixamorigRightHandRing3:'rightRingDistal', mixamorigRightHandMiddle1:'rightMiddleProximal',
  mixamorigRightHandMiddle2:'rightMiddleIntermediate', mixamorigRightHandMiddle3:'rightMiddleDistal',
  mixamorigRightHandIndex1:'rightIndexProximal', mixamorigRightHandIndex2:'rightIndexIntermediate',
  mixamorigRightHandIndex3:'rightIndexDistal', mixamorigRightHandThumb1:'rightThumbMetacarpal',
  mixamorigRightHandThumb2:'rightThumbProximal', mixamorigRightHandThumb3:'rightThumbDistal',
  mixamorigLeftUpLeg:'leftUpperLeg', mixamorigLeftLeg:'leftLowerLeg',
  mixamorigLeftFoot:'leftFoot', mixamorigLeftToeBase:'leftToes',
  mixamorigRightUpLeg:'rightUpperLeg', mixamorigRightLeg:'rightLowerLeg',
  mixamorigRightFoot:'rightFoot', mixamorigRightToeBase:'rightToes',
};

// ================================================================
//  FBX → VRM AnimationClip 変換
// ================================================================
async function loadMixamoAnimation(urlOrBuffer, vrm, clipName = 'anim', reverse = false) {
  const loader = new FBXLoader();
  let asset;
  if (typeof urlOrBuffer === 'string') {
    asset = await loader.loadAsync(urlOrBuffer);
  } else {
    asset = await new Promise((res, rej) => loader.parse(urlOrBuffer, '', res, rej));
  }

  const clip = THREE.AnimationClip.findByName(asset.animations, 'mixamo.com') || asset.animations[0];
  if (!clip) throw new Error('FBXにアニメーションがありません');

  const tracks = [];
  const restRotInv = new THREE.Quaternion();
  const parentRestWorldRot = new THREE.Quaternion();
  const _q = new THREE.Quaternion();

  const mixamoHipsNode = asset.getObjectByName('mixamorigHips');
  const motionHipsH = mixamoHipsNode ? mixamoHipsNode.position.y : 1;
  const vrmHipsH = vrm.humanoid.normalizedRestPose.hips?.position?.[1] ?? 1;
  const hipsScale = vrmHipsH / motionHipsH;

  clip.tracks.forEach((track) => {
    const [rigName, propName] = track.name.split('.');
    const vrmBoneName = mixamoVRMRigMap[rigName];
    const vrmNodeName = vrm.humanoid?.getNormalizedBoneNode(vrmBoneName)?.name;
    const rigNode = asset.getObjectByName(rigName);
    if (!vrmNodeName || !rigNode) return;

    rigNode.getWorldQuaternion(restRotInv).invert();
    rigNode.parent.getWorldQuaternion(parentRestWorldRot);

    if (track instanceof THREE.QuaternionKeyframeTrack) {
      const values = [...track.values];
      for (let i = 0; i < values.length; i += 4) {
        const flat = values.slice(i, i + 4);
        _q.fromArray(flat).premultiply(parentRestWorldRot).multiply(restRotInv).toArray(flat);
        values.splice(i, 4, ...flat);
      }
      const times = reverse ? [...track.times].map(t => clip.duration - t).reverse() : track.times;
      const sortedValues = reverse ? reverseValues(values, 4) : values;
      tracks.push(new THREE.QuaternionKeyframeTrack(`${vrmNodeName}.${propName}`, times, sortedValues));
    } else if (track instanceof THREE.VectorKeyframeTrack && propName === 'position') {
      const values = [];
      for (let i = 0; i < track.values.length; i += 3) {
        values.push(track.values[i] * hipsScale, track.values[i+1] * hipsScale, track.values[i+2] * hipsScale);
      }
      // 位置トラックはルート移動を除去（その場アニメーション）
      const baseX = values[0], baseZ = values[2];
      const fixed = [];
      for (let i = 0; i < values.length; i += 3) {
        fixed.push(0, values[i+1], 0);
      }
      const times = reverse ? [...track.times].map(t => clip.duration - t).reverse() : track.times;
      const sortedFixed = reverse ? reverseValues(fixed, 3) : fixed;
      tracks.push(new THREE.VectorKeyframeTrack(`${vrmNodeName}.${propName}`, times, sortedFixed));
    }
  });

  return new THREE.AnimationClip(clipName, clip.duration, tracks);
}

function reverseValues(arr, stride) {
  const result = [];
  for (let i = arr.length - stride; i >= 0; i -= stride) {
    result.push(...arr.slice(i, i + stride));
  }
  return result;
}

// ================================================================
//  シーン
// ================================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0f1a);
scene.fog = new THREE.FogExp2(0x0a0f1a, 0.025);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 2.5, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1;
controls.maxDistance = 20;
controls.maxPolarAngle = Math.PI * 0.85;
controls.update();

// ── ライト ──
const hemi = new THREE.HemisphereLight(0x87ceeb, 0x334466, 0.8);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff0e0, 2.2);
sun.position.set(8, 15, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far = 80;
sun.shadow.camera.left = sun.shadow.camera.bottom = -20;
sun.shadow.camera.right = sun.shadow.camera.top = 20;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x8899ff, 0.4);
fill.position.set(-5, 3, -3);
scene.add(fill);

// ── ワールド地形 ──
function buildWorld() {
  // 地面
  const groundGeo = new THREE.PlaneGeometry(100, 100, 40, 40);
  // 地面を少し起伏させる
  const pos = groundGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getY(i);
    if (Math.abs(x) > 3 || Math.abs(z) > 3) {
      pos.setZ(i, (Math.sin(x * 0.3) + Math.cos(z * 0.3)) * 0.25);
    }
  }
  groundGeo.computeVertexNormals();
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a4a2a, roughness: 0.95, metalness: 0 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // 路面（キャラ周囲のタイル）
  const tileGeo = new THREE.PlaneGeometry(16, 16, 8, 8);
  const tileMat = new THREE.MeshStandardMaterial({ color: 0x3a3a5a, roughness: 0.9 });
  const tile = new THREE.Mesh(tileGeo, tileMat);
  tile.rotation.x = -Math.PI / 2;
  tile.position.y = 0.001;
  tile.receiveShadow = true;
  scene.add(tile);
  scene.add(new THREE.GridHelper(16, 16, 0x4444aa, 0x222240));

  // 木
  const treePositions = [
    [5,0,5],[8,0,2],[6,0,-7],[-5,0,6],[-8,0,-3],[10,0,-10],
    [-10,0,10],[12,0,4],[-6,0,-9],[3,0,12]
  ];
  treePositions.forEach(([x,y,z]) => {
    const trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.15, 0.2, 1.4, 8),
      new THREE.MeshStandardMaterial({ color: 0x5c3d1e })
    );
    trunk.position.set(x, 0.7, z);
    trunk.castShadow = true;
    scene.add(trunk);
    const foliage = new THREE.Mesh(
      new THREE.IcosahedronGeometry(0.9 + Math.random() * 0.4, 1),
      new THREE.MeshStandardMaterial({ color: 0x1a6b2a + Math.floor(Math.random()*0x101010) })
    );
    foliage.position.set(x, 2.2 + Math.random() * 0.3, z);
    foliage.castShadow = true;
    scene.add(foliage);
  });

  // 石
  [[2,0,4],[-3,0,-2],[7,0,-3]].forEach(([x,y,z]) => {
    const stone = new THREE.Mesh(
      new THREE.DodecahedronGeometry(0.3 + Math.random()*0.2, 0),
      new THREE.MeshStandardMaterial({ color: 0x888898, roughness: 0.95 })
    );
    stone.position.set(x, 0.15, z);
    stone.castShadow = true;
    stone.receiveShadow = true;
    scene.add(stone);
  });

  // 階段オブジェクト（検出用）
  buildStairs(4, 0, -5);
}

// 階段（3段）
const stairBounds = [];
buildWorld();
function buildStairs(x, y, z) {
  const mat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 });
  for (let i = 0; i < 4; i++) {
    const stepH = 0.2, stepD = 0.5;
    const geo = new THREE.BoxGeometry(2, stepH, stepD);
    const step = new THREE.Mesh(geo, mat);
    step.position.set(x, y + stepH/2 + stepH*i, z + stepD*i);
    step.castShadow = true;
    step.receiveShadow = true;
    scene.add(step);
    stairBounds.push({ x, z: z + stepD*i, width: 2, depth: stepD, height: stepH*(i+1) });
  }
}

// ================================================================
//  アニメーション管理
// ================================================================
let currentVrm = null;
let mixer = null;
const animClips = {}; // name -> AnimationClip
const animActions = {}; // name -> AnimationAction
let currentAction = null;
let currentAnimName = '';

// アニメーション名一覧 (FBXファイル名 → キー名マッピング)
const ANIM_KEYS = {
  'Standard Idle': 'idle',
  'Walking': 'walk',
  'Walking Backwards': 'walkBack',
  'Walking Turn 180': 'walkTurn180',
  'Running': 'run',
  'Running Backwards': 'runBack',
  'Running Turn 180': 'runTurn180',
  'Left Strafe Walking': 'strafeWalkLeft',
  'Right Strafe Walking': 'strafeWalkRight',
  'Left Strafe': 'strafeRunLeft',
  'Right Strafe': 'strafeRunRight',
  'Male Crouch Pose': 'crouch',
  'Crouched Walking': 'crouchWalk',
  'Crouched Sneaking Left': 'crouchLeft',
  'Crouched Sneaking Right': 'crouchRight',
  'Jumping': 'jump',
  'Falling Idle': 'fall',
  'Falling to Landing': 'land',
  'Ascending Stairs': 'stairs',
};

// reverse版も管理
const reverseClips = {}; // key -> reversed AnimationClip

function getAction(key, reverse = false) {
  const k = reverse ? key + '_rev' : key;
  if (animActions[k]) return animActions[k];
  const clip = reverse ? reverseClips[key] : animClips[key];
  if (!clip || !mixer) return null;
  const action = mixer.clipAction(clip);
  animActions[k] = action;
  return action;
}

function crossFadeTo(key, duration = 0.15, { reverse = false, loop = true, clampWhenFinished = false } = {}) {
  if (!mixer) return;
  const k = reverse ? key + '_rev' : key;
  if (currentAnimName === k) return;

  const nextAction = getAction(key, reverse);
  if (!nextAction) return; // FBX未ロード

  nextAction.loop = loop ? THREE.LoopRepeat : THREE.LoopOnce;
  nextAction.clampWhenFinished = clampWhenFinished;

  if (currentAction && currentAction !== nextAction) {
    nextAction.reset().play();
    currentAction.crossFadeTo(nextAction, duration, true);
  } else {
    nextAction.reset().play();
  }
  currentAction = nextAction;
  currentAnimName = k;

  document.getElementById('anim-name').textContent = k;
}

// アニメーション終了イベント
function onAnimFinished(e) {
  // ターン180→歩き/走りへ
  if (currentAnimName === 'walkTurn180' || currentAnimName === 'walkTurn180_rev') {
    crossFadeTo('walk', 0.1);
  } else if (currentAnimName === 'runTurn180' || currentAnimName === 'runTurn180_rev') {
    crossFadeTo('run', 0.1);
  } else if (currentAnimName === 'land') {
    // 着地→idle
    crossFadeTo('idle', 0.2);
    jumpState = 'ground';
  } else if (currentAnimName === 'jump') {
    crossFadeTo('fall', 0.1, { loop: true });
    jumpState = 'falling';
  }
}

// ================================================================
//  キャラクター状態
// ================================================================
let charPos = new THREE.Vector3(0, 0, 0);
let charYaw = 0; // キャラの向き (radians)

// ジャンプ
let jumpState = 'ground'; // 'ground' | 'jumping' | 'falling'
let jumpVelocity = 0;
const JUMP_POWER = 5.0;
const GRAVITY = -12.0;

// しゃがみ
let isCrouching = false;

// ターン処理
let isTurning180 = false;
let turnTarget = 0;

// 移動速度
const WALK_SPEED = 2.0;
const RUN_SPEED = 4.5;
const BACKWARD_SLOW = 0.65;
const STAIR_SPEED = 1.2;

// ================================================================
//  キー入力
// ================================================================
const keys = {};
let prevKeys = {};

window.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (!keys[k]) {
    keys[k] = true;
    onKeyDown(e);
  }
  if (['w','a','s','d',' '].includes(k) || e.code === 'Space') e.preventDefault();
});
window.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
  keys[e.code] = false;
});

function isKey(...ks) { return ks.some(k => keys[k]); }
function isCtrl() { return keys['control']; }
function justPressed(k) { return keys[k] && !prevKeys[k]; }

// Shift toggle for crouch
window.addEventListener('keydown', (e) => {
  if (e.key === 'Shift' && !e.repeat) {
    isCrouching = !isCrouching;
  }
  if ((e.code === 'Space' || e.key === ' ') && jumpState === 'ground' && !isCrouching) {
    startJump();
  }
});

function onKeyDown(e) {}

function startJump() {
  jumpState = 'jumping';
  jumpVelocity = JUMP_POWER;
  crossFadeTo('jump', 0.1, { loop: false, clampWhenFinished: false });
}

// ================================================================
//  階段検出（簡易）
// ================================================================
function getStairHeight(px, pz) {
  for (const s of stairBounds) {
    if (Math.abs(px - s.x) < s.width / 2 && Math.abs(pz - s.z) < s.depth / 2) {
      return s.height;
    }
  }
  return 0;
}

// ================================================================
//  メインアニメーションロジック
// ================================================================
let prevAnimKey = '';
let lastMoveDir = 1; // 1=forward, -1=backward (for turn180 detection)

function updateCharacter(delta) {
  if (!currentVrm) return;

  const ctrl = isCtrl();
  const w = isKey('w');
  const s = isKey('s');
  const a = isKey('a');
  const d = isKey('d');
  const moving = w || s || a || d;

  // ── カメラ前方ベクトル（Y除去、正規化）
  const camDir = new THREE.Vector3();
  camera.getWorldDirection(camDir);
  camDir.y = 0;
  camDir.normalize();
  const camRight = new THREE.Vector3().crossVectors(camDir, new THREE.Vector3(0,1,0));

  // ── 移動方向ベクトル
  let moveVec = new THREE.Vector3();
  if (w) moveVec.add(camDir);
  if (s) moveVec.sub(camDir);
  if (a) moveVec.sub(camRight);
  if (d) moveVec.add(camRight);
  moveVec.normalize();

  // ── ジャンプ/落下物理
  if (jumpState === 'jumping' || jumpState === 'falling') {
    jumpVelocity += GRAVITY * delta;
    charPos.y += jumpVelocity * delta;
    const floorH = getStairHeight(charPos.x, charPos.z);
    if (charPos.y <= floorH) {
      charPos.y = floorH;
      jumpVelocity = 0;
      jumpState = 'landing';
      crossFadeTo('land', 0.1, { loop: false, clampWhenFinished: true });
    }
    // 移動しながらジャンプは水平移動も許可
    if (moving && moveVec.lengthSq() > 0) {
      const spd = ctrl ? RUN_SPEED : WALK_SPEED;
      charPos.addScaledVector(moveVec, spd * delta);
    }
    applyCharTransform();
    return;
  }
  if (jumpState === 'landing') {
    applyCharTransform();
    return;
  }

  // ── 地面高さ適用
  const stairH = getStairHeight(charPos.x, charPos.z);
  charPos.y = stairH;

  // ── アニメーション決定
  let animKey = 'idle';
  let speed = 0;
  let turnNeeded = false;

  if (isCrouching) {
    // しゃがみ状態
    if (!moving) {
      animKey = 'crouch';
    } else if (w) {
      animKey = 'crouchWalk';
      speed = WALK_SPEED * 0.7;
    } else if (s) {
      if (settings.faceCamera) {
        animKey = 'crouchWalk_rev'; // 逆再生
      } else {
        // キャラを後ろ向きにしてcrouchWalk
        turnCharTo(charPos.clone().add(moveVec), true);
        animKey = 'crouchWalk';
        speed = WALK_SPEED * 0.7;
      }
    } else if (a) {
      if (settings.faceCamera) {
        animKey = 'crouchLeft';
        speed = WALK_SPEED * 0.7;
      } else {
        turnCharTo(charPos.clone().add(moveVec), true);
        animKey = 'crouchWalk';
        speed = WALK_SPEED * 0.7;
      }
    } else if (d) {
      if (settings.faceCamera) {
        animKey = 'crouchRight';
        speed = WALK_SPEED * 0.7;
      } else {
        turnCharTo(charPos.clone().add(moveVec), true);
        animKey = 'crouchWalk';
        speed = WALK_SPEED * 0.7;
      }
    }
  } else if (jumpState === 'ground') {
    // 通常状態
    if (!moving) {
      animKey = 'idle';
    } else if (w && !s) {
      if (ctrl) { animKey = 'run'; speed = RUN_SPEED; }
      else { animKey = 'walk'; speed = WALK_SPEED; }

      // ターン180検出: 直前が後退中で今前進
      if (lastMoveDir === -1 && (prevAnimKey === 'walkBack' || prevAnimKey === 'runBack')) {
        if (ctrl) {
          animKey = 'runTurn180';
          crossFadeTo('runTurn180', 0.05, { loop: false });
          lastMoveDir = 1;
          applyCharTransform();
          return;
        } else {
          animKey = 'walkTurn180';
          crossFadeTo('walkTurn180', 0.05, { loop: false });
          lastMoveDir = 1;
          applyCharTransform();
          return;
        }
      }
      lastMoveDir = 1;

    } else if (s && !w) {
      const onStair = stairH > 0;
      if (onStair) {
        animKey = 'stairs';
        speed = STAIR_SPEED;
      } else if (settings.faceCamera) {
        if (ctrl) { animKey = 'runBack'; speed = RUN_SPEED * (settings.backwardSlow ? BACKWARD_SLOW : 1); }
        else { animKey = 'walkBack'; speed = WALK_SPEED * (settings.backwardSlow ? BACKWARD_SLOW : 1); }
      } else {
        // キャラを後ろ向きにしてwalk/run
        if (moveVec.lengthSq() > 0) {
          smoothTurnTo(Math.atan2(-moveVec.x, -moveVec.z));
        }
        if (ctrl) { animKey = 'run'; speed = RUN_SPEED * (settings.backwardSlow ? BACKWARD_SLOW : 1); }
        else { animKey = 'walk'; speed = WALK_SPEED * (settings.backwardSlow ? BACKWARD_SLOW : 1); }
      }

      // ターン180: 直前が前進
      if (lastMoveDir === 1 && (prevAnimKey === 'walk' || prevAnimKey === 'run')) {
        if (ctrl) {
          crossFadeTo('runTurn180', 0.05, { loop: false });
          lastMoveDir = -1;
          applyCharTransform();
          return;
        } else {
          crossFadeTo('walkTurn180', 0.05, { loop: false });
          lastMoveDir = -1;
          applyCharTransform();
          return;
        }
      }
      lastMoveDir = -1;

    } else if (a && !d) {
      if (settings.faceCamera) {
        animKey = ctrl ? 'strafeRunLeft' : 'strafeWalkLeft';
        speed = ctrl ? RUN_SPEED * 0.85 : WALK_SPEED * 0.85;
      } else {
        if (moveVec.lengthSq() > 0) smoothTurnTo(Math.atan2(-moveVec.x, -moveVec.z));
        animKey = ctrl ? 'run' : 'walk';
        speed = ctrl ? RUN_SPEED : WALK_SPEED;
      }
    } else if (d && !a) {
      if (settings.faceCamera) {
        animKey = ctrl ? 'strafeRunRight' : 'strafeWalkRight';
        speed = ctrl ? RUN_SPEED * 0.85 : WALK_SPEED * 0.85;
      } else {
        if (moveVec.lengthSq() > 0) smoothTurnTo(Math.atan2(-moveVec.x, -moveVec.z));
        animKey = ctrl ? 'run' : 'walk';
        speed = ctrl ? RUN_SPEED : WALK_SPEED;
      }
    }
  }

  // ── 前後以外の移動でもキャラをカメラ正面に向ける（Wキー）
  if ((w || (animKey.startsWith('run') && !animKey.includes('Back')) || animKey === 'walk') && moveVec.lengthSq() > 0.01) {
    const targetYaw = Math.atan2(-moveVec.x, -moveVec.z);
    smoothTurnTo(targetYaw);
  }

  // ── しゃがみ移動でキャラを進行方向に向ける
  if (isCrouching && w && moveVec.lengthSq() > 0.01) {
    const targetYaw = Math.atan2(-moveVec.x, -moveVec.z);
    smoothTurnTo(targetYaw);
  }

  // ── 移動量を適用
  if (speed > 0 && moveVec.lengthSq() > 0.01) {
    charPos.addScaledVector(moveVec, speed * delta);
  }
  // 後退(faceCamera=ON)はキャラが向いてる反対に移動
  if ((animKey === 'walkBack' || animKey === 'runBack') && settings.faceCamera) {
    const backDir = new THREE.Vector3(-Math.sin(charYaw), 0, -Math.cos(charYaw));
    charPos.addScaledVector(backDir, speed * delta);
  }

  // ── アニメーション切り替え（逆再生判定）
  const needsReverse = animKey === 'crouchWalk_rev';
  const realKey = needsReverse ? 'crouchWalk' : animKey;

  if (animKey !== prevAnimKey) {
    crossFadeTo(realKey, 0.15, { reverse: needsReverse });
  }
  prevAnimKey = animKey;

  // 階段アニメーション
  if (stairH > 0 && moving) {
    crossFadeTo('stairs', 0.2);
  }

  applyCharTransform();
}

function smoothTurnTo(targetYaw) {
  let diff = targetYaw - charYaw;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  charYaw += diff * 0.18; // 平滑化
}

function applyCharTransform() {
  if (!currentVrm) return;
  currentVrm.scene.position.copy(charPos);
  currentVrm.scene.rotation.y = charYaw;
}

// ================================================================
//  カメラ追従
// ================================================================
const camOffset = new THREE.Vector3(0, 2.5, 5.5);
function updateCamera() {
  if (!settings.camFollow || !currentVrm) return;
  const target = charPos.clone().add(new THREE.Vector3(0, 1.2, 0));
  controls.target.lerp(target, 0.07);
}

// ================================================================
//  VRM 読み込み
// ================================================================
async function loadVRM(buffer) {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading-text').textContent = 'VRM 読み込み中...';

  const blob = new Blob([buffer]);
  const url = URL.createObjectURL(blob);

  const loader = new GLTFLoader();
  loader.register(p => new VRMLoaderPlugin(p));

  return new Promise((res, rej) => {
    loader.load(url, async (gltf) => {
      const vrm = gltf.userData.vrm;
      VRMUtils.removeUnnecessaryVertices(gltf.scene);
      VRMUtils.removeUnnecessaryJoints(gltf.scene);
      VRMUtils.rotateVRM0(vrm);
      vrm.scene.traverse(obj => { if (obj.isMesh) { obj.castShadow = true; obj.receiveShadow = true; } });

      if (currentVrm) scene.remove(currentVrm.scene);
      scene.add(vrm.scene);
      currentVrm = vrm;

      mixer = new THREE.AnimationMixer(vrm.scene);
      mixer.addEventListener('finished', onAnimFinished);

      document.getElementById('loading-text').textContent = 'アニメーション準備完了！FBXを読み込んでください';
      document.getElementById('loading-bar').style.width = '100%';
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
      }, 800);

      URL.revokeObjectURL(url);
      res(vrm);
    }, (p) => {
      if (p.total) {
        document.getElementById('loading-bar').style.width = `${(p.loaded/p.total*100)}%`;
      }
    }, rej);
  });
}

// ================================================================
//  FBX 読み込み（複数対応）
// ================================================================
async function loadFBX(name, buffer) {
  if (!currentVrm) { alert('先にVRMを読み込んでください'); return; }
  const key = detectAnimKey(name);
  if (!key) { console.warn('認識できないFBX名:', name); return; }

  try {
    const clip = await loadMixamoAnimation(buffer, currentVrm, key);
    animClips[key] = clip;
    // 逆再生版も作成（Crouched Walking等に使用）
    const revClip = await loadMixamoAnimation(buffer, currentVrm, key + '_rev', true);
    reverseClips[key] = revClip;

    // キャッシュをリセット
    if (animActions[key]) { animActions[key].stop(); delete animActions[key]; }
    if (animActions[key + '_rev']) { animActions[key + '_rev'].stop(); delete animActions[key + '_rev']; }

    console.log(`✅ ${name} → key: ${key}`);
    updateLoadedAnimsList();

    // アイドルが読み込まれたら即再生
    if (key === 'idle' && (!currentAction)) {
      crossFadeTo('idle', 0);
    }
  } catch(e) {
    console.error(`FBX読み込み失敗: ${name}`, e);
  }
}

function detectAnimKey(filename) {
  const base = filename.replace(/\.fbx$/i, '').trim();
  // 完全一致チェック
  if (ANIM_KEYS[base]) return ANIM_KEYS[base];
  // 部分一致
  for (const [k, v] of Object.entries(ANIM_KEYS)) {
    if (base.toLowerCase().includes(k.toLowerCase())) return v;
  }
  return null;
}

function updateLoadedAnimsList() {
  const el = document.getElementById('loaded-anims');
  const loaded = Object.keys(animClips);
  el.textContent = loaded.length ? `読み込み済み: ${loaded.join(', ')}` : '';
}

// ================================================================
//  設定 UI
// ================================================================
document.getElementById('settings-toggle').addEventListener('click', () => {
  const p = document.getElementById('settings-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('setting-face-camera').addEventListener('change', e => {
  settings.faceCamera = e.target.checked;
});
document.getElementById('setting-cam-follow').addEventListener('change', e => {
  settings.camFollow = e.target.checked;
});
document.getElementById('setting-backward-slow').addEventListener('change', e => {
  settings.backwardSlow = e.target.checked;
});

// ファイル入力
document.getElementById('file-vrm').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const buf = await file.arrayBuffer();
  await loadVRM(buf);
  e.target.value = '';
});

document.getElementById('file-fbx').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  for (const file of files) {
    const buf = await file.arrayBuffer();
    await loadFBX(file.name, buf);
  }
  e.target.value = '';
});

// ================================================================
//  リサイズ
// ================================================================
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ================================================================
//  メインループ
// ================================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.05);

  updateCharacter(delta);
  updateCamera();

  if (mixer) mixer.update(delta);
  if (currentVrm) currentVrm.update(delta);

  controls.update();
  renderer.render(scene, camera);

  // 座標表示
  if (currentVrm) {
    const p = charPos;
    document.getElementById('pos-info').textContent =
      `${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}`;
  }

  // prevKeys更新
  prevKeys = {...keys};
}
animate();
</script>
