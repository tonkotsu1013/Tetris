<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VRM Viewer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #15151f;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  #canvas-container { position: fixed; inset: 0; }

  #ui {
    position: fixed;
    top: 12px;
    left: 12px;
    color: #fff;
    background: rgba(0, 0, 0, 0.55);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.7;
    max-width: 280px;
    pointer-events: none;
  }
  #ui h1 { margin: 0 0 6px; font-size: 15px; }
  #status { color: #8be9fd; }

  #expressions {
    position: fixed;
    top: 12px;
    right: 12px;
    max-width: 230px;
    max-height: 80vh;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.55);
    color: #fff;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 12px;
  }
  #expressions h2 { margin: 0 0 8px; font-size: 13px; }
  .expr-btn {
    display: block;
    width: 100%;
    margin: 3px 0;
    padding: 6px 8px;
    border: none;
    border-radius: 6px;
    background: #2e2e4d;
    color: #fff;
    cursor: pointer;
    font-size: 12px;
    text-align: left;
  }
  .expr-btn:hover { background: #45457a; }
  .expr-btn.active { background: #5b6cff; }
  #resetExpr { margin-top: 8px; background: #553333; }

  /* ===== 拡張: サードパーソン・コントローラー用UI（追加分） ===== */
  #tp-ui {
    position: fixed;
    bottom: 12px;
    left: 12px;
    color: #fff;
    background: rgba(0, 0, 0, 0.55);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.7;
    max-width: 280px;
  }
  #tp-ui h2 { margin: 0 0 4px; font-size: 13px; }
  #tp-lookatcam-label {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    cursor: pointer;
  }
  #tp-state { margin-top: 8px; color: #8be9fd; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui">
  <h1>VRM Viewer</h1>
  <div id="status">読み込み中...</div>
  <div>ドラッグ：視点回転 / ホイール：ズーム</div>
  <div>↑：早歩き　↓：ゆっくり</div>
  <div>←→：その場で向きを変える</div>
</div>

<div id="expressions">
  <h2>表情一覧（VRMから自動検出）</h2>
  <div id="exprList">VRM読み込み後に表示されます</div>
</div>

<div id="tp-ui">
  <h2>サードパーソン・コントローラー</h2>
  <div>W/A/S/D：移動</div>
  <div>Z（押しっぱなし）：走る</div>
  <div>Shift：しゃがみ切替</div>
  <div>Space：ジャンプ</div>
  <label id="tp-lookatcam-label">
    <input type="checkbox" id="tp-lookatcam-toggle" checked />
    視点方向を向く（LookAtCameraDir）
  </label>
  <div id="tp-state">状態: -</div>
</div>

<!--
  ====================================================================
  importmap: three.js / three-vrm / addons をCDN(jsdelivr)から読み込む設定。
  バージョンを変えたい場合はここの数字を変更してください。
  ====================================================================
-->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

/* ====================================================================
   ① ファイル名はここで指定します
   index.html と「同じフォルダ」に以下のファイルを置いてください。
   サブフォルダに入れた場合はパスを './models/xxx.vrm' のように直してください。
   ==================================================================== */
const VRM_FILE_PATH = './ayame_v1.1.vrm';     // ← VRMファイル名
const WALK_ANIMATION_PATH = './Walking.fbx';  // ← ミクサモ(Mixamo)の歩行アニメーション(FBX)

// 走る/アイドルなど別のモーションを追加したい場合は、ここに増やして
// 下の「複数アニメーションを使う場合の拡張例」を参考に組み込んでください。
// const RUN_ANIMATION_PATH = './Running.fbx';
// const IDLE_ANIMATION_PATH = './Idle.fbx';

const KEEP_IN_PLACE = true; // true: その場で足踏み（移動しない） / false: 実際に前進してしまう

/* ====================================================================
   ② Mixamo → VRM ボーン名 対応表
   ミクサモのリグ名 (mixamorigXXX) は VRM の Humanoid ボーン名と
   名前も階層も違うため、この対応表で1本ずつ紐づけてから動かします。
   （pixiv公式 three-vrm のサンプルで使われている対応表と同じものです）
   ==================================================================== */
const mixamoVRMRigMap = {
  mixamorigHips: 'hips',
  mixamorigSpine: 'spine',
  mixamorigSpine1: 'chest',
  mixamorigSpine2: 'upperChest',
  mixamorigNeck: 'neck',
  mixamorigHead: 'head',
  mixamorigLeftShoulder: 'leftShoulder',
  mixamorigLeftArm: 'leftUpperArm',
  mixamorigLeftForeArm: 'leftLowerArm',
  mixamorigLeftHand: 'leftHand',
  mixamorigLeftHandThumb1: 'leftThumbMetacarpal',
  mixamorigLeftHandThumb2: 'leftThumbProximal',
  mixamorigLeftHandThumb3: 'leftThumbDistal',
  mixamorigLeftHandIndex1: 'leftIndexProximal',
  mixamorigLeftHandIndex2: 'leftIndexIntermediate',
  mixamorigLeftHandIndex3: 'leftIndexDistal',
  mixamorigLeftHandMiddle1: 'leftMiddleProximal',
  mixamorigLeftHandMiddle2: 'leftMiddleIntermediate',
  mixamorigLeftHandMiddle3: 'leftMiddleDistal',
  mixamorigLeftHandRing1: 'leftRingProximal',
  mixamorigLeftHandRing2: 'leftRingIntermediate',
  mixamorigLeftHandRing3: 'leftRingDistal',
  mixamorigLeftHandPinky1: 'leftLittleProximal',
  mixamorigLeftHandPinky2: 'leftLittleIntermediate',
  mixamorigLeftHandPinky3: 'leftLittleDistal',
  mixamorigRightShoulder: 'rightShoulder',
  mixamorigRightArm: 'rightUpperArm',
  mixamorigRightForeArm: 'rightLowerArm',
  mixamorigRightHand: 'rightHand',
  mixamorigRightHandPinky1: 'rightLittleProximal',
  mixamorigRightHandPinky2: 'rightLittleIntermediate',
  mixamorigRightHandPinky3: 'rightLittleDistal',
  mixamorigRightHandRing1: 'rightRingProximal',
  mixamorigRightHandRing2: 'rightRingIntermediate',
  mixamorigRightHandRing3: 'rightRingDistal',
  mixamorigRightHandMiddle1: 'rightMiddleProximal',
  mixamorigRightHandMiddle2: 'rightMiddleIntermediate',
  mixamorigRightHandMiddle3: 'rightMiddleDistal',
  mixamorigRightHandIndex1: 'rightIndexProximal',
  mixamorigRightHandIndex2: 'rightIndexIntermediate',
  mixamorigRightHandIndex3: 'rightIndexDistal',
  mixamorigRightHandThumb1: 'rightThumbMetacarpal',
  mixamorigRightHandThumb2: 'rightThumbProximal',
  mixamorigRightHandThumb3: 'rightThumbDistal',
  mixamorigLeftUpLeg: 'leftUpperLeg',
  mixamorigLeftLeg: 'leftLowerLeg',
  mixamorigLeftFoot: 'leftFoot',
  mixamorigLeftToeBase: 'leftToes',
  mixamorigRightUpLeg: 'rightUpperLeg',
  mixamorigRightLeg: 'rightLowerLeg',
  mixamorigRightFoot: 'rightFoot',
  mixamorigRightToeBase: 'rightToes',
};

/* ====================================================================
   ③ ミクサモのFBXアニメーションを VRM 用 AnimationClip に変換する関数
   pixiv公式 three-vrm のサンプル loadMixamoAnimation.js をベースに、
   「その場から動かさない」処理 (KEEP_IN_PLACE) を追加したものです。
   https://github.com/pixiv/three-vrm/tree/dev/packages/three-vrm-core/examples/humanoidAnimation
   ==================================================================== */
function loadMixamoAnimation(url, vrm, keepInPlace = true, clipName = 'walk') {
  const loader = new FBXLoader();
  return loader.loadAsync(url).then((asset) => {
    // Mixamoから書き出されたFBXは、アニメーション名が "mixamo.com" になっていることが多い
    const clip = THREE.AnimationClip.findByName(asset.animations, 'mixamo.com') || asset.animations[0];
    if (!clip) throw new Error('FBXの中にアニメーションが見つかりませんでした');

    const tracks = [];
    const restRotationInverse = new THREE.Quaternion();
    const parentRestWorldRotation = new THREE.Quaternion();
    const _quatA = new THREE.Quaternion();

    // ミクサモとVRMでは腰(Hips)の高さ＝身長スケールが違うため、比率を求めて補正する
    const mixamoHipsNode = asset.getObjectByName('mixamorigHips');
    const motionHipsHeight = mixamoHipsNode.position.y;
    const vrmHipsHeight = vrm.humanoid.normalizedRestPose.hips.position[1];
    const hipsPositionScale = vrmHipsHeight / motionHipsHeight;

    clip.tracks.forEach((track) => {
      // トラック名は "mixamorigHips.quaternion" のような形式になっている
      const [mixamoRigName, propertyName] = track.name.split('.');
      const vrmBoneName = mixamoVRMRigMap[mixamoRigName];
      const vrmNodeName = vrm.humanoid?.getNormalizedBoneNode(vrmBoneName)?.name;
      const mixamoRigNode = asset.getObjectByName(mixamoRigName);

      // 対応表に無いボーン（指の一部や補助ボーンなど）は無視する
      if (vrmNodeName == null || mixamoRigNode == null) return;

      // レスト(直立)姿勢時の回転を基準に、回転の差分だけを取り出す
      mixamoRigNode.getWorldQuaternion(restRotationInverse).invert();
      mixamoRigNode.parent.getWorldQuaternion(parentRestWorldRotation);

      if (track instanceof THREE.QuaternionKeyframeTrack) {
        for (let i = 0; i < track.values.length; i += 4) {
          const flat = track.values.slice(i, i + 4);
          _quatA.fromArray(flat).premultiply(parentRestWorldRotation).multiply(restRotationInverse).toArray(flat);
          flat.forEach((v, idx) => (track.values[idx + i] = v));
        }
        tracks.push(new THREE.QuaternionKeyframeTrack(
          `${vrmNodeName}.${propertyName}`,
          track.times,
          // VRM0.0モデルは前後左右の軸が反転しているので、その場合だけ符号を反転する
          track.values.map((v, i) => (vrm.meta?.metaVersion === '0' && i % 2 === 0 ? -v : v)),
        ));
      } else if (track instanceof THREE.VectorKeyframeTrack) {
        const values = track.values.map(
          (v, i) => (vrm.meta?.metaVersion === '0' && i % 3 !== 1 ? -v : v) * hipsPositionScale,
        );

        // Hipsの「位置」トラック＝歩行による前進(根本移動)が入っている部分
        if (mixamoRigName === 'mixamorigHips' && propertyName === 'position' && keepInPlace) {
          // X(左右)とZ(前後)だけ0にする。Y(上下の重心バウンス)はそのまま残すので
          // 「その場で足踏みしている」自然な動きになる
          for (let i = 0; i < values.length; i += 3) {
            values[i] = 0;
            values[i + 2] = 0;
          }
        }
        tracks.push(new THREE.VectorKeyframeTrack(`${vrmNodeName}.${propertyName}`, track.times, values));
      }
    });

    return new THREE.AnimationClip(clipName, clip.duration, tracks);
  });
}

/* ====================================================================
   シーンの基本構築
   ==================================================================== */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15151f);

const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(0, 1.4, 3.2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// マウス/タッチで自由にいろんな角度から見られるようにする
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.minDistance = 0.6;
controls.maxDistance = 8;
controls.update();

// ライト
scene.add(new THREE.HemisphereLight(0xffffff, 0x444466, 1.3));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
dirLight.position.set(1, 2, 1.5);
scene.add(dirLight);

// 足元の目安になる地面とグリッド
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(2.2, 48),
  new THREE.MeshStandardMaterial({ color: 0x23233a, roughness: 1 }),
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);
scene.add(new THREE.GridHelper(4, 16, 0x4444aa, 0x2c2c44));

const clock = new THREE.Clock();
let currentVrm = null;
let mixer = null;
let walkAction = null;

const statusEl = document.getElementById('status');

/* ====================================================================
   ④ VRMの読み込み
   ==================================================================== */
const gltfLoader = new GLTFLoader();
gltfLoader.register((parser) => new VRMLoaderPlugin(parser));

gltfLoader.load(
  VRM_FILE_PATH,
  async (gltf) => {
    const vrm = gltf.userData.vrm;

    // 表示に不要なデータを削除して軽量化（任意・無くても動作します）
    VRMUtils.removeUnnecessaryVertices(gltf.scene);
    VRMUtils.removeUnnecessaryJoints(gltf.scene);

    // VRM0.x のモデルは正面が後ろ(-Z)を向いているため、自動で前(+Z)向きに補正する
    // VRM1.0のモデルなら何もしない（バージョンを自動判定）
    VRMUtils.rotateVRM0(vrm);

    scene.add(vrm.scene);
    currentVrm = vrm;
    statusEl.textContent = 'VRM読み込み完了。アニメーション読込中...';

    // VRMに入っている表情(Expression)の一覧をUIとコンソールに表示
    setupExpressionUI(vrm);

    // ミクサモのアニメーションを読み込んでVRMに適用する
    mixer = new THREE.AnimationMixer(vrm.scene);
    try {
      const walkClip = await loadMixamoAnimation(WALK_ANIMATION_PATH, vrm, KEEP_IN_PLACE);
      walkAction = mixer.clipAction(walkClip);
      walkAction.play(); // 読み込めたら自動でループ再生開始
      statusEl.textContent = '準備完了！矢印キーで速度や向きを変えられます';

      /* ----------------------------------------------------------------
         複数アニメーションを使う場合の拡張例（コメントアウト中）
         Running.fbx などを追加したら、下のようにもう1本読み込んで
         キー入力に応じて crossFadeTo で切り替えてください。
      ----------------------------------------------------------------
      const runClip = await loadMixamoAnimation('./Running.fbx', vrm, KEEP_IN_PLACE);
      const runAction = mixer.clipAction(runClip);
      // 例: ArrowUp を押した瞬間に walk → run へ0.2秒でクロスフェード
      // walkAction.crossFadeTo(runAction, 0.2, true); runAction.play();
      ---------------------------------------------------------------- */
    } catch (e) {
      console.error('アニメーション読み込み失敗:', e);
      statusEl.textContent = 'VRMは表示できましたが、アニメーション読込に失敗しました（コンソール参照）';
    }
  },
  (progress) => {
    if (progress.total) {
      statusEl.textContent = `VRM読み込み中... ${Math.round((progress.loaded / progress.total) * 100)}%`;
    }
  },
  (error) => {
    console.error(error);
    statusEl.textContent = 'VRMの読み込みに失敗しました。ファイル名/パスを確認してください。';
  },
);

/* ====================================================================
   ⑤ 表情(Expression) UI
   VRMに入っている表情を自動で検出してボタンを生成します。
   ボタンを押すと vrm.expressionManager.setValue(名前, 1.0) を呼びます。
   ==================================================================== */
function setupExpressionUI(vrm) {
  const listEl = document.getElementById('exprList');
  listEl.innerHTML = '';

  if (!vrm.expressionManager) {
    listEl.textContent = 'このVRMには表情(Expression)が設定されていません';
    return;
  }

  // このVRMが持つ全表情名（プリセット＋VRoidStudio等で作ったカスタム表情）
  const names = Object.keys(vrm.expressionManager.expressionMap);
  console.log('このVRMが持つ表情一覧:', names);

  names.forEach((name) => {
    const btn = document.createElement('button');
    btn.className = 'expr-btn';
    btn.textContent = name;
    btn.onclick = () => {
      // 一旦すべて0にしてから、押した表情だけ1.0にする
      names.forEach((n) => vrm.expressionManager.setValue(n, 0));
      vrm.expressionManager.setValue(name, 1.0);
      document.querySelectorAll('.expr-btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
    };
    listEl.appendChild(btn);
  });

  const resetBtn = document.createElement('button');
  resetBtn.className = 'expr-btn';
  resetBtn.id = 'resetExpr';
  resetBtn.textContent = 'リセット（neutral）';
  resetBtn.onclick = () => {
    names.forEach((n) => vrm.expressionManager.setValue(n, 0));
    document.querySelectorAll('.expr-btn').forEach((b) => b.classList.remove('active'));
  };
  listEl.appendChild(resetBtn);
}

/* ====================================================================
   ⑥ 矢印キー操作
   歩行アニメーションは1つしか無いので、今は
     ↑：再生速度を上げる（早歩き＝走っているように見せる簡易演出）
     ↓：再生速度を下げる（ゆっくり歩く）
     ←→：その場で体の向きだけを回す（移動はしない）
   という形にしています。本格的に「歩く」と「走る」を別モーションで
   切り替えたい場合は、Running.fbx 等を用意して上の拡張例のように
   crossFadeTo で別アクションへ切り替えてください。
   ==================================================================== */
const pressedKeys = new Set();

window.addEventListener('keydown', (e) => {
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
    pressedKeys.add(e.key);
    e.preventDefault();
  }
});

window.addEventListener('keyup', (e) => {
  pressedKeys.delete(e.key);
});

function updateInputAnimation(delta) {
  if (walkAction) {
    let targetTimeScale = 1.0;
    if (pressedKeys.has('ArrowUp')) targetTimeScale = 1.7; // 早歩き
    if (pressedKeys.has('ArrowDown')) targetTimeScale = 0.6; // ゆっくり
    walkAction.timeScale = targetTimeScale;
  }

  if (currentVrm) {
    const turnSpeed = 1.6; // rad/sec
    if (pressedKeys.has('ArrowLeft')) currentVrm.scene.rotation.y += turnSpeed * delta;
    if (pressedKeys.has('ArrowRight')) currentVrm.scene.rotation.y -= turnSpeed * delta;
  }
}

/* ====================================================================
   ウィンドウリサイズ対応
   ==================================================================== */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ====================================================================
   メインループ
   ==================================================================== */
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  updateInputAnimation(delta);

  if (mixer) mixer.update(delta);
  if (currentVrm) currentVrm.update(delta); // 表情・ボーン・LookAt・スプリングボーン等を一括更新

  controls.update();
  renderer.render(scene, camera);
}
animate();

/* ============================================================================================
   ⑦ 拡張: サードパーソン・キャラクターコントローラー / アニメーション遷移ロジック
   --------------------------------------------------------------------------------------------
   ここから下が今回追加した拡張部分です。①〜⑥の基盤システム（VRM読込・表情UI・矢印キーでの
   簡易デモ操作・メインループ）には一切手を加えていません。
   基盤システムの `currentVrm` / `mixer` / `scene` / `camera` / `controls` / `clock` /
   `loadMixamoAnimation()` をそのまま再利用し、VRMの読み込みが完了したタイミングで
   このコントローラーが処理を引き継ぎます（基盤側の `walkAction` は引き継ぎ時に停止します）。
   ============================================================================================ */

/* ---------------------------------------------------------------------------
   7-1. 設定: アニメーションファイル一覧（仕様書の遷移表に対応するFBXファイル名）
        VRM_FILE_PATH と同じフォルダにこれらのFBXを配置してください。
        ファイルが存在しないものはコンソールに警告を出すだけでスキップされ、
        他の機能（移動・カメラ・ジャンプ物理・接地スナップ等）は問題なく動作します。
--------------------------------------------------------------------------- */
const TP_ANIM_BASE = './'; // ← アニメーションFBXの配置フォルダ
const ANIM_FILES = {
  idle:          'Standard Idle.fbx',
  walk:          'Walking.fbx',
  walkBack:      'Walking Backwards.fbx',
  walkTurn180:   'Walking Turn 180.fbx',
  strafeWalkL:   'Left Strafe Walking.fbx',
  strafeWalkR:   'Right Strafe Walking.fbx',
  run:           'Running.fbx',
  runBack:       'Running Backward.fbx',
  runTurn180:    'Running Turn 180.fbx',
  strafeRunL:    'Left Strafe.fbx',
  strafeRunR:    'Right Strafe.fbx',
  crouchPose:    'Male Crouch Pose.fbx',
  crouchWalk:    'Crouched Walking.fbx',
  crouchSneakL:  'Crouched Sneaking Left.fbx',
  crouchSneakR:  'Crouched Sneaking Right.fbx',
  stairsUp:      'Ascending Stairs.fbx',
  jump:          'Jumping.fbx',
  fallIdle:      'Falling Idle.fbx',
  landing:       'Falling To Landing.fbx',
};

// 移動速度・物理パラメータ（必要に応じて調整してください）
const MOVE_SPEED = { walk: 1.4, run: 3.2, crouch: 0.9 }; // m/s
const TURN_SMOOTH = 10;     // 体の向き補間の速さ（大きいほど速く向きが追従）
const GRAVITY = -9.8;       // m/s^2
const JUMP_SPEED = 4.5;     // m/s（ジャンプ初速）
const GROUND_RAY_OFFSET = 1.0; // 接地判定レイの発射高さ（足元より少し上から下に飛ばす）

// 「設定:視点方向を向く」フラグ。UIのチェックボックスと連動（仕様書の LookAtCameraDir）
let LookAtCameraDir = true;

/* ---------------------------------------------------------------------------
   7-2. 追加UIの配線（HTML側に追加した #tp-ui パネルと接続するだけ）
--------------------------------------------------------------------------- */
document.getElementById('tp-lookatcam-toggle').addEventListener('change', (e) => {
  LookAtCameraDir = e.target.checked;
});
const tpStateEl = document.getElementById('tp-state');

/* ---------------------------------------------------------------------------
   7-3. アニメーション一括読み込み
        既存の loadMixamoAnimation() をそのまま再利用（第4引数にクリップ名を追加しただけ）。
        どのアニメーションも、Hipsボーンの XZ位置を 0 に固定（Y軸の上下バウンスのみ残す）。
        ＝「すべてのアニメーションで位置を固定する」仕様に対応。実際の移動は本コントローラーが
        スクリプト側で座標を書き換えることで行う。
--------------------------------------------------------------------------- */
const tpClips = {};   // name -> AnimationClip
const tpActions = {}; // name -> AnimationAction（mixer.clipAction の使い回しキャッシュ）
let tpAnimReady = false;

async function loadAllCharacterAnimations(vrm) {
  await Promise.all(
    Object.entries(ANIM_FILES).map(async ([key, file]) => {
      try {
        tpClips[key] = await loadMixamoAnimation(TP_ANIM_BASE + file, vrm, true, key);
      } catch (e) {
        console.warn(`[ThirdPersonController] "${file}" の読み込みをスキップしました（未配置か読込失敗）`, e);
      }
    }),
  );
}

/* ---------------------------------------------------------------------------
   7-4. ステート定義（Animator / Animation Blueprint に相当するステートマシン）
--------------------------------------------------------------------------- */
const ST = {
  IDLE: 'IDLE', WALK: 'WALK', WALK_BACK: 'WALK_BACK', WALK_TURN180: 'WALK_TURN180',
  STRAFE_WALK_L: 'STRAFE_WALK_L', STRAFE_WALK_R: 'STRAFE_WALK_R',
  RUN: 'RUN', RUN_BACK: 'RUN_BACK', RUN_TURN180: 'RUN_TURN180',
  STRAFE_RUN_L: 'STRAFE_RUN_L', STRAFE_RUN_R: 'STRAFE_RUN_R',
  CROUCH_TO_POSE: 'CROUCH_TO_POSE', CROUCH_IDLE: 'CROUCH_IDLE',
  CROUCH_WALK: 'CROUCH_WALK', CROUCH_WALK_REV: 'CROUCH_WALK_REV',
  CROUCH_SNEAK_L: 'CROUCH_SNEAK_L', CROUCH_SNEAK_R: 'CROUCH_SNEAK_R',
  STAIRS: 'STAIRS', JUMP: 'JUMP', FALL: 'FALL', LAND: 'LAND',
};

// 各ステート → 再生するクリップ・ループ設定（ワンショット系=ターン180/しゃがみ移行/ジャンプ/着地は除く。下で個別処理）
const tpStateAnimMap = {
  [ST.IDLE]:           { clip: 'idle',         loop: true },
  [ST.WALK]:           { clip: 'walk',         loop: true },
  [ST.WALK_BACK]:      { clip: 'walkBack',     loop: true, timeScale: 0.6 }, // 仕様: ONモードのSは速度を落とす
  [ST.STRAFE_WALK_L]:  { clip: 'strafeWalkL',  loop: true },
  [ST.STRAFE_WALK_R]:  { clip: 'strafeWalkR',  loop: true },
  [ST.RUN]:            { clip: 'run',          loop: true },
  [ST.RUN_BACK]:       { clip: 'runBack',      loop: true },
  [ST.STRAFE_RUN_L]:   { clip: 'strafeRunL',   loop: true },
  [ST.STRAFE_RUN_R]:   { clip: 'strafeRunR',   loop: true },
  [ST.CROUCH_IDLE]:    { clip: 'crouchPose',   loop: false, clamp: true },
  [ST.CROUCH_WALK]:    { clip: 'crouchWalk',   loop: true,  timeScale: 1 },
  [ST.CROUCH_WALK_REV]:{ clip: 'crouchWalk',   loop: true,  timeScale: -1 }, // 仕様: ONモードのSは逆再生
  [ST.CROUCH_SNEAK_L]: { clip: 'crouchSneakL', loop: true },
  [ST.CROUCH_SNEAK_R]: { clip: 'crouchSneakR', loop: true },
  [ST.STAIRS]:         { clip: 'stairsUp',     loop: true },
  [ST.FALL]:           { clip: 'fallIdle',     loop: true },
};

let tpState = ST.IDLE;
let characterYaw = 0;        // コードで管理するキャラクターの向き(ラジアン)。LookAtCameraDir OFF時の「進行方向を向く」やON時の「カメラ正面を向く」を実現する唯一の基準。
let verticalVelocity = 0;
let grounded = true;
let crouching = false;
let oneShotBusy = false;     // ターン180/しゃがみ移行/ジャンプ/着地など、単発アニメーション再生中フラグ
let tpRequestJump = false;
let tpRequestCrouchTransition = false;
let tpPrevDominantKey = null; // 直前フレームで最優先だった移動キー（反対方向入力の検出に使用）

/* ---------------------------------------------------------------------------
   7-5. 入力（W/A/S/D・Shift・Z・Space）
        既存の矢印キー操作（基盤システム側のデモ操作）とはキーが重複しないため共存可能。
--------------------------------------------------------------------------- */
const tpKeys = { w: false, a: false, s: false, d: false, z: false };

window.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'KeyW': tpKeys.w = true; break;
    case 'KeyA': tpKeys.a = true; break;
    case 'KeyS': tpKeys.s = true; break;
    case 'KeyD': tpKeys.d = true; break;
    case 'KeyZ': tpKeys.z = true; break;
    case 'ShiftLeft':
    case 'ShiftRight':
      crouching = !crouching;       // しゃがみ:Shiftを押すたびにON/OFFをトグル
      tpRequestCrouchTransition = true;
      break;
    case 'Space':
      tpRequestJump = true;
      e.preventDefault();
      break;
  }
});

window.addEventListener('keyup', (e) => {
  switch (e.code) {
    case 'KeyW': tpKeys.w = false; break;
    case 'KeyA': tpKeys.a = false; break;
    case 'KeyS': tpKeys.s = false; break;
    case 'KeyD': tpKeys.d = false; break;
    case 'KeyZ': tpKeys.z = false; break;
  }
});

function tpDominantKey() {
  // 同時押し時の優先順位: 前進 > 後退 > 左 > 右（シンプルな実装上の取り決め）
  if (tpKeys.w) return 'w';
  if (tpKeys.s) return 's';
  if (tpKeys.a) return 'a';
  if (tpKeys.d) return 'd';
  return null;
}

function tpWrapAngle(a) {
  while (a > Math.PI) a -= Math.PI * 2;
  while (a < -Math.PI) a += Math.PI * 2;
  return a;
}

/* ---------------------------------------------------------------------------
   7-6. アクション再生ヘルパー（クロスフェードで切り替える簡易Animatorコア）
--------------------------------------------------------------------------- */
function playAction(name, opts = {}) {
  const { loop = true, fade = 0.2, timeScale = 1, onFinished = null, clamp = false } = opts;

  // 現在再生中のアクションは全てフェードアウトしてから次のアクションへ
  Object.values(tpActions).forEach((a) => { if (a.isRunning()) a.fadeOut(fade); });

  const clip = tpClips[name];
  if (!clip) {
    console.warn(`[ThirdPersonController] "${name}" のクリップが無いため再生をスキップしました`);
    return null;
  }

  if (!tpActions[name]) tpActions[name] = mixer.clipAction(clip);
  const action = tpActions[name];
  action.reset();
  action.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, loop ? Infinity : 1);
  action.clampWhenFinished = !loop || clamp;
  action.timeScale = timeScale;
  action.fadeIn(fade);
  action.play();

  if (!loop && onFinished) {
    const handler = (ev) => {
      if (ev.action === action) {
        mixer.removeEventListener('finished', handler);
        onFinished();
      }
    };
    mixer.addEventListener('finished', handler);
  }
  return action;
}

function tpSetState(next, { force = false } = {}) {
  if (!force && next === tpState) return;
  tpState = next;
  tpStateEl.textContent = `状態: ${tpState}`;
  const def = tpStateAnimMap[tpState];
  if (def) playAction(def.clip, { loop: def.loop, timeScale: def.timeScale ?? 1, clamp: def.clamp });
}

// ターン180（向きの反転をアニメーション1回分の間だけクリップに委ね、終了後にコード側の向きを更新する）
function tpPlayTurn180(useRun, onDone) {
  oneShotBusy = true;
  tpState = useRun ? ST.RUN_TURN180 : ST.WALK_TURN180;
  tpStateEl.textContent = `状態: ${tpState}`;
  const action = playAction(useRun ? 'runTurn180' : 'walkTurn180', {
    loop: false, fade: 0.15, clamp: true,
    onFinished: () => {
      characterYaw = tpWrapAngle(characterYaw + Math.PI);
      currentVrm.scene.rotation.y = characterYaw;
      oneShotBusy = false;
      onDone();
    },
  });
  if (!action) {
    // クリップ未配置時はアニメーション無しで即座に向きだけ反転して継続する
    characterYaw = tpWrapAngle(characterYaw + Math.PI);
    currentVrm.scene.rotation.y = characterYaw;
    oneShotBusy = false;
    onDone();
  }
}

function tpPlayCrouchPose(onDone) {
  oneShotBusy = true;
  tpState = ST.CROUCH_TO_POSE;
  tpStateEl.textContent = `状態: ${tpState}`;
  const action = playAction('crouchPose', { loop: false, clamp: true, onFinished: () => { oneShotBusy = false; onDone(); } });
  if (!action) { oneShotBusy = false; onDone(); }
}

function tpPlayJump(onAirborne) {
  oneShotBusy = true;
  grounded = false;
  verticalVelocity = JUMP_SPEED;
  tpState = ST.JUMP;
  tpStateEl.textContent = `状態: ${tpState}`;
  const action = playAction('jump', { loop: false, fade: 0.1, clamp: true, onFinished: () => { oneShotBusy = false; onAirborne(); } });
  if (!action) { oneShotBusy = false; onAirborne(); }
}

function tpPlayLanding(onDone) {
  oneShotBusy = true;
  tpState = ST.LAND;
  tpStateEl.textContent = `状態: ${tpState}`;
  const action = playAction('landing', { loop: false, fade: 0.1, clamp: true, onFinished: () => { oneShotBusy = false; onDone(); } });
  if (!action) { oneShotBusy = false; onDone(); }
}

/* ---------------------------------------------------------------------------
   7-7. 各ロコモーション(移動)カテゴリのステート決定ロジック（仕様の遷移表に対応）
--------------------------------------------------------------------------- */
function tpUpdateWalkState() {
  const dom = tpDominantKey();
  if (!dom) { tpSetState(ST.IDLE); tpPrevDominantKey = null; return; }

  // OFFモードで「歩き中に反対方向(W<->S)が入力されたら」Turn180を挟む
  const isReversal = !LookAtCameraDir &&
    ((tpPrevDominantKey === 'w' && dom === 's') || (tpPrevDominantKey === 's' && dom === 'w'));
  tpPrevDominantKey = dom;
  if (isReversal) { tpPlayTurn180(false, () => tpSetState(ST.WALK, { force: true })); return; }

  if (dom === 'w') tpSetState(ST.WALK);
  else if (dom === 's') tpSetState(LookAtCameraDir ? ST.WALK_BACK : ST.WALK); // OFF: 反転後は前進クリップ
  else if (dom === 'a') tpSetState(LookAtCameraDir ? ST.STRAFE_WALK_L : ST.WALK);
  else if (dom === 'd') tpSetState(LookAtCameraDir ? ST.STRAFE_WALK_R : ST.WALK);
}

function tpUpdateRunState() {
  const dom = tpDominantKey();
  if (!dom) { tpSetState(ST.IDLE); tpPrevDominantKey = null; return; }

  const isReversal = !LookAtCameraDir &&
    ((tpPrevDominantKey === 'w' && dom === 's') || (tpPrevDominantKey === 's' && dom === 'w'));
  tpPrevDominantKey = dom;
  if (isReversal) { tpPlayTurn180(true, () => tpSetState(ST.RUN, { force: true })); return; }

  if (dom === 'w') tpSetState(ST.RUN);
  else if (dom === 's') tpSetState(LookAtCameraDir ? ST.RUN_BACK : ST.RUN);
  else if (dom === 'a') tpSetState(LookAtCameraDir ? ST.STRAFE_RUN_L : ST.RUN);
  else if (dom === 'd') tpSetState(LookAtCameraDir ? ST.STRAFE_RUN_R : ST.RUN);
}

function tpUpdateCrouchState() {
  const dom = tpDominantKey();
  tpPrevDominantKey = dom;
  if (!dom) { tpSetState(ST.CROUCH_IDLE); return; }

  if (dom === 'w') tpSetState(ST.CROUCH_WALK);
  else if (dom === 's') tpSetState(LookAtCameraDir ? ST.CROUCH_WALK_REV : ST.CROUCH_WALK);
  else if (dom === 'a') tpSetState(LookAtCameraDir ? ST.CROUCH_SNEAK_L : ST.CROUCH_WALK);
  else if (dom === 'd') tpSetState(LookAtCameraDir ? ST.CROUCH_SNEAK_R : ST.CROUCH_WALK);
}

/* ---------------------------------------------------------------------------
   7-8. 向き(回転)の更新
        ONモード: 常にカメラの正面方向(0度)を基準に身体を向ける。
        OFFモード: 入力された移動方向(ワールド空間)を向く。反転はTurn180側で処理済みのため、
                   ここでは「向き反転を伴わない」場合のみ滑らかに追従させる。
--------------------------------------------------------------------------- */
function tpUpdateFacing(delta, forward, right) {
  let targetYaw = characterYaw;

  if (LookAtCameraDir) {
    targetYaw = Math.atan2(forward.x, forward.z);
  } else {
    const dom = tpDominantKey();
    if (dom) {
      const dir = new THREE.Vector3();
      if (dom === 'w') dir.copy(forward);
      else if (dom === 's') dir.copy(forward).negate();
      else if (dom === 'a') dir.copy(right).negate();
      else if (dom === 'd') dir.copy(right);
      targetYaw = Math.atan2(dir.x, dir.z);
    }
  }

  characterYaw = targetYaw;
  const cur = currentVrm.scene.rotation.y;
  const diff = tpWrapAngle(targetYaw - cur);
  currentVrm.scene.rotation.y = cur + diff * Math.min(1, delta * TURN_SMOOTH);
}

/* ---------------------------------------------------------------------------
   7-9. 接地・階段判定とジャンプ/落下/着地の物理
        「強制位置固定仕様」: 通常移動中は毎フレーム地面にYをスナップし、
        ジャンプ・落下アニメーションが終了/着地したタイミングでも強制的にスナップする。
--------------------------------------------------------------------------- */
const tpRaycaster = new THREE.Raycaster();
const tpDownVec = new THREE.Vector3(0, -1, 0);

function tpGetGroundHit(originPos) {
  tpRaycaster.set(new THREE.Vector3(originPos.x, originPos.y + GROUND_RAY_OFFSET, originPos.z), tpDownVec);
  tpRaycaster.far = GROUND_RAY_OFFSET + 3;
  const targets = [];
  // 簡易実装: 毎回シーンを走査して isGround / isStairs フラグの付いたオブジェクトのみを対象にする
  scene.traverse((obj) => { if (obj.userData && (obj.userData.isGround || obj.userData.isStairs)) targets.push(obj); });
  const hits = tpRaycaster.intersectObjects(targets, true);
  return hits.length > 0 ? hits[0] : null;
}

function tpIsOnStairsAhead(originPos, forward) {
  const aheadPos = originPos.clone().addScaledVector(forward, 0.4);
  const hit = tpGetGroundHit(aheadPos);
  return !!(hit && hit.object.userData && hit.object.userData.isStairs);
}

function tpSnapToGround() {
  const hit = tpGetGroundHit(currentVrm.scene.position);
  if (hit) currentVrm.scene.position.y = hit.point.y;
}

function tpUpdateAirborne(delta, moveDir, hasInput) {
  if (hasInput) currentVrm.scene.position.addScaledVector(moveDir, MOVE_SPEED.walk * 0.6 * delta);

  verticalVelocity += GRAVITY * delta;
  currentVrm.scene.position.y += verticalVelocity * delta;

  const hit = tpGetGroundHit(currentVrm.scene.position);
  const groundY = hit ? hit.point.y : 0;
  const aboveGround = currentVrm.scene.position.y - groundY;

  if (tpState === ST.JUMP) {
    if (verticalVelocity <= 0) tpSetState(ST.FALL, { force: true });
  } else if (tpState !== ST.LAND) {
    if (tpState !== ST.FALL) tpSetState(ST.FALL, { force: true });
    if (aboveGround <= 0.05 && verticalVelocity <= 0) {
      // 着地: 強制的に地面の高さへスナップ（浮遊・めり込み防止）
      currentVrm.scene.position.y = groundY;
      verticalVelocity = 0;
      tpPlayLanding(() => { grounded = true; tpSetState(ST.IDLE, { force: true }); });
    }
  }
}

/* ---------------------------------------------------------------------------
   7-10. カメラ基準軸の取得（自動追跡3人称カメラ: WASD入力をカメラの向きに変換する）
--------------------------------------------------------------------------- */
function tpGetCameraAxes() {
  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();
  const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();
  return { forward, right };
}

/* ---------------------------------------------------------------------------
   7-11. メイン更新関数（毎フレーム呼ばれる、本拡張のAnimator更新処理）
--------------------------------------------------------------------------- */
function tpUpdate(delta) {
  if (!currentVrm || !mixer) return;

  const { forward, right } = tpGetCameraAxes();

  // 入力からワールド空間の移動方向ベクトルを作成（常にカメラ基準）
  const moveDir = new THREE.Vector3();
  if (tpKeys.w) moveDir.add(forward);
  if (tpKeys.s) moveDir.sub(forward);
  if (tpKeys.a) moveDir.sub(right);
  if (tpKeys.d) moveDir.add(right);
  const hasInput = moveDir.lengthSq() > 0.0001;
  if (hasInput) moveDir.normalize();

  // --- 空中(ジャンプ/落下/着地)は最優先で処理 ---
  if (!grounded || tpState === ST.JUMP || tpState === ST.FALL || tpState === ST.LAND) {
    tpUpdateAirborne(delta, moveDir, hasInput);
    return;
  }

  // --- ジャンプ入力 ---
  if (tpRequestJump && !oneShotBusy) {
    tpRequestJump = false;
    tpPlayJump(() => tpSetState(ST.FALL, { force: true }));
    return;
  }
  tpRequestJump = false;

  if (oneShotBusy) return; // ターン180/しゃがみ移行など単発再生中は他の更新を待つ

  // --- しゃがみ切り替え ---
  if (tpRequestCrouchTransition) {
    tpRequestCrouchTransition = false;
    if (crouching) tpPlayCrouchPose(() => tpSetState(ST.CROUCH_IDLE, { force: true }));
    else tpSetState(ST.IDLE, { force: true });
    return;
  }

  // --- 階段判定 ---
  const onStairs = !crouching && tpKeys.w && tpIsOnStairsAhead(currentVrm.scene.position, forward);

  if (crouching) tpUpdateCrouchState();
  else if (onStairs) tpSetState(ST.STAIRS);
  else if (tpKeys.z) tpUpdateRunState();
  else tpUpdateWalkState();

  if (oneShotBusy) return; // 上記の状態決定中にターン180が開始された場合はここで終了

  // --- 向きの更新 ---
  tpUpdateFacing(delta, forward, right);

  // --- 実際の移動(ワールド座標) ---
  if (hasInput) {
    const baseSpeed = crouching ? MOVE_SPEED.crouch : (tpKeys.z ? MOVE_SPEED.run : MOVE_SPEED.walk);
    const slow = (tpState === ST.WALK_BACK) ? 0.6 : 1.0; // 仕様: 歩き後退(ONモード)は速度を落とす
    currentVrm.scene.position.addScaledVector(moveDir, baseSpeed * slow * delta);
  }

  // --- 強制位置固定仕様: 毎フレーム地面にYをスナップ ---
  tpSnapToGround();

  // --- 自動追跡カメラ: ターゲットをキャラクターに追従させる ---
  controls.target.lerp(
    new THREE.Vector3(currentVrm.scene.position.x, currentVrm.scene.position.y + 1.0, currentVrm.scene.position.z),
    Math.min(1, delta * 6),
  );
}

/* ---------------------------------------------------------------------------
   7-12. 階段の動作確認用サンプル形状（任意。実際のステージ側のisStairsフラグに置き換え可）
--------------------------------------------------------------------------- */
function tpAddExampleStairs() {
  const stepCount = 6, stepW = 1.0, stepD = 0.32, stepH = 0.16;
  const mat = new THREE.MeshStandardMaterial({ color: 0x55557a, roughness: 0.9 });
  const group = new THREE.Group();
  for (let i = 0; i < stepCount; i++) {
    const step = new THREE.Mesh(new THREE.BoxGeometry(stepW, stepH, stepD), mat);
    step.position.set(1.6, stepH * (i + 0.5), -1.3 - stepD * i);
    step.userData.isStairs = true;
    group.add(step);
  }
  scene.add(group);
}

/* ---------------------------------------------------------------------------
   7-13. 初期化: VRM読み込み完了を待ってからコントローラーを起動する
        （基盤システムの非同期読み込みフロー自体は変更しない）
--------------------------------------------------------------------------- */
let tpInitialized = false;
function tpInit() {
  if (tpInitialized || !currentVrm || !mixer) return;
  tpInitialized = true;

  if (walkAction) walkAction.stop(); // 基盤側のデフォルト歩行ループから制御を引き継ぐ
  floor.userData.isGround = true;
  tpAddExampleStairs();

  characterYaw = currentVrm.scene.rotation.y;
  controls.target.set(currentVrm.scene.position.x, currentVrm.scene.position.y + 1.0, currentVrm.scene.position.z);

  loadAllCharacterAnimations(currentVrm).then(() => {
    tpAnimReady = true;
    tpSetState(ST.IDLE, { force: true });
    tpStateEl.textContent = '状態: 準備完了（WASDで移動・Zで走る・Shiftでしゃがみ・Spaceでジャンプ）';
    requestAnimationFrame(tpLoop);
  });
}

const tpReadyWatcher = setInterval(() => {
  if (currentVrm && mixer) {
    clearInterval(tpReadyWatcher);
    tpInit();
  }
}, 200);

const tpClock = new THREE.Clock();
function tpLoop() {
  requestAnimationFrame(tpLoop);
  const delta = Math.min(tpClock.getDelta(), 0.05); // 大きすぎるdeltaでのワープ防止
  if (tpAnimReady) tpUpdate(delta);
}
</script>
</body>
</html>
