<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VRM Viewer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #15151f;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  #canvas-container { position: fixed; inset: 0; }

  #ui {
    position: fixed;
    top: 12px;
    left: 12px;
    color: #fff;
    background: rgba(0, 0, 0, 0.55);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.7;
    max-width: 280px;
    pointer-events: none;
  }
  #ui h1 { margin: 0 0 6px; font-size: 15px; }
  #status { color: #8be9fd; }

  #expressions {
    position: fixed;
    top: 12px;
    right: 12px;
    max-width: 230px;
    max-height: 80vh;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.55);
    color: #fff;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 12px;
  }
  #expressions h2 { margin: 0 0 8px; font-size: 13px; }
  .expr-btn {
    display: block;
    width: 100%;
    margin: 3px 0;
    padding: 6px 8px;
    border: none;
    border-radius: 6px;
    background: #2e2e4d;
    color: #fff;
    cursor: pointer;
    font-size: 12px;
    text-align: left;
  }
  .expr-btn:hover { background: #45457a; }
  .expr-btn.active { background: #5b6cff; }
  #resetExpr { margin-top: 8px; background: #553333; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui">
  <h1>VRM Viewer</h1>
  <div id="status">読み込み中...</div>
  <div>ドラッグ：カメラ回転 / ホイール：ズーム</div>
  <div>W/A/S/D：移動　Z（押しっぱなし）：走る</div>
  <div>Shift：しゃがみ切替　Space：ジャンプ</div>
  <div style="margin-top:8px; pointer-events:auto;">
    <label><input type="checkbox" id="faceCameraToggle" checked /> 常にカメラ方向を向く</label>
  </div>
</div>

<div id="expressions">
  <h2>表情一覧（VRMから自動検出）</h2>
  <div id="exprList">VRM読み込み後に表示されます</div>
</div>

<!--
  ====================================================================
  importmap: three.js / three-vrm / addons をCDN(jsdelivr)から読み込む設定。
  バージョンを変えたい場合はここの数字を変更してください。
  ====================================================================
-->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

/* ====================================================================
   ① ファイル名はここで指定します
   index.html と「同じフォルダ」に以下のファイルを置いてください。
   サブフォルダに入れた場合はパスを './models/xxx.vrm' のように直してください。
   ==================================================================== */
const VRM_FILE_PATH = './ayame_v1.1.vrm';     // ← VRMファイル名
const WALK_ANIMATION_PATH = './Walking.fbx';  // ← ミクサモ(Mixamo)の歩行アニメーション(FBX)

// 走る/アイドルなど別のモーションを追加したい場合は、ここに増やして
// 下の「複数アニメーションを使う場合の拡張例」を参考に組み込んでください。
// const RUN_ANIMATION_PATH = './Running.fbx';
// const IDLE_ANIMATION_PATH = './Idle.fbx';

const KEEP_IN_PLACE = true; // true: その場で足踏み（移動しない） / false: 実際に前進してしまう

/* ====================================================================
   キャラクターコントローラー用：使用するアニメーション一覧
   すべて index.html と同じフォルダに置いてください。
   ==================================================================== */
const ANIM_FILES = {
  idle: './Standard Idle.fbx',
  walk: './Walking.fbx',
  walkBack: './Walking Backwards.fbx',
  walkTurn180: './Walking Turn 180.fbx',
  strafeLeftWalk: './Left Strafe Walking.fbx',
  strafeRightWalk: './Right Strafe Walking.fbx',
  run: './Running.fbx',
  runBack: './Running Backward.fbx',
  runTurn180: './Running Turn 180.fbx',
  strafeLeftRun: './Left Strafe.fbx',
  strafeRightRun: './Right Strafe.fbx',
  crouchIdle: './Male Crouch Pose.fbx',
  crouchWalk: './Crouched Walking.fbx',
  crouchSneakLeft: './Crouched Sneaking Left.fbx',
  crouchSneakRight: './Crouched Sneaking Right.fbx',
  jump: './Jumping.fbx',
  fallIdle: './Falling Idle.fbx',
  fallLanding: './Falling To Landing.fbx',
  stairs: './Ascending Stairs.fbx', // 階段昇り（シーン内に階段が無いのでテスト用に「C」キーで再生できます）
};

// 移動速度 (m/s)
const SPEED = { walk: 1.4, run: 3.4, crouch: 0.8 };
const BACKWARD_SLOWDOWN = 0.6; // 「視点方向を向く」がONの後ろ歩き/後ろ走りだけ遅くする
const GRAVITY = 18;
const JUMP_SPEED = 6;

/* ====================================================================
   ② Mixamo → VRM ボーン名 対応表
   ミクサモのリグ名 (mixamorigXXX) は VRM の Humanoid ボーン名と
   名前も階層も違うため、この対応表で1本ずつ紐づけてから動かします。
   （pixiv公式 three-vrm のサンプルで使われている対応表と同じものです）
   ==================================================================== */
const mixamoVRMRigMap = {
  mixamorigHips: 'hips',
  mixamorigSpine: 'spine',
  mixamorigSpine1: 'chest',
  mixamorigSpine2: 'upperChest',
  mixamorigNeck: 'neck',
  mixamorigHead: 'head',
  mixamorigLeftShoulder: 'leftShoulder',
  mixamorigLeftArm: 'leftUpperArm',
  mixamorigLeftForeArm: 'leftLowerArm',
  mixamorigLeftHand: 'leftHand',
  mixamorigLeftHandThumb1: 'leftThumbMetacarpal',
  mixamorigLeftHandThumb2: 'leftThumbProximal',
  mixamorigLeftHandThumb3: 'leftThumbDistal',
  mixamorigLeftHandIndex1: 'leftIndexProximal',
  mixamorigLeftHandIndex2: 'leftIndexIntermediate',
  mixamorigLeftHandIndex3: 'leftIndexDistal',
  mixamorigLeftHandMiddle1: 'leftMiddleProximal',
  mixamorigLeftHandMiddle2: 'leftMiddleIntermediate',
  mixamorigLeftHandMiddle3: 'leftMiddleDistal',
  mixamorigLeftHandRing1: 'leftRingProximal',
  mixamorigLeftHandRing2: 'leftRingIntermediate',
  mixamorigLeftHandRing3: 'leftRingDistal',
  mixamorigLeftHandPinky1: 'leftLittleProximal',
  mixamorigLeftHandPinky2: 'leftLittleIntermediate',
  mixamorigLeftHandPinky3: 'leftLittleDistal',
  mixamorigRightShoulder: 'rightShoulder',
  mixamorigRightArm: 'rightUpperArm',
  mixamorigRightForeArm: 'rightLowerArm',
  mixamorigRightHand: 'rightHand',
  mixamorigRightHandPinky1: 'rightLittleProximal',
  mixamorigRightHandPinky2: 'rightLittleIntermediate',
  mixamorigRightHandPinky3: 'rightLittleDistal',
  mixamorigRightHandRing1: 'rightRingProximal',
  mixamorigRightHandRing2: 'rightRingIntermediate',
  mixamorigRightHandRing3: 'rightRingDistal',
  mixamorigRightHandMiddle1: 'rightMiddleProximal',
  mixamorigRightHandMiddle2: 'rightMiddleIntermediate',
  mixamorigRightHandMiddle3: 'rightMiddleDistal',
  mixamorigRightHandIndex1: 'rightIndexProximal',
  mixamorigRightHandIndex2: 'rightIndexIntermediate',
  mixamorigRightHandIndex3: 'rightIndexDistal',
  mixamorigRightHandThumb1: 'rightThumbMetacarpal',
  mixamorigRightHandThumb2: 'rightThumbProximal',
  mixamorigRightHandThumb3: 'rightThumbDistal',
  mixamorigLeftUpLeg: 'leftUpperLeg',
  mixamorigLeftLeg: 'leftLowerLeg',
  mixamorigLeftFoot: 'leftFoot',
  mixamorigLeftToeBase: 'leftToes',
  mixamorigRightUpLeg: 'rightUpperLeg',
  mixamorigRightLeg: 'rightLowerLeg',
  mixamorigRightFoot: 'rightFoot',
  mixamorigRightToeBase: 'rightToes',
};

/* ====================================================================
   ③ ミクサモのFBXアニメーションを VRM 用 AnimationClip に変換する関数
   pixiv公式 three-vrm のサンプル loadMixamoAnimation.js をベースに、
   「その場から動かさない」処理 (KEEP_IN_PLACE) を追加したものです。
   https://github.com/pixiv/three-vrm/tree/dev/packages/three-vrm-core/examples/humanoidAnimation
   ==================================================================== */
function loadMixamoAnimation(url, vrm, keepInPlace = true) {
  const loader = new FBXLoader();
  return loader.loadAsync(url).then((asset) => {
    // Mixamoから書き出されたFBXは、アニメーション名が "mixamo.com" になっていることが多い
    const clip = THREE.AnimationClip.findByName(asset.animations, 'mixamo.com') || asset.animations[0];
    if (!clip) throw new Error('FBXの中にアニメーションが見つかりませんでした');

    const tracks = [];
    const restRotationInverse = new THREE.Quaternion();
    const parentRestWorldRotation = new THREE.Quaternion();
    const _quatA = new THREE.Quaternion();

    // ミクサモとVRMでは腰(Hips)の高さ＝身長スケールが違うため、比率を求めて補正する
    const mixamoHipsNode = asset.getObjectByName('mixamorigHips');
    const motionHipsHeight = mixamoHipsNode.position.y;
    const vrmHipsHeight = vrm.humanoid.normalizedRestPose.hips.position[1];
    const hipsPositionScale = vrmHipsHeight / motionHipsHeight;

    clip.tracks.forEach((track) => {
      // トラック名は "mixamorigHips.quaternion" のような形式になっている
      const [mixamoRigName, propertyName] = track.name.split('.');
      const vrmBoneName = mixamoVRMRigMap[mixamoRigName];
      const vrmNodeName = vrm.humanoid?.getNormalizedBoneNode(vrmBoneName)?.name;
      const mixamoRigNode = asset.getObjectByName(mixamoRigName);

      // 対応表に無いボーン（指の一部や補助ボーンなど）は無視する
      if (vrmNodeName == null || mixamoRigNode == null) return;

      // レスト(直立)姿勢時の回転を基準に、回転の差分だけを取り出す
      mixamoRigNode.getWorldQuaternion(restRotationInverse).invert();
      mixamoRigNode.parent.getWorldQuaternion(parentRestWorldRotation);

      if (track instanceof THREE.QuaternionKeyframeTrack) {
        for (let i = 0; i < track.values.length; i += 4) {
          const flat = track.values.slice(i, i + 4);
          _quatA.fromArray(flat).premultiply(parentRestWorldRotation).multiply(restRotationInverse).toArray(flat);
          flat.forEach((v, idx) => (track.values[idx + i] = v));
        }
        tracks.push(new THREE.QuaternionKeyframeTrack(
          `${vrmNodeName}.${propertyName}`,
          track.times,
          // VRM0.0モデルは前後左右の軸が反転しているので、その場合だけ符号を反転する
          track.values.map((v, i) => (vrm.meta?.metaVersion === '0' && i % 2 === 0 ? -v : v)),
        ));
      } else if (track instanceof THREE.VectorKeyframeTrack) {
        const values = track.values.map(
          (v, i) => (vrm.meta?.metaVersion === '0' && i % 3 !== 1 ? -v : v) * hipsPositionScale,
        );

        // Hipsの「位置」トラック＝歩行による前進(根本移動)が入っている部分
        if (mixamoRigName === 'mixamorigHips' && propertyName === 'position' && keepInPlace) {
          // X(左右)とZ(前後)だけ0にする。Y(上下の重心バウンス)はそのまま残すので
          // 「その場で足踏みしている」自然な動きになる
          for (let i = 0; i < values.length; i += 3) {
            values[i] = 0;
            values[i + 2] = 0;
          }
        }
        tracks.push(new THREE.VectorKeyframeTrack(`${vrmNodeName}.${propertyName}`, track.times, values));
      }
    });

    return new THREE.AnimationClip('walk', clip.duration, tracks);
  });
}

/* ====================================================================
   シーンの基本構築
   ==================================================================== */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15151f);

const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(0, 2.6, 4.4); // 少し見下ろす「3Dオーバーワールド」風の3人称視点

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// マウス/タッチでキャラクターの周りを自由に回せる、自動追従の3人称カメラ
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.1, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.12;
controls.minDistance = 1.5;
controls.maxDistance = 9;
controls.maxPolarAngle = Math.PI / 2 - 0.05; // 地面の下に潜らないように制限
controls.update();

// ライト
scene.add(new THREE.HemisphereLight(0xffffff, 0x444466, 1.3));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
dirLight.position.set(1, 2, 1.5);
scene.add(dirLight);

// 足元の目安になる地面とグリッド
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(2.2, 48),
  new THREE.MeshStandardMaterial({ color: 0x23233a, roughness: 1 }),
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);
scene.add(new THREE.GridHelper(4, 16, 0x4444aa, 0x2c2c44));

const clock = new THREE.Clock();
let currentVrm = null;
let mixer = null;
let actions = {}; // { 名前: AnimationAction }
let activeActionName = null;

const statusEl = document.getElementById('status');

/* ====================================================================
   ④ VRMの読み込み
   ==================================================================== */
const gltfLoader = new GLTFLoader();
gltfLoader.register((parser) => new VRMLoaderPlugin(parser));

gltfLoader.load(
  VRM_FILE_PATH,
  async (gltf) => {
    const vrm = gltf.userData.vrm;

    // 表示に不要なデータを削除して軽量化（任意・無くても動作します）
    VRMUtils.removeUnnecessaryVertices(gltf.scene);
    VRMUtils.removeUnnecessaryJoints(gltf.scene);

    // VRM0.x のモデルは正面が後ろ(-Z)を向いているため、自動で前(+Z)向きに補正する
    // VRM1.0のモデルなら何もしない（バージョンを自動判定）
    VRMUtils.rotateVRM0(vrm);

    scene.add(vrm.scene);
    currentVrm = vrm;
    statusEl.textContent = 'VRM読み込み完了。アニメーション読込中...';

    // VRMに入っている表情(Expression)の一覧をUIとコンソールに表示
    setupExpressionUI(vrm);

    // ミクサモのアニメーションを全種類読み込んでVRMに適用する
    mixer = new THREE.AnimationMixer(vrm.scene);
    try {
      const entries = Object.entries(ANIM_FILES);
      const clips = await Promise.all(
        entries.map(([, path]) => loadMixamoAnimation(path, vrm, KEEP_IN_PLACE)),
      );
      entries.forEach(([name], i) => {
        const action = mixer.clipAction(clips[i]);
        action.clampWhenFinished = true;
        actions[name] = action;
      });

      statusEl.textContent = '準備完了！WASDで移動、Zで走る、Shiftでしゃがみ、Spaceでジャンプ';
      initCharacterController(vrm);
      playAction('idle', { loop: true, fade: 0 });
    } catch (e) {
      console.error('アニメーション読み込み失敗:', e);
      statusEl.textContent = 'VRMは表示できましたが、アニメーション読込に失敗しました（コンソール参照）';
    }
  },
  (progress) => {
    if (progress.total) {
      statusEl.textContent = `VRM読み込み中... ${Math.round((progress.loaded / progress.total) * 100)}%`;
    }
  },
  (error) => {
    console.error(error);
    statusEl.textContent = 'VRMの読み込みに失敗しました。ファイル名/パスを確認してください。';
  },
);

/* ====================================================================
   ⑤ 表情(Expression) UI
   VRMに入っている表情を自動で検出してボタンを生成します。
   ボタンを押すと vrm.expressionManager.setValue(名前, 1.0) を呼びます。
   ==================================================================== */
function setupExpressionUI(vrm) {
  const listEl = document.getElementById('exprList');
  listEl.innerHTML = '';

  if (!vrm.expressionManager) {
    listEl.textContent = 'このVRMには表情(Expression)が設定されていません';
    return;
  }

  // このVRMが持つ全表情名（プリセット＋VRoidStudio等で作ったカスタム表情）
  const names = Object.keys(vrm.expressionManager.expressionMap);
  console.log('このVRMが持つ表情一覧:', names);

  names.forEach((name) => {
    const btn = document.createElement('button');
    btn.className = 'expr-btn';
    btn.textContent = name;
    btn.onclick = () => {
      // 一旦すべて0にしてから、押した表情だけ1.0にする
      names.forEach((n) => vrm.expressionManager.setValue(n, 0));
      vrm.expressionManager.setValue(name, 1.0);
      document.querySelectorAll('.expr-btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
    };
    listEl.appendChild(btn);
  });

  const resetBtn = document.createElement('button');
  resetBtn.className = 'expr-btn';
  resetBtn.id = 'resetExpr';
  resetBtn.textContent = 'リセット（neutral）';
  resetBtn.onclick = () => {
    names.forEach((n) => vrm.expressionManager.setValue(n, 0));
    document.querySelectorAll('.expr-btn').forEach((b) => b.classList.remove('active'));
  };
  listEl.appendChild(resetBtn);
}

/* ====================================================================
   ⑥ キャラクターコントローラー
   W/A/S/D：移動　Z(押しっぱなし)：走る　Shift：しゃがみ切替　Space：ジャンプ
   C：（テスト用）階段アニメーションを1回再生

   「常にカメラ方向を向く」(faceCamera) がONのときは、
     どの移動キーでもキャラクターは常にカメラが向いている方向(=画面奥)を向き、
     前進/後退/左右ストレイフ用の専用アニメーションで移動方向だけを表現します。
   OFFのときは、キャラクター自身がコードで移動方向へ向き直ってから
     通常の前進アニメーション(Walking/Running/Crouched Walking)を再生します。
   ==================================================================== */
let faceCamera = true;
const faceCameraToggleEl = document.getElementById('faceCameraToggle');
faceCameraToggleEl.addEventListener('change', () => {
  faceCamera = faceCameraToggleEl.checked;
});

const keys = { w: false, a: false, s: false, d: false, z: false };
let crouching = false;
let turning = false;
let activeDirKey = null; // 直前に確定した移動方向キー ('w'|'a'|'s'|'d'|null)
let vState = null;       // null | 'jump' | 'falling' | 'landing'
let vy = 0;

const OPPOSITE = { w: 's', s: 'w', a: 'd', d: 'a' };

window.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (['w', 'a', 's', 'd', 'z'].includes(k)) {
    keys[k] = true;
    e.preventDefault();
  } else if (k === ' ') {
    e.preventDefault();
    if (!e.repeat) tryJump();
  } else if (k === 'shift') {
    if (!e.repeat) toggleCrouch();
  } else if (k === 'c') {
    if (!e.repeat) tryStairs();
  }
});

window.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if (['w', 'a', 's', 'd', 'z'].includes(k)) keys[k] = false;
});

function playAction(name, { loop = true, fade = 0.2, timeScale = 1, onFinish = null } = {}) {
  const action = actions[name];
  if (!action) return;

  if (activeActionName === name && loop) {
    action.timeScale = timeScale;
    return;
  }

  action.reset();
  action.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, Infinity);
  action.clampWhenFinished = !loop;
  action.timeScale = timeScale;
  if (timeScale < 0) action.time = action.getClip().duration; // 逆再生は終端から開始
  action.enabled = true;
  action.fadeIn(fade);
  action.play();

  if (activeActionName && actions[activeActionName] && activeActionName !== name) {
    actions[activeActionName].fadeOut(fade);
  }
  activeActionName = name;

  if (!loop) {
    const handler = (ev) => {
      if (ev.action === action) {
        mixer.removeEventListener('finished', handler);
        if (onFinish) onFinish();
      }
    };
    mixer.addEventListener('finished', handler);
  }
}

function toggleCrouch() {
  if (vState || turning) return;
  crouching = !crouching;
  activeDirKey = null; // 次フレームで状態を再評価させる
  playAction(crouching ? 'crouchIdle' : 'idle', { loop: true });
}

function tryJump() {
  if (vState || turning) return;
  vState = 'jump';
  vy = JUMP_SPEED;
  playAction('jump', {
    loop: false,
    fade: 0.1,
    onFinish: () => {
      if (vState === 'jump') {
        vState = 'falling';
        playAction('fallIdle', { loop: true, fade: 0.15 });
      }
    },
  });
}

function tryStairs() {
  if (vState || turning) return;
  activeDirKey = null;
  playAction('stairs', {
    loop: false,
    fade: 0.15,
    onFinish: () => playAction(crouching ? 'crouchIdle' : 'idle', { loop: true }),
  });
}

function computeDirKey() {
  if (keys.w) return 'w';
  if (keys.s) return 's';
  if (keys.a) return 'a';
  if (keys.d) return 'd';
  return null;
}

function playClipForDir(dirKey) {
  const running = keys.z;

  if (crouching) {
    if (dirKey === 'w') playAction('crouchWalk', { loop: true });
    else if (dirKey === 's') {
      if (faceCamera) playAction('crouchWalk', { loop: true, timeScale: -1 });
      else playAction('crouchWalk', { loop: true });
    } else if (dirKey === 'a') {
      if (faceCamera) playAction('crouchSneakLeft', { loop: true });
      else playAction('crouchWalk', { loop: true });
    } else if (dirKey === 'd') {
      if (faceCamera) playAction('crouchSneakRight', { loop: true });
      else playAction('crouchWalk', { loop: true });
    }
    return;
  }

  if (running) {
    if (dirKey === 'w') playAction('run', { loop: true });
    else if (dirKey === 's') playAction(faceCamera ? 'runBack' : 'run', { loop: true });
    else if (dirKey === 'a') playAction(faceCamera ? 'strafeLeftRun' : 'run', { loop: true });
    else if (dirKey === 'd') playAction(faceCamera ? 'strafeRightRun' : 'run', { loop: true });
  } else {
    if (dirKey === 'w') playAction('walk', { loop: true });
    else if (dirKey === 's') playAction(faceCamera ? 'walkBack' : 'walk', { loop: true });
    else if (dirKey === 'a') playAction(faceCamera ? 'strafeLeftWalk' : 'walk', { loop: true });
    else if (dirKey === 'd') playAction(faceCamera ? 'strafeRightWalk' : 'walk', { loop: true });
  }
}

// カメラの水平(XZ)方向の「前」「右」ベクトルを求める
function getCameraBasis() {
  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();
  const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();
  return { forward, right };
}

function updateAirborne(vrmRoot, delta) {
  vy -= GRAVITY * delta;
  vrmRoot.scene.position.y += vy * delta;
  if (vState !== 'jump' && vrmRoot.scene.position.y <= 0) {
    vrmRoot.scene.position.y = 0; // ジャンプ終了後は強制的に地面の高さへ着地させる
    vy = 0;
    vState = 'landing';
    playAction('fallLanding', {
      loop: false,
      fade: 0.1,
      onFinish: () => {
        vState = null;
        activeDirKey = null;
      },
    });
  }
}

function updateLocomotion(vrmRoot, delta) {
  if (vState) {
    updateAirborne(vrmRoot, delta);
    return;
  }
  if (turning) return; // ターンアニメーションの完了待ち

  const { forward, right } = getCameraBasis();
  const camYaw = Math.atan2(forward.x, forward.z);

  // 「常にカメラ方向を向く」ON時は、移動の有無にかかわらず常にカメラの向きへ同期
  if (faceCamera) {
    vrmRoot.scene.rotation.y = camYaw;
  }

  const dirKey = computeDirKey();

  if (dirKey === null) {
    if (activeDirKey !== null) {
      activeDirKey = null;
      playAction(crouching ? 'crouchIdle' : 'idle', { loop: true });
    }
    return;
  }

  // OFFモードでは、移動中に正反対のキーへ切り替えたら一度ターンアニメーションを挟む
  if (!faceCamera && !crouching && activeDirKey && OPPOSITE[activeDirKey] === dirKey) {
    turning = true;
    const turnClip = keys.z ? 'runTurn180' : 'walkTurn180';
    playAction(turnClip, {
      loop: false,
      fade: 0.1,
      onFinish: () => {
        turning = false;
        activeDirKey = null; // 次フレームで向き直しとアニメーション選択をやり直す
      },
    });
    return;
  }

  if (activeDirKey !== dirKey) {
    activeDirKey = dirKey;

    if (!faceCamera) {
      // OFFモード：コードでその場の移動方向へ向きを変える
      let yaw = camYaw;
      if (dirKey === 's') yaw = camYaw + Math.PI;
      else if (dirKey === 'a') yaw = camYaw - Math.PI / 2;
      else if (dirKey === 'd') yaw = camYaw + Math.PI / 2;
      vrmRoot.scene.rotation.y = yaw;
    }

    playClipForDir(dirKey);
  }

  // 実際の移動（アニメーション自体はその場で足踏みするだけなので、ここで位置を進める）
  let dirVec;
  if (dirKey === 'w') dirVec = forward;
  else if (dirKey === 's') dirVec = forward.clone().negate();
  else if (dirKey === 'a') dirVec = right.clone().negate();
  else dirVec = right;

  let speed = crouching ? SPEED.crouch : keys.z ? SPEED.run : SPEED.walk;
  if (faceCamera && dirKey === 's') speed *= BACKWARD_SLOWDOWN; // 後ろ歩き/後ろ走りはONのときだけ遅く
  vrmRoot.scene.position.addScaledVector(dirVec, speed * delta);
}

function initCharacterController(vrm) {
  faceCamera = faceCameraToggleEl.checked;
}

// 3人称自動追従カメラ：キャラクターの移動にあわせてカメラごと平行移動させつつ、
// OrbitControls によるドラッグ回転／ホイールズームは引き続き有効にする
function updateFollowCamera() {
  if (!currentVrm) return;
  const targetPos = currentVrm.scene.position.clone().add(new THREE.Vector3(0, 1.1, 0));
  const shift = targetPos.clone().sub(controls.target);
  controls.target.copy(targetPos);
  camera.position.add(shift);
}

/* ====================================================================
   ウィンドウリサイズ対応
   ==================================================================== */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ====================================================================
   メインループ
   ==================================================================== */
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  if (currentVrm) updateLocomotion(currentVrm, delta);
  updateFollowCamera();

  if (mixer) mixer.update(delta);
  if (currentVrm) currentVrm.update(delta); // 表情・ボーン・LookAt・スプリングボーン等を一括更新

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
