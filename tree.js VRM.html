<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRM Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; font-family: sans-serif; }
  canvas { display: block; }
  #info {
    position: fixed; top: 10px; left: 10px; color: #fff;
    background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 8px;
    font-size: 13px; line-height: 1.9; pointer-events: none; z-index: 10;
  }
  #expressions {
    position: fixed; top: 10px; right: 10px; color: #fff;
    background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 8px;
    font-size: 13px; z-index: 10; max-height: 90vh; overflow-y: auto; min-width: 160px;
  }
  #expressions h3 { margin-bottom: 6px; font-size: 14px; color: #adf; }
  .expr-btn {
    display: block; width: 100%; margin: 3px 0; padding: 5px 10px;
    border: none; border-radius: 5px; background: #2a2a5a; color: #fff;
    cursor: pointer; font-size: 12px; text-align: left;
  }
  .expr-btn:hover { background: #4a4ab0; }
  .expr-btn.active { background: #6060e0; }
  #anim-state {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    color: #fff; background: rgba(0,0,0,0.75); padding: 6px 18px;
    border-radius: 20px; font-size: 13px; z-index: 10; white-space: nowrap;
  }
</style>
</head>
<body>
<div id="info">
  <b>🎮 操作方法</b><br>
  ← → ↑ ↓ : カメラ回転<br>W / S : ズーム<br>
  マウスドラッグ : 視点<br>Space : 停止/再生<br>R : リセット
</div>
<div id="expressions"><h3>😊 表情一覧</h3><div id="expr-list">読み込み中...</div></div>
<div id="anim-state">読み込み中...</div>

<script type="importmap">
{
  "imports": {
    "three":             "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/":     "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.2/lib/three-vrm.module.js",
    "@pixiv/three-vrm-core": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-core@2.1.2/lib/three-vrm-core.module.js",
    "@pixiv/three-vrm-materials-v0-compat": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-materials-v0-compat@2.1.2/lib/three-vrm-materials-v0-compat.module.js",
    "@pixiv/three-vrm-node-constraint": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-node-constraint@2.1.2/lib/three-vrm-node-constraint.module.js",
    "@pixiv/three-vrm-springbone": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-springbone@2.1.2/lib/three-vrm-springbone.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { FBXLoader }     from 'three/addons/loaders/FBXLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

// ===================================================
// 【ファイル名】
// ===================================================
const VRM_FILE = 'ayame_v1.1.vrm';
const FBX_FILES = {
  walk: 'Walking.fbx',
  // idle: 'Idle.fbx',
  // run:  'Running.fbx',
};

// ===================================================
// Three.js セットアップ
// ===================================================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.01, 100);
camera.position.set(0, 1.2, 3.0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.9, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.5;
controls.maxDistance = 12;
controls.update();

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(2, 4, 3);
dirLight.castShadow = true;
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0x8899ff, 0.4);
fillLight.position.set(-2, 1, -1);
scene.add(fillLight);

const floorMesh = new THREE.Mesh(
  new THREE.CircleGeometry(5, 64),
  new THREE.MeshStandardMaterial({ color: 0x1e1e3a })
);
floorMesh.rotation.x = -Math.PI / 2;
floorMesh.receiveShadow = true;
scene.add(floorMesh);
scene.add(new THREE.GridHelper(10, 20, 0x334488, 0x223366));

let vrm = null;
const clock   = new THREE.Clock();
const stateEl = document.getElementById('anim-state');

// ===================================================
// VRM 読み込み
// ===================================================
const gltfLoader = new GLTFLoader();
gltfLoader.register(parser => new VRMLoaderPlugin(parser));

gltfLoader.load(VRM_FILE, gltf => {
  vrm = gltf.userData.vrm;
  VRMUtils.removeUnnecessaryJoints(vrm.scene);
  // VRM0: シーンをY180回転（ボーンは触らない）
  if (vrm.meta?.metaVersion === '0') vrm.scene.rotation.y = Math.PI;
  scene.add(vrm.scene);

  const box = new THREE.Box3().setFromObject(vrm.scene);
  vrm.scene.position.y = -box.min.y;
  controls.target.set(0, (box.max.y - box.min.y) * 0.5, 0);
  controls.update();

  buildExpressionUI(vrm);
  loadAllFBX(vrm);
  stateEl.textContent = 'FBX読み込み中...';
}, null, err => {
  console.error('[VRM]', err);
  stateEl.textContent = '❌ VRM失敗';
});

// ===================================================
// 表情 UI
// ===================================================
function buildExpressionUI(vrm) {
  const mgr = vrm.expressionManager;
  const el  = document.getElementById('expr-list');
  if (!mgr) { el.textContent = '表情なし'; return; }

  const names = new Set(['happy','angry','sad','relaxed','surprised',
    'aa','ih','ou','ee','oh','blink','blinkLeft','blinkRight',
    'lookUp','lookDown','lookLeft','lookRight','neutral']);
  if (mgr.expressionMap)  Object.keys(mgr.expressionMap).forEach(n => names.add(n));
  if (mgr._expressions)   Object.keys(mgr._expressions).forEach(n => names.add(n));

  const valid = [...names].filter(n => {
    try { return mgr.getExpression(n) != null; } catch { return false; }
  });

  el.innerHTML = '';
  const resetBtn = document.createElement('button');
  resetBtn.className = 'expr-btn';
  resetBtn.textContent = '😐 リセット';
  resetBtn.onclick = () => {
    valid.forEach(n => { try { mgr.setValue(n, 0); } catch {} });
    mgr.update(0);
    document.querySelectorAll('.expr-btn').forEach(b => b.classList.remove('active'));
  };
  el.appendChild(resetBtn);

  valid.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'expr-btn';
    btn.textContent = name;
    btn.onclick = () => {
      valid.forEach(n => { try { mgr.setValue(n, 0); } catch {} });
      try { mgr.setValue(name, 1.0); } catch {}
      mgr.update(0);
      document.querySelectorAll('.expr-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    el.appendChild(btn);
  });
}

// ===================================================
// Mixamo → VRM ボーン変換テーブル
// ===================================================
const MIXAMO_TO_VRM = {
  mixamorigHips:             'hips',
  mixamorigSpine:            'spine',
  mixamorigSpine1:           'chest',
  mixamorigSpine2:           'upperChest',
  mixamorigNeck:             'neck',
  mixamorigHead:             'head',
  mixamorigLeftShoulder:     'leftShoulder',
  mixamorigLeftArm:          'leftUpperArm',
  mixamorigLeftForeArm:      'leftLowerArm',
  mixamorigLeftHand:         'leftHand',
  mixamorigRightShoulder:    'rightShoulder',
  mixamorigRightArm:         'rightUpperArm',
  mixamorigRightForeArm:     'rightLowerArm',
  mixamorigRightHand:        'rightHand',
  mixamorigLeftUpLeg:        'leftUpperLeg',
  mixamorigLeftLeg:          'leftLowerLeg',
  mixamorigLeftFoot:         'leftFoot',
  mixamorigLeftToeBase:      'leftToes',
  mixamorigRightUpLeg:       'rightUpperLeg',
  mixamorigRightLeg:         'rightLowerLeg',
  mixamorigRightFoot:        'rightFoot',
  mixamorigRightToeBase:     'rightToes',
  mixamorigLeftHandThumb1:   'leftThumbMetacarpal',
  mixamorigLeftHandThumb2:   'leftThumbProximal',
  mixamorigLeftHandThumb3:   'leftThumbDistal',
  mixamorigRightHandThumb1:  'rightThumbMetacarpal',
  mixamorigRightHandThumb2:  'rightThumbProximal',
  mixamorigRightHandThumb3:  'rightThumbDistal',
  mixamorigLeftHandIndex1:   'leftIndexProximal',
  mixamorigLeftHandIndex2:   'leftIndexIntermediate',
  mixamorigLeftHandIndex3:   'leftIndexDistal',
  mixamorigRightHandIndex1:  'rightIndexProximal',
  mixamorigRightHandIndex2:  'rightIndexIntermediate',
  mixamorigRightHandIndex3:  'rightIndexDistal',
  mixamorigLeftHandMiddle1:  'leftMiddleProximal',
  mixamorigLeftHandMiddle2:  'leftMiddleIntermediate',
  mixamorigLeftHandMiddle3:  'leftMiddleDistal',
  mixamorigRightHandMiddle1: 'rightMiddleProximal',
  mixamorigRightHandMiddle2: 'rightMiddleIntermediate',
  mixamorigRightHandMiddle3: 'rightMiddleDistal',
  mixamorigLeftHandRing1:    'leftRingProximal',
  mixamorigLeftHandRing2:    'leftRingIntermediate',
  mixamorigLeftHandRing3:    'leftRingDistal',
  mixamorigRightHandRing1:   'rightRingProximal',
  mixamorigRightHandRing2:   'rightRingIntermediate',
  mixamorigRightHandRing3:   'rightRingDistal',
  mixamorigLeftHandPinky1:   'leftLittleProximal',
  mixamorigLeftHandPinky2:   'leftLittleIntermediate',
  mixamorigLeftHandPinky3:   'leftLittleDistal',
  mixamorigRightHandPinky1:  'rightLittleProximal',
  mixamorigRightHandPinky2:  'rightLittleIntermediate',
  mixamorigRightHandPinky3:  'rightLittleDistal',
};

// ===================================================
// FBX 読み込み + 毎フレーム手動ポーズ適用方式
//
// AnimationMixerではなく、
// 毎フレーム FBXのボーン回転を直接VRMボーンに書き込む。
// これが最も確実な方法。
// ===================================================

// FBXのボーンを毎フレーム参照するためのマップ
// { vrmBoneKey: FBXボーンObject3D }
let fbxBoneMap = {};
let fbxMixer   = null;  // FBX自身のアニメを動かすミキサー
let fbxRoot    = null;  // FBXのルートオブジェクト

// VRM0の座標系補正用クォータニオン
const Y180 = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, Math.PI, 0));
const Y180inv = Y180.clone().invert();

function loadAllFBX(vrm) {
  const fbxLoader = new FBXLoader();
  const entries   = Object.entries(FBX_FILES);
  // まず walk だけ読む（複数対応は後で）
  const [key, file] = entries[0];

  fbxLoader.load(file, fbx => {
    fbxRoot = fbx;
    fbxRoot.visible = false; // FBXは非表示（ポーズデータだけ使う）
    scene.add(fbxRoot);

    // FBXのボーンをマップ化
    const tempMap = {};
    fbxRoot.traverse(o => {
      if (o.isBone) tempMap[o.name] = o;
    });

    // VRMキー → FBXボーン のマップを作る
    fbxBoneMap = {};
    Object.entries(MIXAMO_TO_VRM).forEach(([fbxName, vrmKey]) => {
      if (tempMap[fbxName]) fbxBoneMap[vrmKey] = tempMap[fbxName];
    });
    console.log('[FBX] ボーンマップ作成:', Object.keys(fbxBoneMap).length, '件');

    // FBX自身のアニメをFBXに対して再生
    fbxMixer = new THREE.AnimationMixer(fbxRoot);
    let bestClip = fbx.animations[0];
    fbx.animations.forEach(c => { if (c.duration > bestClip.duration) bestClip = c; });
    const action = fbxMixer.clipAction(bestClip);
    action.play();
    console.log('[FBX] 再生開始:', bestClip.name, bestClip.duration.toFixed(2)+'s');

    stateEl.textContent = '✓ 再生中  Space=停止/再生';
  }, null, err => {
    console.error('[FBX]', err);
    stateEl.textContent = '❌ FBX失敗';
  });
}

// ===================================================
// 毎フレーム: FBXのボーン姿勢をVRMに転写
// ===================================================
function applyFBXPoseToVRM(vrm) {
  if (!fbxBoneMap || !vrm) return;

  const humanBones = vrm.humanoid.humanBones;
  const _q = new THREE.Quaternion();
  const isVRM0 = vrm.meta?.metaVersion === '0';

  Object.entries(fbxBoneMap).forEach(([vrmKey, fbxBone]) => {
    const b    = humanBones[vrmKey];
    const node = b?.node ?? b;
    if (!node) return;

    // FBXボーンの現在のワールドクォータニオンを取得
    fbxBone.getWorldQuaternion(_q);

    // FBXのワールド回転 → ローカル回転に変換
    // FBXの親のワールドクォータニオンの逆を掛ける
    if (fbxBone.parent && fbxBone.parent.isBone) {
      const parentQ = new THREE.Quaternion();
      fbxBone.parent.getWorldQuaternion(parentQ);
      _q.premultiply(parentQ.invert());
    }

    // VRM0の場合、Hipsだけ座標系補正
    if (isVRM0 && vrmKey === 'hips') {
      _q.premultiply(Y180inv);
    }

    node.quaternion.copy(_q);
  });
}

// ===================================================
// アニメ制御
// ===================================================
let isPlaying = true;

function stopAnim() {
  if (fbxMixer) fbxMixer.timeScale = 0;
  isPlaying = false;
  stateEl.textContent = '⏹ 停止';
}

function resumeAnim() {
  if (fbxMixer) fbxMixer.timeScale = 1;
  isPlaying = true;
  stateEl.textContent = '▶ 再生中';
}

// ===================================================
// キーボード
// ===================================================
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  switch (e.key) {
    case ' ':
      isPlaying ? stopAnim() : resumeAnim();
      e.preventDefault(); break;
    case 'r': case 'R':
      camera.position.set(0, 1.2, 3.0);
      controls.target.set(0, 0.9, 0);
      controls.update(); break;
  }
});
window.addEventListener('keyup', e => { delete keys[e.key]; });

function handleKeyCamera() {
  const sph = new THREE.Spherical().setFromVector3(
    camera.position.clone().sub(controls.target)
  );
  let moved = false;
  const r = 0.03, z = 0.07;
  if (keys['ArrowLeft'])  { sph.theta -= r; moved = true; }
  if (keys['ArrowRight']) { sph.theta += r; moved = true; }
  if (keys['ArrowUp'])    { sph.phi   -= r; moved = true; }
  if (keys['ArrowDown'])  { sph.phi   += r; moved = true; }
  if (keys['w']||keys['W']) { sph.radius -= z; moved = true; }
  if (keys['s']||keys['S']) { sph.radius += z; moved = true; }
  if (!moved) return;
  sph.phi    = THREE.MathUtils.clamp(sph.phi, 0.05, Math.PI - 0.05);
  sph.radius = THREE.MathUtils.clamp(sph.radius, 0.5, 12);
  camera.position.setFromSpherical(sph).add(controls.target);
}

// ===================================================
// メインループ
// ===================================================
(function loop() {
  requestAnimationFrame(loop);
  const dt = clock.getDelta();
  handleKeyCamera();
  controls.update();

  // FBXミキサーを更新（FBXのボーンが動く）
  if (fbxMixer) fbxMixer.update(dt);

  // FBXのポーズをVRMに転写
  if (vrm && fbxBoneMap && Object.keys(fbxBoneMap).length > 0) {
    applyFBXPoseToVRM(vrm);
  }

  // VRMの更新（表情・スプリングボーン等）
  if (vrm) vrm.update(dt);

  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
