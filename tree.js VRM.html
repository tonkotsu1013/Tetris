<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VRM Viewer</title>
    <style>body { margin: 0; overflow: hidden; }</style>
</head>
<body>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.0.0/lib/three-vrm.module.js"
      }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRM, VRMUtils } from '@pixiv/three-vrm';

        // --- シーン構築 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.5, 3);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        const light = new THREE.DirectionalLight(0xffffff, 3);
        light.position.set(1, 1, 1);
        scene.add(light);

        // --- VRMとアニメーションの読み込み ---
        let currentVrm = null;
        const loader = new GLTFLoader();

        // 1. VRMモデルの読み込み
        loader.load('ayame_v1.1.vrm', (gltf) => {
            VRMUtils.removeUnnecessaryJoints(gltf.scene);
            VRM.from(gltf).then((vrm) => {
                currentVrm = vrm;
                scene.add(vrm.scene);
                
                // 表情の確認用（デバッグログ）
                console.log("表情プリセット:", vrm.expressionManager.expressionNames);
                // 例: vrm.expressionManager.setValue('happy', 1.0); // 表情変更方法

                // 2. アニメーションの読み込み
                loader.load('Walking.fbx', (fbx) => {
                    const mixer = new THREE.AnimationMixer(vrm.scene);
                    const action = mixer.clipAction(fbx.animations[0]);
                    action.play();
                    
                    // レンダリングループ内でmixer.updateを呼ぶ
                    const clock = new THREE.Clock();
                    function animate() {
                        requestAnimationFrame(animate);
                        mixer.update(clock.getDelta());
                        controls.update();
                        renderer.render(scene, camera);
                    }
                    animate();
                });
            });
        });
    </script>
</body>
</html>
