<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VRM Viewer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #15151f;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  #canvas-container { position: fixed; inset: 0; }

  #ui {
    position: fixed;
    top: 12px;
    left: 12px;
    color: #fff;
    background: rgba(0, 0, 0, 0.55);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.7;
    max-width: 280px;
    pointer-events: none;
  }
  #ui h1 { margin: 0 0 6px; font-size: 15px; }
  #status { color: #8be9fd; }

  #expressions {
    position: fixed;
    top: 12px;
    right: 12px;
    max-width: 230px;
    max-height: 80vh;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.55);
    color: #fff;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 12px;
  }
  #expressions h2 { margin: 0 0 8px; font-size: 13px; }
  .expr-btn {
    display: block;
    width: 100%;
    margin: 3px 0;
    padding: 6px 8px;
    border: none;
    border-radius: 6px;
    background: #2e2e4d;
    color: #fff;
    cursor: pointer;
    font-size: 12px;
    text-align: left;
  }
  .expr-btn:hover { background: #45457a; }
  .expr-btn.active { background: #5b6cff; }
  #resetExpr { margin-top: 8px; background: #553333; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui">
  <h1>VRM Viewer</h1>
  <div id="status">読み込み中...</div>
  <div>ドラッグ：視点回転 / ホイール：ズーム（カメラは自動追従）</div>
  <div>W/A/S/D：歩く（A/Sは設定で挙動が変化）</div>
  <div>Z＋WASD：走る　/　Shift：しゃがみ　/　Space：ジャンプ</div>
  <label style="display:flex; align-items:center; gap:6px; margin-top:6px; pointer-events:auto;">
    <input type="checkbox" id="faceDirToggle" checked />
    移動方向に体を向ける（視点方向を向く）
  </label>
</div>

<div id="expressions">
  <h2>表情一覧（VRMから自動検出）</h2>
  <div id="exprList">VRM読み込み後に表示されます</div>
</div>

<!--
  ====================================================================
  importmap: three.js / three-vrm / addons をCDN(jsdelivr)から読み込む設定。
  バージョンを変えたい場合はここの数字を変更してください。
  ====================================================================
-->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

/* ====================================================================
   ① ファイル名はここで指定します
   index.html と「同じフォルダ」に以下のファイルを置いてください。
   サブフォルダに入れた場合はパスを './models/xxx.vrm' のように直してください。
   ==================================================================== */
const VRM_FILE_PATH = './ayame_v1.1.vrm';     // ← VRMファイル名

// ここに使用するミクサモ(Mixamo)のFBXファイル名をすべて指定します。
// すべて同じフォルダに置いてください。ファイル名が違う場合はここを書き換えてください。
const ANIM_FILES = {
  idle:            'Standard Idle.fbx',
  walk:            'Woking.fbx',
  walkBack:        'Walking Backwards.fbx',
  walkTurn180:     'Walking Turn 180.fbx',
  strafeLeftWalk:  'Left Strafe Walking.fbx',
  strafeRightWalk: 'Right Strafe Walking.fbx',
  run:             'Running.fbx',
  runBack:         'Running Backwards.fbx',
  runTurn180:      'Running Turn 180.fbx',
  strafeLeftRun:   'Left Strafe.fbx',
  strafeRightRun:  'Right Strafe.fbx',
  crouchIdle:      'Male Crouch Pose.fbx',
  crouchWalk:      'Crouched Walking.fbx',
  crouchSneakLeft: 'Crouched Sneaking Left.fbx',
  crouchSneakRight:'Crouched Sneaking Right.fbx',
  jump:            'Jumping.fbx',
  fallIdle:        'Falling Idle.fbx',
  fallLand:        'Falling to Landing.fbx',
  stairsUp:        'Ascending Stairs.fbx',
};

// 移動速度 (m/秒)。後ろ歩き・後ろ走りは少し遅くしてあります。
const SPEED = {
  walk: 1.3, walkBack: 0.8, strafeWalk: 1.1,
  run: 3.4, runBack: 1.8, strafeRun: 2.6,
  crouch: 0.7, crouchBack: 0.6,
};

const KEEP_IN_PLACE = true; // すべてのアニメーションをその場再生にし、移動はコード側(SPEED)で行う

/* ====================================================================
   ② Mixamo → VRM ボーン名 対応表
   ミクサモのリグ名 (mixamorigXXX) は VRM の Humanoid ボーン名と
   名前も階層も違うため、この対応表で1本ずつ紐づけてから動かします。
   （pixiv公式 three-vrm のサンプルで使われている対応表と同じものです）
   ==================================================================== */
const mixamoVRMRigMap = {
  mixamorigHips: 'hips',
  mixamorigSpine: 'spine',
  mixamorigSpine1: 'chest',
  mixamorigSpine2: 'upperChest',
  mixamorigNeck: 'neck',
  mixamorigHead: 'head',
  mixamorigLeftShoulder: 'leftShoulder',
  mixamorigLeftArm: 'leftUpperArm',
  mixamorigLeftForeArm: 'leftLowerArm',
  mixamorigLeftHand: 'leftHand',
  mixamorigLeftHandThumb1: 'leftThumbMetacarpal',
  mixamorigLeftHandThumb2: 'leftThumbProximal',
  mixamorigLeftHandThumb3: 'leftThumbDistal',
  mixamorigLeftHandIndex1: 'leftIndexProximal',
  mixamorigLeftHandIndex2: 'leftIndexIntermediate',
  mixamorigLeftHandIndex3: 'leftIndexDistal',
  mixamorigLeftHandMiddle1: 'leftMiddleProximal',
  mixamorigLeftHandMiddle2: 'leftMiddleIntermediate',
  mixamorigLeftHandMiddle3: 'leftMiddleDistal',
  mixamorigLeftHandRing1: 'leftRingProximal',
  mixamorigLeftHandRing2: 'leftRingIntermediate',
  mixamorigLeftHandRing3: 'leftRingDistal',
  mixamorigLeftHandPinky1: 'leftLittleProximal',
  mixamorigLeftHandPinky2: 'leftLittleIntermediate',
  mixamorigLeftHandPinky3: 'leftLittleDistal',
  mixamorigRightShoulder: 'rightShoulder',
  mixamorigRightArm: 'rightUpperArm',
  mixamorigRightForeArm: 'rightLowerArm',
  mixamorigRightHand: 'rightHand',
  mixamorigRightHandPinky1: 'rightLittleProximal',
  mixamorigRightHandPinky2: 'rightLittleIntermediate',
  mixamorigRightHandPinky3: 'rightLittleDistal',
  mixamorigRightHandRing1: 'rightRingProximal',
  mixamorigRightHandRing2: 'rightRingIntermediate',
  mixamorigRightHandRing3: 'rightRingDistal',
  mixamorigRightHandMiddle1: 'rightMiddleProximal',
  mixamorigRightHandMiddle2: 'rightMiddleIntermediate',
  mixamorigRightHandMiddle3: 'rightMiddleDistal',
  mixamorigRightHandIndex1: 'rightIndexProximal',
  mixamorigRightHandIndex2: 'rightIndexIntermediate',
  mixamorigRightHandIndex3: 'rightIndexDistal',
  mixamorigRightHandThumb1: 'rightThumbMetacarpal',
  mixamorigRightHandThumb2: 'rightThumbProximal',
  mixamorigRightHandThumb3: 'rightThumbDistal',
  mixamorigLeftUpLeg: 'leftUpperLeg',
  mixamorigLeftLeg: 'leftLowerLeg',
  mixamorigLeftFoot: 'leftFoot',
  mixamorigLeftToeBase: 'leftToes',
  mixamorigRightUpLeg: 'rightUpperLeg',
  mixamorigRightLeg: 'rightLowerLeg',
  mixamorigRightFoot: 'rightFoot',
  mixamorigRightToeBase: 'rightToes',
};

/* ====================================================================
   ③ ミクサモのFBXアニメーションを VRM 用 AnimationClip に変換する関数
   pixiv公式 three-vrm のサンプル loadMixamoAnimation.js をベースに、
   「その場から動かさない」処理 (KEEP_IN_PLACE) を追加したものです。
   https://github.com/pixiv/three-vrm/tree/dev/packages/three-vrm-core/examples/humanoidAnimation
   ==================================================================== */
function loadMixamoAnimation(url, vrm, keepInPlace = true) {
  const loader = new FBXLoader();
  return loader.loadAsync(url).then((asset) => {
    // Mixamoから書き出されたFBXは、アニメーション名が "mixamo.com" になっていることが多い
    const clip = THREE.AnimationClip.findByName(asset.animations, 'mixamo.com') || asset.animations[0];
    if (!clip) throw new Error('FBXの中にアニメーションが見つかりませんでした');

    const tracks = [];
    const restRotationInverse = new THREE.Quaternion();
    const parentRestWorldRotation = new THREE.Quaternion();
    const _quatA = new THREE.Quaternion();

    // ミクサモとVRMでは腰(Hips)の高さ＝身長スケールが違うため、比率を求めて補正する
    const mixamoHipsNode = asset.getObjectByName('mixamorigHips');
    const motionHipsHeight = mixamoHipsNode.position.y;
    const vrmHipsHeight = vrm.humanoid.normalizedRestPose.hips.position[1];
    const hipsPositionScale = vrmHipsHeight / motionHipsHeight;

    clip.tracks.forEach((track) => {
      // トラック名は "mixamorigHips.quaternion" のような形式になっている
      const [mixamoRigName, propertyName] = track.name.split('.');
      const vrmBoneName = mixamoVRMRigMap[mixamoRigName];
      const vrmNodeName = vrm.humanoid?.getNormalizedBoneNode(vrmBoneName)?.name;
      const mixamoRigNode = asset.getObjectByName(mixamoRigName);

      // 対応表に無いボーン（指の一部や補助ボーンなど）は無視する
      if (vrmNodeName == null || mixamoRigNode == null) return;

      // レスト(直立)姿勢時の回転を基準に、回転の差分だけを取り出す
      mixamoRigNode.getWorldQuaternion(restRotationInverse).invert();
      mixamoRigNode.parent.getWorldQuaternion(parentRestWorldRotation);

      if (track instanceof THREE.QuaternionKeyframeTrack) {
        for (let i = 0; i < track.values.length; i += 4) {
          const flat = track.values.slice(i, i + 4);
          _quatA.fromArray(flat).premultiply(parentRestWorldRotation).multiply(restRotationInverse).toArray(flat);
          flat.forEach((v, idx) => (track.values[idx + i] = v));
        }
        tracks.push(new THREE.QuaternionKeyframeTrack(
          `${vrmNodeName}.${propertyName}`,
          track.times,
          // VRM0.0モデルは前後左右の軸が反転しているので、その場合だけ符号を反転する
          track.values.map((v, i) => (vrm.meta?.metaVersion === '0' && i % 2 === 0 ? -v : v)),
        ));
      } else if (track instanceof THREE.VectorKeyframeTrack) {
        const values = track.values.map(
          (v, i) => (vrm.meta?.metaVersion === '0' && i % 3 !== 1 ? -v : v) * hipsPositionScale,
        );

        // Hipsの「位置」トラック＝歩行による前進(根本移動)が入っている部分
        if (mixamoRigName === 'mixamorigHips' && propertyName === 'position' && keepInPlace) {
          // X(左右)とZ(前後)だけ0にする。Y(上下の重心バウンス)はそのまま残すので
          // 「その場で足踏みしている」自然な動きになる
          for (let i = 0; i < values.length; i += 3) {
            values[i] = 0;
            values[i + 2] = 0;
          }
        }
        tracks.push(new THREE.VectorKeyframeTrack(`${vrmNodeName}.${propertyName}`, track.times, values));
      }
    });

    return new THREE.AnimationClip('walk', clip.duration, tracks);
  });
}

/* ====================================================================
   シーンの基本構築
   ==================================================================== */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15151f);

const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(0, 1.4, 3.2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// マウス/タッチで角度・距離は変えられるが、注視点(target)は毎フレーム
// キャラクターの位置に自動追従させる（3人称オートフォローカメラ）
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.12;
controls.minDistance = 1.5;
controls.maxDistance = 9;
// 「3Dオーバーワールド」っぽい、見下ろし気味の角度に制限する
controls.minPolarAngle = THREE.MathUtils.degToRad(35);
controls.maxPolarAngle = THREE.MathUtils.degToRad(75);
controls.enablePan = false;
controls.update();

const CAMERA_HEIGHT_OFFSET = new THREE.Vector3(0, 1.1, 0); // 注視点はキャラの胸あたり

// ライト
scene.add(new THREE.HemisphereLight(0xffffff, 0x444466, 1.3));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
dirLight.position.set(1, 2, 1.5);
scene.add(dirLight);

// 足元の目安になる地面とグリッド
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(30, 48),
  new THREE.MeshStandardMaterial({ color: 0x23233a, roughness: 1 }),
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);
scene.add(new THREE.GridHelper(60, 60, 0x4444aa, 0x2c2c44));

const clock = new THREE.Clock();
let currentVrm = null;
let mixer = null;
const actions = {};      // 名前 -> THREE.AnimationAction
let currentAction = null;

const statusEl = document.getElementById('status');

/* ====================================================================
   ④ VRMの読み込み
   ==================================================================== */
const gltfLoader = new GLTFLoader();
gltfLoader.register((parser) => new VRMLoaderPlugin(parser));

gltfLoader.load(
  VRM_FILE_PATH,
  async (gltf) => {
    const vrm = gltf.userData.vrm;

    // 表示に不要なデータを削除して軽量化（任意・無くても動作します）
    VRMUtils.removeUnnecessaryVertices(gltf.scene);
    VRMUtils.removeUnnecessaryJoints(gltf.scene);

    // VRM0.x のモデルは正面が後ろ(-Z)を向いているため、自動で前(+Z)向きに補正する
    // VRM1.0のモデルなら何もしない（バージョンを自動判定）
    VRMUtils.rotateVRM0(vrm);

    scene.add(vrm.scene);
    currentVrm = vrm;
    statusEl.textContent = 'VRM読み込み完了。アニメーション読込中...';

    // VRMに入っている表情(Expression)の一覧をUIとコンソールに表示
    setupExpressionUI(vrm);

    // 用意したミクサモアニメーションをすべて読み込み、VRM用AnimationClipに変換する
    mixer = new THREE.AnimationMixer(vrm.scene);
    const names = Object.keys(ANIM_FILES);
    const results = await Promise.allSettled(
      names.map((key) => loadMixamoAnimation(`./${ANIM_FILES[key]}`, vrm, KEEP_IN_PLACE)),
    );

    const failed = [];
    results.forEach((result, i) => {
      const key = names[i];
      if (result.status === 'fulfilled') {
        const clip = result.value;
        clip.name = key;
        const action = mixer.clipAction(clip);
        actions[key] = action;
      } else {
        failed.push(`${key}(${ANIM_FILES[key]})`);
        console.error(`アニメーション読み込み失敗: ${ANIM_FILES[key]}`, result.reason);
      }
    });

    if (actions.idle) {
      currentAction = actions.idle;
      currentAction.play();
    }

    statusEl.textContent = failed.length
      ? `準備完了（一部読み込み失敗: ${failed.join(', ')}）`
      : '準備完了！W/A/S/D + Z(走る) + Shift(しゃがみ) + Space(ジャンプ)';
  },
  (progress) => {
    if (progress.total) {
      statusEl.textContent = `VRM読み込み中... ${Math.round((progress.loaded / progress.total) * 100)}%`;
    }
  },
  (error) => {
    console.error(error);
    statusEl.textContent = 'VRMの読み込みに失敗しました。ファイル名/パスを確認してください。';
  },
);

/* ====================================================================
   ⑤ 表情(Expression) UI
   VRMに入っている表情を自動で検出してボタンを生成します。
   ボタンを押すと vrm.expressionManager.setValue(名前, 1.0) を呼びます。
   ==================================================================== */
function setupExpressionUI(vrm) {
  const listEl = document.getElementById('exprList');
  listEl.innerHTML = '';

  if (!vrm.expressionManager) {
    listEl.textContent = 'このVRMには表情(Expression)が設定されていません';
    return;
  }

  // このVRMが持つ全表情名（プリセット＋VRoidStudio等で作ったカスタム表情）
  const names = Object.keys(vrm.expressionManager.expressionMap);
  console.log('このVRMが持つ表情一覧:', names);

  names.forEach((name) => {
    const btn = document.createElement('button');
    btn.className = 'expr-btn';
    btn.textContent = name;
    btn.onclick = () => {
      // 一旦すべて0にしてから、押した表情だけ1.0にする
      names.forEach((n) => vrm.expressionManager.setValue(n, 0));
      vrm.expressionManager.setValue(name, 1.0);
      document.querySelectorAll('.expr-btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
    };
    listEl.appendChild(btn);
  });

  const resetBtn = document.createElement('button');
  resetBtn.className = 'expr-btn';
  resetBtn.id = 'resetExpr';
  resetBtn.textContent = 'リセット（neutral）';
  resetBtn.onclick = () => {
    names.forEach((n) => vrm.expressionManager.setValue(n, 0));
    document.querySelectorAll('.expr-btn').forEach((b) => b.classList.remove('active'));
  };
  listEl.appendChild(resetBtn);
}

/* ====================================================================
   ⑥ 矢印キー操作
   歩行アニメーションは1つしか無いので、今は
     ↑：再生速度を上げる（早歩き＝走っているように見せる簡易演出）
     ↓：再生速度を下げる（ゆっくり歩く）
     ←→：その場で体の向きだけを回す（移動はしない）
   という形にしています。本格的に「歩く」と「走る」を別モーションで
   切り替えたい場合は、Running.fbx 等を用意して上の拡張例のように
   crossFadeTo で別アクションへ切り替えてください。
   ==================================================================== */
/* ====================================================================
   ⑥ キャラクター操作（状態遷移）
   ====================================================================
   キー: W/A/S/D = 歩く, Z = 走る(WASDと同時押し), Shift = しゃがみ切替,
         Space = ジャンプ
   設定: 「移動方向に体を向ける」チェックボックス = faceDir
     ON  時: A/D は体の向きを変えずに横歩き(ストレイフ)アニメーションで移動
              S  は体の向きを変えずに後ろ歩き/後ろ走りアニメーションで移動
              （後ろ歩きは速度を落とす）
     OFF 時: A/D はコードで瞬時に体を左右に向けてから通常の前進アニメーションで移動
              S  は（歩行/走行中は）180度ターンアニメーションを1回再生してから
                  通常の前進アニメーションで移動（速度は落とさない）
   歩行/走行中に逆方向のキーを押すと Turn180 アニメーションを挟んで反転する。
   ==================================================================== */
const pressedKeys = new Set();
let faceDir = true; // 「移動方向に体を向ける」設定（チェックボックスと連動）
const faceDirToggle = document.getElementById('faceDirToggle');
faceDirToggle.addEventListener('change', () => { faceDir = faceDirToggle.checked; });

let isCrouching = false;
let isTurning = false;       // Turn180などの単発アニメーション再生中フラグ
let lastForwardKey = null;   // 直近の前後移動キー('w' か 's')。反転検知に使用
let lockedFacingDir = null;  // faceDir=ON時、A/D/Sストレイフ移動で使う「移動方向ベクトル」キャッシュ用

// ジャンプ／落下関連
let verticalVelocity = 0;
let isAirborne = false;       // ジャンプ中 or 落下中
let isJumpRising = false;     // Jumping.fbx(上昇)再生中
const GROUND_Y = 0;
const GRAVITY = 9.8;
const JUMP_SPEED = 3.2;

const trackedKeys = ['w', 'a', 's', 'd', 'z', 'shift', ' '];

window.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (!trackedKeys.includes(k)) return;
  e.preventDefault();

  const isNewPress = !pressedKeys.has(k);
  pressedKeys.add(k);

  // しゃがみのトグル（押すたびに切り替え。空中では不可）
  if (k === 'shift' && isNewPress && !isAirborne) {
    isCrouching = !isCrouching;
  }

  // ジャンプ（地上にいる時だけ開始できる）
  if (k === ' ' && isNewPress && !isAirborne) {
    startJump();
  }

  // 歩行/走行中に逆方向キーが新たに押されたら Turn180 を挟む
  if (isNewPress && (k === 'w' || k === 's') && !isCrouching && !isAirborne) {
    if (lastForwardKey && lastForwardKey !== k) {
      triggerTurn180();
    }
    lastForwardKey = k;
  }
});

window.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  pressedKeys.delete(k);
  if (k === lastForwardKey) lastForwardKey = pressedKeys.has('w') ? 'w' : pressedKeys.has('s') ? 's' : null;
});

function setAction(name, { loop = true, timeScale = 1, fade = 0.2 } = {}) {
  const next = actions[name];
  if (!next) return null;
  if (currentAction === next && next.isRunning() && next.getEffectiveTimeScale() === timeScale) return next;

  next.reset();
  next.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, Infinity);
  next.clampWhenFinished = !loop;
  next.setEffectiveTimeScale(timeScale);
  next.setEffectiveWeight(1);
  next.enabled = true;
  if (currentAction && currentAction !== next) {
    currentAction.crossFadeTo(next, fade, true);
  }
  next.play();
  currentAction = next;
  return next;
}

// Turn180を1回再生し、終わったら通常の前進アニメーションに戻す
function triggerTurn180() {
  if (!currentVrm) return;
  const isRunning = pressedKeys.has('z');
  const clipName = isRunning ? 'runTurn180' : 'walkTurn180';
  if (!actions[clipName]) return; // ファイルが無ければ無視

  isTurning = true;
  currentVrm.scene.rotation.y += Math.PI; // 体の向きを180度反転
  const action = setAction(clipName, { loop: false, fade: 0.15 });
  if (!action) { isTurning = false; return; }

  const onFinished = (e) => {
    if (e.action !== action) return;
    mixer.removeEventListener('finished', onFinished);
    isTurning = false;
  };
  mixer.addEventListener('finished', onFinished);
}

function startJump() {
  if (!actions.jump) return;
  isAirborne = true;
  isJumpRising = true;
  verticalVelocity = JUMP_SPEED;
  const action = setAction('jump', { loop: false, fade: 0.1 });
  if (action) {
    const onFinished = (e) => {
      if (e.action !== action) return;
      mixer.removeEventListener('finished', onFinished);
      isJumpRising = false; // 上昇モーション終了。以後は落下/着地待ち
    };
    mixer.addEventListener('finished', onFinished);
  }
}

function landJump() {
  isAirborne = false;
  isJumpRising = false;
  verticalVelocity = 0;
  // 「ジャンプが終わったら強制的に位置を着地させる」: Y座標を地面に固定する
  if (currentVrm) currentVrm.scene.position.y = GROUND_Y;
  const action = setAction('fallLand', { loop: false, fade: 0.1 });
  if (action) {
    const onFinished = (e) => {
      if (e.action !== action) return;
      mixer.removeEventListener('finished', onFinished);
    };
    mixer.addEventListener('finished', onFinished);
  }
}

// カメラの向きを基準にした「前/右」方向ベクトル(水平面)を取得
function getCameraAxes() {
  const theta = controls.getAzimuthalAngle();
  const forward = new THREE.Vector3(-Math.sin(theta), 0, -Math.cos(theta));
  const right = new THREE.Vector3(forward.z, 0, -forward.x);
  return { forward, right };
}

function faceDirection(dir) {
  if (!currentVrm || dir.lengthSq() < 1e-6) return;
  currentVrm.scene.rotation.y = Math.atan2(dir.x, dir.z);
}

function updateCharacter(delta) {
  if (!currentVrm || !mixer) return;

  // --- ジャンプ／落下の物理 ---
  if (isAirborne) {
    verticalVelocity -= GRAVITY * delta;
    currentVrm.scene.position.y += verticalVelocity * delta;
    if (!isJumpRising && currentVrm.scene.position.y <= GROUND_Y) {
      landJump();
    } else if (!isJumpRising && verticalVelocity < 0 && currentAction !== actions.fallIdle && actions.fallIdle) {
      setAction('fallIdle', { loop: true, fade: 0.2 });
    }
    return; // 空中にいる間は他の移動状態は処理しない
  }

  if (isTurning) return; // Turn180再生中は移動・他アニメ切り替えをしない

  const running = pressedKeys.has('z');
  const w = pressedKeys.has('w');
  const s = pressedKeys.has('s');
  const a = pressedKeys.has('a');
  const d = pressedKeys.has('d');
  const { forward, right } = getCameraAxes();

  let moveVec = new THREE.Vector3(0, 0, 0);
  let animKey = isCrouching ? 'crouchIdle' : 'idle';
  let timeScale = 1;

  if (isCrouching) {
    // ------------------- しゃがみ移動 -------------------
    if (w) {
      animKey = 'crouchWalk';
      faceDirection(forward);
      moveVec = forward.clone().multiplyScalar(SPEED.crouch);
    } else if (s) {
      if (faceDir) {
        animKey = 'crouchWalk';
        timeScale = -1; // 逆再生
        moveVec = forward.clone().multiplyScalar(-SPEED.crouchBack);
      } else {
        faceDirection(forward.clone().negate());
        animKey = 'crouchWalk';
        moveVec = forward.clone().negate().multiplyScalar(SPEED.crouch);
      }
    } else if (a) {
      if (faceDir && actions.crouchSneakLeft) {
        animKey = 'crouchSneakLeft';
        moveVec = right.clone().negate().multiplyScalar(SPEED.crouch);
      } else {
        faceDirection(right.clone().negate());
        animKey = 'crouchWalk';
        moveVec = right.clone().negate().multiplyScalar(SPEED.crouch);
      }
    } else if (d) {
      if (faceDir && actions.crouchSneakRight) {
        animKey = 'crouchSneakRight';
        moveVec = right.clone().multiplyScalar(SPEED.crouch);
      } else {
        faceDirection(right);
        animKey = 'crouchWalk';
        moveVec = right.clone().multiplyScalar(SPEED.crouch);
      }
    } else {
      animKey = 'crouchIdle';
    }
  } else if (w || s || a || d) {
    // ------------------- 通常/走行移動 -------------------
    const spd = running
      ? SPEED.run
      : SPEED.walk;

    if (w) {
      animKey = running ? 'run' : 'walk';
      faceDirection(forward);
      moveVec = forward.clone().multiplyScalar(spd);
    } else if (s) {
      if (faceDir) {
        animKey = running ? 'runBack' : 'walkBack';
        const backSpd = running ? SPEED.runBack : SPEED.walkBack;
        moveVec = forward.clone().multiplyScalar(-backSpd);
      } else {
        faceDirection(forward.clone().negate());
        animKey = running ? 'run' : 'walk';
        moveVec = forward.clone().negate().multiplyScalar(spd); // OFF時は速度を落とさない
      }
    } else if (a) {
      const strafeSpd = running ? SPEED.strafeRun : SPEED.strafeWalk;
      if (faceDir) {
        animKey = running ? 'strafeLeftRun' : 'strafeLeftWalk';
        moveVec = right.clone().negate().multiplyScalar(strafeSpd);
      } else {
        faceDirection(right.clone().negate());
        animKey = running ? 'run' : 'walk';
        moveVec = right.clone().negate().multiplyScalar(spd);
      }
    } else if (d) {
      const strafeSpd = running ? SPEED.strafeRun : SPEED.strafeWalk;
      if (faceDir) {
        animKey = running ? 'strafeRightRun' : 'strafeRightWalk';
        moveVec = right.clone().multiplyScalar(strafeSpd);
      } else {
        faceDirection(right);
        animKey = running ? 'run' : 'walk';
        moveVec = right.clone().multiplyScalar(spd);
      }
    }
  }

  // アクションが無ければ(ファイル未読込)、フォールバックとしてidleを使う
  if (!actions[animKey]) animKey = actions.idle ? 'idle' : animKey;
  setAction(animKey, { loop: true, timeScale });

  currentVrm.scene.position.addScaledVector(moveVec, delta);
}

// カメラの注視点をキャラクターに自動追従させる
function updateCamera() {
  if (!currentVrm) return;
  const target = currentVrm.scene.position.clone().add(CAMERA_HEIGHT_OFFSET);
  controls.target.lerp(target, 0.18);
}

/* ====================================================================
   ウィンドウリサイズ対応
   ==================================================================== */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ====================================================================
   メインループ
   ==================================================================== */
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  updateCharacter(delta);
  updateCamera();

  if (mixer) mixer.update(delta);
  if (currentVrm) currentVrm.update(delta); // 表情・ボーン・LookAt・スプリングボーン等を一括更新

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
