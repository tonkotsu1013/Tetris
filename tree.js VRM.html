<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VRM Viewer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #15151f;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  #canvas-container { position: fixed; inset: 0; }

  #ui {
    position: fixed;
    top: 12px;
    left: 12px;
    color: #fff;
    background: rgba(0, 0, 0, 0.55);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.7;
    max-width: 280px;
    pointer-events: none;
  }
  #ui h1 { margin: 0 0 6px; font-size: 15px; }
  #status { color: #8be9fd; }

  #expressions {
    position: fixed;
    top: 12px;
    right: 12px;
    max-width: 230px;
    max-height: 80vh;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.55);
    color: #fff;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 12px;
  }
  #expressions h2 { margin: 0 0 8px; font-size: 13px; }
  .expr-btn {
    display: block;
    width: 100%;
    margin: 3px 0;
    padding: 6px 8px;
    border: none;
    border-radius: 6px;
    background: #2e2e4d;
    color: #fff;
    cursor: pointer;
    font-size: 12px;
    text-align: left;
  }
  .expr-btn:hover { background: #45457a; }
  .expr-btn.active { background: #5b6cff; }
  #resetExpr { margin-top: 8px; background: #553333; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui">
  <h1>VRM Viewer</h1>
  <div id="status">読み込み中...</div>
  <div>ドラッグ：視点回転 / ホイール：ズーム</div>
  <div>↑：早歩き　↓：ゆっくり</div>
  <div>←→：その場で向きを変える</div>
</div>

<div id="expressions">
  <h2>表情一覧（VRMから自動検出）</h2>
  <div id="exprList">VRM読み込み後に表示されます</div>
</div>

<!-- ====================================================================
     拡張: 3人称キャラクターコントローラー用 UI
     （既存の #ui / #expressions ブロックには手を加えていません）
     ==================================================================== -->
<div id="ctrl-ui">
  <h2>移動コントローラー</h2>
  <label class="ctrl-row">
    <input type="checkbox" id="lookAtCameraDirToggle" checked />
    視点方向を向く (LookAtCameraDir)
  </label>
  <div class="ctrl-row" id="ctrl-status">状態: -</div>
  <div class="ctrl-row ctrl-help">
    W/A/S/D：移動　Z(押しっぱなし)：走る<br/>
    Shift：しゃがみ切替　Space：ジャンプ<br/>
    X：階段モード切替（デバッグ用トグル）
  </div>
</div>
<style>
  #ctrl-ui {
    position: fixed;
    bottom: 12px;
    left: 12px;
    color: #fff;
    background: rgba(0, 0, 0, 0.55);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.6;
    max-width: 300px;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  #ctrl-ui h2 { margin: 0 0 6px; font-size: 13px; }
  #ctrl-ui .ctrl-row { margin: 4px 0; }
  #ctrl-ui .ctrl-help { color: #b8b8d8; font-size: 11px; }
  #ctrl-ui input[type="checkbox"] { vertical-align: middle; margin-right: 6px; }
</style>

<!--
  ====================================================================
  importmap: three.js / three-vrm / addons をCDN(jsdelivr)から読み込む設定。
  バージョンを変えたい場合はここの数字を変更してください。
  ====================================================================
-->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

/* ====================================================================
   ① ファイル名はここで指定します
   index.html と「同じフォルダ」に以下のファイルを置いてください。
   サブフォルダに入れた場合はパスを './models/xxx.vrm' のように直してください。
   ==================================================================== */
const VRM_FILE_PATH = './ayame_v1.1.vrm';     // ← VRMファイル名
const WALK_ANIMATION_PATH = './Walking.fbx';  // ← ミクサモ(Mixamo)の歩行アニメーション(FBX)

// 走る/アイドルなど別のモーションを追加したい場合は、ここに増やして
// 下の「複数アニメーションを使う場合の拡張例」を参考に組み込んでください。
// const RUN_ANIMATION_PATH = './Running.fbx';
// const IDLE_ANIMATION_PATH = './Idle.fbx';

const KEEP_IN_PLACE = true; // true: その場で足踏み（移動しない） / false: 実際に前進してしまう

/* ====================================================================
   ② Mixamo → VRM ボーン名 対応表
   ミクサモのリグ名 (mixamorigXXX) は VRM の Humanoid ボーン名と
   名前も階層も違うため、この対応表で1本ずつ紐づけてから動かします。
   （pixiv公式 three-vrm のサンプルで使われている対応表と同じものです）
   ==================================================================== */
const mixamoVRMRigMap = {
  mixamorigHips: 'hips',
  mixamorigSpine: 'spine',
  mixamorigSpine1: 'chest',
  mixamorigSpine2: 'upperChest',
  mixamorigNeck: 'neck',
  mixamorigHead: 'head',
  mixamorigLeftShoulder: 'leftShoulder',
  mixamorigLeftArm: 'leftUpperArm',
  mixamorigLeftForeArm: 'leftLowerArm',
  mixamorigLeftHand: 'leftHand',
  mixamorigLeftHandThumb1: 'leftThumbMetacarpal',
  mixamorigLeftHandThumb2: 'leftThumbProximal',
  mixamorigLeftHandThumb3: 'leftThumbDistal',
  mixamorigLeftHandIndex1: 'leftIndexProximal',
  mixamorigLeftHandIndex2: 'leftIndexIntermediate',
  mixamorigLeftHandIndex3: 'leftIndexDistal',
  mixamorigLeftHandMiddle1: 'leftMiddleProximal',
  mixamorigLeftHandMiddle2: 'leftMiddleIntermediate',
  mixamorigLeftHandMiddle3: 'leftMiddleDistal',
  mixamorigLeftHandRing1: 'leftRingProximal',
  mixamorigLeftHandRing2: 'leftRingIntermediate',
  mixamorigLeftHandRing3: 'leftRingDistal',
  mixamorigLeftHandPinky1: 'leftLittleProximal',
  mixamorigLeftHandPinky2: 'leftLittleIntermediate',
  mixamorigLeftHandPinky3: 'leftLittleDistal',
  mixamorigRightShoulder: 'rightShoulder',
  mixamorigRightArm: 'rightUpperArm',
  mixamorigRightForeArm: 'rightLowerArm',
  mixamorigRightHand: 'rightHand',
  mixamorigRightHandPinky1: 'rightLittleProximal',
  mixamorigRightHandPinky2: 'rightLittleIntermediate',
  mixamorigRightHandPinky3: 'rightLittleDistal',
  mixamorigRightHandRing1: 'rightRingProximal',
  mixamorigRightHandRing2: 'rightRingIntermediate',
  mixamorigRightHandRing3: 'rightRingDistal',
  mixamorigRightHandMiddle1: 'rightMiddleProximal',
  mixamorigRightHandMiddle2: 'rightMiddleIntermediate',
  mixamorigRightHandMiddle3: 'rightMiddleDistal',
  mixamorigRightHandIndex1: 'rightIndexProximal',
  mixamorigRightHandIndex2: 'rightIndexIntermediate',
  mixamorigRightHandIndex3: 'rightIndexDistal',
  mixamorigRightHandThumb1: 'rightThumbMetacarpal',
  mixamorigRightHandThumb2: 'rightThumbProximal',
  mixamorigRightHandThumb3: 'rightThumbDistal',
  mixamorigLeftUpLeg: 'leftUpperLeg',
  mixamorigLeftLeg: 'leftLowerLeg',
  mixamorigLeftFoot: 'leftFoot',
  mixamorigLeftToeBase: 'leftToes',
  mixamorigRightUpLeg: 'rightUpperLeg',
  mixamorigRightLeg: 'rightLowerLeg',
  mixamorigRightFoot: 'rightFoot',
  mixamorigRightToeBase: 'rightToes',
};

/* ====================================================================
   ③ ミクサモのFBXアニメーションを VRM 用 AnimationClip に変換する関数
   pixiv公式 three-vrm のサンプル loadMixamoAnimation.js をベースに、
   「その場から動かさない」処理 (KEEP_IN_PLACE) を追加したものです。
   https://github.com/pixiv/three-vrm/tree/dev/packages/three-vrm-core/examples/humanoidAnimation
   ==================================================================== */
function loadMixamoAnimation(url, vrm, keepInPlace = true) {
  const loader = new FBXLoader();
  return loader.loadAsync(url).then((asset) => {
    // Mixamoから書き出されたFBXは、アニメーション名が "mixamo.com" になっていることが多い
    const clip = THREE.AnimationClip.findByName(asset.animations, 'mixamo.com') || asset.animations[0];
    if (!clip) throw new Error('FBXの中にアニメーションが見つかりませんでした');

    const tracks = [];
    const restRotationInverse = new THREE.Quaternion();
    const parentRestWorldRotation = new THREE.Quaternion();
    const _quatA = new THREE.Quaternion();

    // ミクサモとVRMでは腰(Hips)の高さ＝身長スケールが違うため、比率を求めて補正する
    const mixamoHipsNode = asset.getObjectByName('mixamorigHips');
    const motionHipsHeight = mixamoHipsNode.position.y;
    const vrmHipsHeight = vrm.humanoid.normalizedRestPose.hips.position[1];
    const hipsPositionScale = vrmHipsHeight / motionHipsHeight;

    clip.tracks.forEach((track) => {
      // トラック名は "mixamorigHips.quaternion" のような形式になっている
      const [mixamoRigName, propertyName] = track.name.split('.');
      const vrmBoneName = mixamoVRMRigMap[mixamoRigName];
      const vrmNodeName = vrm.humanoid?.getNormalizedBoneNode(vrmBoneName)?.name;
      const mixamoRigNode = asset.getObjectByName(mixamoRigName);

      // 対応表に無いボーン（指の一部や補助ボーンなど）は無視する
      if (vrmNodeName == null || mixamoRigNode == null) return;

      // レスト(直立)姿勢時の回転を基準に、回転の差分だけを取り出す
      mixamoRigNode.getWorldQuaternion(restRotationInverse).invert();
      mixamoRigNode.parent.getWorldQuaternion(parentRestWorldRotation);

      if (track instanceof THREE.QuaternionKeyframeTrack) {
        for (let i = 0; i < track.values.length; i += 4) {
          const flat = track.values.slice(i, i + 4);
          _quatA.fromArray(flat).premultiply(parentRestWorldRotation).multiply(restRotationInverse).toArray(flat);
          flat.forEach((v, idx) => (track.values[idx + i] = v));
        }
        tracks.push(new THREE.QuaternionKeyframeTrack(
          `${vrmNodeName}.${propertyName}`,
          track.times,
          // VRM0.0モデルは前後左右の軸が反転しているので、その場合だけ符号を反転する
          track.values.map((v, i) => (vrm.meta?.metaVersion === '0' && i % 2 === 0 ? -v : v)),
        ));
      } else if (track instanceof THREE.VectorKeyframeTrack) {
        const values = track.values.map(
          (v, i) => (vrm.meta?.metaVersion === '0' && i % 3 !== 1 ? -v : v) * hipsPositionScale,
        );

        // Hipsの「位置」トラック＝歩行による前進(根本移動)が入っている部分
        if (mixamoRigName === 'mixamorigHips' && propertyName === 'position' && keepInPlace) {
          // X(左右)とZ(前後)だけ0にする。Y(上下の重心バウンス)はそのまま残すので
          // 「その場で足踏みしている」自然な動きになる
          for (let i = 0; i < values.length; i += 3) {
            values[i] = 0;
            values[i + 2] = 0;
          }
        }
        tracks.push(new THREE.VectorKeyframeTrack(`${vrmNodeName}.${propertyName}`, track.times, values));
      }
    });

    return new THREE.AnimationClip('walk', clip.duration, tracks);
  });
}

/* ====================================================================
   シーンの基本構築
   ==================================================================== */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15151f);

const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(0, 1.4, 3.2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// マウス/タッチで自由にいろんな角度から見られるようにする
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.minDistance = 0.6;
controls.maxDistance = 8;
controls.update();

// ライト
scene.add(new THREE.HemisphereLight(0xffffff, 0x444466, 1.3));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
dirLight.position.set(1, 2, 1.5);
scene.add(dirLight);

// 足元の目安になる地面とグリッド
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(2.2, 48),
  new THREE.MeshStandardMaterial({ color: 0x23233a, roughness: 1 }),
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);
scene.add(new THREE.GridHelper(4, 16, 0x4444aa, 0x2c2c44));

const clock = new THREE.Clock();
let currentVrm = null;
let mixer = null;
let walkAction = null;

const statusEl = document.getElementById('status');

/* ====================================================================
   ④ VRMの読み込み
   ==================================================================== */
const gltfLoader = new GLTFLoader();
gltfLoader.register((parser) => new VRMLoaderPlugin(parser));

gltfLoader.load(
  VRM_FILE_PATH,
  async (gltf) => {
    const vrm = gltf.userData.vrm;

    // 表示に不要なデータを削除して軽量化（任意・無くても動作します）
    VRMUtils.removeUnnecessaryVertices(gltf.scene);
    VRMUtils.removeUnnecessaryJoints(gltf.scene);

    // VRM0.x のモデルは正面が後ろ(-Z)を向いているため、自動で前(+Z)向きに補正する
    // VRM1.0のモデルなら何もしない（バージョンを自動判定）
    VRMUtils.rotateVRM0(vrm);

    scene.add(vrm.scene);
    currentVrm = vrm;
    statusEl.textContent = 'VRM読み込み完了。アニメーション読込中...';

    // VRMに入っている表情(Expression)の一覧をUIとコンソールに表示
    setupExpressionUI(vrm);

    // ミクサモのアニメーションを読み込んでVRMに適用する
    mixer = new THREE.AnimationMixer(vrm.scene);
    try {
      const walkClip = await loadMixamoAnimation(WALK_ANIMATION_PATH, vrm, KEEP_IN_PLACE);
      walkAction = mixer.clipAction(walkClip);
      walkAction.play(); // 読み込めたら自動でループ再生開始
      statusEl.textContent = '準備完了！矢印キーで速度や向きを変えられます';

      /* ----------------------------------------------------------------
         複数アニメーションを使う場合の拡張例（コメントアウト中）
         Running.fbx などを追加したら、下のようにもう1本読み込んで
         キー入力に応じて crossFadeTo で切り替えてください。
      ----------------------------------------------------------------
      const runClip = await loadMixamoAnimation('./Running.fbx', vrm, KEEP_IN_PLACE);
      const runAction = mixer.clipAction(runClip);
      // 例: ArrowUp を押した瞬間に walk → run へ0.2秒でクロスフェード
      // walkAction.crossFadeTo(runAction, 0.2, true); runAction.play();
      ---------------------------------------------------------------- */
    } catch (e) {
      console.error('アニメーション読み込み失敗:', e);
      statusEl.textContent = 'VRMは表示できましたが、アニメーション読込に失敗しました（コンソール参照）';
    }
  },
  (progress) => {
    if (progress.total) {
      statusEl.textContent = `VRM読み込み中... ${Math.round((progress.loaded / progress.total) * 100)}%`;
    }
  },
  (error) => {
    console.error(error);
    statusEl.textContent = 'VRMの読み込みに失敗しました。ファイル名/パスを確認してください。';
  },
);

/* ====================================================================
   ⑤ 表情(Expression) UI
   VRMに入っている表情を自動で検出してボタンを生成します。
   ボタンを押すと vrm.expressionManager.setValue(名前, 1.0) を呼びます。
   ==================================================================== */
function setupExpressionUI(vrm) {
  const listEl = document.getElementById('exprList');
  listEl.innerHTML = '';

  if (!vrm.expressionManager) {
    listEl.textContent = 'このVRMには表情(Expression)が設定されていません';
    return;
  }

  // このVRMが持つ全表情名（プリセット＋VRoidStudio等で作ったカスタム表情）
  const names = Object.keys(vrm.expressionManager.expressionMap);
  console.log('このVRMが持つ表情一覧:', names);

  names.forEach((name) => {
    const btn = document.createElement('button');
    btn.className = 'expr-btn';
    btn.textContent = name;
    btn.onclick = () => {
      // 一旦すべて0にしてから、押した表情だけ1.0にする
      names.forEach((n) => vrm.expressionManager.setValue(n, 0));
      vrm.expressionManager.setValue(name, 1.0);
      document.querySelectorAll('.expr-btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
    };
    listEl.appendChild(btn);
  });

  const resetBtn = document.createElement('button');
  resetBtn.className = 'expr-btn';
  resetBtn.id = 'resetExpr';
  resetBtn.textContent = 'リセット（neutral）';
  resetBtn.onclick = () => {
    names.forEach((n) => vrm.expressionManager.setValue(n, 0));
    document.querySelectorAll('.expr-btn').forEach((b) => b.classList.remove('active'));
  };
  listEl.appendChild(resetBtn);
}

/* ====================================================================
   ⑥ 矢印キー操作
   歩行アニメーションは1つしか無いので、今は
     ↑：再生速度を上げる（早歩き＝走っているように見せる簡易演出）
     ↓：再生速度を下げる（ゆっくり歩く）
     ←→：その場で体の向きだけを回す（移動はしない）
   という形にしています。本格的に「歩く」と「走る」を別モーションで
   切り替えたい場合は、Running.fbx 等を用意して上の拡張例のように
   crossFadeTo で別アクションへ切り替えてください。
   ==================================================================== */
const pressedKeys = new Set();

window.addEventListener('keydown', (e) => {
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
    pressedKeys.add(e.key);
    e.preventDefault();
  }
});

window.addEventListener('keyup', (e) => {
  pressedKeys.delete(e.key);
});

function updateInputAnimation(delta) {
  if (walkAction) {
    let targetTimeScale = 1.0;
    if (pressedKeys.has('ArrowUp')) targetTimeScale = 1.7; // 早歩き
    if (pressedKeys.has('ArrowDown')) targetTimeScale = 0.6; // ゆっくり
    walkAction.timeScale = targetTimeScale;
  }

  if (currentVrm) {
    const turnSpeed = 1.6; // rad/sec
    if (pressedKeys.has('ArrowLeft')) currentVrm.scene.rotation.y += turnSpeed * delta;
    if (pressedKeys.has('ArrowRight')) currentVrm.scene.rotation.y -= turnSpeed * delta;
  }
}

/* ====================================================================
   ⑦ 拡張: 3人称キャラクターコントローラー & アニメーション遷移
   （Animator / Animation Blueprint 相当）

   ここから下は既存のメイン処理（VRM読込・Mixamoリターゲット・表情UI等）
   には一切手を加えず、追加で組み込む拡張モジュールです。
   currentVrm / mixer / camera / controls / loadMixamoAnimation など、
   上で定義済みの変数・関数をそのまま利用します。

   ----------------------------------------------------------------
   ① 使用するFBXファイル名（仕様書の表に対応）
      index.html と同じフォルダに、以下のファイル名で配置してください。
      パスを変えたい場合は ANIM_FILES の値だけ書き換えればOKです。
   ---------------------------------------------------------------- */
const ANIM_FILES = {
  idle:          'Standard Idle.fbx',
  walk:          'Walking.fbx',
  walkBack:      'Walking Backwards.fbx',
  walkTurn180:   'Walking Turn 180.fbx',
  strafeWalkL:   'Left Strafe Walking.fbx',
  strafeWalkR:   'Right Strafe Walking.fbx',
  run:           'Running.fbx',
  runBack:       'Running Backward.fbx',
  runTurn180:    'Running Turn 180.fbx',
  strafeRunL:    'Left Strafe.fbx',
  strafeRunR:    'Right Strafe.fbx',
  crouchIdle:    'Male Crouch Pose.fbx',
  crouchWalk:    'Crouched Walking.fbx',
  crouchSneakL:  'Crouched Sneaking Left.fbx',
  crouchSneakR:  'Crouched Sneaking Right.fbx',
  stairs:        'Ascending Stairs.fbx',
  jump:          'Jumping.fbx',
  fall:          'Falling Idle.fbx',
  land:          'Falling To Landing.fbx',
};

// 1回再生（ループしない）のステート一覧
const ONE_SHOT_KEYS = new Set(['walkTurn180', 'runTurn180', 'jump', 'land']);

/* ----------------------------------------------------------------
   ② アニメーション遅延ロード＆キャッシュ
      仕様: 「ルートモーションは全てLock/Bake into Poseし、移動はコード側で
      制御する」→ loadMixamoAnimation の keepInPlace=true を必ず使うことで、
      Hipsの水平移動トラックを0にし、足踏み・その場再生のクリップとして
      キャラクターに適用する（既存の loadMixamoAnimation 関数をそのまま流用）。
   ---------------------------------------------------------------- */
class AnimationLibrary {
  constructor(vrm, mixer) {
    this.vrm = vrm;
    this.mixer = mixer;
    this.actions = {};      // key -> THREE.AnimationAction
    this.loading = {};      // key -> Promise（二重ロード防止）
  }

  async get(key) {
    if (this.actions[key]) return this.actions[key];
    if (this.loading[key]) return this.loading[key];

    const fileName = ANIM_FILES[key];
    const path = './' + fileName;

    this.loading[key] = loadMixamoAnimation(path, this.vrm, true)
      .then((clip) => {
        clip.name = key;
        const action = this.mixer.clipAction(clip);
        if (ONE_SHOT_KEYS.has(key)) {
          action.setLoop(THREE.LoopOnce, 1);
          action.clampWhenFinished = true;
        } else {
          action.setLoop(THREE.LoopRepeat, Infinity);
        }
        this.actions[key] = action;
        return action;
      })
      .catch((e) => {
        console.warn(`[AnimController] "${fileName}" の読み込みに失敗しました（このファイルが` +
          ` index.html と同じフォルダに無いか、名前が違う可能性があります）:`, e.message);
        delete this.loading[key];
        return null; // ファイルが無くてもアプリ全体は落とさない
      });

    return this.loading[key];
  }
}

/* ----------------------------------------------------------------
   ③ ステートマシン本体（Animator / Animation Blueprint 相当）
   ---------------------------------------------------------------- */
const JumpPhase = { NONE: 'NONE', JUMPING: 'JUMPING', FALLING: 'FALLING', LANDING: 'LANDING' };

class CharacterController {
  constructor(vrm, mixer, camera) {
    this.vrm = vrm;
    this.mixer = mixer;
    this.camera = camera;
    this.lib = new AnimationLibrary(vrm, mixer);

    // ---- 入力状態 ----
    this.keys = { w: false, a: false, s: false, d: false, run: false };
    this.crouching = false;
    this.onStairs = false; // 階段判定: 本来は床との衝突/レイキャストで設定する（ここではXキーでトグルできるスタブ）
    this.jumpPhase = JumpPhase.NONE;
    this.verticalVelocity = 0;

    // ---- 設定: 視点方向を向くフラグ（LookAtCameraDir） ----
    this.lookAtCameraDir = true;

    // ---- 現在のループ再生ステート ----
    this.currentKey = null;
    this.currentAction = null;
    this.turning = false; // Turn180再生中はロジックを一時停止

    // ---- パラメータ ----
    this.walkSpeed = 1.4;       // m/s
    this.runSpeed = 3.4;        // m/s
    this.crouchSpeed = 0.8;     // m/s
    this.stairSpeed = 1.0;      // m/s
    this.turnInstantThreshold = THREE.MathUtils.degToRad(150); // これ以上の方向転換ならTurn180を挟む
    this.faceLerpSpeed = 14;    // 瞬間向き変更時の補間速度(OFF時のA/D等)
    this.jumpSpeed = 4.2;       // 初速 (m/s)
    this.gravity = 11.0;        // m/s^2
    this.groundY = 0;           // 地面の高さ（床コンポーネントに合わせて調整可）

    this._bindInput();
  }

  _bindInput() {
    window.addEventListener('keydown', (e) => {
      switch (e.key.toLowerCase()) {
        case 'w': this.keys.w = true; break;
        case 's': this.keys.s = true; break;
        case 'a': this.keys.a = true; break;
        case 'd': this.keys.d = true; break;
        case 'z': this.keys.run = true; break;
        case 'shift':
          if (!e.repeat) this._toggleCrouch();
          break;
        case ' ':
          e.preventDefault();
          if (!e.repeat) this._tryJump();
          break;
        case 'x':
          if (!e.repeat) this.onStairs = !this.onStairs; // デバッグ用: 階段モードの手動トグル
          break;
      }
    });
    window.addEventListener('keyup', (e) => {
      switch (e.key.toLowerCase()) {
        case 'w': this.keys.w = false; break;
        case 's': this.keys.s = false; break;
        case 'a': this.keys.a = false; break;
        case 'd': this.keys.d = false; break;
        case 'z': this.keys.run = false; break;
      }
    });

    const toggleEl = document.getElementById('lookAtCameraDirToggle');
    if (toggleEl) {
      this.lookAtCameraDir = toggleEl.checked;
      toggleEl.addEventListener('change', () => {
        this.lookAtCameraDir = toggleEl.checked;
      });
    }
  }

  _toggleCrouch() {
    // しゃがみ中はジャンプ不可、ジャンプ/落下中はしゃがみ切替を無視
    if (this.jumpPhase !== JumpPhase.NONE) return;
    this.crouching = !this.crouching;
  }

  _tryJump() {
    if (this.jumpPhase !== JumpPhase.NONE) return;
    if (this.crouching) return; // しゃがみ中はジャンプしない
    this.jumpPhase = JumpPhase.JUMPING;
    this.verticalVelocity = this.jumpSpeed;
    this._playOneShot('jump', () => {
      // Jumping.fbx 再生終了 → 滞空(Falling Idle)ループへ
      this.jumpPhase = JumpPhase.FALLING;
      this._playLoop('fall');
    });
  }

  /* --------------------------------------------------------------
     カメラ基準の前方/右方向（水平成分のみ）を取得
     -------------------------------------------------------------- */
  _cameraBasis() {
    const forward = new THREE.Vector3();
    this.camera.getWorldDirection(forward);
    forward.y = 0;
    forward.normalize();
    const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize().multiplyScalar(-1);
    return { forward, right };
  }

  /* --------------------------------------------------------------
     再生ヘルパー
     -------------------------------------------------------------- */
  async _playLoop(key, fade = 0.2) {
    if (this.currentKey === key) return;
    const action = await this.lib.get(key);
    if (!action) return;
    const prev = this.currentAction;
    action.reset().setEffectiveWeight(1).fadeIn(fade).play();
    if (prev && prev !== action) prev.fadeOut(fade);
    this.currentKey = key;
    this.currentAction = action;
  }

  async _playOneShot(key, onFinished, fade = 0.15) {
    const action = await this.lib.get(key);
    if (!action) { if (onFinished) onFinished(); return; } // ファイルが無い場合は即座に次のステートへ
    const prev = this.currentAction;
    action.reset().setEffectiveWeight(1).fadeIn(fade).play();
    if (prev && prev !== action) prev.fadeOut(fade);
    this.currentKey = key;
    this.currentAction = action;

    const onFinishedHandler = (e) => {
      if (e.action !== action) return;
      this.mixer.removeEventListener('finished', onFinishedHandler);
      if (onFinished) onFinished();
    };
    this.mixer.addEventListener('finished', onFinishedHandler);
  }

  // 逆再生（しゃがみ後退用）: 同じクリップを time=duration から timeScale=-1 で再生する
  async _playLoopReversed(key, fade = 0.2) {
    const reversedKey = key + '__rev';
    if (this.currentKey === reversedKey) return;
    const action = await this.lib.get(key);
    if (!action) return;
    const prev = this.currentAction;
    action.reset();
    action.timeScale = -1;
    action.time = action.getClip().duration;
    action.setEffectiveWeight(1).fadeIn(fade).play();
    if (prev && prev !== action) prev.fadeOut(fade);
    this.currentKey = reversedKey;
    this.currentAction = action;
  }

  /* --------------------------------------------------------------
     毎フレーム更新
     -------------------------------------------------------------- */
  update(delta) {
    const statusEl = document.getElementById('ctrl-status');
    const { forward, right } = this._cameraBasis();

    // ===== ジャンプ / 滞空 / 着地（ロコモーションより優先） =====
    if (this.jumpPhase !== JumpPhase.NONE) {
      this._updateAirborne(delta, forward, right);
      if (statusEl) statusEl.textContent = `状態: ${this.jumpPhase}`;
      return;
    }

    // ===== 入力ベクトルの算出（W/S優先、その後A/D） =====
    let moveX = 0, moveZ = 0; // ローカル系: Z=前後(+1前進) X=左右(+1右)
    if (this.keys.w && !this.keys.s) moveZ = 1;
    else if (this.keys.s && !this.keys.w) moveZ = -1;
    if (this.keys.a && !this.keys.d) moveX = -1;
    else if (this.keys.d && !this.keys.a) moveX = 1;
    const moving = moveX !== 0 || moveZ !== 0;

    // ===== 階段（特殊環境）: 何かを踏んでいる間はロコモーションより優先 =====
    if (this.onStairs && moving) {
      this._playLoop('stairs');
      this._moveAlongFacing(delta, this.stairSpeed);
      if (statusEl) statusEl.textContent = '状態: 階段昇降';
      return;
    }

    if (this.crouching) {
      this._updateCrouch(delta, moveX, moveZ, moving, forward, right);
      if (statusEl) statusEl.textContent = `状態: しゃがみ ${this.currentKey ?? ''}`;
      return;
    }

    if (this.turning) {
      // Turn180再生中は移動・向き変更を行わない（その場で振り向く）
      if (statusEl) statusEl.textContent = '状態: 振り向き中(Turn180)';
      return;
    }

    if (!moving) {
      this._playLoop('idle');
      if (statusEl) statusEl.textContent = '状態: 待機';
      return;
    }

    const running = this.keys.run;
    this._updateLocomotion(delta, moveX, moveZ, running, forward, right);
    if (statusEl) statusEl.textContent = `状態: ${running ? '走行' : '歩行'} (${this.currentKey ?? ''})`;
  }

  /* --------------------------------------------------------------
     通常移動（歩き / 走り）
     -------------------------------------------------------------- */
  _updateLocomotion(delta, moveX, moveZ, running, forward, right) {
    const speed = running ? this.runSpeed : this.walkSpeed;

    if (this.lookAtCameraDir) {
      // ---- LookAtCameraDir = ON ----
      // 身体は常にカメラの向き(0度)を基準。各方向に専用クリップを直接割り当てる。
      this._setFacing(Math.atan2(forward.x, forward.z), true);

      if (moveZ > 0)      this._playLoop(running ? 'run' : 'walk');
      else if (moveZ < 0)  this._playLoop(running ? 'runBack' : 'walkBack');
      else if (moveX < 0)  this._playLoop(running ? 'strafeRunL' : 'strafeWalkL');
      else if (moveX > 0)  this._playLoop(running ? 'strafeRunR' : 'strafeWalkR');

      this._moveWorld(delta, forward, right, moveX, moveZ, speed);
    } else {
      // ---- LookAtCameraDir = OFF ----
      // キャラクターは進行方向そのものを向く。前進アニメ(Walking/Running)だけを
      // 使い、向きはコードで制御する。反対方向への切り返しはTurn180を挟む。
      const moveDir = new THREE.Vector3()
        .addScaledVector(forward, moveZ)
        .addScaledVector(right, moveX)
        .normalize();
      const targetYaw = Math.atan2(moveDir.x, moveDir.z);
      const currentYaw = this.vrm.scene.rotation.y;
      const diff = Math.abs(THREE.MathUtils.euclideanModulo(targetYaw - currentYaw + Math.PI, Math.PI * 2) - Math.PI);

      const isReversal = moveZ < 0 && moveX === 0 && diff > this.turnInstantThreshold &&
        (this.currentKey === 'walk' || this.currentKey === 'run');

      if (isReversal) {
        // 歩行/走行中に正反対の入力 → Turn180を1回再生してから前進継続
        this.turning = true;
        const turnKey = running ? 'runTurn180' : 'walkTurn180';
        this._playOneShot(turnKey, () => {
          this.vrm.scene.rotation.y = targetYaw;
          this.turning = false;
        });
      } else {
        // A/D・通常の前進などは即座にコードで向きを変える
        this._setFacing(targetYaw, false);
        this._playLoop(running ? 'run' : 'walk');
      }

      this._moveAlongFacing(delta, speed);
    }
  }

  /* --------------------------------------------------------------
     しゃがみ移動
     -------------------------------------------------------------- */
  _updateCrouch(delta, moveX, moveZ, moving, forward, right) {
    if (!moving) {
      this._playLoop('crouchIdle');
      return;
    }

    if (this.lookAtCameraDir) {
      this._setFacing(Math.atan2(forward.x, forward.z), true);
      if (moveZ > 0)      { this._playLoop('crouchWalk'); this._moveWorld(delta, forward, right, moveX, moveZ, this.crouchSpeed); }
      else if (moveZ < 0) { this._playLoopReversed('crouchWalk'); this._moveWorld(delta, forward, right, moveX, moveZ, this.crouchSpeed); }
      else if (moveX < 0) { this._playLoop('crouchSneakL'); this._moveWorld(delta, forward, right, moveX, moveZ, this.crouchSpeed); }
      else if (moveX > 0) { this._playLoop('crouchSneakR'); this._moveWorld(delta, forward, right, moveX, moveZ, this.crouchSpeed); }
    } else {
      if (moveZ > 0) {
        const moveDir = new THREE.Vector3().addScaledVector(forward, 1).normalize();
        this._setFacing(Math.atan2(moveDir.x, moveDir.z), false);
        this._playLoop('crouchWalk');
      } else if (moveZ < 0) {
        // 仕様: 「コードで後ろ向きに変更 + Crouched Walking.fbx」
        const backDir = new THREE.Vector3().addScaledVector(forward, -1).normalize();
        this._setFacing(Math.atan2(backDir.x, backDir.z), false);
        this._playLoop('crouchWalk');
      } else if (moveX < 0) {
        const leftDir = new THREE.Vector3().addScaledVector(right, -1).normalize();
        this._setFacing(Math.atan2(leftDir.x, leftDir.z), false);
        this._playLoop('crouchWalk');
      } else if (moveX > 0) {
        const rightDir = new THREE.Vector3().addScaledVector(right, 1).normalize();
        this._setFacing(Math.atan2(rightDir.x, rightDir.z), false);
        this._playLoop('crouchWalk');
      }
      this._moveAlongFacing(delta, this.crouchSpeed);
    }
  }

  /* --------------------------------------------------------------
     ジャンプ / 滞空 / 着地
     仕様: アニメ終了 or 着地タイミングで強制的に座標を地面にスナップする
     -------------------------------------------------------------- */
  _updateAirborne(delta, forward, right) {
    // 空中でもW/A/S/Dで多少の慣性移動を許可（簡易エアコントロール）
    let moveX = 0, moveZ = 0;
    if (this.keys.w && !this.keys.s) moveZ = 1;
    else if (this.keys.s && !this.keys.w) moveZ = -1;
    if (this.keys.a && !this.keys.d) moveX = -1;
    else if (this.keys.d && !this.keys.a) moveX = 1;
    if (moveX !== 0 || moveZ !== 0) {
      this._moveWorld(delta, forward, right, moveX, moveZ, this.walkSpeed * 0.6);
    }

    if (this.jumpPhase === JumpPhase.JUMPING || this.jumpPhase === JumpPhase.FALLING) {
      this.verticalVelocity -= this.gravity * delta;
      this.vrm.scene.position.y += this.verticalVelocity * delta;

      if (this.vrm.scene.position.y <= this.groundY) {
        // ---- 強制位置固定仕様: 着地時に座標を地面へスナップ ----
        this.vrm.scene.position.y = this.groundY;
        this.verticalVelocity = 0;
        this.jumpPhase = JumpPhase.LANDING;
        this._playOneShot('land', () => {
          this.vrm.scene.position.y = this.groundY; // 念のため再スナップ
          this.jumpPhase = JumpPhase.NONE;
        });
      }
    }
    // LANDING中はその場固定（_playOneShotのfinishedコールバックでNONEへ戻る）
  }

  /* --------------------------------------------------------------
     向き設定
     immediate=true: 補間せず即座にカメラ向き(ON時)へ追従させる
     immediate=false: 滑らかに回転(OFF時のコード制御)
     -------------------------------------------------------------- */
  _setFacing(targetYaw, immediate) {
    if (immediate) {
      this.vrm.scene.rotation.y = targetYaw;
    } else {
      const current = this.vrm.scene.rotation.y;
      const delta = THREE.MathUtils.euclideanModulo(targetYaw - current + Math.PI, Math.PI * 2) - Math.PI;
      this.vrm.scene.rotation.y = current + delta; // 単純なスナップ（必要ならlerpに変更可）
    }
  }

  /* --------------------------------------------------------------
     移動: ワールド(カメラ基準)方向にそのまま移動（LookAtCameraDir=ON用）
     -------------------------------------------------------------- */
  _moveWorld(delta, forward, right, moveX, moveZ, speed) {
    const move = new THREE.Vector3()
      .addScaledVector(forward, moveZ)
      .addScaledVector(right, moveX);
    if (move.lengthSq() > 0) move.normalize().multiplyScalar(speed * delta);
    this.vrm.scene.position.add(move);
  }

  /* --------------------------------------------------------------
     移動: キャラクター自身の正面方向に移動（LookAtCameraDir=OFF用、
     ルートモーションは固定済みなのでコード側でこの分だけ前進させる）
     -------------------------------------------------------------- */
  _moveAlongFacing(delta, speed) {
    const yaw = this.vrm.scene.rotation.y;
    const dir = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
    this.vrm.scene.position.addScaledVector(dir, speed * delta);
  }
}

/* ----------------------------------------------------------------
   ④ VRM読み込み完了後にコントローラーを初期化する
      （gltfLoader.load の成功コールバック自体は変更せず、
      currentVrm がセットされるのを監視して後付けで初期化する）
   ---------------------------------------------------------------- */
const __initWatcher = setInterval(() => {
  if (currentVrm && mixer && !window.__characterController) {
    window.__characterController = new CharacterController(currentVrm, mixer, camera);
    // 初期姿勢としてアイドルを再生しておく
    window.__characterController._playLoop('idle');
    clearInterval(__initWatcher);
    console.log('[CharacterController] 初期化完了');
  }
}, 200);

/* ====================================================================
   ウィンドウリサイズ対応
   ==================================================================== */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ====================================================================
   メインループ
   ==================================================================== */
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  updateInputAnimation(delta);
  if (window.__characterController) window.__characterController.update(delta); // ← 拡張: 3人称コントローラー更新

  if (mixer) mixer.update(delta);
  if (currentVrm) currentVrm.update(delta); // 表情・ボーン・LookAt・スプリングボーン等を一括更新

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
