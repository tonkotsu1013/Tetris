<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VRM Viewer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #15151f;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  #canvas-container { position: fixed; inset: 0; }

  #ui {
    position: fixed;
    top: 12px;
    left: 12px;
    color: #fff;
    background: rgba(0, 0, 0, 0.55);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.7;
    max-width: 280px;
    pointer-events: none;
  }
  #ui h1 { margin: 0 0 6px; font-size: 15px; }
  #status { color: #8be9fd; }

  #expressions {
    position: fixed;
    top: 12px;
    right: 12px;
    max-width: 230px;
    max-height: 80vh;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.55);
    color: #fff;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 12px;
  }
  #expressions h2 { margin: 0 0 8px; font-size: 13px; }
  .expr-btn {
    display: block;
    width: 100%;
    margin: 3px 0;
    padding: 6px 8px;
    border: none;
    border-radius: 6px;
    background: #2e2e4d;
    color: #fff;
    cursor: pointer;
    font-size: 12px;
    text-align: left;
  }
  .expr-btn:hover { background: #45457a; }
  .expr-btn.active { background: #5b6cff; }
  #resetExpr { margin-top: 8px; background: #553333; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui">
  <h1>VRM Viewer</h1>
  <div id="status">読み込み中...</div>
  <div>ドラッグ：視点回転 / ホイール：ズーム</div>
</div>

<div id="expressions">
  <h2>表情一覧（VRMから自動検出）</h2>
  <div id="exprList">VRM読み込み後に表示されます</div>
</div>

<!--
  ====================================================================
  importmap: three.js / three-vrm / addons をCDN(jsdelivr)から読み込む設定。
  バージョンを変えたい場合はここの数字を変更してください。
  ====================================================================
-->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

/* ====================================================================
   ① ファイル名はここで指定します
   index.html と「同じフォルダ」に以下のファイルを置いてください。
   サブフォルダに入れた場合はパスを './models/xxx.vrm' のように直してください。
   ==================================================================== */
const VRM_FILE_PATH = './ayame_v1.1.vrm';     // ← VRMファイル名

const KEEP_IN_PLACE = true; // true: その場で足踏み（移動しない） / false: 実際に前進してしまう

/* ====================================================================
   アニメーションファイルパス一覧
   ==================================================================== */
const ANIM_PATHS = {
  idle:               './Standard Idle.fbx',
  walk:               './Walking.fbx',
  walkBack:           './Walking Backwards.fbx',
  walkTurn180:        './Walking Turn 180.fbx',
  strafeLeft:         './Left Strafe Walking.fbx',
  strafeRight:        './Right Strafe Walking.fbx',
  run:                './Running.fbx',
  runBack:            './Running Backwards.fbx',
  runTurn180:         './Running Turn 180.fbx',
  strafeRunLeft:      './Left Strafe.fbx',
  strafeRunRight:     './Right Strafe.fbx',
  crouch:             './Male Crouch Pose.fbx',
  crouchWalk:         './Crouched Walking.fbx',
  crouchLeft:         './Crouched Sneaking Left.fbx',
  crouchRight:        './Crouched Sneaking Right.fbx',
  jump:               './Jumping.fbx',
  fall:               './Falling Idle.fbx',
  land:               './Falling to Landing.fbx',
  stair:              './Ascending Stairs.fbx',
};

/* ====================================================================
   設定：「視点方向を向く」ON/OFFの切り替え
   true  = Mixamoの横歩き/後歩きアニメーションをそのまま使う
   false = キャラの向きをコードで回転させてからWalking/Runningを使う
   ==================================================================== */
let FACE_CAMERA_DIRECTION = true;

/* ====================================================================
   ② Mixamo → VRM ボーン名 対応表
   ミクサモのリグ名 (mixamorigXXX) は VRM の Humanoid ボーン名と
   名前も階層も違うため、この対応表で1本ずつ紐づけてから動かします。
   （pixiv公式 three-vrm のサンプルで使われている対応表と同じものです）
   ==================================================================== */
const mixamoVRMRigMap = {
  mixamorigHips: 'hips',
  mixamorigSpine: 'spine',
  mixamorigSpine1: 'chest',
  mixamorigSpine2: 'upperChest',
  mixamorigNeck: 'neck',
  mixamorigHead: 'head',
  mixamorigLeftShoulder: 'leftShoulder',
  mixamorigLeftArm: 'leftUpperArm',
  mixamorigLeftForeArm: 'leftLowerArm',
  mixamorigLeftHand: 'leftHand',
  mixamorigLeftHandThumb1: 'leftThumbMetacarpal',
  mixamorigLeftHandThumb2: 'leftThumbProximal',
  mixamorigLeftHandThumb3: 'leftThumbDistal',
  mixamorigLeftHandIndex1: 'leftIndexProximal',
  mixamorigLeftHandIndex2: 'leftIndexIntermediate',
  mixamorigLeftHandIndex3: 'leftIndexDistal',
  mixamorigLeftHandMiddle1: 'leftMiddleProximal',
  mixamorigLeftHandMiddle2: 'leftMiddleIntermediate',
  mixamorigLeftHandMiddle3: 'leftMiddleDistal',
  mixamorigLeftHandRing1: 'leftRingProximal',
  mixamorigLeftHandRing2: 'leftRingIntermediate',
  mixamorigLeftHandRing3: 'leftRingDistal',
  mixamorigLeftHandPinky1: 'leftLittleProximal',
  mixamorigLeftHandPinky2: 'leftLittleIntermediate',
  mixamorigLeftHandPinky3: 'leftLittleDistal',
  mixamorigRightShoulder: 'rightShoulder',
  mixamorigRightArm: 'rightUpperArm',
  mixamorigRightForeArm: 'rightLowerArm',
  mixamorigRightHand: 'rightHand',
  mixamorigRightHandPinky1: 'rightLittleProximal',
  mixamorigRightHandPinky2: 'rightLittleIntermediate',
  mixamorigRightHandPinky3: 'rightLittleDistal',
  mixamorigRightHandRing1: 'rightRingProximal',
  mixamorigRightHandRing2: 'rightRingIntermediate',
  mixamorigRightHandRing3: 'rightRingDistal',
  mixamorigRightHandMiddle1: 'rightMiddleProximal',
  mixamorigRightHandMiddle2: 'rightMiddleIntermediate',
  mixamorigRightHandMiddle3: 'rightMiddleDistal',
  mixamorigRightHandIndex1: 'rightIndexProximal',
  mixamorigRightHandIndex2: 'rightIndexIntermediate',
  mixamorigRightHandIndex3: 'rightIndexDistal',
  mixamorigRightHandThumb1: 'rightThumbMetacarpal',
  mixamorigRightHandThumb2: 'rightThumbProximal',
  mixamorigRightHandThumb3: 'rightThumbDistal',
  mixamorigLeftUpLeg: 'leftUpperLeg',
  mixamorigLeftLeg: 'leftLowerLeg',
  mixamorigLeftFoot: 'leftFoot',
  mixamorigLeftToeBase: 'leftToes',
  mixamorigRightUpLeg: 'rightUpperLeg',
  mixamorigRightLeg: 'rightLowerLeg',
  mixamorigRightFoot: 'rightFoot',
  mixamorigRightToeBase: 'rightToes',
};

/* ====================================================================
   ③ ミクサモのFBXアニメーションを VRM 用 AnimationClip に変換する関数
   pixiv公式 three-vrm のサンプル loadMixamoAnimation.js をベースに、
   「その場から動かさない」処理 (KEEP_IN_PLACE) を追加したものです。
   https://github.com/pixiv/three-vrm/tree/dev/packages/three-vrm-core/examples/humanoidAnimation
   ==================================================================== */
function loadMixamoAnimation(url, vrm, keepInPlace = true) {
  const loader = new FBXLoader();
  return loader.loadAsync(url).then((asset) => {
    // Mixamoから書き出されたFBXは、アニメーション名が "mixamo.com" になっていることが多い
    const clip = THREE.AnimationClip.findByName(asset.animations, 'mixamo.com') || asset.animations[0];
    if (!clip) throw new Error('FBXの中にアニメーションが見つかりませんでした');

    const tracks = [];
    const restRotationInverse = new THREE.Quaternion();
    const parentRestWorldRotation = new THREE.Quaternion();
    const _quatA = new THREE.Quaternion();

    // ミクサモとVRMでは腰(Hips)の高さ＝身長スケールが違うため、比率を求めて補正する
    const mixamoHipsNode = asset.getObjectByName('mixamorigHips');
    const motionHipsHeight = mixamoHipsNode.position.y;
    const vrmHipsHeight = vrm.humanoid.normalizedRestPose.hips.position[1];
    const hipsPositionScale = vrmHipsHeight / motionHipsHeight;

    clip.tracks.forEach((track) => {
      // トラック名は "mixamorigHips.quaternion" のような形式になっている
      const [mixamoRigName, propertyName] = track.name.split('.');
      const vrmBoneName = mixamoVRMRigMap[mixamoRigName];
      const vrmNodeName = vrm.humanoid?.getNormalizedBoneNode(vrmBoneName)?.name;
      const mixamoRigNode = asset.getObjectByName(mixamoRigName);

      // 対応表に無いボーン（指の一部や補助ボーンなど）は無視する
      if (vrmNodeName == null || mixamoRigNode == null) return;

      // レスト(直立)姿勢時の回転を基準に、回転の差分だけを取り出す
      mixamoRigNode.getWorldQuaternion(restRotationInverse).invert();
      mixamoRigNode.parent.getWorldQuaternion(parentRestWorldRotation);

      if (track instanceof THREE.QuaternionKeyframeTrack) {
        for (let i = 0; i < track.values.length; i += 4) {
          const flat = track.values.slice(i, i + 4);
          _quatA.fromArray(flat).premultiply(parentRestWorldRotation).multiply(restRotationInverse).toArray(flat);
          flat.forEach((v, idx) => (track.values[idx + i] = v));
        }
        tracks.push(new THREE.QuaternionKeyframeTrack(
          `${vrmNodeName}.${propertyName}`,
          track.times,
          // VRM0.0モデルは前後左右の軸が反転しているので、その場合だけ符号を反転する
          track.values.map((v, i) => (vrm.meta?.metaVersion === '0' && i % 2 === 0 ? -v : v)),
        ));
      } else if (track instanceof THREE.VectorKeyframeTrack) {
        const values = track.values.map(
          (v, i) => (vrm.meta?.metaVersion === '0' && i % 3 !== 1 ? -v : v) * hipsPositionScale,
        );

        // Hipsの「位置」トラック＝歩行による前進(根本移動)が入っている部分
        if (mixamoRigName === 'mixamorigHips' && propertyName === 'position' && keepInPlace) {
          // X(左右)とZ(前後)だけ0にする。Y(上下の重心バウンス)はそのまま残すので
          // 「その場で足踏みしている」自然な動きになる
          for (let i = 0; i < values.length; i += 3) {
            values[i] = 0;
            values[i + 2] = 0;
          }
        }
        tracks.push(new THREE.VectorKeyframeTrack(`${vrmNodeName}.${propertyName}`, track.times, values));
      }
    });

    return new THREE.AnimationClip(url, clip.duration, tracks);
  });
}

/* ====================================================================
   シーンの基本構築
   ==================================================================== */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15151f);

const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(0, 1.4, 3.2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// マウス/タッチで自由にいろんな角度から見られるようにする
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.minDistance = 0.6;
controls.maxDistance = 8;
controls.update();

// ライト
scene.add(new THREE.HemisphereLight(0xffffff, 0x444466, 1.3));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
dirLight.position.set(1, 2, 1.5);
scene.add(dirLight);

// 足元の目安になる地面とグリッド
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(2.2, 48),
  new THREE.MeshStandardMaterial({ color: 0x23233a, roughness: 1 }),
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);
scene.add(new THREE.GridHelper(4, 16, 0x4444aa, 0x2c2c44));

const clock = new THREE.Clock();
let currentVrm = null;
let mixer = null;

// アニメーション管理
const actions = {};           // { キー: AnimationAction }
let currentAction = null;     // 現在再生中のアクション名
let currentState = 'idle';    // 論理ステート

// キャラクターの向き管理（コード回転モード用）
let charYaw = 0;              // キャラクターのY軸回転（ラジアン）

// ジャンプ・落下・着地 状態
let isJumping = false;
let isFalling = false;
let isLanding = false;

// しゃがみ状態
let isCrouching = false;

// ランニングモード中に反対向きキーが押された瞬間
let wasMovingForward = false;  // 前フレームの進行方向
let wasMovingBackward = false;

const statusEl = document.getElementById('status');

/* ====================================================================
   ④ VRMの読み込み
   ==================================================================== */
const gltfLoader = new GLTFLoader();
gltfLoader.register((parser) => new VRMLoaderPlugin(parser));

gltfLoader.load(
  VRM_FILE_PATH,
  async (gltf) => {
    const vrm = gltf.userData.vrm;

    // 表示に不要なデータを削除して軽量化（任意・無くても動作します）
    VRMUtils.removeUnnecessaryVertices(gltf.scene);
    VRMUtils.removeUnnecessaryJoints(gltf.scene);

    // VRM0.x のモデルは正面が後ろ(-Z)を向いているため、自動で前(+Z)向きに補正する
    // VRM1.0のモデルなら何もしない（バージョンを自動判定）
    VRMUtils.rotateVRM0(vrm);

    scene.add(vrm.scene);
    currentVrm = vrm;
    statusEl.textContent = 'VRM読み込み完了。アニメーション読込中...';

    // VRMに入っている表情(Expression)の一覧をUIとコンソールに表示
    setupExpressionUI(vrm);

    // ミクサモのアニメーションを読み込んでVRMに適用する
    mixer = new THREE.AnimationMixer(vrm.scene);

    statusEl.textContent = 'アニメーション読み込み中...';

    // 全アニメーションを並列ロード
    const loadResults = await Promise.allSettled(
      Object.entries(ANIM_PATHS).map(async ([key, path]) => {
        const clip = await loadMixamoAnimation(path, vrm, KEEP_IN_PLACE);
        const action = mixer.clipAction(clip);
        action.setLoop(THREE.LoopRepeat, Infinity);
        // Walking Turn 180 / Running Turn 180 / Land は1回再生
        if (key === 'walkTurn180' || key === 'runTurn180' || key === 'land') {
          action.setLoop(THREE.LoopOnce, 1);
          action.clampWhenFinished = true;
        }
        // しゃがみポーズは静止させる（1フレーム目で止める）
        if (key === 'crouch') {
          action.setLoop(THREE.LoopOnce, 1);
          action.clampWhenFinished = true;
        }
        // ジャンプ・着地も1回
        if (key === 'jump' || key === 'land') {
          action.setLoop(THREE.LoopOnce, 1);
          action.clampWhenFinished = true;
        }
        actions[key] = action;
        return key;
      })
    );

    const loaded = loadResults.filter(r => r.status === 'fulfilled').map(r => r.value);
    const failed = loadResults.filter(r => r.status === 'rejected');
    if (failed.length > 0) console.warn('一部アニメーション読み込み失敗:', failed.map(r => r.reason));

    // 設定パネルのON/OFFトグルを追加
    addSettingsUI();

    // 初期アニメーション：アイドル
    playAction('idle');

    // キー入力の設定
    setupKeyControls();

    // ジャンプ/ターン終了イベント
    mixer.addEventListener('finished', onActionFinished);

    statusEl.textContent = '準備完了！ W/A/S/D で移動、Z+W で走る、Shift でしゃがむ、Space でジャンプ';

  },
  (progress) => {
    if (progress.total) {
      statusEl.textContent = `VRM読み込み中... ${Math.round((progress.loaded / progress.total) * 100)}%`;
    }
  },
  (error) => {
    console.error(error);
    statusEl.textContent = 'VRMの読み込みに失敗しました。ファイル名/パスを確認してください。';
  },
);

/* ====================================================================
   ⑤ 表情(Expression) UI
   VRMに入っている表情を自動で検出してボタンを生成します。
   ボタンを押すと vrm.expressionManager.setValue(名前, 1.0) を呼びます。
   ==================================================================== */
function setupExpressionUI(vrm) {
  const listEl = document.getElementById('exprList');
  listEl.innerHTML = '';

  if (!vrm.expressionManager) {
    listEl.textContent = 'このVRMには表情(Expression)が設定されていません';
    return;
  }

  // このVRMが持つ全表情名（プリセット＋VRoidStudio等で作ったカスタム表情）
  const names = Object.keys(vrm.expressionManager.expressionMap);
  console.log('このVRMが持つ表情一覧:', names);

  names.forEach((name) => {
    const btn = document.createElement('button');
    btn.className = 'expr-btn';
    btn.textContent = name;
    btn.onclick = () => {
      // 一旦すべて0にしてから、押した表情だけ1.0にする
      names.forEach((n) => vrm.expressionManager.setValue(n, 0));
      vrm.expressionManager.setValue(name, 1.0);
      document.querySelectorAll('.expr-btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
    };
    listEl.appendChild(btn);
  });

  const resetBtn = document.createElement('button');
  resetBtn.className = 'expr-btn';
  resetBtn.id = 'resetExpr';
  resetBtn.textContent = 'リセット（neutral）';
  resetBtn.onclick = () => {
    names.forEach((n) => vrm.expressionManager.setValue(n, 0));
    document.querySelectorAll('.expr-btn').forEach((b) => b.classList.remove('active'));
  };
  listEl.appendChild(resetBtn);
}

/* ====================================================================
   設定UIの追加（視点方向を向くON/OFF）
   ==================================================================== */
function addSettingsUI() {
  const uiEl = document.getElementById('ui');
  uiEl.style.pointerEvents = 'auto';

  const label = document.createElement('label');
  label.style.cssText = 'display:flex;align-items:center;gap:6px;margin-top:10px;cursor:pointer;';
  const checkbox = document.createElement('input');
  checkbox.type = 'checkbox';
  checkbox.checked = FACE_CAMERA_DIRECTION;
  checkbox.onchange = () => { FACE_CAMERA_DIRECTION = checkbox.checked; };
  label.appendChild(checkbox);
  label.appendChild(document.createTextNode('視点方向を向くモード'));
  uiEl.appendChild(label);

  const hint = document.createElement('div');
  hint.style.cssText = 'margin-top:8px;font-size:11px;color:#aaa;';
  hint.innerHTML = 'W:歩く　S:後退　A:左　D:右<br>Z+W:走る　Shift:しゃがむ　Space:ジャンプ';
  uiEl.appendChild(hint);
}

/* ====================================================================
   アニメーション切り替え
   ==================================================================== */
function playAction(key, fadeTime = 0.15) {
  if (!actions[key]) {
    // フォールバック：アニメーションが存在しない場合はidleへ
    if (key !== 'idle' && actions['idle']) playAction('idle', fadeTime);
    return;
  }
  if (currentAction === key) return;

  const next = actions[key];
  const prev = currentAction ? actions[currentAction] : null;

  // ターン・ジャンプ・着地は頭から再生
  next.reset();

  if (prev && prev !== next) {
    prev.crossFadeTo(next, fadeTime, true);
  }
  next.play();
  currentAction = key;
}

/* ====================================================================
   ターン/ジャンプ/着地 終了時の処理
   ==================================================================== */
function onActionFinished(e) {
  const finishedAction = e.action;

  // walkTurn180終了 → 通常歩行へ
  if (actions['walkTurn180'] && finishedAction === actions['walkTurn180']) {
    inWalkTurn = false;
    playAction('walk');
  }
  // runTurn180終了 → 走行へ
  if (actions['runTurn180'] && finishedAction === actions['runTurn180']) {
    inRunTurn = false;
    playAction('run');
  }
  // 着地終了 → アイドルへ
  if (actions['land'] && finishedAction === actions['land']) {
    isLanding = false;
    playAction('idle');
  }
  // ジャンプ終了 → 落下へ
  if (actions['jump'] && finishedAction === actions['jump']) {
    isJumping = false;
    isFalling = true;
    playAction('fall');
    // 1.2秒後に着地（簡易シミュレーション）
    setTimeout(() => {
      isFalling = false;
      isLanding = true;
      playAction('land');
    }, 1200);
  }
}

/* ====================================================================
   キー入力のセットアップ
   ==================================================================== */
const pressedKeys = new Set();
// ターン180中フラグ
let inWalkTurn = false;
let inRunTurn = false;
// 前フレームでの移動方向
let prevMovingFwd = false;
let prevMovingBack = false;

function setupKeyControls() {
  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (['w','a','s','d','z',' ','shift'].includes(k) ||
        ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Shift'].includes(e.key)) {
      pressedKeys.add(k === 'shift' ? 'shift' : k === ' ' ? 'space' : k);
      e.preventDefault();
    }
  });

  window.addEventListener('keyup', (e) => {
    const k = e.key.toLowerCase();
    pressedKeys.delete(k === 'shift' ? 'shift' : k === ' ' ? 'space' : k);

    // Shiftトグル：keydownより keyupで行う（押した瞬間ではなく離した時）
    if (e.key === 'Shift') {
      isCrouching = !isCrouching;
      if (!isCrouching) {
        playAction('idle');
      } else {
        playAction('crouch');
      }
    }
  });
}

/* ====================================================================
   毎フレームのアニメーション更新
   ==================================================================== */
function updateInputAnimation(delta) {
  if (!currentVrm || !mixer) return;

  // ジャンプ/落下/着地中は移動入力を無視
  if (isJumping || isFalling || isLanding) return;

  // スペースでジャンプ
  if (pressedKeys.has('space') && !isJumping && !isFalling && !isCrouching) {
    isJumping = true;
    playAction('jump', 0.1);
    return;
  }

  const isRunning = pressedKeys.has('z');
  const fwd   = pressedKeys.has('w');
  const back  = pressedKeys.has('s');
  const left  = pressedKeys.has('a');
  const right = pressedKeys.has('d');
  const anyMove = fwd || back || left || right;

  // ターン180中は入力を受け付けない
  if (inWalkTurn || inRunTurn) return;

  if (isCrouching) {
    // ========== しゃがみ状態 ==========
    if (!anyMove) {
      playAction('crouch');
      return;
    }
    if (fwd) {
      playAction('crouchWalk');
    } else if (back) {
      if (FACE_CAMERA_DIRECTION) {
        // 逆再生で後ろ歩き
        const a = actions['crouchWalk'];
        if (a && currentAction !== 'crouchWalkBack') {
          if (currentAction && actions[currentAction]) {
            actions[currentAction].fadeOut(0.15);
          }
          a.reset();
          a.timeScale = -1;
          a.play();
          currentAction = 'crouchWalkBack';
        }
      } else {
        rotateChar(Math.PI);
        playAction('crouchWalk');
      }
    } else if (left) {
      if (FACE_CAMERA_DIRECTION) {
        playAction('crouchLeft');
      } else {
        rotateChar(-Math.PI / 2);
        playAction('crouchWalk');
      }
    } else if (right) {
      if (FACE_CAMERA_DIRECTION) {
        playAction('crouchRight');
      } else {
        rotateChar(Math.PI / 2);
        playAction('crouchWalk');
      }
    }
    return;
  }

  if (!anyMove) {
    prevMovingFwd = false;
    prevMovingBack = false;
    playAction('idle');
    return;
  }

  if (isRunning) {
    // ========== ランニング ==========
    if (fwd) {
      // 前フレームで後退していたらターン180
      if (prevMovingBack && actions['runTurn180']) {
        inRunTurn = true;
        playAction('runTurn180', 0.1);
      } else {
        playAction('run');
      }
      prevMovingFwd = true; prevMovingBack = false;
    } else if (back) {
      if (prevMovingFwd && actions['runTurn180']) {
        inRunTurn = true;
        playAction('runTurn180', 0.1);
      } else {
        if (FACE_CAMERA_DIRECTION) {
          playAction('runBack');
        } else {
          rotateChar(Math.PI);
          playAction('run');
        }
      }
      prevMovingFwd = false; prevMovingBack = true;
    } else if (left) {
      if (FACE_CAMERA_DIRECTION) {
        playAction('strafeRunLeft');
      } else {
        rotateChar(-Math.PI / 2);
        playAction('run');
      }
    } else if (right) {
      if (FACE_CAMERA_DIRECTION) {
        playAction('strafeRunRight');
      } else {
        rotateChar(Math.PI / 2);
        playAction('run');
      }
    }
    // 後退走りはスピードを落とす
    if (actions['runBack'] && currentAction === 'runBack') {
      actions['runBack'].timeScale = 0.7;
    }
  } else {
    // ========== 歩き ==========
    if (fwd) {
      // 前フレームで後退していたらターン180
      if (prevMovingBack && actions['walkTurn180']) {
        inWalkTurn = true;
        playAction('walkTurn180', 0.1);
      } else {
        playAction('walk');
      }
      prevMovingFwd = true; prevMovingBack = false;
    } else if (back) {
      if (prevMovingFwd && actions['walkTurn180']) {
        inWalkTurn = true;
        playAction('walkTurn180', 0.1);
      } else {
        if (FACE_CAMERA_DIRECTION) {
          // 設定ON：Walking Backwards
          if (actions['walkBack']) {
            playAction('walkBack');
            if (actions['walkBack']) actions['walkBack'].timeScale = 0.7; // スピードを落とす
          } else {
            playAction('walkTurn180');
          }
        } else {
          // 設定OFF：Walking Turn 180 → Walking
          if (!inWalkTurn && actions['walkTurn180']) {
            inWalkTurn = true;
            playAction('walkTurn180', 0.1);
          }
        }
      }
      prevMovingFwd = false; prevMovingBack = true;
    } else if (left) {
      if (FACE_CAMERA_DIRECTION) {
        playAction('strafeLeft');
      } else {
        rotateChar(-Math.PI / 2);
        playAction('walk');
      }
    } else if (right) {
      if (FACE_CAMERA_DIRECTION) {
        playAction('strafeRight');
      } else {
        rotateChar(Math.PI / 2);
        playAction('walk');
      }
    }
  }
}

/* ====================================================================
   キャラクターのY軸を指定角度に補間しながら回転
   ==================================================================== */
function rotateChar(targetYaw) {
  if (!currentVrm) return;
  currentVrm.scene.rotation.y = targetYaw;
}

/* ====================================================================
   ⑥（旧）矢印キー操作 → 新システムに統合済み。ここは空にする
   ==================================================================== */



/* ====================================================================
   ウィンドウリサイズ対応
   ==================================================================== */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ====================================================================
   メインループ
   ==================================================================== */
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  updateInputAnimation(delta);

  if (mixer) mixer.update(delta);
  if (currentVrm) currentVrm.update(delta); // 表情・ボーン・LookAt・スプリングボーン等を一括更新

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
