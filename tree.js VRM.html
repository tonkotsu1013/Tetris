<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

/* ──────────────────────────────────────────
   定数・設定
────────────────────────────────────────── */
const VRM_PATH = './ayame_v1.1.vrm';

// アニメーションファイル名（全てVRMと同じフォルダ）
const ANIM = {
  idle:          'Standard Idle.fbx',
  walk:          'Walking.fbx',
  walkBack:      'Walking Backwards.fbx',
  turn180:       'Walking Turn 180.fbx',
  strafeL:       'Left Strafe Walking.fbx',
  strafeR:       'Right Strafe Walking.fbx',
  run:           'Running.fbx',
  runBack:       'Running Backwards.fbx',
  runTurn180:    'Running Turn 180.fbx',
  runStrafeL:    'Left Strafe.fbx',
  runStrafeR:    'Right Strafe.fbx',
  crouch:        'Male Crouch Pose.fbx',
  crouchWalk:    'Crouched Walking.fbx',
  crouchWalkRev: 'Crouched Walking.fbx',   // 後ろしゃがみ用（逆再生）
  crouchStrafeL: 'Crouched Sneaking Left.fbx',
  crouchStrafeR: 'Crouched Sneaking Right.fbx',
  jump:          'Jumping.fbx',
  fall:          'Falling Idle.fbx',
  land:          'Falling to Landing.fbx',
  stairsUp:      'Ascending Stairs.fbx',
};

const SPEED = {
  walk:       2.8,
  walkBack:   1.7,   // 後ろ歩きは遅め
  strafe:     2.2,
  run:        5.8,
  runBack:    2.2,
  runStrafe:  4.8,
  crouch:     1.2,
  turnSmooth: 10,    // rad/s（向き補間速度）
};

const GRAVITY     = -14;
const JUMP_VEL    =  5.5;
const LAND_DUR    =  0.6;   // 着地モーション長さ(秒)
const TURN180_DUR =  0.45;  // 180ターン長さ(秒)

/* ──────────────────────────────────────────
   Mixamo → VRM ボーンマップ
────────────────────────────────────────── */
const rigMap = {
  mixamorigHips:'hips',mixamorigSpine:'spine',mixamorigSpine1:'chest',
  mixamorigSpine2:'upperChest',mixamorigNeck:'neck',mixamorigHead:'head',
  mixamorigLeftShoulder:'leftShoulder',mixamorigLeftArm:'leftUpperArm',
  mixamorigLeftForeArm:'leftLowerArm',mixamorigLeftHand:'leftHand',
  mixamorigLeftHandThumb1:'leftThumbMetacarpal',mixamorigLeftHandThumb2:'leftThumbProximal',
  mixamorigLeftHandThumb3:'leftThumbDistal',mixamorigLeftHandIndex1:'leftIndexProximal',
  mixamorigLeftHandIndex2:'leftIndexIntermediate',mixamorigLeftHandIndex3:'leftIndexDistal',
  mixamorigLeftHandMiddle1:'leftMiddleProximal',mixamorigLeftHandMiddle2:'leftMiddleIntermediate',
  mixamorigLeftHandMiddle3:'leftMiddleDistal',mixamorigLeftHandRing1:'leftRingProximal',
  mixamorigLeftHandRing2:'leftRingIntermediate',mixamorigLeftHandRing3:'leftRingDistal',
  mixamorigLeftHandPinky1:'leftLittleProximal',mixamorigLeftHandPinky2:'leftLittleIntermediate',
  mixamorigLeftHandPinky3:'leftLittleDistal',mixamorigRightShoulder:'rightShoulder',
  mixamorigRightArm:'rightUpperArm',mixamorigRightForeArm:'rightLowerArm',
  mixamorigRightHand:'rightHand',mixamorigRightHandPinky1:'rightLittleProximal',
  mixamorigRightHandPinky2:'rightLittleIntermediate',mixamorigRightHandPinky3:'rightLittleDistal',
  mixamorigRightHandRing1:'rightRingProximal',mixamorigRightHandRing2:'rightRingIntermediate',
  mixamorigRightHandRing3:'rightRingDistal',mixamorigRightHandMiddle1:'rightMiddleProximal',
  mixamorigRightHandMiddle2:'rightMiddleIntermediate',mixamorigRightHandMiddle3:'rightMiddleDistal',
  mixamorigRightHandIndex1:'rightIndexProximal',mixamorigRightHandIndex2:'rightIndexIntermediate',
  mixamorigRightHandIndex3:'rightIndexDistal',mixamorigRightHandThumb1:'rightThumbMetacarpal',
  mixamorigRightHandThumb2:'rightThumbProximal',mixamorigRightHandThumb3:'rightThumbDistal',
  mixamorigLeftUpLeg:'leftUpperLeg',mixamorigLeftLeg:'leftLowerLeg',
  mixamorigLeftFoot:'leftFoot',mixamorigLeftToeBase:'leftToes',
  mixamorigRightUpLeg:'rightUpperLeg',mixamorigRightLeg:'rightLowerLeg',
  mixamorigRightFoot:'rightFoot',mixamorigRightToeBase:'rightToes',
};

/* ──────────────────────────────────────────
   Mixamo FBX → VRM AnimationClip 変換
   reverse=true で逆再生クリップを生成（しゃがみ後退用）
────────────────────────────────────────── */
function loadMixamoAnimation(url, vrmModel, reverse = false) {
  return new FBXLoader().loadAsync(url).then(asset => {
    const clip = THREE.AnimationClip.findByName(asset.animations,'mixamo.com') || asset.animations[0];
    if (!clip) throw new Error('アニメなし: ' + url);

    const restRotInv = new THREE.Quaternion();
    const parentRot  = new THREE.Quaternion();
    const _q = new THREE.Quaternion();

    const hipsNode = asset.getObjectByName('mixamorigHips');
    const motionH  = hipsNode ? hipsNode.position.y : 1;
    const vrmH     = vrmModel.humanoid.normalizedRestPose.hips?.position?.[1] ?? 1;
    const hipsScale = vrmH / motionH;
    const isVRM0    = vrmModel.meta?.metaVersion === '0';

    const tracks = [];
    clip.tracks.forEach(track => {
      const dotIdx = track.name.indexOf('.');
      const rigName = track.name.slice(0, dotIdx);
      const prop    = track.name.slice(dotIdx + 1);
      const boneName = rigMap[rigName];
      const vrmNode  = vrmModel.humanoid?.getNormalizedBoneNode(boneName)?.name;
      const rigNode  = asset.getObjectByName(rigName);
      if (!vrmNode || !rigNode) return;

      rigNode.getWorldQuaternion(restRotInv).invert();
      rigNode.parent.getWorldQuaternion(parentRot);

      if (track instanceof THREE.QuaternionKeyframeTrack) {
        const vals = Float32Array.from(track.values);
        for (let i = 0; i < vals.length; i += 4) {
          const f = vals.subarray(i, i + 4);
          _q.fromArray(f).premultiply(parentRot).multiply(restRotInv).toArray(f);
          if (isVRM0) { vals[i] = -vals[i]; vals[i+2] = -vals[i+2]; }
        }
        tracks.push(new THREE.QuaternionKeyframeTrack(`${vrmNode}.${prop}`, track.times, vals));
      } else if (track instanceof THREE.VectorKeyframeTrack) {
        const vals = track.values.map((v, i) => {
          const s = isVRM0 && i % 3 !== 1 ? -1 : 1;
          return v * s * hipsScale;
        });
        // Hips XZ固定（その場で動く）
        if (rigName === 'mixamorigHips' && prop === 'position') {
          for (let i = 0; i < vals.length; i += 3) { vals[i] = 0; vals[i+2] = 0; }
        }
        tracks.push(new THREE.VectorKeyframeTrack(`${vrmNode}.${prop}`, track.times, vals));
      }
    });

    // 逆再生：時間軸を反転
    let finalTracks = tracks;
    const dur = clip.duration;
    if (reverse) {
      finalTracks = tracks.map(t => {
        const n = t.values.length / t.times.length;
        const revT = [];
        const revV = [];
        for (let i = t.times.length - 1; i >= 0; i--) {
          revT.push(dur - t.times[i]);
          for (let j = 0; j < n; j++) revV.push(t.values[i * n + j]);
        }
        if (t instanceof THREE.QuaternionKeyframeTrack)
          return new THREE.QuaternionKeyframeTrack(t.name, revT, revV);
        return new THREE.VectorKeyframeTrack(t.name, revT, revV);
      });
    }

    return new THREE.AnimationClip(url + (reverse?'_rev':''), dur, finalTracks);
  });
}

/* ──────────────────────────────────────────
   シーン構築
────────────────────────────────────────── */
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a0e1a, 40, 90);

// 夜空ドーム
scene.add(Object.assign(
  new THREE.Mesh(new THREE.SphereGeometry(80,32,16),
    new THREE.MeshBasicMaterial({color:0x0d1530,side:THREE.BackSide}))
));

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 120);
camera.position.set(0, 4, 8);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('canvas-container').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.2, 0);
controls.enableDamping = true;
controls.minDistance = 2; controls.maxDistance = 20;
controls.maxPolarAngle = Math.PI * 0.84;
controls.update();

// 光源
scene.add(new THREE.HemisphereLight(0x6688bb, 0x223322, 1.0));
const sun = new THREE.DirectionalLight(0xfff8d0, 1.8);
sun.position.set(6, 14, 8); sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left = sun.shadow.camera.bottom = -25;
sun.shadow.camera.right = sun.shadow.camera.top = 25;
sun.shadow.camera.far = 100;
scene.add(sun);

/* ──────────────────────────────────────────
   ワールドマップ
────────────────────────────────────────── */
(function buildWorld() {
  const mkMesh = (geo,mat,pos,rx,shadow) => {
    const m = new THREE.Mesh(geo,mat);
    if (pos) m.position.set(...pos);
    if (rx) m.rotation.x = rx;
    m.castShadow = m.receiveShadow = !!shadow;
    scene.add(m); return m;
  };

  // 地面
  mkMesh(new THREE.PlaneGeometry(120,120),
    new THREE.MeshStandardMaterial({color:0x2a5522,roughness:.9}),
    [0,0,0], -Math.PI/2, true);

  // 道路
  mkMesh(new THREE.PlaneGeometry(4,120),
    new THREE.MeshStandardMaterial({color:0x383848,roughness:.85}),
    [0,0.004,0], -Math.PI/2, true);

  // 道路中央線
  const lineMat = new THREE.MeshStandardMaterial({color:0xffff88});
  for (let z=-56;z<=56;z+=6)
    mkMesh(new THREE.PlaneGeometry(.15,3.2),lineMat,[0,0.009,z],-Math.PI/2,false);

  // 階段（左側 x=-6 付近）
  const stairMat = new THREE.MeshStandardMaterial({color:0x998866,roughness:.8});
  for (let i=0;i<6;i++) {
    const h=.2*(i+1), w=3, d=.55;
    mkMesh(new THREE.BoxGeometry(w,h,d),stairMat,[-6,h/2,-9+i*d],0,true);
  }

  // 木
  const tPos = [[8,0,-5],[10,0,-14],[-8,0,-7],[-11,0,4],[13,0,7],
                [7,0,16],[-9,0,19],[15,0,-21],[-13,0,-24],[6,0,27]];
  const trunk = new THREE.MeshStandardMaterial({color:0x6b3f1e});
  const leaf  = new THREE.MeshStandardMaterial({color:0x1e7a1e});
  tPos.forEach(([x,,z]) => {
    mkMesh(new THREE.CylinderGeometry(.2,.28,2.2,8),trunk,[x,1.1,z],0,true);
    mkMesh(new THREE.SphereGeometry(1.6,8,7),leaf,[x,3.4,z],0,true);
  });

  // 岩
  const rock = new THREE.MeshStandardMaterial({color:0x777766,roughness:.9});
  [[3.5,.5,-3.5],[-4,.5,5.5],[-3,.5,-16],[5,.5,22]].forEach(([x,y,z])=>{
    mkMesh(new THREE.SphereGeometry(.8,7,5),rock,[x,y,z],0,true);
  });

  // 建物（2棟）
  const wall = new THREE.MeshStandardMaterial({color:0x336688});
  const roof = new THREE.MeshStandardMaterial({color:0x882211});
  [[18,2.5,-12],[18,2.5,12]].forEach(([x,y,z])=>{
    mkMesh(new THREE.BoxGeometry(6,5,6),wall,[x,y,z],0,true);
    const r=mkMesh(new THREE.ConeGeometry(4.6,2.2,4),roof,[x,6.2,z],0,true);
    r.rotation.y=Math.PI/4;
  });

  // 小川（青い帯）
  mkMesh(new THREE.PlaneGeometry(2.5,60),
    new THREE.MeshStandardMaterial({color:0x2244aa,roughness:.2,metalness:.3}),
    [-14,0.01,0],-Math.PI/2,false);
})();

/* ──────────────────────────────────────────
   設定UI
────────────────────────────────────────── */
const settings = { faceDir: true, camFollow: true };

document.getElementById('btn-face-dir').addEventListener('click', e=>{
  settings.faceDir = !settings.faceDir;
  e.target.textContent = settings.faceDir ? 'ON' : 'OFF';
  e.target.classList.toggle('on', settings.faceDir);
});
document.getElementById('btn-cam-follow').addEventListener('click', e=>{
  settings.camFollow = !settings.camFollow;
  e.target.textContent = settings.camFollow ? 'ON' : 'OFF';
  e.target.classList.toggle('on', settings.camFollow);
  controls.enabled = !settings.camFollow;
});

/* ──────────────────────────────────────────
   入力管理
────────────────────────────────────────── */
const keys = new Set();
const justPressed = new Set(); // 1フレームだけのフラグ

window.addEventListener('keydown', e => {
  if (['Space','KeyW','KeyS','KeyA','KeyD'].includes(e.code)) e.preventDefault();
  if (!e.repeat) justPressed.add(e.code);
  keys.add(e.code);
});
window.addEventListener('keyup', e => keys.delete(e.code));

const K = {
  w:     () => keys.has('KeyW'),
  s:     () => keys.has('KeyS'),
  a:     () => keys.has('KeyA'),
  d:     () => keys.has('KeyD'),
  ctrl:  () => keys.has('ControlLeft') || keys.has('ControlRight'),
  space: () => keys.has('Space'),
  shiftJP: () => justPressed.has('ShiftLeft') || justPressed.has('ShiftRight'),
};

/* ──────────────────────────────────────────
   ステート管理
────────────────────────────────────────── */
let vrm     = null;
let mixer   = null;
const acts  = {};          // key -> AnimationAction
let curAct  = null;
let curState = 'idle';

// キャラ状態
const charPos = new THREE.Vector3(0,0,0);
let charYaw = 0;           // 現在の向き (Y軸ラジアン)
let charYawTarget = 0;     // 目標向き
let isCrouching = false;
let velY = 0;
let isGrounded = true;

// タイマー
let landTimer    = 0;
let turn180Timer = 0;
let turn180From  = 0;
let turn180ToRun = false;   // ターン後に走るか歩くか

function playAction(key, fadeIn = 0.2, timeScale = 1.0) {
  const next = acts[key];
  if (!next) return;        // アニメ未読込はスキップ
  if (curAct === next) {
    // 逆再生切り替えなどで timescale だけ変える
    if (Math.sign(curAct.timeScale) !== Math.sign(timeScale)) {
      curAct.setEffectiveTimeScale(timeScale);
      if (timeScale < 0) curAct.time = curAct.getClip().duration - 0.001;
    }
    return;
  }
  if (curAct) curAct.fadeOut(fadeIn);
  next.reset();
  next.setEffectiveWeight(1);
  next.setEffectiveTimeScale(timeScale);
  if (timeScale < 0) next.time = next.getClip().duration - 0.001;
  next.fadeIn(fadeIn);
  next.play();
  curAct = next;
}

// stateLabel 更新
function updateLabel() {
  document.getElementById('state-label').textContent =
    `状態: ${curState}  (${charPos.x.toFixed(1)}, ${charPos.y.toFixed(1)}, ${charPos.z.toFixed(1)})`;
}

function setState(s, fadeIn=0.2) {
  curState = s;
  updateLabel();
  const backScale = 0.7;

  switch(s) {
    case 'idle':         playAction('idle', fadeIn); break;
    case 'walk':         playAction('walk', fadeIn); break;
    case 'walkBack':     playAction('walkBack', fadeIn, backScale); break;
    case 'turn180':      playAction('turn180', 0.08); break;
    case 'runTurn180':   playAction('runTurn180', 0.08); break;
    case 'walkStrafeL':  playAction('strafeL', fadeIn); break;
    case 'walkStrafeR':  playAction('strafeR', fadeIn); break;
    case 'run':          playAction('run', fadeIn); break;
    case 'runBack':      playAction('runBack', fadeIn, backScale); break;
    case 'runStrafeL':   playAction('runStrafeL', fadeIn); break;
    case 'runStrafeR':   playAction('runStrafeR', fadeIn); break;
    case 'crouch':       playAction('crouch', fadeIn); break;
    case 'crouchWalk':   playAction('crouchWalk', fadeIn); break;
    case 'crouchWalkBack': playAction('crouchWalkRev', fadeIn); break;  // 逆再生クリップ
    case 'crouchStrafeL': playAction('crouchStrafeL', fadeIn); break;
    case 'crouchStrafeR': playAction('crouchStrafeR', fadeIn); break;
    case 'jump':         playAction('jump', 0.1); break;
    case 'fall':         playAction('fall', 0.2); break;
    case 'land':         playAction('land', 0.08); landTimer = LAND_DUR; break;
    case 'stairsUp':     playAction('stairsUp', 0.2); break;
  }
}

/* ──────────────────────────────────────────
   地面高さ（階段エリア簡易判定）
────────────────────────────────────────── */
function getGroundH(x, z) {
  // 左側の階段（x: -4.5〜-7.5, z: -9〜-5.7）
  if (x > -7.5 && x < -4.5 && z > -9.2 && z < -5.7) {
    const step = Math.max(0, Math.min(5, Math.floor((z + 9.2) / 0.55)));
    return 0.2 * (step + 1);
  }
  return 0;
}

/* ──────────────────────────────────────────
   カメラ追従
────────────────────────────────────────── */
function updateCamera(dt) {
  if (!settings.camFollow) { controls.update(); return; }
  const dist=7, height=3.8;
  const target = new THREE.Vector3(
    charPos.x + Math.sin(charYaw)*dist,
    charPos.y + height,
    charPos.z + Math.cos(charYaw)*dist
  );
  camera.position.lerp(target, dt*4.5);
  const lookTarget = new THREE.Vector3(charPos.x, charPos.y+1.3, charPos.z);
  controls.target.lerp(lookTarget, dt*9);
  controls.update();
}

/* ──────────────────────────────────────────
   キャラ更新（毎フレーム）
────────────────────────────────────────── */
function updateChar(dt) {
  if (!vrm) return;

  // ── Shiftトグル ──
  if (K.shiftJP()) {
    isCrouching = !isCrouching;
    setState(isCrouching ? 'crouch' : 'idle');
  }

  // ── 重力・ジャンプ ──
  const groundH = getGroundH(charPos.x, charPos.z);
  const onGround = charPos.y <= groundH + 0.02;

  if (!onGround) {
    velY += GRAVITY * dt;
    charPos.y = Math.max(groundH, charPos.y + velY * dt);
    if (charPos.y <= groundH) {
      velY = 0; charPos.y = groundH;
      setState('land');
    } else {
      if (curState !== 'jump' && curState !== 'land') setState('fall');
    }
    applyChar(); updateCamera(dt);
    mixer?.update(dt); vrm?.update(dt);
    justPressed.clear(); return;
  }
  charPos.y = groundH;
  isGrounded = true;

  // ── 着地モーション待ち ──
  if (landTimer > 0) {
    landTimer -= dt;
    if (landTimer <= 0) setState('idle');
    applyChar(); updateCamera(dt);
    mixer?.update(dt); vrm?.update(dt);
    justPressed.clear(); return;
  }

  // ── ジャンプ ──
  if (K.space() && justPressed.has('Space')) {
    velY = JUMP_VEL;
    charPos.y += 0.05;
    setState('jump');
    applyChar(); updateCamera(dt);
    mixer?.update(dt); vrm?.update(dt);
    justPressed.clear(); return;
  }

  // ── 180ターン処理 ──
  if (turn180Timer > 0) {
    turn180Timer -= dt;
    const t = 1 - Math.max(0, turn180Timer / TURN180_DUR);
    charYaw = turn180From + Math.PI * t;
    if (turn180Timer <= 0) {
      charYaw = turn180From + Math.PI;
      setState(turn180ToRun ? 'run' : 'walk');
    }
    applyChar(); updateCamera(dt);
    mixer?.update(dt); vrm?.update(dt);
    justPressed.clear(); return;
  }

  // ── 視点方向yaw取得 ──
  const camDirV = new THREE.Vector3();
  camera.getWorldDirection(camDirV);
  camDirV.y = 0; camDirV.normalize();
  const viewYaw = Math.atan2(camDirV.x, camDirV.z);

  // ── キー入力でステートを決定 ──
  const ctrl = K.ctrl();
  const w=K.w(), s=K.s(), a=K.a(), d=K.d();
  const moving = w||s||a||d;
  const isWalkState = curState==='walk'||curState==='walkBack'||curState==='walkStrafeL'||curState==='walkStrafeR';
  const isRunState  = curState==='run' ||curState==='runBack' ||curState==='runStrafeL' ||curState==='runStrafeR';

  let moveVec = new THREE.Vector3(0,0,0);
  let newState = curState;

  if (!isCrouching) {
    // ============ 通常モード ============
    if (!moving) {
      newState = 'idle';
    } else if (ctrl) {
      // ── 走り ──
      if (w && !s) {
        if (isRunState && curState==='runBack') { // 後ろ走り中にW → Turn180
          startTurn180(true); justPressed.clear(); return;
        }
        if (settings.faceDir) charYawTarget = viewYaw;
        newState = 'run';
        moveVec.set(Math.sin(charYaw),0,Math.cos(charYaw)).multiplyScalar(SPEED.run*dt);
      } else if (s && !w) {
        if (isRunState && curState==='run') { // 前走り中にS → Turn180 or runBack
          if (settings.faceDir) {
            charYawTarget = viewYaw;
            newState = 'runBack';
            moveVec.set(-Math.sin(charYaw),0,-Math.cos(charYaw)).multiplyScalar(SPEED.runBack*dt);
          } else {
            startTurn180(true); justPressed.clear(); return;
          }
        } else {
          if (settings.faceDir) {
            charYawTarget = viewYaw;
            newState = 'runBack';
            moveVec.set(-Math.sin(charYaw),0,-Math.cos(charYaw)).multiplyScalar(SPEED.runBack*dt);
          } else {
            charYawTarget = charYaw + Math.PI;
            newState = 'run';
            const fy = charYawTarget;
            moveVec.set(Math.sin(fy),0,Math.cos(fy)).multiplyScalar(SPEED.run*dt);
          }
        }
      } else if (a && !d) {
        if (settings.faceDir) {
          charYawTarget = viewYaw;
          newState = 'runStrafeL';
          moveVec.set(-Math.cos(charYaw),0,Math.sin(charYaw)).multiplyScalar(SPEED.runStrafe*dt);
        } else {
          charYawTarget = charYaw - Math.PI/2;
          newState = 'run';
          const fy = charYawTarget;
          moveVec.set(Math.sin(fy),0,Math.cos(fy)).multiplyScalar(SPEED.run*dt);
        }
      } else if (d && !a) {
        if (settings.faceDir) {
          charYawTarget = viewYaw;
          newState = 'runStrafeR';
          moveVec.set(Math.cos(charYaw),0,-Math.sin(charYaw)).multiplyScalar(SPEED.runStrafe*dt);
        } else {
          charYawTarget = charYaw + Math.PI/2;
          newState = 'run';
          const fy = charYawTarget;
          moveVec.set(Math.sin(fy),0,Math.cos(fy)).multiplyScalar(SPEED.run*dt);
        }
      }
    } else {
      // ── 歩き ──
      if (w && !s) {
        if (isWalkState && curState==='walkBack') {
          startTurn180(false); justPressed.clear(); return;
        }
        if (settings.faceDir) charYawTarget = viewYaw;
        newState = 'walk';
        moveVec.set(Math.sin(charYaw),0,Math.cos(charYaw)).multiplyScalar(SPEED.walk*dt);
      } else if (s && !w) {
        if (isWalkState && curState==='walk') {
          if (settings.faceDir) {
            charYawTarget = viewYaw;
            newState = 'walkBack';
            moveVec.set(-Math.sin(charYaw),0,-Math.cos(charYaw)).multiplyScalar(SPEED.walkBack*dt);
          } else {
            startTurn180(false); justPressed.clear(); return;
          }
        } else {
          if (settings.faceDir) {
            charYawTarget = viewYaw;
            newState = 'walkBack';
            moveVec.set(-Math.sin(charYaw),0,-Math.cos(charYaw)).multiplyScalar(SPEED.walkBack*dt);
          } else {
            charYawTarget = charYaw + Math.PI;
            newState = 'turn180';
            startTurn180(false); justPressed.clear(); return;
          }
        }
      } else if (a && !d) {
        if (settings.faceDir) {
          charYawTarget = viewYaw;
          newState = 'walkStrafeL';
          moveVec.set(-Math.cos(charYaw),0,Math.sin(charYaw)).multiplyScalar(SPEED.strafe*dt);
        } else {
          charYawTarget = charYaw - Math.PI/2;
          newState = 'walk';
          const fy = charYawTarget;
          moveVec.set(Math.sin(fy),0,Math.cos(fy)).multiplyScalar(SPEED.walk*dt);
        }
      } else if (d && !a) {
        if (settings.faceDir) {
          charYawTarget = viewYaw;
          newState = 'walkStrafeR';
          moveVec.set(Math.cos(charYaw),0,-Math.sin(charYaw)).multiplyScalar(SPEED.strafe*dt);
        } else {
          charYawTarget = charYaw + Math.PI/2;
          newState = 'walk';
          const fy = charYawTarget;
          moveVec.set(Math.sin(fy),0,Math.cos(fy)).multiplyScalar(SPEED.walk*dt);
        }
      }
    }
  } else {
    // ============ しゃがみモード ============
    if (!moving) {
      newState = 'crouch';
    } else if (w && !s) {
      newState = 'crouchWalk';
      moveVec.set(Math.sin(charYaw),0,Math.cos(charYaw)).multiplyScalar(SPEED.crouch*dt);
    } else if (s && !w) {
      if (settings.faceDir) {
        // 視点方向設定ON: Crouched Walking逆再生
        newState = 'crouchWalkBack';
        moveVec.set(-Math.sin(charYaw),0,-Math.cos(charYaw)).multiplyScalar(SPEED.crouch*dt);
      } else {
        charYawTarget = charYaw + Math.PI;
        newState = 'crouchWalk';
        const fy = charYawTarget;
        moveVec.set(Math.sin(fy),0,Math.cos(fy)).multiplyScalar(SPEED.crouch*dt);
      }
    } else if (a && !d) {
      if (settings.faceDir) {
        newState = 'crouchStrafeL';
        moveVec.set(-Math.cos(charYaw),0,Math.sin(charYaw)).multiplyScalar(SPEED.crouch*dt);
      } else {
        charYawTarget = charYaw - Math.PI/2;
        newState = 'crouchWalk';
        const fy = charYawTarget;
        moveVec.set(Math.sin(fy),0,Math.cos(fy)).multiplyScalar(SPEED.crouch*dt);
      }
    } else if (d && !a) {
      if (settings.faceDir) {
        newState = 'crouchStrafeR';
        moveVec.set(Math.cos(charYaw),0,-Math.sin(charYaw)).multiplyScalar(SPEED.crouch*dt);
      } else {
        charYawTarget = charYaw + Math.PI/2;
        newState = 'crouchWalk';
        const fy = charYawTarget;
        moveVec.set(Math.sin(fy),0,Math.cos(fy)).multiplyScalar(SPEED.crouch*dt);
      }
    }
  }

  // ── 階段判定 ──
  const stairH = getGroundH(charPos.x + moveVec.x, charPos.z + moveVec.z);
  if (stairH > charPos.y + 0.05 && moving) newState = 'stairsUp';

  // ── ステート更新（変わったときのみ） ──
  if (newState !== curState) setState(newState);

  // ── 向きスムーズ補間 ──
  let diff = ((charYawTarget - charYaw) % (Math.PI*2) + Math.PI*3) % (Math.PI*2) - Math.PI;
  charYaw += diff * Math.min(1, SPEED.turnSmooth * dt);

  // ── 移動 ──
  charPos.add(moveVec);
  charPos.y = Math.max(charPos.y, stairH);

  applyChar();
  updateCamera(dt);
  mixer?.update(dt);
  vrm?.update(dt);
  justPressed.clear();
}

function startTurn180(run) {
  turn180From = charYaw;
  turn180Timer = TURN180_DUR;
  turn180ToRun = run;
  setState(run ? 'runTurn180' : 'turn180', 0.08);
}

function applyChar() {
  if (!vrm) return;
  vrm.scene.position.copy(charPos);
  vrm.scene.rotation.y = charYaw;
}

/* ──────────────────────────────────────────
   アニメーション全読込
────────────────────────────────────────── */
async function loadAllAnimations(vrmModel) {
  mixer = new THREE.AnimationMixer(vrmModel.scene);
  const entries = Object.entries(ANIM);
  let done = 0;
  for (const [key, file] of entries) {
    try {
      const rev = key === 'crouchWalkRev';
      const clip = await loadMixamoAnimation('./'+file, vrmModel, rev);
      clip.name = key;
      const act = mixer.clipAction(clip);
      act.setLoop(THREE.LoopRepeat);
      acts[key] = act;
      // land / jump は LoopOnce
      if (key==='land'||key==='jump') act.setLoop(THREE.LoopOnce, 1);
    } catch(e) {
      console.warn(`スキップ: ${file}`, e.message);
    }
    done++;
    loadingBar.style.width = (50 + Math.round(done/entries.length*48)) + '%';
    loadingText.textContent = `アニメ読込 ${done}/${entries.length}: ${file}`;
  }
}

/* ──────────────────────────────────────────
   VRM読み込み
────────────────────────────────────────── */
const clock = new THREE.Clock();
const loadingBar  = document.getElementById('loading-bar');
const loadingText = document.getElementById('loading-text');

const gltfLoader = new GLTFLoader();
gltfLoader.register(p => new VRMLoaderPlugin(p));

gltfLoader.load(VRM_PATH,
  async gltf => {
    const vrmModel = gltf.userData.vrm;
    VRMUtils.removeUnnecessaryVertices(gltf.scene);
    VRMUtils.removeUnnecessaryJoints(gltf.scene);
    VRMUtils.rotateVRM0(vrmModel);
    vrmModel.scene.castShadow = true;
    scene.add(vrmModel.scene);
    vrm = vrmModel;
    charPos.set(0,0,0); applyChar();

    setupExpressionUI(vrmModel);
    loadingBar.style.width = '50%';
    loadingText.textContent = 'アニメーション読み込み中...';

    try {
      await loadAllAnimations(vrmModel);
      setState('idle');
    } catch(e) { console.error(e); }

    loadingBar.style.width = '100%';
    setTimeout(()=>{ document.getElementById('loading-overlay').style.display='none'; }, 250);
  },
  prog => {
    if (prog.total) {
      const p = Math.round(prog.loaded/prog.total*50);
      loadingBar.style.width = p+'%';
      loadingText.textContent = `VRM読込中... ${p}%`;
    }
  },
  err => {
    console.error(err);
    loadingText.textContent = 'VRM読み込み失敗';
    loadingBar.style.background = '#ff5555';
  }
);

/* ──────────────────────────────────────────
   表情UI
────────────────────────────────────────── */
function setupExpressionUI(vrmModel) {
  const listEl = document.getElementById('exprList');
  listEl.innerHTML = '';
  if (!vrmModel.expressionManager) { listEl.textContent='表情なし'; return; }
  const names = Object.keys(vrmModel.expressionManager.expressionMap);
  names.forEach(name => {
    const btn = document.createElement('button');
    btn.className='expr-btn'; btn.textContent=name;
    btn.onclick = () => {
      names.forEach(n=>vrmModel.expressionManager.setValue(n,0));
      vrmModel.expressionManager.setValue(name,1);
      document.querySelectorAll('.expr-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    };
    listEl.appendChild(btn);
  });
  const rst=document.createElement('button');
  rst.className='expr-btn';rst.id='resetExpr';rst.textContent='リセット';
  rst.onclick=()=>{
    names.forEach(n=>vrmModel.expressionManager.setValue(n,0));
    document.querySelectorAll('.expr-btn').forEach(b=>b.classList.remove('active'));
  };
  listEl.appendChild(rst);
}

/* ──────────────────────────────────────────
   リサイズ
────────────────────────────────────────── */
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

/* ──────────────────────────────────────────
   メインループ
────────────────────────────────────────── */
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  updateChar(dt);
  renderer.render(scene, camera);
}
animate();
</script>
