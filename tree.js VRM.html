<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VRM Viewer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #15151f;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  #canvas-container { position: fixed; inset: 0; }

  #ui {
    position: fixed;
    top: 12px;
    left: 12px;
    color: #fff;
    background: rgba(0, 0, 0, 0.55);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.7;
    max-width: 280px;
    pointer-events: none;
  }
  #ui h1 { margin: 0 0 6px; font-size: 15px; }
  #status { color: #8be9fd; }

  #expressions {
    position: fixed;
    top: 12px;
    right: 12px;
    max-width: 230px;
    max-height: 80vh;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.55);
    color: #fff;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 12px;
  }
  #expressions h2 { margin: 0 0 8px; font-size: 13px; }
  .expr-btn {
    display: block;
    width: 100%;
    margin: 3px 0;
    padding: 6px 8px;
    border: none;
    border-radius: 6px;
    background: #2e2e4d;
    color: #fff;
    cursor: pointer;
    font-size: 12px;
    text-align: left;
  }
  .expr-btn:hover { background: #45457a; }
  .expr-btn.active { background: #5b6cff; }
  #resetExpr { margin-top: 8px; background: #553333; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui">
  <h1>VRM Viewer</h1>
  <div id="status">読み込み中...</div>
  <div style="margin: 6px 0; pointer-events: auto;">
    <label for="vrmModelSelect" style="display:block; margin-bottom:2px;">3Dモデル切り替え：</label>
    <select id="vrmModelSelect" style="width:100%; padding:4px; border-radius:6px; background:#2e2e4d; color:#fff; border:none;"></select>
  </div>
  <div>ドラッグ：視点回転 / ホイール：ズーム</div>
  <div>↑：早歩き　↓：ゆっくり</div>
  <div>←→：その場で向きを変える</div>
</div>

<div id="expressions">
  <h2>表情一覧（VRMから自動検出）</h2>
  <div id="exprList">VRM読み込み後に表示されます</div>
</div>

  // { name: 'MMDモデル名', type: 'mmd', path: './models/sample.pmx' },
];

// 走る/アイドルなど別のモーションを追加したい場合は、ここに増やして
// 下の「複数アニメーションを使う場合の拡張例」を参考に組み込んでください。
// const RUN_ANIMATION_PATH = './Running.fbx';
// const IDLE_ANIMATION_PATH = './Idle.fbx';

/* ====================================================================
   【拡張機能・設定】3人称キャラクターコントローラー / Animator
   ------------------------------------------------------------------
   既存の①〜⑥(VRM読込・表情UI・矢印キーのお試し操作)の処理には
   一切手を加えていません。WASD + Z(走る) + Shift(しゃがみ) +

   index.html と同じフォルダに、以下のファイル名のまま Mixamo の
   FBXアニメーションを配置してください（半角スペースを含むファイル名です）。
   ==================================================================== */
const CHAR_ANIM_FILES = {
  idle:             'Standard Idle.fbx',
  walk:             'Walking.fbx',               // 既存の WALK_ANIMATION_PATH と同じモーション

  runBackward:      'Running Backward.fbx',
  runTurn180:       'Running Turn 180.fbx',
  strafeRunLeft:    'Left Strafe.fbx',
  strafeRunRight:   'Right Strafe.fbx',
  crouchIdle:       'Male Crouch Pose.fbx',
  crouchWalk:       'Crouched Walking.fbx',
  crouchSneakLeft:  'Crouched Sneaking Left.fbx',
  crouchSneakRight: 'Crouched Sneaking Right.fbx',
  jump:             'Jumping.fbx',
  fallingIdle:      'Falling Idle.fbx',
  landing:          'Falling To Landing.fbx',

/* ====================================================================
   【拡張】追加のアニメーションファイルを読み込みたいだけの場合は、
   ここにファイル名を1行追加するだけでOKです（他の場所は書き換え不要）。
   ------------------------------------------------------------------
   ・index.html と同じフォルダに置いた .fbx ファイル名をそのまま書いてください。
   ・拡張子を除いたファイル名がそのまま再生キーになります
     （例: 'Waving.fbx' を追加 → characterAnimator.play('Waving') で再生可能）。
   ・自動的に読み込まれ、CharacterAnimator の中でアクションとして使えるようになります。
   ・キー入力などに実際に割り当てて使いたい場合は、別途 CharacterController /
     updateStandardMovement 等のロジック側でそのキー名を呼び出すコードが必要です。
   ・ループ再生させたい場合は、下の CharacterAnimator 内の loopKeys にも
     同じキー名を追加してください（追加しなければ1回再生になります）。
   ==================================================================== */
const EXTRA_ANIMATION_FILES = [
  // ↓↓↓ ここにファイル名を追加するだけで自動的に読み込まれます ↓↓↓
  // 'Waving.fbx',
  // 'Clapping.fbx',
];


// 調整可能なパラメータ
const CHAR_TUNING = {
  walkSpeed: 1.4,               // m/s
  walkBackwardSpeedScale: 0.6,  // LookAtCameraDir=ON で後退する時だけ速度を落とす(仕様3.の備考)
  runSpeed: 3.2,                // m/s
  crouchSpeed: 0.9,             // m/s
  turnLerpSpeed: 10,            // 体の向きが目標角度へ追従する速さ
  turn180Duration: 0.45,        // Turn180を挟んでいる間、体を半回転させる秒数
  gravity: 9.8,                 // m/s^2
  jumpUpSpeed: 4.2,              // ジャンプ初速 m/s
  crossFadeDuration: 0.2,       // アニメーション切替のクロスフェード時間
  groundY: 0,                   // 地面の高さ(このビューアでは床がY=0)
};

// 設定：視点方向を向く (LookAtCameraDir)
// ON  : 体は常にカメラの正面を基準(0度)にする(ストレイフ/後退用クリップを使用)
// OFF : 体は常に実際の移動方向を向く(平歩行/平走行クリップ+コードによる向き変更で表現)
const charSettings = {
  lookAtCameraDir: true,
  debug: false, // trueにすると画面右上に方向ベクトル等のデバッグ情報を表示
};

/* ====================================================================
   ② Mixamo → VRM ボーン名 対応表
   ミクサモのリグ名 (mixamorigXXX) は VRM の Humanoid ボーン名と
   名前も階層も違うため、この対応表で1本ずつ紐づけてから動かします。
   （pixiv公式 three-vrm のサンプルで使われている対応表と同じものです）
   ==================================================================== */
const mixamoVRMRigMap = {
  mixamorigHips: 'hips',
  mixamorigSpine: 'spine',
  mixamorigSpine1: 'chest',
  mixamorigSpine2: 'upperChest',
  mixamorigNeck: 'neck',
  mixamorigHead: 'head',
  mixamorigLeftShoulder: 'leftShoulder',
  mixamorigLeftArm: 'leftUpperArm',
  mixamorigLeftForeArm: 'leftLowerArm',
  mixamorigLeftHand: 'leftHand',
  mixamorigLeftHandThumb1: 'leftThumbMetacarpal',
  mixamorigLeftHandThumb2: 'leftThumbProximal',
  mixamorigLeftHandThumb3: 'leftThumbDistal',
  mixamorigLeftHandIndex1: 'leftIndexProximal',
  mixamorigLeftHandIndex2: 'leftIndexIntermediate',
  mixamorigLeftHandIndex3: 'leftIndexDistal',
  mixamorigLeftHandMiddle1: 'leftMiddleProximal',
  mixamorigLeftHandMiddle2: 'leftMiddleIntermediate',
  mixamorigLeftHandMiddle3: 'leftMiddleDistal',
  mixamorigLeftHandRing1: 'leftRingProximal',
  mixamorigLeftHandRing2: 'leftRingIntermediate',
  mixamorigLeftHandRing3: 'leftRingDistal',
  mixamorigLeftHandPinky1: 'leftLittleProximal',
  mixamorigLeftHandPinky2: 'leftLittleIntermediate',
  mixamorigLeftHandPinky3: 'leftLittleDistal',
  mixamorigRightShoulder: 'rightShoulder',
  mixamorigRightArm: 'rightUpperArm',
  mixamorigRightForeArm: 'rightLowerArm',
  mixamorigRightHand: 'rightHand',
  mixamorigRightHandPinky1: 'rightLittleProximal',
  mixamorigRightHandPinky2: 'rightLittleIntermediate',
  mixamorigRightHandPinky3: 'rightLittleDistal',
  mixamorigRightHandRing1: 'rightRingProximal',
  mixamorigRightHandRing2: 'rightRingIntermediate',
  mixamorigRightHandRing3: 'rightRingDistal',
  mixamorigRightHandMiddle1: 'rightMiddleProximal',
  mixamorigRightHandMiddle2: 'rightMiddleIntermediate',
  mixamorigRightHandMiddle3: 'rightMiddleDistal',
  mixamorigRightHandIndex1: 'rightIndexProximal',
  mixamorigRightHandIndex2: 'rightIndexIntermediate',
  mixamorigRightHandIndex3: 'rightIndexDistal',
  mixamorigRightHandThumb1: 'rightThumbMetacarpal',
  mixamorigRightHandThumb2: 'rightThumbProximal',
  mixamorigRightHandThumb3: 'rightThumbDistal',
  mixamorigLeftUpLeg: 'leftUpperLeg',
  mixamorigLeftLeg: 'leftLowerLeg',
  mixamorigLeftFoot: 'leftFoot',
  mixamorigLeftToeBase: 'leftToes',
  mixamorigRightUpLeg: 'rightUpperLeg',
  mixamorigRightLeg: 'rightLowerLeg',
  mixamorigRightFoot: 'rightFoot',
  mixamorigRightToeBase: 'rightToes',
};

/* ====================================================================
   ③ ミクサモのFBXアニメーションを VRM 用 AnimationClip に変換する関数
   pixiv公式 three-vrm のサンプル loadMixamoAnimation.js をベースに、
   「その場から動かさない」処理 (KEEP_IN_PLACE) を追加したものです。
   https://github.com/pixiv/three-vrm/tree/dev/packages/three-vrm-core/examples/humanoidAnimation
   ==================================================================== */
function loadMixamoAnimation(url, vrm, keepInPlace = true, hipsYawOffsetDeg = 0) {
  const loader = new FBXLoader();
  // Hips(ルートボーン)だけをY軸まわりに指定角度だけ回転させておくと、
  // Hipsを親とする全身がまとめて回るため、クリップ全体を丸ごと
  // 「指定角度だけ回転させた向き」で再生できる。
  const hipsYawOffsetQuat = new THREE.Quaternion().setFromAxisAngle(
    new THREE.Vector3(0, 1, 0),
    THREE.MathUtils.degToRad(hipsYawOffsetDeg),
  );

  return loader.loadAsync(url).then((asset) => {
    // Mixamoから書き出されたFBXは、アニメーション名が "mixamo.com" になっていることが多い
    const clip = THREE.AnimationClip.findByName(asset.animations, 'mixamo.com') || asset.animations[0];
    if (!clip) throw new Error('FBXの中にアニメーションが見つかりませんでした');

    const tracks = [];
    const restRotationInverse = new THREE.Quaternion();
    const parentRestWorldRotation = new THREE.Quaternion();
    const _quatA = new THREE.Quaternion();

    // ミクサモとVRMでは腰(Hips)の高さ＝身長スケールが違うため、比率を求めて補正する
    const mixamoHipsNode = asset.getObjectByName('mixamorigHips');
    const motionHipsHeight = mixamoHipsNode.position.y;
    const vrmHipsHeight = vrm.humanoid.normalizedRestPose.hips.position[1];
    const hipsPositionScale = vrmHipsHeight / motionHipsHeight;

    clip.tracks.forEach((track) => {
      // トラック名は "mixamorigHips.quaternion" のような形式になっている
      const [mixamoRigName, propertyName] = track.name.split('.');
      const vrmBoneName = mixamoVRMRigMap[mixamoRigName];
      const vrmNodeName = vrm.humanoid?.getNormalizedBoneNode(vrmBoneName)?.name;
      const mixamoRigNode = asset.getObjectByName(mixamoRigName);

      // 対応表に無いボーン（指の一部や補助ボーンなど）は無視する
      if (vrmNodeName == null || mixamoRigNode == null) return;

      // レスト(直立)姿勢時の回転を基準に、回転の差分だけを取り出す
      mixamoRigNode.getWorldQuaternion(restRotationInverse).invert();
      mixamoRigNode.parent.getWorldQuaternion(parentRestWorldRotation);

      if (track instanceof THREE.QuaternionKeyframeTrack) {
        for (let i = 0; i < track.values.length; i += 4) {
          const flat = track.values.slice(i, i + 4);
          _quatA.fromArray(flat).premultiply(parentRestWorldRotation).multiply(restRotationInverse);
          // ★このクリップだけ体全体を指定角度回転させたい場合(Hipsのみ)
          if (hipsYawOffsetDeg !== 0 && mixamoRigName === 'mixamorigHips') {
            _quatA.premultiply(hipsYawOffsetQuat);
          }
          _quatA.toArray(flat);
          flat.forEach((v, idx) => (track.values[idx + i] = v));
        }
        tracks.push(new THREE.QuaternionKeyframeTrack(
          `${vrmNodeName}.${propertyName}`,
          track.times,
          // VRM0.0モデルは前後左右の軸が反転しているので、その場合だけ符号を反転する
          track.values.map((v, i) => (vrm.meta?.metaVersion === '0' && i % 2 === 0 ? -v : v)),
        ));
      } else if (track instanceof THREE.VectorKeyframeTrack) {
        const values = track.values.map(
          (v, i) => (vrm.meta?.metaVersion === '0' && i % 3 !== 1 ? -v : v) * hipsPositionScale,
        );

        // Hipsの「位置」トラック＝歩行による前進(根本移動)が入っている部分
        if (mixamoRigName === 'mixamorigHips' && propertyName === 'position' && keepInPlace) {
          // X(左右)とZ(前後)だけ0にする。Y(上下の重心バウンス)はそのまま残すので
          // 「その場で足踏みしている」自然な動きになる
          for (let i = 0; i < values.length; i += 3) {
            values[i] = 0;
            values[i + 2] = 0;
          }
        }
        tracks.push(new THREE.VectorKeyframeTrack(`${vrmNodeName}.${propertyName}`, track.times, values));
      }
    });

    return new THREE.AnimationClip('walk', clip.duration, tracks);
  });
}


/* ====================================================================
   ③' 【拡張】MMDモデル用：Mixamo → MMD ボーン名 対応表 ＆ リターゲット処理
   ------------------------------------------------------------------
   VRMのHumanoidボーンには標準名(hips, spineなど)がありますが、
   MMD(.pmx)にはそれが無く、モデルごとに「下半身」「上半身」等の
   日本語ボーン名を直接持っています。ここでは多くのMMDモデルで
   共通して使われる標準的なボーン名を前提に対応表を作っています。
   （モデルによってボーン名が違う場合は、下記の値を実際のモデルの
   　ボーン名に書き換えてください）
   ==================================================================== */
const mixamoMMDRigMap = {
  // Hipsの「回転」はここ(下半身)へ適用します。「位置(移動)」は
  // MMD_HIPS_POSITION_BONE_NAME で指定した別ボーン(センター)へ適用します。
  mixamorigHips: '下半身',
  mixamorigSpine: '上半身',
  mixamorigSpine1: '上半身2',
  mixamorigSpine2: '上半身3', // 無いモデルも多く、その場合は自動的に無視されます
  mixamorigNeck: '首',
  mixamorigHead: '頭',

  mixamorigLeftShoulder: '左肩',
  mixamorigLeftArm: '左腕',
  mixamorigLeftForeArm: '左ひじ',
  mixamorigLeftHand: '左手首',
  mixamorigLeftHandThumb1: '左親指０',
  mixamorigLeftHandThumb2: '左親指１',
  mixamorigLeftHandThumb3: '左親指２',
  mixamorigLeftHandIndex1: '左人指１',
  mixamorigLeftHandIndex2: '左人指２',
  mixamorigLeftHandIndex3: '左人指３',
  mixamorigLeftHandMiddle1: '左中指１',
  mixamorigLeftHandMiddle2: '左中指２',
  mixamorigLeftHandMiddle3: '左中指３',
  mixamorigLeftHandRing1: '左薬指１',
  mixamorigLeftHandRing2: '左薬指２',
  mixamorigLeftHandRing3: '左薬指３',
  mixamorigLeftHandPinky1: '左小指１',
  mixamorigLeftHandPinky2: '左小指２',
  mixamorigLeftHandPinky3: '左小指３',

  mixamorigRightShoulder: '右肩',
  mixamorigRightArm: '右腕',
  mixamorigRightForeArm: '右ひじ',
  mixamorigRightHand: '右手首',
  mixamorigRightHandThumb1: '右親指０',
  mixamorigRightHandThumb2: '右親指１',
  mixamorigRightHandThumb3: '右親指２',
  mixamorigRightHandIndex1: '右人指１',
  mixamorigRightHandIndex2: '右人指２',
  mixamorigRightHandIndex3: '右人指３',
  mixamorigRightHandMiddle1: '右中指１',
  mixamorigRightHandMiddle2: '右中指２',
  mixamorigRightHandMiddle3: '右中指３',
  mixamorigRightHandRing1: '右薬指１',
  mixamorigRightHandRing2: '右薬指２',
  mixamorigRightHandRing3: '右薬指３',
  mixamorigRightHandPinky1: '右小指１',
  mixamorigRightHandPinky2: '右小指２',
  mixamorigRightHandPinky3: '右小指３',

  mixamorigLeftUpLeg: '左足',
  mixamorigLeftLeg: '左ひざ',
  mixamorigLeftFoot: '左足首',
  mixamorigLeftToeBase: '左つま先',
  mixamorigRightUpLeg: '右足',
  mixamorigRightLeg: '右ひざ',
  mixamorigRightFoot: '右足首',
  mixamorigRightToeBase: '右つま先',
};

// Hipsの「位置」トラック(前進移動やY方向の重心バウンス)を適用するボーン名。
// このボーンが無いモデルの場合は、自動的に mixamorigHips の回転先(下半身)へ
// 位置トラックも一緒に適用するようフォールバックします。
const MMD_HIPS_POSITION_BONE_NAME = 'センター';

// MMDモデルの正面の向き調整(度)。多くのMMDモデルは three.js に読み込むと
// +Z方向を向くため、既存コードの前方判定(-Z基準)に合わせて180度回転させています。
// 手持ちのモデルで前後が逆になる場合は 0 に変更してください。
const MMD_FRONT_YAW_OFFSET_DEG = 180;

// VRM版 loadMixamoAnimation() と同じ考え方で、MixamoのFBXアニメーションを
// MMDモデルのスケルトンにリターゲットする。VRMのようなHumanoidの正規化された
// レストポーズが無いため、読み込み時点のボーンのワールド回転を基準にして
// 差分だけを取り出す(Mixamo同士のリターゲットと同じ一般的な手法)。
function loadMixamoAnimationForMMD(url, mmdMesh, keepInPlace = true, hipsYawOffsetDeg = 0) {
  const loader = new FBXLoader();
  const hipsYawOffsetQuat = new THREE.Quaternion().setFromAxisAngle(
    new THREE.Vector3(0, 1, 0),
    THREE.MathUtils.degToRad(hipsYawOffsetDeg),
  );

  return loader.loadAsync(url).then((asset) => {
    const clip = THREE.AnimationClip.findByName(asset.animations, 'mixamo.com') || asset.animations[0];
    if (!clip) throw new Error('FBXの中にアニメーションが見つかりませんでした');

    mmdMesh.updateMatrixWorld(true);
    const skeleton = mmdMesh.skeleton;
    const boneByName = {};
    skeleton.bones.forEach((b) => { boneByName[b.name] = b; });

    const hipsRotationBone = boneByName[mixamoMMDRigMap.mixamorigHips]; // 下半身
    const hipsPositionBone = boneByName[MMD_HIPS_POSITION_BONE_NAME] || hipsRotationBone; // センター(無ければ下半身で代用)
    const hipsHeightRefBone = hipsRotationBone || hipsPositionBone || skeleton.bones[0];

    const mixamoHipsNode = asset.getObjectByName('mixamorigHips');
    const motionHipsHeight = mixamoHipsNode.position.y;

    const worldPos = new THREE.Vector3();
    hipsHeightRefBone.getWorldPosition(worldPos);
    const hipsPositionScale = (worldPos.y || 1) / motionHipsHeight;

    const tracks = [];
    const restRotationInverse = new THREE.Quaternion();
    const parentRestWorldRotation = new THREE.Quaternion();
    const _quatA = new THREE.Quaternion();

    clip.tracks.forEach((track) => {
      const [mixamoRigName, propertyName] = track.name.split('.');
      const mixamoRigNode = asset.getObjectByName(mixamoRigName);
      if (mixamoRigNode == null) return;

      // Hipsの「位置」トラック(前進・上下バウンス)はセンター(無ければ下半身)へ
      if (propertyName === 'position') {
        if (mixamoRigName !== 'mixamorigHips' || !hipsPositionBone) return;
        const values = track.values.map((v) => v * hipsPositionScale);
        if (keepInPlace) {
          // X(左右)とZ(前後)だけ0にする。Y(上下の重心バウンス)はそのまま残す
          for (let i = 0; i < values.length; i += 3) {
            values[i] = 0;
            values[i + 2] = 0;
          }
        }
        tracks.push(new THREE.VectorKeyframeTrack(`${hipsPositionBone.name}.position`, track.times, values));
        return;
      }

      // 対応表に無いボーン(指の一部や補助ボーンなど、モデルにより名前が違うもの)は無視する
      const mmdBoneName = mixamoMMDRigMap[mixamoRigName];
      const mmdBoneNode = mmdBoneName ? boneByName[mmdBoneName] : null;
      if (mmdBoneNode == null) return;

      // レスト(直立)姿勢時の回転を基準に、回転の差分だけを取り出す
      mixamoRigNode.getWorldQuaternion(restRotationInverse).invert();
      mixamoRigNode.parent.getWorldQuaternion(parentRestWorldRotation);

      const values = track.values.slice();
      for (let i = 0; i < values.length; i += 4) {
        const flat = values.slice(i, i + 4);
        _quatA.fromArray(flat).premultiply(parentRestWorldRotation).multiply(restRotationInverse);
        // Hipsのみ、クリップ全体を指定角度だけ追加でY軸回転させたい場合
        if (hipsYawOffsetDeg !== 0 && mixamoRigName === 'mixamorigHips') {
          _quatA.premultiply(hipsYawOffsetQuat);
        }
        _quatA.toArray(flat);
        flat.forEach((v, idx) => (values[idx + i] = v));
      }
      tracks.push(new THREE.QuaternionKeyframeTrack(`${mmdBoneNode.name}.quaternion`, track.times, values));
    });

    return new THREE.AnimationClip('walk', clip.duration, tracks);
  });
}

// 読み込んだMMDの SkinnedMesh を、既存のVRM用コード(CharacterController等)が
// そのまま使えるように「.scene(位置・回転の基準となるObject3D)」と
// 「.update(delta)(VRMでいう表情/スプリングボーン更新。MMDでは何もしない)」を
// 持つ簡易アダプタでラップする。こうすることで CharacterController や
// メインループ側の currentVrm.scene / currentVrm.update(delta) は
// VRMでもMMDでも一切コードを変えずに動く。
function createMmdAvatarAdapter(mesh) {
  const root = new THREE.Group();
  root.name = 'mmdAvatarRoot';
  root.rotation.y = THREE.MathUtils.degToRad(MMD_FRONT_YAW_OFFSET_DEG);
  root.add(mesh);
  return {
    isMMD: true,
    scene: root,
    mesh,
    update() {}, // MMDは毎フレームの表情/スプリングボーン更新が不要なため何もしない
  };
}

// VRM版 loadAllCharacterAnimations() と同じく、CHAR_ANIM_FILES /
// EXTRA_ANIMATION_FILES を読み込んでMMD用にリターゲットしたクリップ一式を返す
async function loadAllCharacterAnimationsForMMD(mesh) {
  const namedEntries = Object.entries(CHAR_ANIM_FILES);
  const extraEntries = EXTRA_ANIMATION_FILES.map((file) => [file.replace(/\.fbx$/i, ''), file]);
  const entries = [...namedEntries, ...extraEntries];

  const clipMap = {};
  await Promise.all(entries.map(async ([key, file]) => {
    try {
      const yawOffsetDeg = CLIP_YAW_OFFSET_DEG[key] || 0;
      const clip = await loadMixamoAnimationForMMD(`./${file}`, mesh, true, yawOffsetDeg);
      clip.name = key;
      clipMap[key] = clip;
    } catch (err) {
      console.warn(`[CharacterController/MMD] アニメーション "${file}" の読み込みに失敗しました。`, err);
    }
  }));
  return clipMap;
}

// VRM版 initExtendedCharacterController() と同じ役割(MMD版)
async function initExtendedCharacterControllerForMMD(avatar, mesh, mixer) {
  statusEl.textContent = '拡張アニメーション読込中...(MMD)';
  const clipMap = await loadAllCharacterAnimationsForMMD(mesh);

  if (Object.keys(clipMap).length === 0) {
    console.warn('[CharacterController/MMD] 拡張アニメーションが1つも読み込めなかったため、初期化を中止しました。');
    return;
  }

  if (walkAction) walkAction.stop();

  characterAnimator = new CharacterAnimator(mixer, clipMap);
  characterController = new CharacterController(avatar, characterAnimator, camera);

  statusEl.textContent = '準備完了！ WASD：移動 / Z：走る / Shift：しゃがみ / Space：ジャンプ';
}

let mixer = null;
let walkAction = null;

/* ====================================================================
   ④ VRMの読み込み（モデル切り替え対応）
   ==================================================================== */
const gltfLoader = new GLTFLoader();
gltfLoader.register((parser) => new VRMLoaderPlugin(parser));

// 【拡張】MMD(.pmx/.pmd)読み込み用ローダー
const mmdLoader = new MMDLoader();

// シーン上のジオメトリ/マテリアル/テクスチャをまとめて解放するための小さなヘルパー
// (モデルを切り替えるたびに古いモデルのメモリが残り続けないようにする)
function disposeObject3D(root) {
  root.traverse((obj) => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
      materials.forEach((mat) => {
        Object.values(mat).forEach((value) => {
          if (value && value.isTexture) value.dispose();
        });
        mat.dispose();
      });
    }
  });
}

// 現在表示中のVRM・アニメーション・拡張コントローラーをすべて破棄する
// (モデル切り替え時に、古いモデルのキー入力リスナーやアニメーションが
//  残って二重に動いてしまうのを防ぐ)
function disposeCurrentVRM() {
  if (characterController) {
    characterController.dispose();
    characterController = null;
  }
  characterAnimator = null;

  if (mixer) {
    mixer.stopAllAction();
    mixer = null;
  }
  walkAction = null;

  if (currentVrm) {
    scene.remove(currentVrm.scene);
    disposeObject3D(currentVrm.scene);
    currentVrm = null;
  }
}

// 指定したパスのVRMを読み込んで表示する。既にモデルが表示されていれば
// 先に破棄してから読み込む(=プルダウンでの切り替えにも使える共通関数)。
function loadVRMModel(path) {
  statusEl.textContent = `VRM読み込み中... (${path})`;

  gltfLoader.load(
    path,
    async (gltf) => {
      disposeCurrentVRM();

      const vrm = gltf.userData.vrm;

      // 表示に不要なデータを削除して軽量化（任意・無くても動作します）
      VRMUtils.removeUnnecessaryVertices(gltf.scene);
      VRMUtils.removeUnnecessaryJoints(gltf.scene);

      // VRM0.x のモデルは正面が後ろ(-Z)を向いているため、自動で前(+Z)向きに補正する
      // VRM1.0のモデルなら何もしない（バージョンを自動判定）
      VRMUtils.rotateVRM0(vrm);

      scene.add(vrm.scene);
      currentVrm = vrm;
      statusEl.textContent = 'VRM読み込み完了。アニメーション読込中...';

      // VRMに入っている表情(Expression)の一覧をUIとコンソールに表示
      setupExpressionUI(vrm);

      // ミクサモのアニメーションを読み込んでVRMに適用する
      mixer = new THREE.AnimationMixer(vrm.scene);
      try {
        const walkClip = await loadMixamoAnimation(WALK_ANIMATION_PATH, vrm, KEEP_IN_PLACE);
        walkAction = mixer.clipAction(walkClip);
        walkAction.play(); // 読み込めたら自動でループ再生開始
        statusEl.textContent = '準備完了！矢印キーで速度や向きを変えられます';
      } catch (e) {
        console.error('アニメーション読み込み失敗:', e);
        statusEl.textContent = 'VRMは表示できましたが、アニメーション読込に失敗しました（コンソール参照）';
      }

      // 【拡張】3人称キャラクターコントローラー / Animator の初期化
      try {
        await initExtendedCharacterController(vrm, mixer);
      } catch (e) {
        console.error('拡張キャラクターコントローラーの初期化に失敗しました:', e);
      }
    },
    (progress) => {
      if (progress.total) {
        statusEl.textContent = `VRM読み込み中... ${Math.round((progress.loaded / progress.total) * 100)}%`;
      }
    },
    (error) => {
      console.error(error);
      statusEl.textContent = 'VRMの読み込みに失敗しました。ファイル名/パスを確認してください。';
    },
  );
}

// 【拡張】指定したパスのMMD(.pmx/.pmd)を読み込んで表示する。
// loadVRMModel() のMMD版で、役割・流れはVRM版と同じ。
function loadMMDModel(path) {
  statusEl.textContent = `MMD読み込み中... (${path})`;

  mmdLoader.load(
    path,
    async (mesh) => {
      disposeCurrentVRM();

      const avatar = createMmdAvatarAdapter(mesh);
      scene.add(avatar.scene);
      // VRMでもMMDでも後続コード(コントローラー・追従カメラ等)が共通で使えるよう、
      // 既存の currentVrm 変数にそのままMMDアダプタを入れて使い回す
      currentVrm = avatar;
      statusEl.textContent = 'MMD読み込み完了。アニメーション読込中...';

      // MMDには(このビューアでは)表情UIが無いため、その旨を表示するだけ
      setupExpressionUI(avatar);

      mixer = new THREE.AnimationMixer(mesh);
      try {
        const walkClip = await loadMixamoAnimationForMMD(WALK_ANIMATION_PATH, mesh, KEEP_IN_PLACE);
        walkAction = mixer.clipAction(walkClip);
        walkAction.play();
        statusEl.textContent = '準備完了！矢印キーで速度や向きを変えられます';
      } catch (e) {
        console.error('アニメーション読み込み失敗:', e);
        statusEl.textContent = 'MMDは表示できましたが、アニメーション読込に失敗しました（コンソール参照）';
      }

      try {
        await initExtendedCharacterControllerForMMD(avatar, mesh, mixer);
      } catch (e) {
        console.error('拡張キャラクターコントローラー(MMD)の初期化に失敗しました:', e);
      }
    },
    (progress) => {
      if (progress.total) {
        statusEl.textContent = `MMD読み込み中... ${Math.round((progress.loaded / progress.total) * 100)}%`;
      }
    },
    (error) => {
      console.error(error);
      statusEl.textContent = 'MMDの読み込みに失敗しました。ファイル名/パスを確認してください。';
    },
  );
}

// モデルのtypeに応じてVRM/MMDどちらの読み込み関数を呼ぶかを振り分ける
function loadModel(model) {
  if (model.type === 'mmd') {
    loadMMDModel(model.path);
  } else {
    loadVRMModel(model.path);
  }
}

/* ====================================================================
   ⑤ 表情(Expression) UI
   VRMに入っている表情を自動で検出してボタンを生成します。
   ボタンを押すと vrm.expressionManager.setValue(名前, 1.0) を呼びます。
   ==================================================================== */
function setupExpressionUI(vrm) {
  const listEl = document.getElementById('exprList');
  listEl.innerHTML = '';

  if (!vrm.expressionManager) {
    listEl.textContent = vrm.isMMD
      ? 'MMDモデルには表情(Expression)UIは未対応です'
      : 'このVRMには表情(Expression)が設定されていません';
    return;
  }

  // このVRMが持つ全表情名（プリセット＋VRoidStudio等で作ったカスタム表情）
  const names = Object.keys(vrm.expressionManager.expressionMap);
  console.log('このVRMが持つ表情一覧:', names);

  names.forEach((name) => {
    const btn = document.createElement('button');
    btn.className = 'expr-btn';
    btn.textContent = name;
    btn.onclick = () => {
      // 一旦すべて0にしてから、押した表情だけ1.0にする
      names.forEach((n) => vrm.expressionManager.setValue(n, 0));
      vrm.expressionManager.setValue(name, 1.0);
      document.querySelectorAll('.expr-btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
    };
    listEl.appendChild(btn);
  });

  const resetBtn = document.createElement('button');
  resetBtn.className = 'expr-btn';
  resetBtn.id = 'resetExpr';
  resetBtn.textContent = 'リセット（neutral）';
  resetBtn.onclick = () => {
    names.forEach((n) => vrm.expressionManager.setValue(n, 0));
    document.querySelectorAll('.expr-btn').forEach((b) => b.classList.remove('active'));
  };
  listEl.appendChild(resetBtn);
}

/* ---- 7-2. 全アニメーションクリップの読み込み ----
   既存の loadMixamoAnimation() をそのまま再利用する。
   第3引数 keepInPlace=true により、すべてのクリップで Hips の
   X/Z位置(根本の前後左右移動)をその場0に固定し、移動は本コントローラーが
   コード側で行う(=仕様1.の「ルート位置・回転を固定」を満たす)。 */

// クリップ単位で体(Hips)を追加でY軸回転させたい場合はここに角度(度)を指定する。
// Crouched Sneaking Right.fbx は向きが実際の再生に対して180度反転していたため補正。
const CLIP_YAW_OFFSET_DEG = {
  crouchSneakRight: 180,
};

async function loadAllCharacterAnimations(vrm) {
  const namedEntries = Object.entries(CHAR_ANIM_FILES); // [key, file] のペア
  // EXTRA_ANIMATION_FILES は「ファイル名を1行追加するだけ」で読めるように、
  // 拡張子を除いたファイル名をそのままキー名として自動生成する
  const extraEntries = EXTRA_ANIMATION_FILES.map((file) => [
    file.replace(/\.fbx$/i, ''),
    file,
  ]);
  const entries = [...namedEntries, ...extraEntries];

  const clipMap = {};
  await Promise.all(entries.map(async ([key, file]) => {
    try {
      const yawOffsetDeg = CLIP_YAW_OFFSET_DEG[key] || 0;
      const clip = await loadMixamoAnimation(`./${file}`, vrm, true, yawOffsetDeg);
      clip.name = key;
      clipMap[key] = clip;
    } catch (err) {
      console.warn(`[CharacterController] アニメーション "${file}" の読み込みに失敗しました。`, err);
    }
  }));
  return clipMap;
}

/* ---- 7-3. Animator (Animation Blueprint相当) ----
   ステート切替・クロスフェード・ワンショット(Turn180/Jump/Landing)の
   再生終了コールバックをまとめて管理する。 */
class CharacterAnimator {
  constructor(mixer, clipMap) {
    this.mixer = mixer;
    this.actions = {};

    Object.entries(clipMap).forEach(([key, clip]) => {
      const action = mixer.clipAction(clip);
      action.clampWhenFinished = true;
      this.actions[key] = action;
    });

    // ループ再生するステート
    this.loopKeys = new Set([
      'idle', 'walk', 'walkBackward', 'strafeWalkLeft', 'strafeWalkRight',
      'run', 'runBackward', 'strafeRunLeft', 'strafeRunRight',
      'crouchIdle', 'crouchWalk', 'crouchSneakLeft', 'crouchSneakRight',
      'fallingIdle',
    ]);
    // 1回だけ再生するワンショットステート
    this.oneShotKeys = new Set(['walkTurn180', 'runTurn180', 'jump', 'landing']);

    Object.entries(this.actions).forEach(([key, action]) => {
      action.setLoop(this.loopKeys.has(key) ? THREE.LoopRepeat : THREE.LoopOnce);
    });

    this.currentKey = null;
    this.currentAction = null;
    this._warnedFallbacks = new Set();
  }

  has(key) {
    return !!this.actions[key];
  }

  _warnFallbackOnce(missingKey, fallbackKey) {
    if (this._warnedFallbacks.has(missingKey)) return;
    this._warnedFallbacks.add(missingKey);
    console.warn(
      `[CharacterController] "${CHAR_ANIM_FILES[missingKey] || missingKey}" が読み込めていないため、` +
      `代わりに "${CHAR_ANIM_FILES[fallbackKey] || fallbackKey}" を再生しています。` +
      `ファイルが同じフォルダに正しい名前で置かれているか確認してください。`
    );
  }

  // 通常のループステートへクロスフェードしながら切り替える。
  // key のクリップが読み込めていない場合(ファイル未配置など)は、
  // fallbackKey が指定されていればそちらを代わりに再生する
  // (無言でアニメーションが固まってしまうのを防ぐため)。
  play(key, fadeDuration = CHAR_TUNING.crossFadeDuration, fallbackKey = null) {
    let targetKey = key;
    if (!this.has(targetKey)) {
      if (fallbackKey && this.has(fallbackKey)) {
        this._warnFallbackOnce(key, fallbackKey);
        targetKey = fallbackKey;
      } else {
        return; // フォールバックも無ければ何もしない(直前の状態を維持)
      }
    }
    if (this.currentKey === targetKey) return;
    const next = this.actions[targetKey];
    next.reset();
    next.fadeIn(fadeDuration);
    next.play();
    if (this.currentAction) this.currentAction.fadeOut(fadeDuration);
    this.currentKey = targetKey;
    this.currentAction = next;
  }

  // ワンショット(Turn180 / Jumping / Falling To Landing)を1回再生し、
  // 終了したら onFinished を呼ぶ
  playOnce(key, { fadeDuration = CHAR_TUNING.crossFadeDuration, onFinished } = {}) {
    if (!this.has(key)) {
      if (onFinished) onFinished();
      return;
    }
    const next = this.actions[key];
    next.reset();
    next.setLoop(THREE.LoopOnce);
    next.clampWhenFinished = true;
    next.fadeIn(fadeDuration);
    next.play();
    if (this.currentAction && this.currentAction !== next) this.currentAction.fadeOut(fadeDuration);
    this.currentKey = key;
    this.currentAction = next;

    const onFinishedEvent = (e) => {
      if (e.action !== next) return;
      this.mixer.removeEventListener('finished', onFinishedEvent);
      if (onFinished) onFinished();
    };
    this.mixer.addEventListener('finished', onFinishedEvent);
  }
}

/* ---- 7-4. CharacterController ----
   入力受付・カメラ基準の移動方向計算・体の向きの制御・
   ジャンプ/落下/着地時の強制座標固定までを担当する。 */
class CharacterController {
  constructor(vrm, animator, camera) {
    this.vrm = vrm;
    this.animator = animator;
    this.camera = camera;

    this.keys = new Set();
    // dispose() で確実に解除できるよう、リスナー参照を保持しておく
    // (モデル切り替え時に古いコントローラーのキー入力が残らないようにするため)
    this._onKeyDown = (e) => this.onKeyDown(e);
    this._onKeyUp = (e) => this.onKeyUp(e);
    window.addEventListener('keydown', this._onKeyDown);
    window.addEventListener('keyup', this._onKeyUp);

    this.isCrouching = false;
    this.verticalVelocity = 0;
    // 'grounded'（地上・通常状態） | 'rising'（Jumping.fbx再生中、重力で上下動＋強制着地待ち）
    // 以前あった 'falling' / 'landing' は使用しない(Jumping.fbx終了と同時に強制スナップするため)
    this.jumpState = 'grounded';

    this.lastMoveAxis = null;    // 'forward' | 'backward' | 'strafeLeft' | 'strafeRight' | null
    this.lastGait = 'walk';      // 'walk' | 'run'
    this._turn180 = null;        // Turn180再生中の回転トゥイーン情報

    this.tmpCamForward = new THREE.Vector3();
    this.tmpCamRight = new THREE.Vector3();
    this.tmpMoveDir = new THREE.Vector3();
    this.tmpCrouchDir = new THREE.Vector3(); // しゃがみ移動用：axisから作り直した「アニメと完全一致する」方向ベクトル

    // ウィンドウのフォーカスが外れた瞬間に keyup が飛んでこないケース(Alt+Tab等)対策。
    // 押しっぱなし状態のキーが残ると「Dを押しているのにAの入力も生きている」ような
    // 意図しない合成入力になり、アニメーションと実際の移動方向がズレる原因になるため、
    // フォーカスを失ったら入力状態を必ずクリアする。
    this._onBlur = () => this.keys.clear();
    this._onVisibilityChange = () => {
      if (document.hidden) this.keys.clear();
    };
    window.addEventListener('blur', this._onBlur);
    document.addEventListener('visibilitychange', this._onVisibilityChange);

    this.animator.play('idle', 0);
  }

  // モデル切り替え時などに、このコントローラーが登録したイベントリスナーを
  // すべて解除する(呼び忘れると古いモデル分の入力処理が二重に残ってしまう)
  dispose() {
    window.removeEventListener('keydown', this._onKeyDown);
    window.removeEventListener('keyup', this._onKeyUp);
    window.removeEventListener('blur', this._onBlur);
    document.removeEventListener('visibilitychange', this._onVisibilityChange);
  }

  onKeyDown(e) {
    const code = e.code;
    if (['KeyW', 'KeyA', 'KeyS', 'KeyD', 'KeyZ', 'Space'].includes(code)) {
      this.keys.add(code);
      e.preventDefault();
    }
    if ((code === 'ShiftLeft' || code === 'ShiftRight') && !e.repeat) {
      this.toggleCrouch();
      e.preventDefault();
    }
    if (code === 'Space' && !e.repeat) {
      this.tryJump();
    }
  }

  onKeyUp(e) {
    this.keys.delete(e.code);
  }

  toggleCrouch() {
    if (this.jumpState !== 'grounded') return; // 空中ではしゃがみ操作不可
    this.isCrouching = !this.isCrouching;
  }

  // 仕様3.：Spaceでジャンプ開始(Jumping.fbx)
  // ★修正: Jumping.fbx を1回再生したら、Falling Idle / Landing など他のアニメーションは
  // 一切再生せず、再生終了と同時に強制的に地面(着地位置)へ座標をスナップ・固定する。
  // これにより、物理演算(重力)のタイミングとアニメーションの長さがズレて
  // 浮いたまま止まったり、地面にめり込んだりすることを確実に防ぐ。
  tryJump() {
    if (this.jumpState !== 'grounded' || this.isCrouching) return;
    this.jumpState = 'rising';
    this.verticalVelocity = CHAR_TUNING.jumpUpSpeed;
    this.animator.playOnce('jump', {
      onFinished: () => {
        // ★強制位置固定：Jumping.fbx 再生終了の瞬間に、他は何も再生せず
        // 座標を地面の高さへスナップして浮遊・ズレを防ぐ
        this.vrm.scene.position.y = CHAR_TUNING.groundY;
        this.verticalVelocity = 0;
        this.jumpState = 'grounded';
        // ここで landing / fallingIdle は再生しない。次フレームの updateLocomotion が
        // 現在の入力状況に応じて idle / walk 等へ自然に戻す。
      },
    });
  }

  // カメラ前方を基準にした入力方向ベクトル(ワールド空間, XZ平面, 正規化)
  computeCameraRelativeMoveDir() {
    this.camera.getWorldDirection(this.tmpCamForward);
    this.tmpCamForward.y = 0;
    this.tmpCamForward.normalize();
    // 右方向 = 前方ベクトル(Fx,Fz)を基準にした screen-right。
    // Y-upの右手系で right = cross(forward, up) = (-Fz, 0, Fx)。
    this.tmpCamRight.set(-this.tmpCamForward.z, 0, this.tmpCamForward.x);

    const wsInput = (this.keys.has('KeyW') ? 1 : 0) - (this.keys.has('KeyS') ? 1 : 0);
    const adInput = (this.keys.has('KeyD') ? 1 : 0) - (this.keys.has('KeyA') ? 1 : 0);

    this.tmpMoveDir.set(0, 0, 0);
    this.tmpMoveDir.addScaledVector(this.tmpCamForward, wsInput);
    this.tmpMoveDir.addScaledVector(this.tmpCamRight, adInput);
    if (this.tmpMoveDir.lengthSq() > 0) this.tmpMoveDir.normalize();
    return this.tmpMoveDir;
  }

  update(delta) {
    if (!this.vrm) return;

    this.updateVertical(delta);

    // Turn180再生中は体の回転だけをトゥイーンさせ、他の入力評価はスキップする
    if (this._turn180) {
      this._turn180.elapsed += delta;
      const t = Math.min(1, this._turn180.elapsed / this._turn180.duration);
      this.vrm.scene.rotation.y = this._turn180.startYaw + this._turn180.diff * t;
      if (t >= 1) this._turn180 = null;
      return;
    }

    this.updateLocomotion(delta);
    this.updateDebugHud();
  }

  updateDebugHud() {
    if (!charSettings.debug) return;
    const el = document.getElementById('charDebugHud');
    if (!el) return;
    const f = this.tmpCamForward, r = this.tmpCamRight, m = this.tmpMoveDir;
    const deg = (rad) => ((rad * 180 / Math.PI) % 360 + 360) % 360;
    el.textContent =
      `LookAtCameraDir: ${charSettings.lookAtCameraDir ? 'ON' : 'OFF'}\n` +
      `isCrouching: ${this.isCrouching}\n` +
      `keys: ${[...this.keys].join(',')}\n` +
      `camForward: (${f.x.toFixed(2)}, ${f.z.toFixed(2)})\n` +
      `camRight  : (${r.x.toFixed(2)}, ${r.z.toFixed(2)})\n` +
      `moveDir   : (${m.x.toFixed(2)}, ${m.z.toFixed(2)})\n` +
      `axis      : ${this.lastMoveAxis}\n` +
      `body yaw  : ${deg(this.vrm.scene.rotation.y).toFixed(1)} deg\n` +
      `position  : (${this.vrm.scene.position.x.toFixed(2)}, ${this.vrm.scene.position.z.toFixed(2)})`;
  }

  // 仕様3.：滞空中(Jumping.fbx再生中)の重力落下シミュレーション。
  // 着地の確定・座標固定は tryJump() の onFinished 側でまとめて行う
  // (Falling Idle / Landing は再生しない仕様のため、ここでは 'rising' 状態の
  //  上下運動のみを扱う)。
  updateVertical(delta) {
    if (this.jumpState !== 'rising') return;

    this.verticalVelocity -= CHAR_TUNING.gravity * delta;
    this.vrm.scene.position.y += this.verticalVelocity * delta;

    // Jumping.fbx の再生時間より先に重力計算で地面へ到達してしまった場合の保険。
    // ここでも地面より下に沈まないようクランプしておく(実際の状態確定はアニメ終了時)。
    if (this.vrm.scene.position.y < CHAR_TUNING.groundY) {
      this.vrm.scene.position.y = CHAR_TUNING.groundY;
    }
  }

  updateLocomotion(delta) {
    if (this.jumpState !== 'grounded') return; // 空中では地上ロジックを評価しない

    const moveDir = this.computeCameraRelativeMoveDir(); // 同時に tmpCamForward(カメラ前方)も更新
    const moving = moveDir.lengthSq() > 0;
    const running = this.keys.has('KeyZ') && !this.isCrouching;
    const gait = running ? 'run' : 'walk';

    if (!moving) {
      this.lastMoveAxis = null;
      this.animator.play(this.isCrouching ? 'crouchIdle' : 'idle');
      if (charSettings.lookAtCameraDir) this.faceCameraDirection(delta);
      return;
    }

    // 入力方向が前後左右どれに最も近いかを、カメラ基準で判定する
    // (this.tmpCamRightはcomputeCameraRelativeMoveDir内で最新のカメラ向きに更新済み)
    const rightVec = this.tmpCamRight;
    const fwdDot = moveDir.dot(this.tmpCamForward);
    const rightDot = moveDir.dot(rightVec);

    let axis;
    if (Math.abs(fwdDot) >= Math.abs(rightDot)) {
      axis = fwdDot >= 0 ? 'forward' : 'backward';
    } else {
      axis = rightDot >= 0 ? 'strafeRight' : 'strafeLeft';
    }

    const isReversal =
      (this.lastMoveAxis === 'forward' && axis === 'backward') ||
      (this.lastMoveAxis === 'backward' && axis === 'forward');

    if (this.isCrouching) {
      this.updateCrouchMovement(axis, moveDir, delta);
    } else if (isReversal && !charSettings.lookAtCameraDir && this.lastGait === gait) {
      // OFF設定で、歩行/走行中に前後が反転した瞬間だけ Turn180 を1回挟む(表3.の備考)
      this.startTurn180(gait, moveDir);
    } else {
      this.updateStandardMovement(axis, gait, moveDir, delta);
    }

    this.lastMoveAxis = axis;
    this.lastGait = gait;
  }

  // LookAtCameraDir=ON：体をカメラの正面方向へ滑らかに追従させる
  faceCameraDirection(delta) {
    this.camera.getWorldDirection(this.tmpCamForward);
    const targetYaw = this.yawFromDirection(this.tmpCamForward.x, this.tmpCamForward.z);
    this.rotateTowards(targetYaw, delta);
  }

  // ワールド方向ベクトル(dirX, dirZ)を向くために必要な rotation.y を返す。
  // three-vrm でロードしたモデルはローカル前方が -Z (glTF/VRM1.0の正面方向の慣習。
  // VRM0.xモデルも既存コードの VRMUtils.rotateVRM0() により同じ -Z 前方に補正済み)
  // なので、符号を反転した atan2(-dirX, -dirZ) を使う。
  // ※もし手持ちのモデルで前後が逆になる場合は、ここの符号を反転してください。
  yawFromDirection(dirX, dirZ) {
    return Math.atan2(-dirX, -dirZ);
  }

  rotateTowards(targetYaw, delta) {
    const obj = this.vrm.scene;
    let diff = targetYaw - obj.rotation.y;
    diff = Math.atan2(Math.sin(diff), Math.cos(diff)); // -PI..PI に正規化
    const t = Math.min(1, CHAR_TUNING.turnLerpSpeed * delta);
    obj.rotation.y += diff * t;
  }

  // LookAtCameraDir=ON→体はカメラ正面のまま / OFF→体は移動方向を向く
  faceTowardsForMovement(moveDir, delta) {
    if (charSettings.lookAtCameraDir) {
      this.faceCameraDirection(delta);
    } else {
      const targetYaw = this.yawFromDirection(moveDir.x, moveDir.z);
      this.rotateTowards(targetYaw, delta);
    }
  }

  applyTranslation(moveDir, speed, delta) {
    this.vrm.scene.position.addScaledVector(moveDir, speed * delta);
  }

  // 表2.の「通常移動」「ランニング」行に対応
  updateStandardMovement(axis, gait, moveDir, delta) {
    const onFlag = charSettings.lookAtCameraDir;
    const speedBase = gait === 'run' ? CHAR_TUNING.runSpeed : CHAR_TUNING.walkSpeed;
    let speed = speedBase;
    let animKey;

    if (axis === 'forward') {
      animKey = gait; // 'walk' | 'run'
    } else if (axis === 'backward') {
      if (onFlag) {
        animKey = gait === 'run' ? 'runBackward' : 'walkBackward';
        if (gait === 'walk') speed = speedBase * CHAR_TUNING.walkBackwardSpeedScale; // 歩行後退のみ減速
      } else {
        animKey = gait; // OFF：体を後ろへ向け、通常の前進クリップで表現(速度は落とさない)
      }
    } else if (axis === 'strafeLeft') {
      animKey = onFlag ? (gait === 'run' ? 'strafeRunLeft' : 'strafeWalkLeft') : gait;
    } else { // strafeRight
      animKey = onFlag ? (gait === 'run' ? 'strafeRunRight' : 'strafeWalkRight') : gait;
    }

    this.faceTowardsForMovement(moveDir, delta);
    // strafe/backward系クリップが未読込の場合は通常のwalk/runにフォールバックする
    this.animator.play(animKey, undefined, gait);
    this.applyTranslation(moveDir, speed, delta);
  }

  // 表2.の「しゃがみ」状態に対応
  //
  // ★修正: 移動方向は「axis(=どのアニメを再生するか決めた判定結果)」から
  // その場でカメラ基準ベクトルを組み立てて求める(this.tmpCrouchDir)。
  // 以前は入力を合成した moveDir をそのまま移動にも使っていたため、
  // 「LookAtCameraDir=ON でしゃがみ中にDを押すと、Dのアニメが再生されているのに
  // 実際の移動はAの方向に進む」という、再生中のアニメーションと実移動方向が
  // 食い違う不具合が起こり得た。axis と移動ベクトルの生成元を完全に一致させる
  // ことで、再生されるアニメと進む方向が常に一致するようにする。
  updateCrouchMovement(axis, moveDir, delta) {
    const onFlag = charSettings.lookAtCameraDir;
    const speed = CHAR_TUNING.crouchSpeed;
    let animKey;
    const dir = this.tmpCrouchDir;

    if (axis === 'strafeLeft') {
      animKey = onFlag ? 'crouchSneakLeft' : 'crouchWalk';
      dir.copy(this.tmpCamRight).multiplyScalar(-1); // カメラ基準の「左」
    } else if (axis === 'strafeRight') {
      animKey = onFlag ? 'crouchSneakRight' : 'crouchWalk';
      dir.copy(this.tmpCamRight); // カメラ基準の「右」＝Dキー方向
    } else if (axis === 'forward') {
      animKey = 'crouchWalk';
      dir.copy(this.tmpCamForward);
    } else {
      animKey = 'crouchWalk'; // backward(逆再生で表現)
      dir.copy(this.tmpCamForward).multiplyScalar(-1);
    }

    this.faceTowardsForMovement(moveDir, delta);
    // crouchSneakLeft/Right が未読込の場合は crouchWalk にフォールバックする
    this.animator.play(animKey, undefined, 'crouchWalk');

    const action = this.animator.actions[this.animator.currentKey];
    // 後退時は Crouched Walking.fbx を逆再生して後ろ歩きを表現する
    if (action) action.timeScale = (axis === 'backward') ? -1 : 1;

    // ★ここが修正点：moveDir ではなく axis から作った dir(再生中アニメと同じ方向)を使って移動する
    this.applyTranslation(dir, speed, delta);
  }

  // OFF設定時、歩行/走行中に進行方向が反転した瞬間に挟む180度ターン
  // (ルート回転はクリップ内で動かさず、コード側でトゥイーンさせて固定を保つ)
  startTurn180(gait, moveDir) {
    const turnKey = gait === 'run' ? 'runTurn180' : 'walkTurn180';
    const followKey = gait; // 'walk' | 'run'
    const targetYaw = this.yawFromDirection(moveDir.x, moveDir.z);
    const startYaw = this.vrm.scene.rotation.y;
    let diff = targetYaw - startYaw;
    diff = Math.atan2(Math.sin(diff), Math.cos(diff));

    this._turn180 = { startYaw, diff, duration: CHAR_TUNING.turn180Duration, elapsed: 0 };

    this.animator.playOnce(turnKey, {
      onFinished: () => {
        this.vrm.scene.rotation.y = targetYaw;
        this.animator.play(followKey, 0.1);
      },
    });
  }
}

/* ---- 7-5. 初期化エントリポイント ----
   VRM読み込み完了後に④のコールバックから呼び出される。 */
async function initExtendedCharacterController(vrm, mixer) {
  statusEl.textContent = '拡張アニメーション読込中...';
  const clipMap = await loadAllCharacterAnimations(vrm);

  if (Object.keys(clipMap).length === 0) {
    console.warn('[CharacterController] 拡張アニメーションが1つも読み込めなかったため、初期化を中止しました。');
    return;
  }

  // ⑥のお試し用 walkAction(矢印キー)と二重に動いてしまわないよう、
  // ここでは新コントローラーを優先して既存アクションを止める
  // (⑥自体のコードは変更していません)
  if (walkAction) walkAction.stop();

  characterAnimator = new CharacterAnimator(mixer, clipMap);
  characterController = new CharacterController(vrm, characterAnimator, camera);

  statusEl.textContent = '準備完了！ WASD：移動 / Z：走る / Shift：しゃがみ / Space：ジャンプ';
}

/* ====================================================================
   ⑥ 矢印キー操作
   歩行アニメーションは1つしか無いので、今は
     ↑：再生速度を上げる（早歩き＝走っているように見せる簡易演出）
     ↓：再生速度を下げる（ゆっくり歩く）
     ←→：その場で体の向きだけを回す（移動はしない）
   という形にしています。本格的に「歩く」と「走る」を別モーションで
   切り替えたい場合は、Running.fbx 等を用意して上の拡張例のように
   crossFadeTo で別アクションへ切り替えてください。
   ==================================================================== */
const pressedKeys = new Set();

window.addEventListener('keydown', (e) => {
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
    pressedKeys.add(e.key);
    e.preventDefault();
  }
});

window.addEventListener('keyup', (e) => {
  pressedKeys.delete(e.key);
});

function updateInputAnimation(delta) {
  if (walkAction) {
    let targetTimeScale = 1.0;
    if (pressedKeys.has('ArrowUp')) targetTimeScale = 1.7; // 早歩き
    if (pressedKeys.has('ArrowDown')) targetTimeScale = 0.6; // ゆっくり
    walkAction.timeScale = targetTimeScale;
  }

  if (currentVrm) {
    const turnSpeed = 1.6; // rad/sec
    if (pressedKeys.has('ArrowLeft')) currentVrm.scene.rotation.y += turnSpeed * delta;
    if (pressedKeys.has('ArrowRight')) currentVrm.scene.rotation.y -= turnSpeed * delta;
  }
}

/* ====================================================================
   ウィンドウリサイズ対応
   ==================================================================== */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ====================================================================
   メインループ
   ==================================================================== */
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  updateInputAnimation(delta);

  // 【拡張】3人称キャラクターコントローラーの更新(移動・向き・ジャンプ等)
  if (characterController) characterController.update(delta);

  if (mixer) mixer.update(delta);
  if (currentVrm) currentVrm.update(delta); // 表情・ボーン・LookAt・スプリングボーン等を一括更新

  // 【拡張】オーバーワールド風の追従カメラ：
  // target をキャラクターの胸あたりへ毎フレーム更新するだけで、
  // マウスドラッグでの自由な視点回転・ホイールでのズームは
  // OrbitControls がそのまま維持してくれる(距離・角度は変わらず、
  // 追従対象だけがキャラクターに切り替わる)。
  if (currentVrm) {
    controls.target.set(
      currentVrm.scene.position.x,
      currentVrm.scene.position.y + 1.0,
      currentVrm.scene.position.z,
    );
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
