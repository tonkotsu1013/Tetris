<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VRM 3D オーバーワールド</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    overflow: hidden;
    background: #0d0d18;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    color: #e8e8f0;
  }
  #canvas-container { position: fixed; inset: 0; }

  #hud {
    position: fixed; top: 12px; left: 12px;
    background: rgba(10,10,25,0.78);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(120,120,255,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 12px;
    line-height: 1.8;
    max-width: 270px;
    pointer-events: none;
    z-index: 100;
  }
  #hud h1 { margin: 0 0 6px; font-size: 14px; color: #a0a0ff; letter-spacing:.05em; }
  #state-badge {
    display: inline-block;
    background: #1e1e4a; border: 1px solid #5555cc;
    border-radius: 6px; padding: 2px 8px;
    font-size: 11px; color: #8be9fd; margin-bottom: 4px;
  }
  #anim-name { color: #ff79c6; font-size: 11px; }

  #vrm-selector {
    position: fixed; top: 12px; right: 12px;
    background: rgba(10,10,25,0.82);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(120,120,255,0.2);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 12px; max-width: 240px;
    max-height: 70vh; overflow-y: auto;
    z-index: 100;
  }
  #vrm-selector h2 { margin: 0 0 8px; font-size: 13px; color: #a0a0ff; }
  .vrm-btn {
    display: block; width: 100%;
    margin: 3px 0; padding: 7px 10px;
    border: 1px solid rgba(100,100,200,0.3);
    border-radius: 7px; background: #1a1a35;
    color: #e0e0f8; cursor: pointer;
    font-size: 12px; text-align: left;
    transition: background .15s, border-color .15s;
  }
  .vrm-btn:hover { background: #2a2a55; border-color: #6666cc; }
  .vrm-btn.active { background: #3333aa; border-color: #8888ff; color: #fff; }

  #settings-btn {
    position: fixed; bottom: 16px; right: 16px;
    background: rgba(10,10,25,0.82);
    border: 1px solid rgba(120,120,255,0.3);
    border-radius: 50%; width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 20px; z-index: 200;
    transition: background .15s;
  }
  #settings-btn:hover { background: #2a2a55; }
  #settings-panel {
    position: fixed; bottom: 70px; right: 16px;
    background: rgba(10,10,25,0.95);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(120,120,255,0.25);
    border-radius: 12px; padding: 14px 18px;
    font-size: 13px; min-width: 240px;
    z-index: 200; display: none;
  }
  #settings-panel h3 { margin: 0 0 12px; color: #a0a0ff; font-size: 13px; }
  .setting-row {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 10px;
  }
  .setting-row label { color: #c0c0e0; }
  .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: #333355; border-radius: 11px;
    cursor: pointer; transition: background .2s;
  }
  .toggle input:checked + .toggle-track { background: #5555cc; }
  .toggle-track::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 16px; height: 16px; background: #fff;
    border-radius: 50%; transition: transform .2s;
  }
  .toggle input:checked + .toggle-track::after { transform: translateX(18px); }

  #keys-help {
    position: fixed; bottom: 16px; left: 12px;
    background: rgba(10,10,25,0.72);
    border: 1px solid rgba(120,120,255,0.15);
    border-radius: 10px; padding: 10px 14px;
    font-size: 11px; line-height: 1.9; color: #aaa;
    pointer-events: none; z-index: 100;
  }
  #keys-help b { color: #e0e0ff; }

  #loading {
    position: fixed; inset: 0; background: #0d0d18;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999; transition: opacity .5s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading-title { font-size: 22px; color: #a0a0ff; margin-bottom: 12px; }
  #loading-bar-wrap {
    width: 260px; height: 6px;
    background: #1a1a35; border-radius: 3px; overflow: hidden;
  }
  #loading-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg,#5555cc,#8888ff);
    border-radius: 3px; transition: width .2s;
  }
  #loading-text { margin-top: 10px; color: #8888bb; font-size: 13px; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333355; border-radius: 3px; }

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

/* ================================================================
   ★ HTMLファイルと同じフォルダのVRMファイルを列挙してください
   ================================================================ */
const VRM_FILES = [
  { name: 'Ayame v1.1',    path: './ayame_v1.1.vrm' },
  // 追加例:
  // { name: 'My Character', path: './mychar.vrm' },
];

/* ================================================================
   アニメーションファイル名（Mixamo標準名称）
   ================================================================ */
const ANIM_FILES = {
  idle:          'Standard Idle.fbx',
  walk:          'Walking.fbx',
  walkBack:      'Walking Backwards.fbx',
  turn180:       'Walking Turn 180.fbx',
  strafeL:       'Left Strafe Walking.fbx',
  strafeR:       'Right Strafe Walking.fbx',
  run:           'Running.fbx',
  runBack:       'Running Backwards.fbx',
  runTurn180:    'Running Turn 180.fbx',
  runStrafeL:    'Left Strafe.fbx',
  runStrafeR:    'Right Strafe.fbx',
  crouch:        'Male Crouch Pose.fbx',
  crouchWalk:    'Crouched Walking.fbx',
  crouchStrafeL: 'Crouched Sneaking Left.fbx',
  crouchStrafeR: 'Crouched Sneaking Right.fbx',
  jump:          'Jumping.fbx',
  fall:          'Falling Idle.fbx',
  land:          'Falling to Landing.fbx',
  stairsUp:      'Ascending Stairs.fbx',
};

/* ================================================================
   Mixamo → VRM ボーンマップ
   ================================================================ */
const mixamoVRMRigMap = {
  mixamorigHips:'hips', mixamorigSpine:'spine', mixamorigSpine1:'chest',
  mixamorigSpine2:'upperChest', mixamorigNeck:'neck', mixamorigHead:'head',
  mixamorigLeftShoulder:'leftShoulder', mixamorigLeftArm:'leftUpperArm',
  mixamorigLeftForeArm:'leftLowerArm', mixamorigLeftHand:'leftHand',
  mixamorigLeftHandThumb1:'leftThumbMetacarpal', mixamorigLeftHandThumb2:'leftThumbProximal',
  mixamorigLeftHandThumb3:'leftThumbDistal', mixamorigLeftHandIndex1:'leftIndexProximal',
  mixamorigLeftHandIndex2:'leftIndexIntermediate', mixamorigLeftHandIndex3:'leftIndexDistal',
  mixamorigLeftHandMiddle1:'leftMiddleProximal', mixamorigLeftHandMiddle2:'leftMiddleIntermediate',
  mixamorigLeftHandMiddle3:'leftMiddleDistal', mixamorigLeftHandRing1:'leftRingProximal',
  mixamorigLeftHandRing2:'leftRingIntermediate', mixamorigLeftHandRing3:'leftRingDistal',
  mixamorigLeftHandPinky1:'leftLittleProximal', mixamorigLeftHandPinky2:'leftLittleIntermediate',
  mixamorigLeftHandPinky3:'leftLittleDistal', mixamorigRightShoulder:'rightShoulder',
  mixamorigRightArm:'rightUpperArm', mixamorigRightForeArm:'rightLowerArm',
  mixamorigRightHand:'rightHand', mixamorigRightHandPinky1:'rightLittleProximal',
  mixamorigRightHandPinky2:'rightLittleIntermediate', mixamorigRightHandPinky3:'rightLittleDistal',
  mixamorigRightHandRing1:'rightRingProximal', mixamorigRightHandRing2:'rightRingIntermediate',
  mixamorigRightHandRing3:'rightRingDistal', mixamorigRightHandMiddle1:'rightMiddleProximal',
  mixamorigRightHandMiddle2:'rightMiddleIntermediate', mixamorigRightHandMiddle3:'rightMiddleDistal',
  mixamorigRightHandIndex1:'rightIndexProximal', mixamorigRightHandIndex2:'rightIndexIntermediate',
  mixamorigRightHandIndex3:'rightIndexDistal', mixamorigRightHandThumb1:'rightThumbMetacarpal',
  mixamorigRightHandThumb2:'rightThumbProximal', mixamorigRightHandThumb3:'rightThumbDistal',
  mixamorigLeftUpLeg:'leftUpperLeg', mixamorigLeftLeg:'leftLowerLeg',
  mixamorigLeftFoot:'leftFoot', mixamorigLeftToeBase:'leftToes',
  mixamorigRightUpLeg:'rightUpperLeg', mixamorigRightLeg:'rightLowerLeg',
  mixamorigRightFoot:'rightFoot', mixamorigRightToeBase:'rightToes',
};

/* ================================================================
   FBX → VRM AnimationClip 変換
   reverse=true で逆再生クリップを生成（しゃがみ後退など）
   ================================================================ */
async function loadMixamoAnimation(filename, vrm, { reverse = false } = {}) {
  const url = `./${filename}`;
  const loader = new FBXLoader();
  let asset;
  try {
    asset = await loader.loadAsync(url);
  } catch(e) {
    console.warn(`[Anim] 読み込みスキップ: ${filename}`, e.message);
    return null;
  }

  const clip = THREE.AnimationClip.findByName(asset.animations, 'mixamo.com')
             || asset.animations[0];
  if (!clip) return null;

  const tracks = [];
  const restRotInv = new THREE.Quaternion();
  const parentRestWorldRot = new THREE.Quaternion();
  const qA = new THREE.Quaternion();

  const hipsNode = asset.getObjectByName('mixamorigHips');
  if (!hipsNode) return null;
  const motionHipsH = hipsNode.position.y;
  const vrmHipsH = vrm.humanoid.normalizedRestPose.hips.position[1];
  const hipsScale = vrmHipsH / motionHipsH;

  clip.tracks.forEach(track => {
    const dotIdx = track.name.indexOf('.');
    const mixamoName = track.name.substring(0, dotIdx);
    const propName = track.name.substring(dotIdx + 1);
    const vrmBone = mixamoVRMRigMap[mixamoName];
    const vrmNode = vrm.humanoid?.getNormalizedBoneNode(vrmBone)?.name;
    const mixamoNode = asset.getObjectByName(mixamoName);
    if (!vrmNode || !mixamoNode) return;

    mixamoNode.getWorldQuaternion(restRotInv).invert();
    mixamoNode.parent.getWorldQuaternion(parentRestWorldRot);

    const isHips = mixamoName === 'mixamorigHips';
    const dur = clip.duration;

    if (track instanceof THREE.QuaternionKeyframeTrack) {
      const vals = Array.from(track.values);
      for (let i = 0; i < vals.length; i += 4) {
        const sl = vals.slice(i, i+4);
        qA.fromArray(sl).premultiply(parentRestWorldRot).multiply(restRotInv).toArray(sl);
        vals.splice(i, 4, ...sl);
      }
      const [times, values] = reverse
        ? [Array.from(track.times).map(t => dur - t).reverse(), reverseStride(vals, 4)]
        : [track.times, vals];
      tracks.push(new THREE.QuaternionKeyframeTrack(`${vrmNode}.${propName}`, times, values));
    } else if (track instanceof THREE.VectorKeyframeTrack) {
      const vals = Array.from(track.values).map((v, idx) => {
        if (isHips && propName === 'position') {
          const axis = idx % 3;
          if (axis === 0 || axis === 2) return 0; // X/Z固定
          return v * hipsScale;
        }
        return v;
      });
      const [times, values] = reverse
        ? [Array.from(track.times).map(t => dur - t).reverse(), reverseStride(vals, 3)]
        : [track.times, vals];
      tracks.push(new THREE.VectorKeyframeTrack(`${vrmNode}.${propName}`, times, values));
    }
  });

  return new THREE.AnimationClip(filename.replace('.fbx',''), clip.duration, tracks);
}

function reverseStride(arr, s) {
  const r = [];
  for (let i = arr.length - s; i >= 0; i -= s)
    for (let j = 0; j < s; j++) r.push(arr[i+j]);
  return r;
}

/* ================================================================
   シーン構築
   ================================================================ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d18);
scene.fog = new THREE.FogExp2(0x0d0d18, 0.025);

const camera = new THREE.PerspectiveCamera(35, innerWidth/innerHeight, 0.05, 100);
camera.position.set(0, 1.8, 4.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('canvas-container').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.0;
controls.maxDistance = 25;
controls.maxPolarAngle = Math.PI * 0.88;

// ライト
scene.add(new THREE.HemisphereLight(0x7777cc, 0x334433, 0.9));
const sun = new THREE.DirectionalLight(0xfff0e0, 2.0);
sun.position.set(5, 10, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far = 60;
sun.shadow.camera.left = sun.shadow.camera.bottom = -20;
sun.shadow.camera.right = sun.shadow.camera.top = 20;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x4466aa, 0.5);
fill.position.set(-4, 3, -5);
scene.add(fill);

// 地面
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60, 1, 1),
  new THREE.MeshStandardMaterial({ color: 0x1a2a1a, roughness: 0.95 })
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

const grid = new THREE.GridHelper(60, 60, 0x223322, 0x182218);
grid.position.y = 0.002;
scene.add(grid);

// 木
[
  [6,3],[−5,7],[9,−4],[−8,−3],[4,−9],[−7,9],[11,2],[−11,−7],
  [3,13],[−4,−13],[8,10],[−9,5],[14,−5],[−14,4],[2,−16],[−2,16],
].forEach(([x,z]) => {
  const h = 0.6 + Math.random()*0.4;
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.07, 0.12, h, 6),
    new THREE.MeshStandardMaterial({ color: 0x4a3020, roughness: 1 })
  );
  trunk.position.set(x, h/2, z);
  trunk.castShadow = true;
  scene.add(trunk);

  const leavesSize = 0.55 + Math.random()*0.35;
  const leaves = new THREE.Mesh(
    new THREE.IcosahedronGeometry(leavesSize, 0),
    new THREE.MeshStandardMaterial({
      color: new THREE.Color().setHSL(0.33 + Math.random()*0.05, 0.6, 0.18 + Math.random()*0.08),
      roughness: 0.9
    })
  );
  leaves.position.set(x, h + leavesSize*0.7, z);
  leaves.rotation.set(Math.random(), Math.random(), Math.random());
  leaves.castShadow = true;
  scene.add(leaves);
});

// 岩
[[7,1],[−3,6],[5,−5],[−6,−8],[10,8]].forEach(([x,z]) => {
  const s = 0.15 + Math.random()*0.2;
  const rock = new THREE.Mesh(
    new THREE.DodecahedronGeometry(s, 0),
    new THREE.MeshStandardMaterial({ color: 0x555565, roughness: 0.9 })
  );
  rock.position.set(x, s*0.5, z);
  rock.rotation.set(Math.random()*2, Math.random()*2, Math.random()*2);
  rock.castShadow = rock.receiveShadow = true;
  scene.add(rock);
});

// 階段（X=-3付近）
buildStairs(−3.5, 0, −2);
function buildStairs(x, y, z) {
  const mat = new THREE.MeshStandardMaterial({ color: 0x888899, roughness: 0.8 });
  for (let i = 0; i < 5; i++) {
    const step = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.16, 0.45), mat);
    step.position.set(x, y + i * 0.16, z − i * 0.45);
    step.castShadow = step.receiveShadow = true;
    scene.add(step);
  }
}

/* ================================================================
   アニメーション管理
   ================================================================ */
const ONE_SHOT_KEYS = new Set(['jump','land','turn180','runTurn180']);

let currentVrm = null;
let mixer = null;
const clips   = {};  // key → AnimationClip
const actions = {};  // key → AnimationAction
let currentKey = null;
let currentAction = null;

function playAnim(key, fade = 0.18) {
  if (!mixer) return;
  const targetKey = actions[key] ? key : 'idle';
  if (currentKey === targetKey) return;

  const next = actions[targetKey];
  if (!next) return;

  next.reset().setEffectiveWeight(1).setEffectiveTimeScale(1).play();
  if (currentAction && currentAction !== next) {
    currentAction.crossFadeTo(next, fade, true);
  }
  currentAction = next;
  currentKey = targetKey;

  // HUD
  document.getElementById('state-badge').textContent = targetKey.toUpperCase();
  const fname = ANIM_FILES[{
    idle:'idle', walk:'walk', walkBack:'walkBack', turn180:'turn180',
    strafeL:'strafeL', strafeR:'strafeR', run:'run', runBack:'runBack',
    runTurn180:'runTurn180', runStrafeL:'runStrafeL', runStrafeR:'runStrafeR',
    crouch:'crouch', crouchWalk:'crouchWalk', crouchWalkBack:'crouchWalk',
    crouchStrafeL:'crouchStrafeL', crouchStrafeR:'crouchStrafeR',
    jump:'jump', fall:'fall', land:'land',
  }[targetKey] || 'idle'];
  document.getElementById('anim-name').textContent = fname || targetKey;
}

/* ================================================================
   キャラクター状態
   ================================================================ */
const charPos = new THREE.Vector3(0, 0, 0);
let charYaw = 0;   // キャラクターの向き（ラジアン）

let isCrouching = false;
let isGrounded  = true;
let isJumping   = false;
let isLanding   = false;
let landTimer   = 0;
let turn180Active = false;
let turn180IsRun  = false;
let turn180Timer  = 0;
let velY = 0;

const GROUND_Y    = 0;
const WALK_SPD    = 2.2;
const RUN_SPD     = 5.0;
const CROUCH_SPD  = 1.0;
const BACK_MULT   = 0.65;
const GRAVITY     = -14;
const JUMP_V      = 6.0;

/* ================================================================
   キー入力
   ================================================================ */
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','KeyW','KeyS','KeyA','KeyD'].includes(e.code)) e.preventDefault();

  // Shift: しゃがみトグル
  if ((e.code === 'ShiftLeft' || e.code === 'ShiftRight') && !isJumping && !isLanding) {
    isCrouching = !isCrouching;
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

const isCtrl  = () => keys['ControlLeft'] || keys['ControlRight'];
const isW     = () => keys['KeyW'];
const isS     = () => keys['KeyS'];
const isA     = () => keys['KeyA'];
const isD     = () => keys['KeyD'];
const isSpace = () => keys['Space'];

/* ================================================================
   設定ゲッター
   ================================================================ */
const getFaceDir     = () => document.getElementById('face-direction-toggle').checked;
const getCamFollow   = () => document.getElementById('camera-follow-toggle').checked;
const getBackSlow    = () => document.getElementById('backward-slow-toggle').checked;

document.getElementById('settings-btn').onclick = () => {
  const p = document.getElementById('settings-panel');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
};

/* ================================================================
   移動・アニメーション更新
   ================================================================ */
function updateCharacter(dt) {
  if (!currentVrm) return;

  // カメラYaw（水平方向）
  const camFwd = new THREE.Vector3();
  camera.getWorldDirection(camFwd);
  const camYaw = Math.atan2(camFwd.x, camFwd.z);

  const faceDir  = getFaceDir();
  const backSlow = getBackSlow();
  const ctrl = isCtrl();
  const w = isW(), s = isS(), a = isA(), d = isD();

  // --- 空中 ---
  if (!isGrounded) {
    velY += GRAVITY * dt;
    charPos.y += velY * dt;
    if (charPos.y <= GROUND_Y) {
      charPos.y = GROUND_Y;
      velY = 0;
      isGrounded = true;
      isJumping  = false;
      isLanding  = true;
      landTimer  = 0.55;
      playAnim('land', 0.08);
    } else if (velY < 0 && currentKey !== 'fall') {
      playAnim('fall', 0.15);
    }
    applyToVRM();
    return;
  }

  // --- 着地アニメ中 ---
  if (isLanding) {
    landTimer -= dt;
    if (landTimer <= 0) { isLanding = false; playAnim('idle', 0.2); }
    applyToVRM();
    return;
  }

  // --- Turn180トランジション中 ---
  if (turn180Active) {
    turn180Timer -= dt;
    if (turn180Timer <= 0) {
      turn180Active = false;
      charYaw += Math.PI;  // 実際に180度向きを変える
      playAnim(turn180IsRun ? 'run' : 'walk', 0.1);
    }
    applyToVRM();
    return;
  }

  // --- ジャンプ開始 ---
  if (isSpace() && isGrounded && !isJumping) {
    isGrounded = false;
    isJumping  = true;
    isCrouching = false;
    velY = JUMP_V;
    playAnim('jump', 0.08);
    applyToVRM();
    return;
  }

  // --- 移動計算 ---
  let mx = 0, mz = 0;
  let targetKey = 'idle';
  let faceYaw = charYaw;

  if (isCrouching) {
    // === しゃがみ ===
    if (!w && !s && !a && !d) {
      targetKey = 'crouch';
    } else if (w) {
      targetKey = 'crouchWalk';
      faceYaw = camYaw;
      const spd = CROUCH_SPD;
      mx = -Math.sin(camYaw) * spd;
      mz = -Math.cos(camYaw) * spd;
    } else if (s) {
      if (faceDir) {
        // 視点方向ON: crouchWalkを逆再生（後退）
        targetKey = 'crouchWalkBack';
        faceYaw = camYaw;
        const spd = CROUCH_SPD;
        mx = Math.sin(camYaw) * spd;
        mz = Math.cos(camYaw) * spd;
      } else {
        // 視点方向OFF: 後ろに向いてからcrouchWalk
        faceYaw = camYaw + Math.PI;
        targetKey = 'crouchWalk';
        const spd = CROUCH_SPD;
        mx = -Math.sin(faceYaw) * spd;
        mz = -Math.cos(faceYaw) * spd;
      }
    } else if (a) {
      if (faceDir) {
        targetKey = 'crouchStrafeL';
        faceYaw = camYaw;
        mx = -Math.cos(camYaw) * CROUCH_SPD;
        mz =  Math.sin(camYaw) * CROUCH_SPD;
      } else {
        faceYaw = camYaw - Math.PI/2;
        targetKey = 'crouchWalk';
        mx = -Math.sin(faceYaw) * CROUCH_SPD;
        mz = -Math.cos(faceYaw) * CROUCH_SPD;
      }
    } else if (d) {
      if (faceDir) {
        targetKey = 'crouchStrafeR';
        faceYaw = camYaw;
        mx =  Math.cos(camYaw) * CROUCH_SPD;
        mz = -Math.sin(camYaw) * CROUCH_SPD;
      } else {
        faceYaw = camYaw + Math.PI/2;
        targetKey = 'crouchWalk';
        mx = -Math.sin(faceYaw) * CROUCH_SPD;
        mz = -Math.cos(faceYaw) * CROUCH_SPD;
      }
    }
  } else if (ctrl) {
    // === 走り ===
    if (w && s) {
      // 走り中に逆キー → RunTurn180
      if ((currentKey === 'run') && !turn180Active) {
        turn180Active = true; turn180IsRun = true; turn180Timer = 0.4;
        playAnim('runTurn180', 0.08);
        applyToVRM(); return;
      }
    }
    if (w) {
      targetKey = 'run';
      faceYaw = camYaw;
      mx = -Math.sin(camYaw) * RUN_SPD;
      mz = -Math.cos(camYaw) * RUN_SPD;
    } else if (s) {
      if (faceDir) {
        targetKey = 'runBack';
        faceYaw = camYaw;
        const spd = RUN_SPD * BACK_MULT;
        mx = Math.sin(camYaw) * spd;
        mz = Math.cos(camYaw) * spd;
      } else {
        faceYaw = camYaw + Math.PI;
        targetKey = 'run';
        const spd = getBackSlow() ? RUN_SPD * BACK_MULT : RUN_SPD;
        mx = -Math.sin(faceYaw) * spd;
        mz = -Math.cos(faceYaw) * spd;
      }
    } else if (a) {
      if (faceDir) {
        targetKey = 'runStrafeL';
        faceYaw = camYaw;
        mx = -Math.cos(camYaw) * RUN_SPD;
        mz =  Math.sin(camYaw) * RUN_SPD;
      } else {
        faceYaw = camYaw - Math.PI/2;
        targetKey = 'run';
        mx = -Math.sin(faceYaw) * RUN_SPD;
        mz = -Math.cos(faceYaw) * RUN_SPD;
      }
    } else if (d) {
      if (faceDir) {
        targetKey = 'runStrafeR';
        faceYaw = camYaw;
        mx =  Math.cos(camYaw) * RUN_SPD;
        mz = -Math.sin(camYaw) * RUN_SPD;
      } else {
        faceYaw = camYaw + Math.PI/2;
        targetKey = 'run';
        mx = -Math.sin(faceYaw) * RUN_SPD;
        mz = -Math.cos(faceYaw) * RUN_SPD;
      }
    } else {
      targetKey = 'idle';
    }
  } else {
    // === 歩き ===
    if (w && s) {
      // 歩き中に逆キー → Turn180
      if ((currentKey === 'walk') && !turn180Active) {
        turn180Active = true; turn180IsRun = false; turn180Timer = 0.45;
        playAnim('turn180', 0.08);
        applyToVRM(); return;
      }
    }
    if (w) {
      targetKey = 'walk';
      faceYaw = camYaw;
      mx = -Math.sin(camYaw) * WALK_SPD;
      mz = -Math.cos(camYaw) * WALK_SPD;
    } else if (s) {
      if (faceDir) {
        targetKey = 'walkBack';
        faceYaw = camYaw;
        const spd = backSlow ? WALK_SPD * BACK_MULT : WALK_SPD;
        mx = Math.sin(camYaw) * spd;
        mz = Math.cos(camYaw) * spd;
      } else {
        faceYaw = camYaw + Math.PI;
        targetKey = 'walk';
        const spd = backSlow ? WALK_SPD * BACK_MULT : WALK_SPD;
        mx = -Math.sin(faceYaw) * spd;
        mz = -Math.cos(faceYaw) * spd;
      }
    } else if (a) {
      if (faceDir) {
        targetKey = 'strafeL';
        faceYaw = camYaw;
        mx = -Math.cos(camYaw) * WALK_SPD;
        mz =  Math.sin(camYaw) * WALK_SPD;
      } else {
        faceYaw = camYaw - Math.PI/2;
        targetKey = 'walk';
        mx = -Math.sin(faceYaw) * WALK_SPD;
        mz = -Math.cos(faceYaw) * WALK_SPD;
      }
    } else if (d) {
      if (faceDir) {
        targetKey = 'strafeR';
        faceYaw = camYaw;
        mx =  Math.cos(camYaw) * WALK_SPD;
        mz = -Math.sin(camYaw) * WALK_SPD;
      } else {
        faceYaw = camYaw + Math.PI/2;
        targetKey = 'walk';
        mx = -Math.sin(faceYaw) * WALK_SPD;
        mz = -Math.cos(faceYaw) * WALK_SPD;
      }
    } else {
      targetKey = 'idle';
    }
  }

  // 位置更新
  charPos.x += mx * dt;
  charPos.z += mz * dt;

  // 向きをスムーズに補間
  const diff = normAngle(faceYaw - charYaw);
  charYaw += diff * Math.min(dt * 12, 1);

  playAnim(targetKey, 0.15);
  applyToVRM();

  // カメラ追従
  if (getCamFollow()) {
    controls.target.lerp(charPos.clone().add(new THREE.Vector3(0, 1.2, 0)), 0.1);
  }
}

function normAngle(a) {
  while (a >  Math.PI) a -= Math.PI*2;
  while (a < -Math.PI) a += Math.PI*2;
  return a;
}

function applyToVRM() {
  if (!currentVrm) return;
  currentVrm.scene.position.copy(charPos);
  currentVrm.scene.rotation.y = charYaw;
}

/* ================================================================
   VRM 読み込み
   ================================================================ */
const gltfLoader = new GLTFLoader();
gltfLoader.register(p => new VRMLoaderPlugin(p));

async function loadVRM(path) {
  // 既存削除
  if (currentVrm) {
    scene.remove(currentVrm.scene);
    currentVrm = null;
    mixer = null;
    Object.keys(actions).forEach(k => delete actions[k]);
    Object.keys(clips).forEach(k => delete clips[k]);
    currentKey = null; currentAction = null;
  }

  setLoad(true, 0, 'VRM読み込み中...');

  let vrm;
  try {
    const gltf = await new Promise((res, rej) => {
      gltfLoader.load(path, res,
        p => { if (p.total) setLoad(true, (p.loaded/p.total)*45, 'VRM読み込み中...'); },
        rej);
    });
    vrm = gltf.userData.vrm;
    VRMUtils.removeUnnecessaryVertices(gltf.scene);
    VRMUtils.removeUnnecessaryJoints(gltf.scene);
    VRMUtils.rotateVRM0(vrm);
    vrm.scene.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
    vrm.scene.position.copy(charPos);
    scene.add(vrm.scene);
    currentVrm = vrm;
    mixer = new THREE.AnimationMixer(vrm.scene);
  } catch(e) {
    console.error('VRM失敗:', e);
    setLoad(true, 0, `読み込み失敗: ${e.message}`);
    return;
  }

  // アニメ読み込み
  setLoad(true, 48, 'アニメーション読み込み中...');
  const entries = Object.entries(ANIM_FILES);
  for (let i = 0; i < entries.length; i++) {
    const [key, file] = entries[i];
    setLoad(true, 48 + (i/entries.length)*48, `読込中: ${file}`);
    const opts = (key === 'crouchWalkBack') ? { reverse: true } : {};
    const clip = await loadMixamoAnimation(file, vrm, opts);
    if (clip) {
      clips[key] = clip;
      actions[key] = mixer.clipAction(clip);
      actions[key].setLoop(
        ONE_SHOT_KEYS.has(key) ? THREE.LoopOnce : THREE.LoopRepeat
      );
      actions[key].clampWhenFinished = ONE_SHOT_KEYS.has(key);
    }
  }

  setLoad(true, 100, '完了！');
  setTimeout(() => setLoad(false), 500);

  isCrouching = false;
  isGrounded = true; isJumping = false; isLanding = false;
  turn180Active = false;
  charPos.set(0, 0, 0);
  charYaw = 0;
  controls.target.set(0, 1.2, 0);

  currentKey = null; currentAction = null;
  playAnim('idle', 0.0);
}

/* ================================================================
   VRM Selector UI
   ================================================================ */
function buildVRMSelector() {
  const list = document.getElementById('vrm-list');
  list.innerHTML = '';
  if (!VRM_FILES.length) {
    list.innerHTML = '<div style="color:#666;font-size:11px;">VRM_FILESにファイルを追加してください</div>';
    return;
  }
  VRM_FILES.forEach((v, i) => {
    const btn = document.createElement('button');
    btn.className = 'vrm-btn' + (i===0?' active':'');
    btn.textContent = v.name;
    btn.onclick = () => {
      document.querySelectorAll('.vrm-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadVRM(v.path);
    };
    list.appendChild(btn);
  });
}

/* ================================================================
   Loading UI
   ================================================================ */
function setLoad(vis, pct, txt) {
  const el = document.getElementById('loading');
  if (vis) el.classList.remove('hidden'); else el.classList.add('hidden');
  document.getElementById('loading-bar').style.width = pct + '%';
  document.getElementById('loading-text').textContent = txt;
}

/* ================================================================
   Resize
   ================================================================ */
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ================================================================
   メインループ
   ================================================================ */
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  updateCharacter(dt);
  if (mixer) mixer.update(dt);
  if (currentVrm) currentVrm.update(dt);
  controls.update();
  renderer.render(scene, camera);
}

/* ================================================================
   起動
   ================================================================ */
buildVRMSelector();
if (VRM_FILES.length > 0) loadVRM(VRM_FILES[0].path);
else setLoad(false);
animate();
</script>
