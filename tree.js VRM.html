<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VRM Viewer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #15151f;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  #canvas-container { position: fixed; inset: 0; }

  #ui {
    position: fixed;
    top: 12px;
    left: 12px;
    color: #fff;
    background: rgba(0, 0, 0, 0.55);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.7;
    max-width: 280px;
    pointer-events: none;
  }
  #ui h1 { margin: 0 0 6px; font-size: 15px; }
  #status { color: #8be9fd; }

  #expressions {
    position: fixed;
    top: 12px;
    right: 12px;
    max-width: 230px;
    max-height: 80vh;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.55);
    color: #fff;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 12px;
  }
  #expressions h2 { margin: 0 0 8px; font-size: 13px; }
  .expr-btn {
    display: block;
    width: 100%;
    margin: 3px 0;
    padding: 6px 8px;
    border: none;
    border-radius: 6px;
    background: #2e2e4d;
    color: #fff;
    cursor: pointer;
    font-size: 12px;
    text-align: left;
  }
  .expr-btn:hover { background: #45457a; }
  .expr-btn.active { background: #5b6cff; }
  #resetExpr { margin-top: 8px; background: #553333; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui">
  <h1>VRM Viewer</h1>
  <div id="status">読み込み中...</div>
  <div>ドラッグ：視点回転 / ホイール：ズーム</div>
  <div>W/A/S/D：移動　Z(長押し)：走る</div>
  <div>Shift：しゃがみ切替　Space：ジャンプ</div>
  <label style="display:flex;align-items:center;gap:6px;margin-top:6px;pointer-events:auto;">
    <input type="checkbox" id="faceCameraToggle" checked />
    視点方向を向く
  </label>
</div>

<div id="expressions">
  <h2>表情一覧（VRMから自動検出）</h2>
  <div id="exprList">VRM読み込み後に表示されます</div>
</div>

<!--
  ====================================================================
  importmap: three.js / three-vrm / addons をCDN(jsdelivr)から読み込む設定。
  バージョンを変えたい場合はここの数字を変更してください。
  ====================================================================
-->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

/* ====================================================================
   ① ファイル名はここで指定します
   index.html と「同じフォルダ」に以下のファイルを置いてください。
   サブフォルダに入れた場合はパスを './models/xxx.vrm' のように直してください。
   ==================================================================== */
const VRM_FILE_PATH = './ayame_v1.1.vrm';     // ← VRMファイル名

// 使用するミクサモ(Mixamo)アニメーション(FBX)のファイル名一覧
// すべて index.html と同じフォルダに置いてください。
const ANIM_FILES = {
  idle:           './Standard Idle.fbx',
  walk:           './Walking.fbx',
  walkBack:       './Walking Backwards.fbx',
  walkTurn180:    './Walking Turn 180.fbx',
  strafeLeftWalk: './Left Strafe Walking.fbx',
  strafeRightWalk:'./Right Strafe Walking.fbx',
  run:            './Running.fbx',
  runBack:        './Running Backward.fbx',
  runTurn180:     './Running Turn 180.fbx',
  strafeLeftRun:  './Left Strafe.fbx',
  strafeRightRun: './Right Strafe.fbx',
  crouchIdle:     './Male Crouch Pose.fbx',
  crouchWalk:     './Crouched Walking.fbx',
  crouchLeft:     './Crouched Sneaking Left.fbx',
  crouchRight:    './Crouched Sneaking Right.fbx',
  jump:           './Jumping.fbx',
  fall:           './Falling Idle.fbx',
  land:           './Falling To Landing.fbx',
  stairs:         './Ascending Stairs.fbx',
};

const KEEP_IN_PLACE = true; // true: その場で足踏み（移動はコード側で行う）

/* ====================================================================
   ② Mixamo → VRM ボーン名 対応表
   ミクサモのリグ名 (mixamorigXXX) は VRM の Humanoid ボーン名と
   名前も階層も違うため、この対応表で1本ずつ紐づけてから動かします。
   （pixiv公式 three-vrm のサンプルで使われている対応表と同じものです）
   ==================================================================== */
const mixamoVRMRigMap = {
  mixamorigHips: 'hips',
  mixamorigSpine: 'spine',
  mixamorigSpine1: 'chest',
  mixamorigSpine2: 'upperChest',
  mixamorigNeck: 'neck',
  mixamorigHead: 'head',
  mixamorigLeftShoulder: 'leftShoulder',
  mixamorigLeftArm: 'leftUpperArm',
  mixamorigLeftForeArm: 'leftLowerArm',
  mixamorigLeftHand: 'leftHand',
  mixamorigLeftHandThumb1: 'leftThumbMetacarpal',
  mixamorigLeftHandThumb2: 'leftThumbProximal',
  mixamorigLeftHandThumb3: 'leftThumbDistal',
  mixamorigLeftHandIndex1: 'leftIndexProximal',
  mixamorigLeftHandIndex2: 'leftIndexIntermediate',
  mixamorigLeftHandIndex3: 'leftIndexDistal',
  mixamorigLeftHandMiddle1: 'leftMiddleProximal',
  mixamorigLeftHandMiddle2: 'leftMiddleIntermediate',
  mixamorigLeftHandMiddle3: 'leftMiddleDistal',
  mixamorigLeftHandRing1: 'leftRingProximal',
  mixamorigLeftHandRing2: 'leftRingIntermediate',
  mixamorigLeftHandRing3: 'leftRingDistal',
  mixamorigLeftHandPinky1: 'leftLittleProximal',
  mixamorigLeftHandPinky2: 'leftLittleIntermediate',
  mixamorigLeftHandPinky3: 'leftLittleDistal',
  mixamorigRightShoulder: 'rightShoulder',
  mixamorigRightArm: 'rightUpperArm',
  mixamorigRightForeArm: 'rightLowerArm',
  mixamorigRightHand: 'rightHand',
  mixamorigRightHandPinky1: 'rightLittleProximal',
  mixamorigRightHandPinky2: 'rightLittleIntermediate',
  mixamorigRightHandPinky3: 'rightLittleDistal',
  mixamorigRightHandRing1: 'rightRingProximal',
  mixamorigRightHandRing2: 'rightRingIntermediate',
  mixamorigRightHandRing3: 'rightRingDistal',
  mixamorigRightHandMiddle1: 'rightMiddleProximal',
  mixamorigRightHandMiddle2: 'rightMiddleIntermediate',
  mixamorigRightHandMiddle3: 'rightMiddleDistal',
  mixamorigRightHandIndex1: 'rightIndexProximal',
  mixamorigRightHandIndex2: 'rightIndexIntermediate',
  mixamorigRightHandIndex3: 'rightIndexDistal',
  mixamorigRightHandThumb1: 'rightThumbMetacarpal',
  mixamorigRightHandThumb2: 'rightThumbProximal',
  mixamorigRightHandThumb3: 'rightThumbDistal',
  mixamorigLeftUpLeg: 'leftUpperLeg',
  mixamorigLeftLeg: 'leftLowerLeg',
  mixamorigLeftFoot: 'leftFoot',
  mixamorigLeftToeBase: 'leftToes',
  mixamorigRightUpLeg: 'rightUpperLeg',
  mixamorigRightLeg: 'rightLowerLeg',
  mixamorigRightFoot: 'rightFoot',
  mixamorigRightToeBase: 'rightToes',
};

/* ====================================================================
   ③ ミクサモのFBXアニメーションを VRM 用 AnimationClip に変換する関数
   pixiv公式 three-vrm のサンプル loadMixamoAnimation.js をベースに、
   「その場から動かさない」処理 (KEEP_IN_PLACE) を追加したものです。
   https://github.com/pixiv/three-vrm/tree/dev/packages/three-vrm-core/examples/humanoidAnimation
   ==================================================================== */
function loadMixamoAnimation(url, vrm, keepInPlace = true, clipName = 'clip') {
  const loader = new FBXLoader();
  return loader.loadAsync(url).then((asset) => {
    // Mixamoから書き出されたFBXは、アニメーション名が "mixamo.com" になっていることが多い
    const clip = THREE.AnimationClip.findByName(asset.animations, 'mixamo.com') || asset.animations[0];
    if (!clip) throw new Error('FBXの中にアニメーションが見つかりませんでした');

    const tracks = [];
    const restRotationInverse = new THREE.Quaternion();
    const parentRestWorldRotation = new THREE.Quaternion();
    const _quatA = new THREE.Quaternion();

    // ミクサモとVRMでは腰(Hips)の高さ＝身長スケールが違うため、比率を求めて補正する
    const mixamoHipsNode = asset.getObjectByName('mixamorigHips');
    const motionHipsHeight = mixamoHipsNode.position.y;
    const vrmHipsHeight = vrm.humanoid.normalizedRestPose.hips.position[1];
    const hipsPositionScale = vrmHipsHeight / motionHipsHeight;

    clip.tracks.forEach((track) => {
      // トラック名は "mixamorigHips.quaternion" のような形式になっている
      const [mixamoRigName, propertyName] = track.name.split('.');
      const vrmBoneName = mixamoVRMRigMap[mixamoRigName];
      const vrmNodeName = vrm.humanoid?.getNormalizedBoneNode(vrmBoneName)?.name;
      const mixamoRigNode = asset.getObjectByName(mixamoRigName);

      // 対応表に無いボーン（指の一部や補助ボーンなど）は無視する
      if (vrmNodeName == null || mixamoRigNode == null) return;

      // レスト(直立)姿勢時の回転を基準に、回転の差分だけを取り出す
      mixamoRigNode.getWorldQuaternion(restRotationInverse).invert();
      mixamoRigNode.parent.getWorldQuaternion(parentRestWorldRotation);

      if (track instanceof THREE.QuaternionKeyframeTrack) {
        for (let i = 0; i < track.values.length; i += 4) {
          const flat = track.values.slice(i, i + 4);
          _quatA.fromArray(flat).premultiply(parentRestWorldRotation).multiply(restRotationInverse).toArray(flat);
          flat.forEach((v, idx) => (track.values[idx + i] = v));
        }
        tracks.push(new THREE.QuaternionKeyframeTrack(
          `${vrmNodeName}.${propertyName}`,
          track.times,
          // VRM0.0モデルは前後左右の軸が反転しているので、その場合だけ符号を反転する
          track.values.map((v, i) => (vrm.meta?.metaVersion === '0' && i % 2 === 0 ? -v : v)),
        ));
      } else if (track instanceof THREE.VectorKeyframeTrack) {
        const values = track.values.map(
          (v, i) => (vrm.meta?.metaVersion === '0' && i % 3 !== 1 ? -v : v) * hipsPositionScale,
        );

        // Hipsの「位置」トラック＝歩行による前進(根本移動)が入っている部分
        if (mixamoRigName === 'mixamorigHips' && propertyName === 'position' && keepInPlace) {
          // X(左右)とZ(前後)だけ0にする。Y(上下の重心バウンス)はそのまま残すので
          // 「その場で足踏みしている」自然な動きになる
          for (let i = 0; i < values.length; i += 3) {
            values[i] = 0;
            values[i + 2] = 0;
          }
        }
        tracks.push(new THREE.VectorKeyframeTrack(`${vrmNodeName}.${propertyName}`, track.times, values));
      }
    });

    return new THREE.AnimationClip(clipName, clip.duration, tracks);
  });
}

/* ====================================================================
   シーンの基本構築
   ==================================================================== */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15151f);

const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 4.2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// 3人称自動追跡カメラ：targetをキャラクターに毎フレーム追従させる(後述のanimate内)。
// マウス/タッチでの視点回転・ズームはOrbitControlsのまま使う。
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.1, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.12;
controls.minDistance = 1.2;
controls.maxDistance = 8;
controls.minPolarAngle = 0.3;
controls.maxPolarAngle = Math.PI / 1.9;
controls.enablePan = false;
controls.update();

// ライト
scene.add(new THREE.HemisphereLight(0xffffff, 0x444466, 1.3));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
dirLight.position.set(1, 2, 1.5);
scene.add(dirLight);

// 足元の目安になる地面とグリッド
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(20, 48),
  new THREE.MeshStandardMaterial({ color: 0x23233a, roughness: 1 }),
);
floor.rotation.x = -Math.PI / 2;
floor.name = 'ground';
scene.add(floor);
scene.add(new THREE.GridHelper(40, 80, 0x4444aa, 0x2c2c44));

// 階段検証用の簡単な階段（Ascending Stairs.fbxの動作確認用）。不要なら削除してください。
const stairGroup = new THREE.Group();
const stepCount = 6, stepH = 0.18, stepD = 0.32;
for (let i = 0; i < stepCount; i++) {
  const step = new THREE.Mesh(
    new THREE.BoxGeometry(1.4, stepH, stepD),
    new THREE.MeshStandardMaterial({ color: 0x33334d, roughness: 1 }),
  );
  step.position.set(2.5, stepH * (i + 0.5), -1.0 - i * stepD);
  step.name = 'ground';
  stairGroup.add(step);
}
scene.add(stairGroup);

const clock = new THREE.Clock();
let currentVrm = null;
let mixer = null;
const actions = {}; // key: ANIM_FILESのキー名 → THREE.AnimationAction
let activeAction = null;

const statusEl = document.getElementById('status');

/* ====================================================================
   ④ VRMの読み込み
   ==================================================================== */
const gltfLoader = new GLTFLoader();
gltfLoader.register((parser) => new VRMLoaderPlugin(parser));

gltfLoader.load(
  VRM_FILE_PATH,
  async (gltf) => {
    const vrm = gltf.userData.vrm;

    // 表示に不要なデータを削除して軽量化（任意・無くても動作します）
    VRMUtils.removeUnnecessaryVertices(gltf.scene);
    VRMUtils.removeUnnecessaryJoints(gltf.scene);

    // VRM0.x のモデルは正面が後ろ(-Z)を向いているため、自動で前(+Z)向きに補正する
    // VRM1.0のモデルなら何もしない（バージョンを自動判定）
    VRMUtils.rotateVRM0(vrm);

    scene.add(vrm.scene);
    currentVrm = vrm;
    statusEl.textContent = 'VRM読み込み完了。アニメーション読込中...';

    // VRMに入っている表情(Expression)の一覧をUIとコンソールに表示
    setupExpressionUI(vrm);

    // ミクサモのアニメーションを全種類読み込んでVRMに適用する
    mixer = new THREE.AnimationMixer(vrm.scene);
    setupAnimationFinishedHandling();
    const keys = Object.keys(ANIM_FILES);
    let loadedCount = 0;
    await Promise.all(
      keys.map(async (key) => {
        try {
          const clip = await loadMixamoAnimation(ANIM_FILES[key], vrm, KEEP_IN_PLACE, key);
          const action = mixer.clipAction(clip);
          action.clampWhenFinished = true;
          actions[key] = action;
          loadedCount++;
          statusEl.textContent = `アニメーション読込中... (${loadedCount}/${keys.length})`;
        } catch (e) {
          console.error(`「${ANIM_FILES[key]}」の読み込みに失敗しました:`, e);
        }
      }),
    );

    if (actions.idle) {
      activeAction = actions.idle;
      activeAction.reset().play();
    }
    statusEl.textContent = '準備完了！W/A/S/Dで移動、Zで走る、Shiftでしゃがみ、Spaceでジャンプ';
  },
  (progress) => {
    if (progress.total) {
      statusEl.textContent = `VRM読み込み中... ${Math.round((progress.loaded / progress.total) * 100)}%`;
    }
  },
  (error) => {
    console.error(error);
    statusEl.textContent = 'VRMの読み込みに失敗しました。ファイル名/パスを確認してください。';
  },
);

/* ====================================================================
   ⑤ 表情(Expression) UI
   VRMに入っている表情を自動で検出してボタンを生成します。
   ボタンを押すと vrm.expressionManager.setValue(名前, 1.0) を呼びます。
   ==================================================================== */
function setupExpressionUI(vrm) {
  const listEl = document.getElementById('exprList');
  listEl.innerHTML = '';

  if (!vrm.expressionManager) {
    listEl.textContent = 'このVRMには表情(Expression)が設定されていません';
    return;
  }

  // このVRMが持つ全表情名（プリセット＋VRoidStudio等で作ったカスタム表情）
  const names = Object.keys(vrm.expressionManager.expressionMap);
  console.log('このVRMが持つ表情一覧:', names);

  names.forEach((name) => {
    const btn = document.createElement('button');
    btn.className = 'expr-btn';
    btn.textContent = name;
    btn.onclick = () => {
      // 一旦すべて0にしてから、押した表情だけ1.0にする
      names.forEach((n) => vrm.expressionManager.setValue(n, 0));
      vrm.expressionManager.setValue(name, 1.0);
      document.querySelectorAll('.expr-btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
    };
    listEl.appendChild(btn);
  });

  const resetBtn = document.createElement('button');
  resetBtn.className = 'expr-btn';
  resetBtn.id = 'resetExpr';
  resetBtn.textContent = 'リセット（neutral）';
  resetBtn.onclick = () => {
    names.forEach((n) => vrm.expressionManager.setValue(n, 0));
    document.querySelectorAll('.expr-btn').forEach((b) => b.classList.remove('active'));
  };
  listEl.appendChild(resetBtn);
}

/* ====================================================================
   ⑥ 移動・アニメーション ステートマシン
   W/A/S/D：移動　Z(押している間)：走る　Shift：しゃがみ切替　Space：ジャンプ
   「視点方向を向く」設定がONのときはカメラの向きを基準(0度)に体が
   常にカメラ方向を向き、その場でストレイフ/後退します。
   OFFのときは体そのものが移動方向へコードで瞬時に向き直ってから前進します。
   ==================================================================== */
const WALK_SPEED = 1.4;
const RUN_SPEED = 3.2;
const CROUCH_SPEED = 0.9;
const BACK_SPEED_MULT = 0.6; // 視点方向を向く=ON時の後退だけ減速する
const JUMP_SPEED = 5.5;
const GRAVITY = -14;

const pressedKeys = new Set();
const dirKeyOrder = []; // 押した順を保持し、最後に押したキーを優先する

let isCrouching = false;
let verticalState = 'grounded'; // grounded | jumping | falling | landing
let velocityY = 0;
let isTurning = false; // 180度ターンアニメーション再生中は入力を無視
let lastMode = null;   // 'walk' | 'run' | 'crouch' | 'idle'
let lastAxis = null;   // 'forward' | 'backward' | 'left' | 'right' | null

const faceCameraToggle = document.getElementById('faceCameraToggle');
const stairRaycaster = new THREE.Raycaster();

function normalizeKey(e) {
  return e.key.length === 1 ? e.key.toLowerCase() : e.key;
}

window.addEventListener('keydown', (e) => {
  const k = normalizeKey(e);
  if (['w', 'a', 's', 'd'].includes(k)) {
    pressedKeys.add(k);
    if (!dirKeyOrder.includes(k)) dirKeyOrder.push(k);
  } else if (k === 'z') {
    pressedKeys.add('z');
  } else if (e.key === 'Shift') {
    if (!pressedKeys.has('Shift')) {
      pressedKeys.add('Shift');
      if (verticalState === 'grounded' && !isTurning) isCrouching = !isCrouching;
    }
  } else if (e.key === ' ') {
    e.preventDefault();
    if (!pressedKeys.has(' ')) {
      pressedKeys.add(' ');
      tryJump();
    }
  }
});

window.addEventListener('keyup', (e) => {
  const k = normalizeKey(e);
  if (['w', 'a', 's', 'd'].includes(k)) {
    pressedKeys.delete(k);
    const idx = dirKeyOrder.indexOf(k);
    if (idx !== -1) dirKeyOrder.splice(idx, 1);
  } else if (k === 'z') {
    pressedKeys.delete('z');
  } else if (e.key === 'Shift') {
    pressedKeys.delete('Shift');
  } else if (e.key === ' ') {
    pressedKeys.delete(' ');
  }
});

function getMoveKey() {
  for (let i = dirKeyOrder.length - 1; i >= 0; i--) {
    if (pressedKeys.has(dirKeyOrder[i])) return dirKeyOrder[i];
  }
  return null;
}

// -1〜+1のπをまたぐ角度同士を最短経路で補間する
function lerpAngle(from, to, t) {
  let diff = ((to - from + Math.PI) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2) - Math.PI;
  return from + diff * t;
}

function playAction(key, opts = {}) {
  const next = actions[key];
  if (!next) return null;
  const fade = opts.fade ?? 0.2;
  const sameAction = next === activeAction;

  if (!sameAction) {
    next.reset();
  }
  next.timeScale = opts.reverse ? -1 : 1;
  if (opts.reverse) next.time = next.getClip().duration;
  if (opts.once) {
    next.setLoop(THREE.LoopOnce, 1);
    next.clampWhenFinished = true;
  } else {
    next.setLoop(THREE.LoopRepeat, Infinity);
    next.clampWhenFinished = false;
  }
  if (!sameAction) {
    next.play();
    if (activeAction) activeAction.crossFadeTo(next, fade, true);
    else next.fadeIn(fade);
    activeAction = next;
  }
  return next;
}

function tryJump() {
  if (!currentVrm || !mixer) return;
  if (verticalState !== 'grounded' || isCrouching || isTurning) return;
  verticalState = 'jumping';
  velocityY = JUMP_SPEED;
  lastMode = null; lastAxis = null;
  playAction('jump', { fade: 0.1, once: true });
}

// 地面(ground)に向けてレイを飛ばし、現在の足元の高さを調べる(階段の自動昇降に使用)
function sampleGroundHeight(position) {
  const origin = position.clone();
  origin.y += 1.0;
  stairRaycaster.set(origin, new THREE.Vector3(0, -1, 0));
  stairRaycaster.far = 2.0;
  const hits = stairRaycaster.intersectObjects(scene.children, true)
    .filter((h) => h.object.name === 'ground');
  return hits.length ? hits[0].point.y : 0;
}

function updateCharacter(delta) {
  if (!currentVrm || !mixer || Object.keys(actions).length === 0) return;
  const faceCam = faceCameraToggle.checked;

  // カメラが向いている水平方向(ヨー)。これを0度とする。
  const camDir = new THREE.Vector3();
  camera.getWorldDirection(camDir);
  camDir.y = 0;
  if (camDir.lengthSq() < 1e-6) camDir.set(0, 0, 1);
  camDir.normalize();
  const cameraYaw = Math.atan2(camDir.x, camDir.z);

  // ---- 垂直方向(ジャンプ／落下／着地) ----
  if (verticalState !== 'grounded') {
    velocityY += GRAVITY * delta;
    currentVrm.scene.position.y += velocityY * delta;

    if (verticalState === 'jumping' && velocityY < 0) {
      verticalState = 'falling';
      playAction('fall', { fade: 0.25 });
    }

    const groundY = sampleGroundHeight(currentVrm.scene.position);
    if (currentVrm.scene.position.y <= groundY) {
      currentVrm.scene.position.y = groundY; // 着地位置を強制的に固定
      velocityY = 0;
      verticalState = 'landing';
      playAction('land', { fade: 0.1, once: true });
    }
    return; // 空中にいる間は通常の移動ステートマシンを停止
  }
  if (verticalState === 'landing' && activeAction === actions.land && !activeAction.isRunning()) {
    verticalState = 'grounded';
  }

  if (isTurning) return; // 180度ターン中は入力を無視

  const moveKey = getMoveKey();
  const isRun = pressedKeys.has('z');

  let mode = 'idle';
  let animKey = 'idle';
  let axis = null;
  let speed = 0;
  let reverseClip = false;
  let turnKeyForReversal = null;
  let faceTargetYaw = currentVrm.scene.rotation.y;
  let moveOffset = 0; // faceCam=ON時のみ使う「体の向き」と「実際に進む方向」のズレ

  if (isCrouching) {
    mode = 'crouch';
    if (!moveKey) {
      animKey = 'crouchIdle';
    } else if (moveKey === 'w') {
      animKey = 'crouchWalk'; axis = 'forward'; speed = CROUCH_SPEED;
      if (faceCam) faceTargetYaw = cameraYaw;
    } else if (moveKey === 's') {
      axis = 'backward'; speed = CROUCH_SPEED;
      if (faceCam) {
        animKey = 'crouchWalk'; reverseClip = true;
        faceTargetYaw = cameraYaw; moveOffset = Math.PI;
      } else {
        animKey = 'crouchWalk';
        faceTargetYaw = currentVrm.scene.rotation.y + Math.PI;
      }
    } else if (moveKey === 'a') {
      axis = 'left'; speed = CROUCH_SPEED;
      if (faceCam) {
        animKey = 'crouchLeft';
        faceTargetYaw = cameraYaw; moveOffset = -Math.PI / 2;
      } else {
        animKey = 'crouchWalk';
        faceTargetYaw = currentVrm.scene.rotation.y - Math.PI / 2;
      }
    } else if (moveKey === 'd') {
      axis = 'right'; speed = CROUCH_SPEED;
      if (faceCam) {
        animKey = 'crouchRight';
        faceTargetYaw = cameraYaw; moveOffset = Math.PI / 2;
      } else {
        animKey = 'crouchWalk';
        faceTargetYaw = currentVrm.scene.rotation.y + Math.PI / 2;
      }
    }
  } else {
    mode = isRun ? 'run' : 'walk';
    const fwdKey = isRun ? 'run' : 'walk';
    const backKey = isRun ? 'runBack' : 'walkBack';
    const turnKey = isRun ? 'runTurn180' : 'walkTurn180';
    const strafeLeftKey = isRun ? 'strafeLeftRun' : 'strafeLeftWalk';
    const strafeRightKey = isRun ? 'strafeRightRun' : 'strafeRightWalk';
    const baseSpeed = isRun ? RUN_SPEED : WALK_SPEED;

    if (!moveKey) {
      mode = 'idle'; animKey = 'idle';
    } else if (moveKey === 'w') {
      animKey = fwdKey; axis = 'forward'; speed = baseSpeed; turnKeyForReversal = turnKey;
      if (faceCam) faceTargetYaw = cameraYaw;

      // 階段の自動検出：進行方向の足元が一段上がっていればAscending Stairs.fbxに切り替える
      const aheadYaw = faceCam ? cameraYaw : currentVrm.scene.rotation.y;
      const aheadPos = currentVrm.scene.position.clone();
      aheadPos.x += Math.sin(aheadYaw) * 0.45;
      aheadPos.z += Math.cos(aheadYaw) * 0.45;
      const aheadGroundY = sampleGroundHeight(aheadPos);
      if (aheadGroundY - currentVrm.scene.position.y > 0.04) {
        animKey = 'stairs';
      }
    } else if (moveKey === 's') {
      axis = 'backward'; turnKeyForReversal = turnKey;
      if (faceCam) {
        animKey = backKey; speed = baseSpeed * BACK_SPEED_MULT; // 後退のみ減速
        faceTargetYaw = cameraYaw; moveOffset = Math.PI;
      } else {
        animKey = fwdKey; speed = baseSpeed; // OFF時は速度を落とさない
        faceTargetYaw = currentVrm.scene.rotation.y + Math.PI;
      }
    } else if (moveKey === 'a') {
      axis = 'left'; speed = baseSpeed;
      if (faceCam) {
        animKey = strafeLeftKey;
        faceTargetYaw = cameraYaw; moveOffset = -Math.PI / 2;
      } else {
        animKey = fwdKey;
        faceTargetYaw = currentVrm.scene.rotation.y - Math.PI / 2;
      }
    } else if (moveKey === 'd') {
      axis = 'right'; speed = baseSpeed;
      if (faceCam) {
        animKey = strafeRightKey;
        faceTargetYaw = cameraYaw; moveOffset = Math.PI / 2;
      } else {
        animKey = fwdKey;
        faceTargetYaw = currentVrm.scene.rotation.y + Math.PI / 2;
      }
    }
  }

  // 歩行/走行中に反対方向のキーへ切り替えたら、Turn180アニメーションを1回挟む
  if (
    turnKeyForReversal && lastMode === mode && lastAxis &&
    ((lastAxis === 'forward' && axis === 'backward') || (lastAxis === 'backward' && axis === 'forward'))
  ) {
    isTurning = true;
    playAction(turnKeyForReversal, { fade: 0.1, once: true });
    lastMode = mode; lastAxis = axis;
    return;
  }

  playAction(animKey, { fade: 0.15, reverse: reverseClip });

  // 体の向き：ONなら常にカメラ方向へ滑らかに追従、OFFなら移動方向へ瞬時に切り替える
  if (axis !== null) {
    if (faceCam) {
      currentVrm.scene.rotation.y = lerpAngle(currentVrm.scene.rotation.y, faceTargetYaw, Math.min(1, delta * 10));
    } else {
      currentVrm.scene.rotation.y = faceTargetYaw;
    }
  }

  // 実際の移動
  if (axis !== null && speed > 0) {
    const moveYaw = currentVrm.scene.rotation.y + (faceCam ? moveOffset : 0);
    currentVrm.scene.position.x += Math.sin(moveYaw) * speed * delta;
    currentVrm.scene.position.z += Math.cos(moveYaw) * speed * delta;
  }

  // 地面（階段含む）に沿って足元の高さを滑らかに合わせる
  const groundY = sampleGroundHeight(currentVrm.scene.position);
  currentVrm.scene.position.y += (groundY - currentVrm.scene.position.y) * Math.min(1, delta * 8);

  lastMode = mode;
  lastAxis = axis;
}

// 180度ターンや着地アニメーションが終わったタイミングを検知する
function setupAnimationFinishedHandling() {
  mixer.addEventListener('finished', (e) => {
    if (e.action === actions.walkTurn180 || e.action === actions.runTurn180) {
      isTurning = false;
    } else if (e.action === actions.land) {
      verticalState = 'grounded';
    }
  });
}

/* ====================================================================
   ウィンドウリサイズ対応
   ==================================================================== */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ====================================================================
   メインループ（3人称自動追跡カメラ：キャラクターの位置にtargetを追従させる）
   ==================================================================== */
function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.1);

  updateCharacter(delta);

  if (mixer) mixer.update(delta);
  if (currentVrm) currentVrm.update(delta); // 表情・ボーン・LookAt・スプリングボーン等を一括更新

  if (currentVrm) {
    const targetPos = currentVrm.scene.position.clone();
    targetPos.y += 1.3; // 頭〜胸あたりを注視点にする
    controls.target.lerp(targetPos, Math.min(1, delta * 6));
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
