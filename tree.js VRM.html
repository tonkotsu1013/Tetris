<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRM Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; font-family: sans-serif; }
  canvas { display: block; }
  #info {
    position: fixed; top: 10px; left: 10px;
    color: #fff; background: rgba(0,0,0,0.65);
    padding: 10px 14px; border-radius: 8px;
    font-size: 13px; line-height: 1.9; pointer-events: none; z-index: 10;
  }
  #expressions {
    position: fixed; top: 10px; right: 10px;
    color: #fff; background: rgba(0,0,0,0.65);
    padding: 10px 14px; border-radius: 8px;
    font-size: 13px; z-index: 10;
    max-height: 90vh; overflow-y: auto; min-width: 160px;
  }
  #expressions h3 { margin-bottom: 6px; font-size: 14px; color: #adf; }
  .expr-btn {
    display: block; width: 100%; margin: 3px 0;
    padding: 5px 10px; border: none; border-radius: 5px;
    background: #2a2a5a; color: #fff; cursor: pointer; font-size: 12px;
    text-align: left; transition: background 0.15s;
  }
  .expr-btn:hover { background: #4a4ab0; }
  .expr-btn.active { background: #6060e0; }
  #anim-state {
    position: fixed; bottom: 12px; left: 50%;
    transform: translateX(-50%);
    color: #fff; background: rgba(0,0,0,0.75);
    padding: 6px 18px; border-radius: 20px;
    font-size: 13px; z-index: 10; white-space: nowrap;
  }
</style>
</head>
<body>

<div id="info">
  <b>🎮 操作方法</b><br>
  ← → ↑ ↓ : カメラ回転<br>
  W / S : ズームイン / アウト<br>
  マウスドラッグ : 視点回転<br>
  スクロール : ズーム<br>
  Space : アニメ停止 / 再生<br>
  R : カメラリセット
</div>

<div id="expressions">
  <h3>😊 表情一覧</h3>
  <div id="expr-list">VRM読み込み後に表示...</div>
</div>

<div id="anim-state">読み込み中...</div>

<script type="importmap">
{
  "imports": {
    "three":                    "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/":            "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/",
    "@pixiv/three-vrm":         "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.2/lib/three-vrm.module.js",
    "@pixiv/three-vrm-core":    "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-core@2.1.2/lib/three-vrm-core.module.js",
    "@pixiv/three-vrm-materials-v0-compat": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-materials-v0-compat@2.1.2/lib/three-vrm-materials-v0-compat.module.js",
    "@pixiv/three-vrm-node-constraint": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-node-constraint@2.1.2/lib/three-vrm-node-constraint.module.js",
    "@pixiv/three-vrm-springbone": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-springbone@2.1.2/lib/three-vrm-springbone.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { FBXLoader }     from 'three/addons/loaders/FBXLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

// =====================================================
// 【ファイル名の設定】ここだけ変える
// =====================================================
const VRM_FILE  = 'ayame_v1.1.vrm';

// ← Mixamoからダウンロードしたアニメを追加する場所
const FBX_FILES = {
  walk:  'Walking.fbx',
  // idle:  'Idle.fbx',      // 追加例
  // run:   'Running.fbx',   // 追加例
  // jump:  'Jump.fbx',      // 追加例
};

// =====================================================
// シーン初期化
// =====================================================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace; // r150+ の書き方
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.04);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 1.3, 3.2);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.9, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.5;
controls.maxDistance = 12;
controls.update();

// ライト
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dir = new THREE.DirectionalLight(0xffffff, 1.2);
dir.position.set(2, 4, 3);
dir.castShadow = true;
scene.add(dir);
const fill = new THREE.DirectionalLight(0x8899ff, 0.35);
fill.position.set(-2, 1, -1);
scene.add(fill);

// 床 + グリッド
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(5, 64),
  new THREE.MeshStandardMaterial({ color: 0x1e1e3a, roughness: 0.9 })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);
scene.add(new THREE.GridHelper(10, 20, 0x334488, 0x223366));

// =====================================================
// 状態
// =====================================================
let vrm        = null;
let mixer      = null;
let animations = {};
let currentAction = null;
const clock    = new THREE.Clock();
const stateEl  = document.getElementById('anim-state');

// =====================================================
// VRM 読み込み
// =====================================================
const gltfLoader = new GLTFLoader();
gltfLoader.register(parser => new VRMLoaderPlugin(parser));

stateEl.textContent = 'VRM 読み込み中...';

gltfLoader.load(
  VRM_FILE,
  gltf => {
    vrm = gltf.userData.vrm;
    VRMUtils.removeUnnecessaryJoints(vrm.scene);

    // VRM0 は Y180 回転が必要な場合がある
    if (vrm.meta?.metaVersion === '0') {
      vrm.scene.rotation.y = Math.PI;
    }

    scene.add(vrm.scene);

    // 接地
    const box = new THREE.Box3().setFromObject(vrm.scene);
    vrm.scene.position.y = -box.min.y;

    // カメラターゲットをモデル中心に
    const center = box.getCenter(new THREE.Vector3());
    controls.target.set(0, center.y - box.min.y, 0);
    controls.update();

    stateEl.textContent = 'VRM 読み込み完了 ✓';
    console.log('[VRM] 読み込み完了');

    // 表情一覧を表示
    buildExpressionUI(vrm);

    // FBX アニメ読み込み
    loadAllFBX(vrm);
  },
  xhr => {
    if (xhr.total) stateEl.textContent = `VRM ${Math.round(xhr.loaded/xhr.total*100)}%`;
  },
  err => {
    console.error('[VRM] エラー:', err);
    stateEl.textContent = '❌ VRM 読み込み失敗 — ファイル名・場所を確認してください';
  }
);

// =====================================================
// 表情 UI 構築
// =====================================================
function buildExpressionUI(vrm) {
  const mgr = vrm.expressionManager;
  const el  = document.getElementById('expr-list');
  if (!mgr) { el.textContent = '表情なし'; return; }

  // VRM2: expressionMap から取得
  // VRM1/0: _expressions から取得（内部プロパティ）
  const names = new Set();

  // 標準プリセット
  ['happy','angry','sad','relaxed','surprised',
   'aa','ih','ou','ee','oh',
   'blink','blinkLeft','blinkRight',
   'lookUp','lookDown','lookLeft','lookRight',
   'neutral'].forEach(n => names.add(n));

  // モデル固有の表情を追加
  if (mgr.expressionMap) {
    Object.keys(mgr.expressionMap).forEach(n => names.add(n));
  }
  if (mgr._expressions) {
    Object.keys(mgr._expressions).forEach(n => names.add(n));
  }

  // 実際に存在するものだけ残す
  const validNames = [...names].filter(n => {
    try { return mgr.getExpression(n) != null; } catch { return false; }
  });

  console.log('[VRM] 表情一覧:', validNames);

  el.innerHTML = '';

  // リセットボタン
  const resetBtn = document.createElement('button');
  resetBtn.className = 'expr-btn';
  resetBtn.textContent = '😐 リセット';
  resetBtn.onclick = () => {
    validNames.forEach(n => { try { mgr.setValue(n, 0); } catch {} });
    mgr.update(0);
    document.querySelectorAll('.expr-btn').forEach(b => b.classList.remove('active'));
  };
  el.appendChild(resetBtn);

  validNames.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'expr-btn';
    btn.textContent = name;
    btn.onclick = () => {
      validNames.forEach(n => { try { mgr.setValue(n, 0); } catch {} });
      try { mgr.setValue(name, 1.0); } catch {}
      mgr.update(0);
      document.querySelectorAll('.expr-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    el.appendChild(btn);
  });
}

// =====================================================
// Mixamo ボーン → VRM ボーン 変換テーブル
// （インストール不要・このテーブルで翻訳します）
// =====================================================
const MIXAMO_TO_VRM = {
  mixamorigHips:            'hips',
  mixamorigSpine:           'spine',
  mixamorigSpine1:          'chest',
  mixamorigSpine2:          'upperChest',
  mixamorigNeck:            'neck',
  mixamorigHead:            'head',
  mixamorigLeftShoulder:    'leftShoulder',
  mixamorigLeftArm:         'leftUpperArm',
  mixamorigLeftForeArm:     'leftLowerArm',
  mixamorigLeftHand:        'leftHand',
  mixamorigRightShoulder:   'rightShoulder',
  mixamorigRightArm:        'rightUpperArm',
  mixamorigRightForeArm:    'rightLowerArm',
  mixamorigRightHand:       'rightHand',
  mixamorigLeftUpLeg:       'leftUpperLeg',
  mixamorigLeftLeg:         'leftLowerLeg',
  mixamorigLeftFoot:        'leftFoot',
  mixamorigLeftToeBase:     'leftToes',
  mixamorigRightUpLeg:      'rightUpperLeg',
  mixamorigRightLeg:        'rightLowerLeg',
  mixamorigRightFoot:       'rightFoot',
  mixamorigRightToeBase:    'rightToes',
  // 指
  mixamorigLeftHandThumb1:  'leftThumbProximal',
  mixamorigLeftHandThumb2:  'leftThumbIntermediate',
  mixamorigLeftHandThumb3:  'leftThumbDistal',
  mixamorigLeftHandIndex1:  'leftIndexProximal',
  mixamorigLeftHandIndex2:  'leftIndexIntermediate',
  mixamorigLeftHandIndex3:  'leftIndexDistal',
  mixamorigLeftHandMiddle1: 'leftMiddleProximal',
  mixamorigLeftHandMiddle2: 'leftMiddleIntermediate',
  mixamorigLeftHandMiddle3: 'leftMiddleDistal',
  mixamorigLeftHandRing1:   'leftRingProximal',
  mixamorigLeftHandRing2:   'leftRingIntermediate',
  mixamorigLeftHandRing3:   'leftRingDistal',
  mixamorigLeftHandPinky1:  'leftLittleProximal',
  mixamorigLeftHandPinky2:  'leftLittleIntermediate',
  mixamorigLeftHandPinky3:  'leftLittleDistal',
  mixamorigRightHandThumb1: 'rightThumbProximal',
  mixamorigRightHandThumb2: 'rightThumbIntermediate',
  mixamorigRightHandThumb3: 'rightThumbDistal',
  mixamorigRightHandIndex1: 'rightIndexProximal',
  mixamorigRightHandIndex2: 'rightIndexIntermediate',
  mixamorigRightHandIndex3: 'rightIndexDistal',
  mixamorigRightHandMiddle1:'rightMiddleProximal',
  mixamorigRightHandMiddle2:'rightMiddleIntermediate',
  mixamorigRightHandMiddle3:'rightMiddleDistal',
  mixamorigRightHandRing1:  'rightRingProximal',
  mixamorigRightHandRing2:  'rightRingIntermediate',
  mixamorigRightHandRing3:  'rightRingDistal',
  mixamorigRightHandPinky1: 'rightLittleProximal',
  mixamorigRightHandPinky2: 'rightLittleIntermediate',
  mixamorigRightHandPinky3: 'rightLittleDistal',
};

// =====================================================
// FBX 読み込み → VRM へリターゲット
// =====================================================
function loadAllFBX(vrm) {
  const fbxLoader = new FBXLoader();
  const entries   = Object.entries(FBX_FILES);
  let loaded = 0;

  if (entries.length === 0) {
    mixer = new THREE.AnimationMixer(vrm.scene);
    return;
  }

  entries.forEach(([key, file]) => {
    stateEl.textContent = `FBX 読み込み中: ${file}`;
    fbxLoader.load(
      file,
      fbx => {
        // コンソールにFBXのボーン名を出力（デバッグ用）
        console.log(`[FBX] ${file} のボーン一覧:`);
        fbx.traverse(o => { if (o.isBone) console.log('  ', o.name); });

        if (fbx.animations[0]) {
          const clip = retarget(fbx.animations[0], fbx, vrm);
          if (clip) { animations[key] = clip; console.log(`[FBX] ${key} 変換完了`); }
          else console.warn(`[FBX] ${key} 変換失敗 — ボーン名を確認してください`);
        }
        onFBXDone();
      },
      xhr => {
        if (xhr.total) stateEl.textContent = `FBX ${Math.round(xhr.loaded/xhr.total*100)}%`;
      },
      err => {
        console.error(`[FBX] ${file} エラー:`, err);
        stateEl.textContent = `❌ FBX 失敗: ${file}`;
        onFBXDone();
      }
    );

    function onFBXDone() {
      loaded++;
      if (loaded < entries.length) return;
      mixer = new THREE.AnimationMixer(vrm.scene);
      stateEl.textContent = '準備完了 ✓  Space で再生';
      if (animations.walk) playAnim('walk');
    }
  });
}

// =====================================================
// リターゲット処理
// FBXのクォータニオントラックをVRMのボーン名に付け替えるだけ
// =====================================================
function retarget(clip, fbxRoot, vrm) {
  const humanBones = vrm.humanoid.humanBones;
  const newTracks  = [];

  // FBXのボーン: name → object
  const fbxBones = {};
  fbxRoot.traverse(o => { if (o.isBone) fbxBones[o.name] = o; });

  clip.tracks.forEach(track => {
    const dotIdx     = track.name.indexOf('.');
    const fbxName    = track.name.slice(0, dotIdx);
    const property   = track.name.slice(dotIdx + 1);
    const vrmBoneKey = MIXAMO_TO_VRM[fbxName];
    if (!vrmBoneKey) return;

    const vrmNode = humanBones[vrmBoneKey]?.node;
    if (!vrmNode) return;

    const newName = `${vrmNode.name}.${property}`;

    if (property === 'quaternion') {
      newTracks.push(new THREE.QuaternionKeyframeTrack(newName, track.times, track.values));
    } else if (property === 'position' && fbxName === 'mixamorigHips') {
      // Hipsの位置はスケール調整（FBX=cm → VRM=m）
      const vals = Float32Array.from(track.values, v => v * 0.01);
      newTracks.push(new THREE.VectorKeyframeTrack(newName, track.times, vals));
    }
  });

  if (!newTracks.length) return null;
  return new THREE.AnimationClip('clip_' + Date.now(), clip.duration, newTracks);
}

// =====================================================
// アニメ制御
// =====================================================
function playAnim(key) {
  if (!mixer || !animations[key]) {
    stateEl.textContent = `アニメなし: ${key}`;
    return;
  }
  if (currentAction) currentAction.fadeOut(0.25);
  const action = mixer.clipAction(animations[key]);
  action.reset().fadeIn(0.25).play();
  action.setLoop(THREE.LoopRepeat, Infinity);
  currentAction = action;
  stateEl.textContent = `▶ ${key}`;
}

function stopAnim() {
  if (!currentAction) return;
  currentAction.fadeOut(0.25);
  currentAction = null;
  stateEl.textContent = '⏹ 停止';
}

// =====================================================
// キーボード
// =====================================================
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  switch (e.key) {
    case 'ArrowLeft': case 'ArrowRight':
    case 'ArrowUp':   case 'ArrowDown':
      if (animations.walk && !currentAction) playAnim('walk');
      e.preventDefault(); break;
    case ' ':
      currentAction ? stopAnim() : playAnim('walk');
      e.preventDefault(); break;
    case 'r': case 'R':
      camera.position.set(0, 1.3, 3.2);
      controls.target.set(0, 0.9, 0);
      controls.update(); break;
    // ← ここにキー追加 例: case '1': playAnim('idle'); break;
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function handleKeyCamera() {
  const sph = new THREE.Spherical().setFromVector3(
    camera.position.clone().sub(controls.target)
  );
  let changed = false;
  const rs = 0.03, zs = 0.08;
  if (keys['ArrowLeft'])  { sph.theta -= rs; changed = true; }
  if (keys['ArrowRight']) { sph.theta += rs; changed = true; }
  if (keys['ArrowUp'])    { sph.phi   -= rs; changed = true; }
  if (keys['ArrowDown'])  { sph.phi   += rs; changed = true; }
  if (keys['w']||keys['W']) { sph.radius -= zs; changed = true; }
  if (keys['s']||keys['S']) { sph.radius += zs; changed = true; }
  if (!changed) return;
  sph.phi    = Math.max(0.05, Math.min(Math.PI - 0.05, sph.phi));
  sph.radius = Math.max(0.5, Math.min(12, sph.radius));
  camera.position.setFromSpherical(sph).add(controls.target);
}

// =====================================================
// メインループ
// =====================================================
(function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  handleKeyCamera();
  controls.update();
  if (mixer) mixer.update(dt);
  if (vrm)   vrm.update(dt);
  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
